  seg_id: KR1h0004_tls_004-6a.1
  pos: 3
  bucket: body
  offset: 128
  translation:
    text: When stumbling along he will unfailingly insist on this."   【1.  The moral discourse refuses to maintain the elevated moralising tone and is philosophically and realistically analytic.   2. Through this conclusion this piece rises above idealising moralistic pontification. 3. The rhetoric of the last lines is the crux:  Consecultively in two 對仗 wildly colloquial and poetic binomes, the Master refers to the natural messiness of real life.  None of the clean neatness of Confucian discourse her. The mask is dropped. But in that topsy-turvy mess that is the real life, the model individual 君子 insists on his noble aspirations.   4. This is a tripartite (tricolon) structure, like LY 1.1., in which the first two members are thoroughly mediocre, but the last part makes a highly sensitive and subtle non-evident point.   5. Of course the old commentators never focus on such essential matters of dramatic poetic rhetoric.】
    title: 論語 (en)
    src: C. Harbsmeier
  form:
    orig: ''
    orth: 必
    pron: bì
  sense:
    id: uuid-e106f270-7eeb-4d71-86f2-707eebfd7156
    pos: V
    syn_func: vt+prep+Nab{ACT}
    def: insist on
