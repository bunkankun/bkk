- id: uuid-9c8673a1-f1d6-466b-8673-a1f1d6166bda
  concept: BIND
  concept_id: uuid-3d4e3af4-36fc-41b2-b732-dd9721af4325
  seg_id: KR1h0004_tls_015-3a.10
  pos: 4
  bucket: body
  offset: 99
  translation:
    text: 我是在此多学中有个一来贯通着的。”  　【一以贯之：贯，穿义。一以贯之，如孔子言《诗》，曰：“《诗》三百，一言以蔽之，曰：思无邪。”言礼，曰：“礼，与其奢也宁俭。”又曰：“殷因于夏礼，周因于殷礼，虽百世可知。”此等皆所谓一以贯之。惟诗礼之上，犹有贯通此诗礼者。多学，即犹言下学。一贯，则上达矣。上达自下学来，一贯自多学来。非多学，则无可贯。如云：“文武之道在人，贤者识其大者，不贤者识其小者，夫子焉不学”，是其多学。又曰：“文不在兹乎”，则又一以贯之矣。故求一贯，须先多学。多学当求一贯，不当专务多学而识，亦不当于多学外别求一贯。】　　【本章一以贯之，与“孔子告曾子”章一以贯之，两章“之”字所指微不同。告曾子是吾道一以贯之，“之”指道。本章告子贡多学一以贯之，“之”指学。然道与学仍当一以贯之。道之所得本于学，学之所求即在道。学者当由此两章再深求孔子一贯之义始得。谓孔子告曾子者其义深，告子贡者其义浅，因孔子之言而可以测曾子、子贡两人所学之深浅，则殊未见其诚然。】
    title: 論語新解
    src: Qian Mu 錢穆
  form:
    orig: ''
    orth: 貫
    orths:
    - 貫
    - 貫
    pron: guàn
  sense:
    id: uuid-1a864da2-70b8-4219-9216-ca6aa4b92cd2
    pos: V
    syn_func: vtoN
    sem_feat: figurative
    usage:
      warring-states-currency: '3'
    def: make into a unity, organise into a unity
  metadata:
    resp: a.schmidt
    created: '2025-09-20T17:12:02.704+09:00'
