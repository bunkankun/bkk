      KR1h0004_tls_001-1a.3: 1.1子曰：
      KR1h0004_tls_001-1a.4: 「學而時習之，
      KR1h0004_tls_001-1a.5: 不亦說乎？
      KR1h0004_tls_001-1a.6: 有朋自遠方來，
      KR1h0004_tls_001-1a.7: 不亦樂乎？
      KR1h0004_tls_001-1a.8: 人不知而不慍，
      KR1h0004_tls_001-2a.1: 不亦君子乎？」
      KR1h0004_tls_001-2a.3: 「其為人也孝弟，而好犯上者，
      KR1h0004_tls_001-2a.4: 鮮矣；
      KR1h0004_tls_001-2a.5: 不好犯上，而好作亂者，
      KR1h0004_tls_001-2a.6: 未之有也。
      KR1h0004_tls_001-2a.7: 君子務本，
      KR1h0004_tls_001-2a.8: 本立而道生。
      KR1h0004_tls_001-2a.9: 孝弟也者，
      KR1h0004_tls_001-3a.1: 其為人之本與！」
      KR1h0004_tls_001-3a.3: 「巧言令色，
      KR1h0004_tls_001-4a.1: 鮮矣仁！」
      KR1h0004_tls_001-4a.3: 「吾日三省吾身：
      KR1h0004_tls_001-4a.4: 為人謀而不忠乎？
      KR1h0004_tls_001-4a.5: 與朋友交而不信乎？
      KR1h0004_tls_001-5a.1: 傳不習乎？」
      KR1h0004_tls_001-5a.3: 「道千乘之國，
      KR1h0004_tls_001-5a.4: 敬事而信，
      KR1h0004_tls_001-5a.5: 節用而愛人，
      KR1h0004_tls_001-6a.1: 使民以時。」
      KR1h0004_tls_001-6a.3: 「弟子
      KR1h0004_tls_001-6a.4: 入則孝，
      KR1h0004_tls_001-6a.5: 出則悌，
      KR1h0004_tls_001-6a.6: 謹而信，
      KR1h0004_tls_001-6a.7: 汎愛眾，而親人。
      KR1h0004_tls_001-6a.8: 行有餘力，
      KR1h0004_tls_001-7a.1: 則以學文。」
      KR1h0004_tls_001-7a.3: 「賢賢易色；
      KR1h0004_tls_001-7a.4: 事父母，能竭其力；
      KR1h0004_tls_001-7a.5: 事君，能致其身；
      KR1h0004_tls_001-7a.6: 與朋友交，言而有信。
      KR1h0004_tls_001-7a.7: 雖曰未學，
      KR1h0004_tls_001-8a.1: 吾必謂之學矣。」
      KR1h0004_tls_001-8a.3: 「君子不重則不威；
      KR1h0004_tls_001-8a.4: 學則不固。
      KR1h0004_tls_001-8a.5: 主忠信。
      KR1h0004_tls_001-8a.6: 無友不如己者。
      KR1h0004_tls_001-9a.1: 過則勿憚改。」
      KR1h0004_tls_001-9a.3: 「慎終
      KR1h0004_tls_001-9a.4: 追遠，
      KR1h0004_tls_001-10a.1: 民德歸厚矣。」
      KR1h0004_tls_001-10a.2: 1.10子禽問於子貢曰：
      KR1h0004_tls_001-10a.3: 「夫子至於是邦也，
      KR1h0004_tls_001-10a.4: 必聞其政，
      KR1h0004_tls_001-10a.6: 抑與之與？」
      KR1h0004_tls_001-10a.8: 「夫子溫、良、恭、儉、讓以得之。
      KR1h0004_tls_001-10a.9: 夫子之求之也，
      KR1h0004_tls_001-11a.1: 其諸異乎人之求之與？」
      KR1h0004_tls_001-11a.3: 「父在，
      KR1h0004_tls_001-11a.4: 觀其志；
      KR1h0004_tls_001-11a.5: 父沒，
      KR1h0004_tls_001-11a.6: 觀其行；
      KR1h0004_tls_001-11a.7: 三年無改於父之道，
      KR1h0004_tls_001-12a.1: 可謂孝矣。」
      KR1h0004_tls_001-12a.3: 「禮之用，
      KR1h0004_tls_001-12a.4: 和為貴。
      KR1h0004_tls_001-12a.5: 先王之道，
      KR1h0004_tls_001-12a.6: 斯為美；
      KR1h0004_tls_001-12a.7: 小大由之。
      KR1h0004_tls_001-12a.8: 有所不行，
      KR1h0004_tls_001-12a.9: 知和而和，
      KR1h0004_tls_001-12a.10: 不以禮節之，
      KR1h0004_tls_001-13a.3: 「信近於義，
      KR1h0004_tls_001-13a.4: 言可復也。
      KR1h0004_tls_001-13a.5: 恭近於禮，
      KR1h0004_tls_001-13a.6: 遠恥辱也。
      KR1h0004_tls_001-13a.7: 因不失其親，
      KR1h0004_tls_001-14a.1: 亦可宗也。」
      KR1h0004_tls_001-14a.3: 「君子食無求飽，
      KR1h0004_tls_001-14a.4: 居無求安，
      KR1h0004_tls_001-14a.5: 敏於事而慎於言，
      KR1h0004_tls_001-14a.6: 就有道而正焉，
      KR1h0004_tls_001-15a.1: 可謂好學也已。」
      KR1h0004_tls_001-15a.3: 「貧而無諂，
      KR1h0004_tls_001-15a.4: 富而無驕，
      KR1h0004_tls_001-15a.5: 何如？」
      KR1h0004_tls_001-15a.7: 「可也；
      KR1h0004_tls_001-15a.8: 未若貧而樂
      KR1h0004_tls_001-16a.1: 富而好禮者也。」
      KR1h0004_tls_001-16a.3: 「《詩》云：
      KR1h0004_tls_001-16a.4: 『如切如磋，
      KR1h0004_tls_001-16a.5: 如琢如磨。』
      KR1h0004_tls_001-16a.6: 其斯之謂與？」
      KR1h0004_tls_001-16a.9: 始可與言《詩》已矣，
      KR1h0004_tls_001-17a.1: 告諸往而知來者。」
      KR1h0004_tls_001-17a.3: 「不患人之不己知，
      KR1h0004_tls_001-17a.4: 患不知人也。」
      KR1h0004_tls_002-1a.4: 「為政以德，
      KR1h0004_tls_002-1a.5: 譬如北辰，
      KR1h0004_tls_002-2a.1: 居其所而眾星共之。」
      KR1h0004_tls_002-2a.3: 「《詩》三百，
      KR1h0004_tls_002-2a.4: 一言以蔽之，
      KR1h0004_tls_002-3a.1: 『思無邪。』」
      KR1h0004_tls_002-3a.3: 「道之以政，
      KR1h0004_tls_002-3a.4: 齊之以刑，
      KR1h0004_tls_002-3a.5: 民免而無恥；
      KR1h0004_tls_002-3a.6: 道之以德，
      KR1h0004_tls_002-3a.7: 齊之以禮，
      KR1h0004_tls_002-4a.1: 有恥且格。」
      KR1h0004_tls_002-4a.3: 「吾十有五而志于學，
      KR1h0004_tls_002-4a.4: 三十而立，
      KR1h0004_tls_002-4a.5: 四十而不惑，
      KR1h0004_tls_002-4a.6: 五十而知天命，
      KR1h0004_tls_002-4a.7: 六十而耳順，
      KR1h0004_tls_002-4a.8: 七十而從心所欲，
      KR1h0004_tls_002-5a.1: 不踰矩。」
      KR1h0004_tls_002-5a.2: 2.5孟懿子問孝。
      KR1h0004_tls_002-6a.1: 「無違。」
      KR1h0004_tls_002-6a.2: 樊遲御，
      KR1h0004_tls_002-6a.3: 子告之曰：
      KR1h0004_tls_002-6a.4: 「孟孫問孝於我，
      KR1h0004_tls_002-6a.8: 「何謂也？」
      KR1h0004_tls_002-6a.10: 「生，事之以禮；
      KR1h0004_tls_002-7a.1: 祭之以禮。」
      KR1h0004_tls_002-7a.2: 2.6孟武伯問孝。
      KR1h0004_tls_002-8a.1: 「父母唯其疾之憂。」
      KR1h0004_tls_002-8a.2: 2.7子游問孝。
      KR1h0004_tls_002-8a.4: 「今之孝者，
      KR1h0004_tls_002-8a.5: 是謂能養。
      KR1h0004_tls_002-8a.6: 至於犬馬，
      KR1h0004_tls_002-8a.8: 不敬，
      KR1h0004_tls_002-9a.1: 何以別乎？」
      KR1h0004_tls_002-9a.2: 2.8子夏問孝。
      KR1h0004_tls_002-9a.4: 「色難。
      KR1h0004_tls_002-9a.6: 弟子服其勞；
      KR1h0004_tls_002-9a.7: 有酒食，
      KR1h0004_tls_002-9a.8: 先生饌，
      KR1h0004_tls_002-10a.1: 曾是以為孝乎？」
      KR1h0004_tls_002-10a.3: 「吾與回言
      KR1h0004_tls_002-10a.4: 終日，不違，
      KR1h0004_tls_002-10a.5: 如愚。
      KR1h0004_tls_002-10a.6: 退而省其私，
      KR1h0004_tls_002-10a.7: 亦足以發，
      KR1h0004_tls_002-11a.1: 回也不愚。」
      KR1h0004_tls_002-11a.3: 「視其所以，
      KR1h0004_tls_002-11a.4: 觀其所由，
      KR1h0004_tls_002-11a.5: 察其所安。
      KR1h0004_tls_002-11a.6: 人焉廋哉？
      KR1h0004_tls_002-12a.3: 「溫故而知新，
      KR1h0004_tls_002-13a.1: 可以為師矣。」
      KR1h0004_tls_002-14a.1: 「君子不器。」
      KR1h0004_tls_002-14a.2: 2.13子貢問君子。
      KR1h0004_tls_002-15a.1: 「先行其言而後從之。」
      KR1h0004_tls_002-15a.3: 「君子周而不比，
      KR1h0004_tls_002-16a.1: 小人比而不周。」
      KR1h0004_tls_002-16a.3: 「學而不思則罔，
      KR1h0004_tls_002-17a.1: 思而不學則殆。」
      KR1h0004_tls_002-17a.3: 「攻乎異端，
      KR1h0004_tls_002-18a.1: 斯害也已。」
      KR1h0004_tls_002-18a.4: 誨女知之乎！
      KR1h0004_tls_002-18a.5: 知之為知之，
      KR1h0004_tls_002-18a.6: 不知為不知，
      KR1h0004_tls_002-19a.1: 是知也。」
      KR1h0004_tls_002-19a.2: 2.18子張學干祿。
      KR1h0004_tls_002-19a.4: 「多聞闕疑，
      KR1h0004_tls_002-19a.5: 慎言其餘，
      KR1h0004_tls_002-19a.8: 慎行其餘，
      KR1h0004_tls_002-19a.9: 則寡悔。
      KR1h0004_tls_002-19a.10: 言寡尤，
      KR1h0004_tls_002-20a.1: 祿在其中矣。」
      KR1h0004_tls_002-20a.2: 2.19哀公問曰：
      KR1h0004_tls_002-20a.3: 「何為則民服？」
      KR1h0004_tls_002-20a.4: 孔子對曰：
      KR1h0004_tls_002-20a.5: 「舉直錯諸枉，
      KR1h0004_tls_002-20a.6: 則民服；
      KR1h0004_tls_002-20a.7: 舉枉錯諸直，
      KR1h0004_tls_002-21a.1: 則民不服。」
      KR1h0004_tls_002-21a.2: 2.20季康子問：
      KR1h0004_tls_002-21a.3: 「使民敬、忠以勸，
      KR1h0004_tls_002-21a.4: 如之何？」
      KR1h0004_tls_002-21a.6: 「臨之以莊，
      KR1h0004_tls_002-21a.8: 孝慈，
      KR1h0004_tls_002-21a.9: 則忠；
      KR1h0004_tls_002-21a.10: 舉善而教不能，
      KR1h0004_tls_002-22a.2: 2.21或謂孔子曰：
      KR1h0004_tls_002-22a.3: 「子奚不為政？」
      KR1h0004_tls_002-22a.7: 友于兄弟，
      KR1h0004_tls_002-22a.8: 施於有政。』
      KR1h0004_tls_002-23a.3: 「人而無信，
      KR1h0004_tls_002-23a.4: 不知其可也。
      KR1h0004_tls_002-23a.5: 大車無輗，
      KR1h0004_tls_002-23a.6: 小車無軏，
      KR1h0004_tls_002-24a.1: 其何以行之哉？」
      KR1h0004_tls_002-24a.2: 2.23子張問：
      KR1h0004_tls_002-24a.3: 「十世可知也？」
      KR1h0004_tls_002-24a.5: 「殷因於夏禮，
      KR1h0004_tls_002-24a.6: 所損益，
      KR1h0004_tls_002-24a.8: 周因於殷禮，
      KR1h0004_tls_002-24a.9: 所損益，
      KR1h0004_tls_002-25a.1: 雖百世可知也。」
      KR1h0004_tls_002-25a.3: 「非其鬼而祭之，
      KR1h0004_tls_002-25a.4: 諂也。見義不為，
      KR1h0004_tls_002-25a.5: 無勇也。」
      KR1h0004_tls_003-1a.3: 3.1孔子謂季氏，
      KR1h0004_tls_003-1a.4: 「八佾舞於庭，
      KR1h0004_tls_003-1a.5: 是可忍也，
      KR1h0004_tls_003-2a.1: 孰不可忍也？」
      KR1h0004_tls_003-2a.2: 3.2三家者以《雍》徹。
      KR1h0004_tls_003-2a.4: 「『相維辟公，
      KR1h0004_tls_003-2a.5: 天子穆穆』，
      KR1h0004_tls_003-3a.1: 奚取於三家之堂？」
      KR1h0004_tls_003-3a.3: 「人而不仁，
      KR1h0004_tls_003-3a.4: 如禮何？
      KR1h0004_tls_003-3a.5: 人而不仁，
      KR1h0004_tls_003-4a.1: 如樂何？」
      KR1h0004_tls_003-4a.2: 3.4林放問禮之本。
      KR1h0004_tls_003-4a.4: 「大哉問！
      KR1h0004_tls_003-4a.5: 禮，
      KR1h0004_tls_003-4a.6: 與其奢也，
      KR1h0004_tls_003-4a.7: 寧儉；
      KR1h0004_tls_003-4a.8: 喪，
      KR1h0004_tls_003-4a.9: 與其易也，
      KR1h0004_tls_003-5a.1: 寧戚。」
      KR1h0004_tls_003-5a.3: 「夷狄之有君，
      KR1h0004_tls_003-6a.1: 不如諸夏之亡也。」
      KR1h0004_tls_003-6a.2: 3.6季氏旅於泰山。
      KR1h0004_tls_003-6a.3: 子謂冉有曰：
      KR1h0004_tls_003-6a.4: 「女弗能救與？」
      KR1h0004_tls_003-6a.5: 對曰：
      KR1h0004_tls_003-6a.6: 「不能。」
      KR1h0004_tls_003-6a.8: 「嗚呼！
      KR1h0004_tls_003-7a.1: 曾謂泰山不如林放乎？」
      KR1h0004_tls_003-7a.3: 「君子無所爭。
      KR1h0004_tls_003-7a.4: 必也射乎！
      KR1h0004_tls_003-7a.5: 揖讓而升，
      KR1h0004_tls_003-7a.6: 下而飲。
      KR1h0004_tls_003-8a.1: 其爭也君子。」
      KR1h0004_tls_003-8a.2: 3.8子夏問曰：
      KR1h0004_tls_003-8a.3: 「『巧笑倩兮，
      KR1h0004_tls_003-8a.4: 美目盼兮，
      KR1h0004_tls_003-8a.5: 素以為絢兮。』
      KR1h0004_tls_003-8a.6: 何謂也？」
      KR1h0004_tls_003-9a.1: 「繪事後素。」
      KR1h0004_tls_003-9a.3: 「禮後乎？」
      KR1h0004_tls_003-10a.1: 始可與言《詩》已矣。」
      KR1h0004_tls_003-10a.3: 「夏禮，
      KR1h0004_tls_003-10a.4: 吾能言之，
      KR1h0004_tls_003-10a.5: 杞不足徵也；
      KR1h0004_tls_003-10a.6: 殷禮，
      KR1h0004_tls_003-10a.8: 宋不足徵也。
      KR1h0004_tls_003-10a.9: 文獻不足故也。
      KR1h0004_tls_003-11a.3: 「禘自既灌而往者，
      KR1h0004_tls_003-12a.1: 吾不欲觀之矣。」
      KR1h0004_tls_003-12a.2: 3.11或問禘之說。
      KR1h0004_tls_003-12a.4: 「不知也；
      KR1h0004_tls_003-12a.5: 知其說者之於天下也，
      KR1h0004_tls_003-12a.6: 其如示諸斯乎！」
      KR1h0004_tls_003-12a.7: 指其掌。
      KR1h0004_tls_003-13a.2: 3.12祭如在，
      KR1h0004_tls_003-13a.3: 祭神如神在。
      KR1h0004_tls_003-13a.5: 「吾不與祭，
      KR1h0004_tls_003-14a.1: 如不祭。」
      KR1h0004_tls_003-14a.2: 3.13王孫賈問曰：
      KR1h0004_tls_003-14a.3: 「『與其媚於奧，
      KR1h0004_tls_003-14a.4: 寧媚於竈』，
      KR1h0004_tls_003-14a.5: 何謂也？」
      KR1h0004_tls_003-14a.7: 「不然；
      KR1h0004_tls_003-14a.8: 獲罪於天，
      KR1h0004_tls_003-15a.1: 無所禱也。」
      KR1h0004_tls_003-15a.3: 「周監於二代，
      KR1h0004_tls_003-15a.4: 郁郁乎文哉！
      KR1h0004_tls_003-16a.1: 吾從周。」
      KR1h0004_tls_003-16a.2: 3.15子入太廟，
      KR1h0004_tls_003-16a.3: 每事問。
      KR1h0004_tls_003-16a.4: 或曰：
      KR1h0004_tls_003-16a.5: 「孰謂鄹人之子知禮乎？
      KR1h0004_tls_003-16a.6: 入太廟，
      KR1h0004_tls_003-16a.7: 每事問。」
      KR1h0004_tls_003-16a.8: 子聞之，
      KR1h0004_tls_003-17a.1: 「是禮也。」
      KR1h0004_tls_003-17a.3: 「射不主皮，
      KR1h0004_tls_003-17a.4: 為力不同科，
      KR1h0004_tls_003-18a.1: 古之道也。」
      KR1h0004_tls_003-18a.2: 3.17子貢欲去告朔之餼羊。
      KR1h0004_tls_003-18a.4: 「賜也！
      KR1h0004_tls_003-18a.5: 爾愛其羊，
      KR1h0004_tls_003-19a.1: 我愛其禮。」
      KR1h0004_tls_003-19a.3: 「事君盡禮，
      KR1h0004_tls_003-20a.1: 人以為諂也。」
      KR1h0004_tls_003-20a.2: 3.19定公問：
      KR1h0004_tls_003-20a.3: 「君使臣，
      KR1h0004_tls_003-20a.4: 臣事君，
      KR1h0004_tls_003-20a.5: 如之何？」
      KR1h0004_tls_003-20a.6: 孔子對曰：
      KR1h0004_tls_003-20a.7: 「君使臣以禮，
      KR1h0004_tls_003-21a.1: 臣事君以忠。」
      KR1h0004_tls_003-21a.4: 樂而不淫，
      KR1h0004_tls_003-22a.1: 哀而不傷。」
      KR1h0004_tls_003-22a.2: 3.21哀公問社於宰我。
      KR1h0004_tls_003-22a.3: 宰我對曰：
      KR1h0004_tls_003-22a.4: 「夏后氏以松，
      KR1h0004_tls_003-22a.5: 殷人以柏，
      KR1h0004_tls_003-22a.6: 周人以栗，
      KR1h0004_tls_003-22a.8: 使民戰栗。」
      KR1h0004_tls_003-22a.10: 「成事不說，
      KR1h0004_tls_003-23a.1: 既往不咎。」
      KR1h0004_tls_003-24a.1: 「管仲之器小哉！」
      KR1h0004_tls_003-24a.2: 或曰：
      KR1h0004_tls_003-24a.3: 「管仲儉乎？」
      KR1h0004_tls_003-24a.5: 「管氏有三歸，
      KR1h0004_tls_003-24a.6: 官事不攝，
      KR1h0004_tls_003-25a.1: 焉得儉？」
      KR1h0004_tls_003-25a.2: 「然則管仲知禮乎？」
      KR1h0004_tls_003-25a.4: 「邦君樹塞門，
      KR1h0004_tls_003-25a.5: 管氏亦樹塞門。
      KR1h0004_tls_003-25a.6: 邦君為兩君之好，
      KR1h0004_tls_003-25a.7: 有反坫，
      KR1h0004_tls_003-25a.8: 管氏亦有反坫。
      KR1h0004_tls_003-25a.9: 管氏而知禮，
      KR1h0004_tls_003-26a.1: 孰不知禮？」
      KR1h0004_tls_003-26a.2: 3.23子語魯大師樂，
      KR1h0004_tls_003-26a.4: 「樂其可知也：
      KR1h0004_tls_003-26a.5: 始作，
      KR1h0004_tls_003-26a.6: 翕如也；
      KR1h0004_tls_003-26a.7: 從之，
      KR1h0004_tls_003-26a.8: 純如也，
      KR1h0004_tls_003-26a.9: 皦如也，
      KR1h0004_tls_003-26a.10: 繹如也，
      KR1h0004_tls_003-27a.2: 3.24儀封人請見，
      KR1h0004_tls_003-27a.4: 「君子之至於斯也，
      KR1h0004_tls_003-27a.5: 吾未嘗不得見也。」
      KR1h0004_tls_003-27a.6: 從者見之。
      KR1h0004_tls_003-27a.8: 「二三子何患於喪乎？
      KR1h0004_tls_003-27a.9: 天下之無道也久矣，
      KR1h0004_tls_003-28a.1: 天將以夫子為木鐸。」
      KR1h0004_tls_003-28a.2: 3.25子謂《韶》，
      KR1h0004_tls_003-28a.3: 「盡美矣，
      KR1h0004_tls_003-28a.4: 又盡善也。」
      KR1h0004_tls_003-28a.5: 謂《武》，
      KR1h0004_tls_003-29a.1: 未盡善也。」
      KR1h0004_tls_003-29a.3: 「居上不寬，
      KR1h0004_tls_003-29a.4: 為禮不敬，
      KR1h0004_tls_003-29a.5: 臨喪不哀，
      KR1h0004_tls_003-29a.6: 吾何以觀之哉？」
      KR1h0004_tls_004-1a.4: 「里仁為美。
      KR1h0004_tls_004-1a.5: 擇不處仁，
      KR1h0004_tls_004-2a.1: 焉得知？」
      KR1h0004_tls_004-2a.3: 「不仁者
      KR1h0004_tls_004-2a.4: 不可以久處約，
      KR1h0004_tls_004-2a.5: 不可以長處樂。
      KR1h0004_tls_004-2a.6: 仁者安仁，
      KR1h0004_tls_004-3a.1: 知者利仁。」
      KR1h0004_tls_004-3a.3: 「唯仁者
      KR1h0004_tls_004-3a.4: 能好人，
      KR1h0004_tls_004-4a.1: 能惡人。」
      KR1h0004_tls_004-4a.3: 「苟志於仁矣，
      KR1h0004_tls_004-5a.1: 無惡也。」
      KR1h0004_tls_004-5a.3: 「富與貴，
      KR1h0004_tls_004-5a.4: 是人之所欲也；
      KR1h0004_tls_004-5a.5: 不以其道得之，
      KR1h0004_tls_004-5a.6: 不處也。
      KR1h0004_tls_004-5a.7: 貧與賤，
      KR1h0004_tls_004-5a.8: 是人之所惡也；
      KR1h0004_tls_004-5a.9: 不以其道得之，
      KR1h0004_tls_004-5a.10: 不去也。
      KR1h0004_tls_004-5a.12: 惡乎成名？
      KR1h0004_tls_004-5a.13: 君子無終食之間違仁，
      KR1h0004_tls_004-5a.14: 造次必於是，
      KR1h0004_tls_004-6a.1: 顛沛必於是。」
      KR1h0004_tls_004-6a.3: 「我未見好仁者、
      KR1h0004_tls_004-6a.4: 惡不仁者。
      KR1h0004_tls_004-6a.5: 好仁者，
      KR1h0004_tls_004-6a.6: 無以尚之；
      KR1h0004_tls_004-6a.7: 惡不仁者，
      KR1h0004_tls_004-6a.8: 其為仁矣，
      KR1h0004_tls_004-6a.9: 不使不仁者加乎其身。
      KR1h0004_tls_004-6a.10: 有能一日用其力於仁矣乎？
      KR1h0004_tls_004-6a.11: 我未見力不足者。
      KR1h0004_tls_004-7a.1: 蓋有之矣，我未之見也。」
      KR1h0004_tls_004-7a.3: 「人之過也，
      KR1h0004_tls_004-7a.4: 各於其黨。
      KR1h0004_tls_004-7a.5: 觀過，
      KR1h0004_tls_004-8a.1: 斯知人矣。」
      KR1h0004_tls_004-8a.3: 「朝聞道，
      KR1h0004_tls_004-9a.1: 夕死可矣。」
      KR1h0004_tls_004-9a.3: 「士志於道，
      KR1h0004_tls_004-9a.4: 而恥惡衣惡食者，
      KR1h0004_tls_004-10a.1: 未足與議也。」
      KR1h0004_tls_004-10a.3: 「君子之於天下也，
      KR1h0004_tls_004-10a.4: 無適也，
      KR1h0004_tls_004-10a.5: 無莫也，
      KR1h0004_tls_004-11a.1: 義之與比。」
      KR1h0004_tls_004-11a.3: 「君子懷德，
      KR1h0004_tls_004-11a.4: 小人懷土；
      KR1h0004_tls_004-11a.5: 君子懷刑，
      KR1h0004_tls_004-12a.1: 小人懷惠。」
      KR1h0004_tls_004-12a.3: 「放於利而行，
      KR1h0004_tls_004-13a.1: 多怨。」
      KR1h0004_tls_004-13a.3: 「能以禮讓為國，於從政乎
      KR1h0004_tls_004-13a.5: 不能以禮讓為國，
      KR1h0004_tls_004-14a.1: 如禮何？」
      KR1h0004_tls_004-14a.3: 「不患無位，
      KR1h0004_tls_004-14a.4: 患所以立。
      KR1h0004_tls_004-14a.5: 不患莫己知，
      KR1h0004_tls_004-15a.1: 求為可知也。」
      KR1h0004_tls_004-15a.3: 「參乎！
      KR1h0004_tls_004-15a.4: 吾道一以貫之。」
      KR1h0004_tls_004-16a.1: 「唯。」
      KR1h0004_tls_004-16a.2: 子出，
      KR1h0004_tls_004-16a.3: 門人問曰：
      KR1h0004_tls_004-16a.4: 「何謂也？」
      KR1h0004_tls_004-17a.1: 忠恕而已矣。」
      KR1h0004_tls_004-17a.3: 「君子喻於義，
      KR1h0004_tls_004-18a.1: 小人喻於利。」
      KR1h0004_tls_004-18a.3: 「見賢思齊焉，
      KR1h0004_tls_004-19a.1: 見不賢而內自省也。」
      KR1h0004_tls_004-19a.3: 「事父母幾諫，
      KR1h0004_tls_004-19a.4: 見志不從，
      KR1h0004_tls_004-19a.5: 又敬不違，
      KR1h0004_tls_004-20a.1: 勞而不怨。」
      KR1h0004_tls_004-20a.3: 「父母在，
      KR1h0004_tls_004-20a.4: 不遠遊，
      KR1h0004_tls_004-21a.1: 遊必有方。」
      KR1h0004_tls_004-21a.3: 「三年無改於父之道，
      KR1h0004_tls_004-22a.1: 可謂孝矣。」
      KR1h0004_tls_004-22a.3: 「父母之年，
      KR1h0004_tls_004-22a.4: 不可不知也。
      KR1h0004_tls_004-22a.5: 一則以喜，
      KR1h0004_tls_004-23a.1: 一則以懼。」
      KR1h0004_tls_004-23a.3: 「古者言之不出，
      KR1h0004_tls_004-24a.1: 恥躬之不逮也。」
      KR1h0004_tls_004-24a.3: 「以約失之者
      KR1h0004_tls_004-25a.1: 鮮矣。」
      KR1h0004_tls_004-25a.3: 「君子欲訥於言
      KR1h0004_tls_004-26a.1: 而敏於行。」
      KR1h0004_tls_004-26a.3: 「德不孤，
      KR1h0004_tls_004-27a.1: 必有鄰。」
      KR1h0004_tls_004-27a.3: 「事君數，
      KR1h0004_tls_004-27a.4: 斯辱矣；
      KR1h0004_tls_004-27a.5: 朋友數，
      KR1h0004_tls_004-27a.6: 斯疏矣。」
      KR1h0004_tls_005-1a.4: 「可妻也。
      KR1h0004_tls_005-1a.5: 雖在縲絏之中，
      KR1h0004_tls_005-1a.6: 非其罪也。」
      KR1h0004_tls_005-1a.7: 以其子妻之。
      KR1h0004_tls_005-2a.2: 5.2子謂南容，
      KR1h0004_tls_005-2a.3: 「邦有道，不廢；
      KR1h0004_tls_005-2a.4: 邦無道，
      KR1h0004_tls_005-2a.5: 免於刑戮。」
      KR1h0004_tls_005-2a.6: 以其兄之子妻之。
      KR1h0004_tls_005-3a.2: 5.3子謂子賤，
      KR1h0004_tls_005-3a.3: 「君子哉若人！
      KR1h0004_tls_005-3a.4: 魯無君子者，
      KR1h0004_tls_005-4a.1: 斯焉取斯？」
      KR1h0004_tls_005-4a.2: 5.4子貢問曰：
      KR1h0004_tls_005-4a.5: 「女、器也。」
      KR1h0004_tls_005-4a.7: 「何器也？」
      KR1h0004_tls_005-5a.1: 「瑚璉也。」
      KR1h0004_tls_005-5a.3: 「雍也仁而不佞。」
      KR1h0004_tls_005-5a.5: 「焉用佞？
      KR1h0004_tls_005-5a.6: 禦人以口給，
      KR1h0004_tls_005-5a.7: 屢憎於人。
      KR1h0004_tls_005-5a.8: 不知其仁，
      KR1h0004_tls_005-6a.1: 焉用佞？」
      KR1h0004_tls_005-6a.2: 5.6子使漆彫開仕。
      KR1h0004_tls_005-6a.4: 「吾斯之未能信。」
      KR1h0004_tls_005-6a.5: 子說。
      KR1h0004_tls_005-7a.3: 「道不行，
      KR1h0004_tls_005-7a.4: 乘桴浮于海。
      KR1h0004_tls_005-7a.5: 從我者，
      KR1h0004_tls_005-7a.6: 其由與？」
      KR1h0004_tls_005-7a.7: 子路聞之喜。
      KR1h0004_tls_005-7a.9: 「由也好勇過我，
      KR1h0004_tls_005-8a.1: 無所取材。」
      KR1h0004_tls_005-8a.2: 5.8孟武伯問：
      KR1h0004_tls_005-8a.3: 「子路仁乎？」
      KR1h0004_tls_005-8a.5: 「不知也。」
      KR1h0004_tls_005-8a.6: 又問。
      KR1h0004_tls_005-8a.9: 千乘之國，
      KR1h0004_tls_005-8a.10: 可使治其賦也，
      KR1h0004_tls_005-9a.5: 千室之邑，
      KR1h0004_tls_005-9a.6: 百乘之家，
      KR1h0004_tls_005-9a.7: 可使為之宰也，
      KR1h0004_tls_005-10a.1: 不知其仁也。」
      KR1h0004_tls_005-10a.5: 可使與賓客言也，
      KR1h0004_tls_005-11a.1: 不知其仁也。」
      KR1h0004_tls_005-11a.3: 「女與回也
      KR1h0004_tls_005-11a.4: 孰愈？」
      KR1h0004_tls_005-11a.7: 何敢望回？
      KR1h0004_tls_005-11a.8: 回也聞一以知十，
      KR1h0004_tls_005-11a.9: 賜也聞一以知二。」
      KR1h0004_tls_005-12a.1: 吾與女弗如也。」
      KR1h0004_tls_005-12a.2: 5.10宰予晝寢。
      KR1h0004_tls_005-12a.4: 「朽木不可雕也，
      KR1h0004_tls_005-12a.5: 糞土之牆不可杇也；
      KR1h0004_tls_005-12a.6: 於予與何誅？」
      KR1h0004_tls_005-12a.8: 「始吾於人也，
      KR1h0004_tls_005-12a.9: 聽其言而信其行；
      KR1h0004_tls_005-12a.10: 今吾於人也，
      KR1h0004_tls_005-13a.1: 於予與改是。」
      KR1h0004_tls_005-13a.3: 「吾未見剛者。」
      KR1h0004_tls_005-13a.4: 或對曰：
      KR1h0004_tls_005-13a.7: 「棖也慾，
      KR1h0004_tls_005-14a.1: 焉得剛？」
      KR1h0004_tls_005-14a.3: 「我不欲人之加諸我也，
      KR1h0004_tls_005-14a.4: 吾亦欲無加諸人。」
      KR1h0004_tls_005-15a.1: 非爾所及也。」
      KR1h0004_tls_005-15a.3: 「夫子之文章，
      KR1h0004_tls_005-15a.4: 可得而聞也；
      KR1h0004_tls_005-15a.5: 夫子之言性與天道，
      KR1h0004_tls_005-16a.1: 不可得而聞也。」
      KR1h0004_tls_005-16a.2: 5.14子路有聞，
      KR1h0004_tls_005-16a.3: 未之能行，
      KR1h0004_tls_005-16a.4: 唯恐有聞。
      KR1h0004_tls_005-17a.2: 5.15子貢問曰：
      KR1h0004_tls_005-17a.4: 『文』也？」
      KR1h0004_tls_005-17a.6: 「敏而好學，
      KR1h0004_tls_005-17a.7: 不恥下問，
      KR1h0004_tls_005-18a.1: 『文』也。」
      KR1h0004_tls_005-18a.3: 「有君子之道四焉：
      KR1h0004_tls_005-18a.4: 其行己也恭，
      KR1h0004_tls_005-18a.5: 其事上也敬，
      KR1h0004_tls_005-18a.6: 其養民也惠，
      KR1h0004_tls_005-19a.1: 其使民也義。」
      KR1h0004_tls_005-19a.3: 「晏平仲善與人交，
      KR1h0004_tls_005-20a.1: 久而敬之。」
      KR1h0004_tls_005-20a.3: 「臧文仲居蔡，
      KR1h0004_tls_005-20a.4: 山節藻梲，
      KR1h0004_tls_005-21a.1: 何如其知也？」
      KR1h0004_tls_005-21a.2: 5.19子張問曰：
      KR1h0004_tls_005-21a.3: 「令尹子文三仕為令尹，
      KR1h0004_tls_005-21a.4: 無喜色；
      KR1h0004_tls_005-21a.5: 三已之，
      KR1h0004_tls_005-21a.6: 無慍色。
      KR1h0004_tls_005-21a.7: 舊令尹之政，
      KR1h0004_tls_005-21a.8: 必以告新令尹。
      KR1h0004_tls_005-21a.9: 何如？」
      KR1h0004_tls_005-21a.11: 「忠矣。」
      KR1h0004_tls_005-21a.13: 「仁矣乎？」
      KR1h0004_tls_005-22a.1: 焉得仁？」
      KR1h0004_tls_005-22a.2: 「崔子弒齊君，
      KR1h0004_tls_005-22a.3: 陳文子有馬十乘，
      KR1h0004_tls_005-22a.4: 棄而違之。
      KR1h0004_tls_005-22a.5: 至於他邦，
      KR1h0004_tls_005-22a.7: 『猶吾大夫崔子也。』
      KR1h0004_tls_005-22a.9: 之一邦，
      KR1h0004_tls_005-22a.10: 則又曰：
      KR1h0004_tls_005-22a.13: 何如？」
      KR1h0004_tls_005-22a.15: 「清矣。」
      KR1h0004_tls_005-22a.19: 「未知；
      KR1h0004_tls_005-23a.1: 焉得仁？」
      KR1h0004_tls_005-23a.2: 5.20季文子三思而後行。
      KR1h0004_tls_005-23a.3: 子聞之，
      KR1h0004_tls_005-23a.5: 「再，
      KR1h0004_tls_005-24a.1: 斯可矣。」
      KR1h0004_tls_005-24a.4: 邦有道，
      KR1h0004_tls_005-24a.5: 則知；
      KR1h0004_tls_005-24a.8: 其知可及也，
      KR1h0004_tls_005-25a.1: 其愚不可及也。」
      KR1h0004_tls_005-25a.2: 5.22子在陳，
      KR1h0004_tls_005-25a.4: 「歸與！
      KR1h0004_tls_005-25a.6: 吾黨之小子狂簡，
      KR1h0004_tls_005-25a.7: 斐然成章，
      KR1h0004_tls_005-26a.1: 不知所以裁之。」
      KR1h0004_tls_005-26a.3: 「伯夷、叔齊不念舊惡，
      KR1h0004_tls_005-27a.1: 怨是用希。」
      KR1h0004_tls_005-27a.3: 「孰謂微生高直？
      KR1h0004_tls_005-27a.4: 或乞醯焉，
      KR1h0004_tls_005-28a.1: 乞諸其鄰而與之。」
      KR1h0004_tls_005-28a.4: 令色、足恭，
      KR1h0004_tls_005-28a.5: 左丘明恥之，
      KR1h0004_tls_005-28a.6: 丘亦恥之。
      KR1h0004_tls_005-28a.7: 匿怨而友其人，
      KR1h0004_tls_005-28a.8: 左丘明恥之，
      KR1h0004_tls_005-29a.1: 丘亦恥之。」
      KR1h0004_tls_005-29a.2: 5.26顏淵季路侍。
      KR1h0004_tls_005-29a.4: 「盍各言爾志？」
      KR1h0004_tls_005-29a.6: 「願車馬衣（輕）裘
      KR1h0004_tls_005-29a.7: 與朋友共，
      KR1h0004_tls_005-29a.8: 敝之而無憾。」
      KR1h0004_tls_005-29a.10: 「願無伐善，
      KR1h0004_tls_005-29a.13: 「願聞子之志。」
      KR1h0004_tls_005-29a.15: 「老者安之，
      KR1h0004_tls_005-29a.16: 朋友信之，
      KR1h0004_tls_005-30a.1: 少者懷之。」
      KR1h0004_tls_005-30a.3: 「已矣乎！
      KR1h0004_tls_005-30a.4: 吾未見能見其過
      KR1h0004_tls_005-31a.1: 而內自訟者也。」
      KR1h0004_tls_005-31a.3: 「十室之邑，
      KR1h0004_tls_005-31a.4: 必有忠信如丘者焉，
      KR1h0004_tls_005-31a.5: 不如丘之好學也。」
      KR1h0004_tls_006-2a.1: 「雍也可使南面。」
      KR1h0004_tls_006-2a.2: 6.2仲弓問子桑伯子。
      KR1h0004_tls_006-3a.1: 「可也簡。」
      KR1h0004_tls_006-3a.3: 「居敬而行簡，
      KR1h0004_tls_006-3a.4: 以臨其民，
      KR1h0004_tls_006-3a.6: 居簡而行簡，
      KR1h0004_tls_006-3a.7: 無乃大簡乎？」
      KR1h0004_tls_006-4a.1: 「雍之言然。」
      KR1h0004_tls_006-4a.2: 6.3哀公問：
      KR1h0004_tls_006-4a.3: 「弟子孰為好學？」
      KR1h0004_tls_006-4a.5: 「有顏回者好學，
      KR1h0004_tls_006-4a.6: 不遷怒，
      KR1h0004_tls_006-4a.7: 不貳過。
      KR1h0004_tls_006-4a.8: 不幸短命死矣，
      KR1h0004_tls_006-4a.9: 今也則亡，
      KR1h0004_tls_006-5a.1: 未聞好學者也。」
      KR1h0004_tls_006-5a.2: 6.4子華使於齊，
      KR1h0004_tls_006-5a.3: 冉子為其母請粟。
      KR1h0004_tls_006-6a.1: 「與之釜。」
      KR1h0004_tls_006-6a.2: 請益。
      KR1h0004_tls_006-7a.1: 「與之庾。」
      KR1h0004_tls_006-7a.2: 冉子與之粟五秉。
      KR1h0004_tls_006-8a.3: 「赤之適齊也，
      KR1h0004_tls_006-8a.4: 乘肥馬，
      KR1h0004_tls_006-8a.5: 衣輕裘。
      KR1h0004_tls_006-9a.1: 君子周急不繼富。」
      KR1h0004_tls_006-9a.2: 6.5原思為之宰，
      KR1h0004_tls_006-9a.3: 與之粟九百，
      KR1h0004_tls_006-9a.4: 辭。
      KR1h0004_tls_006-9a.6: 「毋
      KR1h0004_tls_006-10a.1: 以與爾鄰里鄉黨乎？」
      KR1h0004_tls_006-10a.4: 「犂牛之子騂且角，
      KR1h0004_tls_006-10a.5: 雖欲勿用，
      KR1h0004_tls_006-11a.1: 山川其舍諸？」
      KR1h0004_tls_006-11a.3: 「回也，
      KR1h0004_tls_006-11a.4: 其心三月不違仁，
      KR1h0004_tls_006-12a.1: 其餘則日月至焉而已矣。」
      KR1h0004_tls_006-12a.2: 6.8季康子問：
      KR1h0004_tls_006-12a.3: 「仲由可使從政也與？」
      KR1h0004_tls_006-12a.5: 「由也果，
      KR1h0004_tls_006-13a.5: 「賜也達，
      KR1h0004_tls_006-14a.1: 於從政乎何有？」
      KR1h0004_tls_006-14a.5: 「求也藝，
      KR1h0004_tls_006-15a.2: 6.9季氏使閔子騫為費宰。
      KR1h0004_tls_006-15a.4: 「善為我辭焉！
      KR1h0004_tls_006-15a.5: 如有復我者，
      KR1h0004_tls_006-16a.1: 則吾必在汶上矣。」
      KR1h0004_tls_006-16a.2: 6.10伯牛有疾，
      KR1h0004_tls_006-16a.3: 子問之，
      KR1h0004_tls_006-16a.4: 自牖執其手，
      KR1h0004_tls_006-16a.6: 「亡之，
      KR1h0004_tls_006-16a.7: 命矣夫！
      KR1h0004_tls_006-16a.8: 斯人也而有斯疾也！
      KR1h0004_tls_006-17a.1: 斯人也而有斯疾也！」
      KR1h0004_tls_006-17a.3: 「賢哉回也！
      KR1h0004_tls_006-17a.4: 一簞食，
      KR1h0004_tls_006-17a.5: 一瓢飲，
      KR1h0004_tls_006-17a.6: 在陋巷，
      KR1h0004_tls_006-17a.7: 人不堪其憂，
      KR1h0004_tls_006-17a.8: 回也不改其樂。
      KR1h0004_tls_006-18a.1: 賢哉回也！」
      KR1h0004_tls_006-18a.3: 「非不說子之道，
      KR1h0004_tls_006-18a.4: 力不足也。」
      KR1h0004_tls_006-18a.6: 「力不足者，
      KR1h0004_tls_006-18a.7: 中道而廢。
      KR1h0004_tls_006-19a.1: 今女畫。」
      KR1h0004_tls_006-19a.2: 6.13子謂子夏曰：
      KR1h0004_tls_006-19a.3: 「女為君子儒！
      KR1h0004_tls_006-20a.1: 無為小人儒！」
      KR1h0004_tls_006-20a.2: 6.14子游為武城宰。
      KR1h0004_tls_006-20a.4: 「女得人焉耳乎？」
      KR1h0004_tls_006-20a.6: 「有澹臺滅明者，
      KR1h0004_tls_006-20a.7: 行不由徑，
      KR1h0004_tls_006-20a.8: 非公事，
      KR1h0004_tls_006-21a.1: 未嘗至於偃之室也。」
      KR1h0004_tls_006-21a.3: 「孟之反不伐，
      KR1h0004_tls_006-21a.4: 奔而殿，
      KR1h0004_tls_006-21a.5: 將入門，
      KR1h0004_tls_006-21a.6: 策其馬，
      KR1h0004_tls_006-21a.8: 『非敢後也，
      KR1h0004_tls_006-22a.1: 馬不進也。』」
      KR1h0004_tls_006-22a.3: 「不有祝鮀之佞，
      KR1h0004_tls_006-22a.4: 而有宋朝之美，
      KR1h0004_tls_006-23a.1: 難乎免於今之世矣。」
      KR1h0004_tls_006-23a.3: 「誰能出不由戶？
      KR1h0004_tls_006-24a.1: 何莫由斯道也？」
      KR1h0004_tls_006-24a.3: 「質勝文則野，
      KR1h0004_tls_006-24a.4: 文勝質則史。
      KR1h0004_tls_006-25a.1: 文質彬彬，然後君子。」
      KR1h0004_tls_006-25a.3: 「人之生也直，
      KR1h0004_tls_006-26a.1: 罔之生也幸而免。」
      KR1h0004_tls_006-26a.3: 「知之者不如好之者，
      KR1h0004_tls_006-27a.1: 好之者不如樂之者。」
      KR1h0004_tls_006-27a.3: 「中人以上，
      KR1h0004_tls_006-27a.4: 可以語上也；
      KR1h0004_tls_006-27a.5: 中人以下，
      KR1h0004_tls_006-28a.1: 不可以語上也。」
      KR1h0004_tls_006-28a.2: 6.22樊遲問知。
      KR1h0004_tls_006-28a.4: 「務民之義，
      KR1h0004_tls_006-28a.5: 敬鬼神而遠之，
      KR1h0004_tls_006-29a.1: 可謂知矣。」
      KR1h0004_tls_006-29a.2: 問仁。
      KR1h0004_tls_006-29a.4: 「仁者先難而後獲，
      KR1h0004_tls_006-30a.1: 可謂仁矣。」
      KR1h0004_tls_006-30a.3: 「知者樂水，
      KR1h0004_tls_006-30a.4: 仁者樂山。
      KR1h0004_tls_006-30a.5: 知者動，
      KR1h0004_tls_006-30a.6: 仁者靜。
      KR1h0004_tls_006-30a.7: 知者樂，
      KR1h0004_tls_006-31a.1: 仁者壽。」
      KR1h0004_tls_006-31a.3: 「齊一變，
      KR1h0004_tls_006-31a.5: 魯一變，
      KR1h0004_tls_006-32a.1: 至於道。」
      KR1h0004_tls_006-32a.3: 「觚不觚，
      KR1h0004_tls_006-32a.4: 觚哉！
      KR1h0004_tls_006-33a.2: 6.26宰我問曰：
      KR1h0004_tls_006-33a.3: 「仁者，
      KR1h0004_tls_006-33a.4: 雖告之曰，『井有仁焉。』
      KR1h0004_tls_006-33a.5: 其從之也？」
      KR1h0004_tls_006-33a.7: 「何為其然也。
      KR1h0004_tls_006-33a.8: 君子可逝也，
      KR1h0004_tls_006-33a.9: 不可陷也；
      KR1h0004_tls_006-33a.10: 可欺也，
      KR1h0004_tls_006-34a.3: 「君子博學於文，
      KR1h0004_tls_006-34a.4: 約之以禮，
      KR1h0004_tls_006-35a.1: 亦可以弗畔矣夫！」
      KR1h0004_tls_006-35a.2: 6.28子見南子，
      KR1h0004_tls_006-35a.3: 子路不說。
      KR1h0004_tls_006-35a.4: 夫子矢之曰：
      KR1h0004_tls_006-35a.5: 「予所否者，
      KR1h0004_tls_006-35a.6: 天厭之！
      KR1h0004_tls_006-36a.1: 天厭之！」
      KR1h0004_tls_006-36a.3: 「中庸之為德也，
      KR1h0004_tls_006-36a.4: 其至矣乎！
      KR1h0004_tls_006-37a.1: 民鮮久矣。」
      KR1h0004_tls_006-37a.3: 「如有博施於民而能濟眾，
      KR1h0004_tls_006-37a.4: 何如？
      KR1h0004_tls_006-37a.7: 「何事於仁！
      KR1h0004_tls_006-37a.8: 必也聖乎！
      KR1h0004_tls_006-37a.9: 堯、舜其猶病諸！
      KR1h0004_tls_006-37a.10: 夫仁者，
      KR1h0004_tls_006-37a.11: 己欲立而立人，
      KR1h0004_tls_006-37a.12: 己欲達而達人。
      KR1h0004_tls_006-37a.13: 能近取譬，
      KR1h0004_tls_006-37a.14: 可謂仁之方也已。」
      KR1h0004_tls_007-1a.4: 「述而不作，
      KR1h0004_tls_007-1a.5: 信而好古，
      KR1h0004_tls_007-2a.1: 竊比於我老彭。」
      KR1h0004_tls_007-2a.3: 「默而識之，
      KR1h0004_tls_007-2a.4: 學而不厭，
      KR1h0004_tls_007-2a.5: 誨人不倦，
      KR1h0004_tls_007-3a.1: 何有於我哉？」
      KR1h0004_tls_007-3a.3: 「德之不脩，
      KR1h0004_tls_007-3a.4: 學之不講，
      KR1h0004_tls_007-3a.5: 聞義不能徙，
      KR1h0004_tls_007-3a.6: 不善不能改，
      KR1h0004_tls_007-4a.2: 7.4子之燕居，
      KR1h0004_tls_007-4a.3: 申申如也，
      KR1h0004_tls_007-4a.4: 夭夭如也。
      KR1h0004_tls_007-5a.3: 「甚矣吾衰也！
      KR1h0004_tls_007-6a.1: 久矣吾不復夢見周公！」
      KR1h0004_tls_007-6a.3: 「志於道，
      KR1h0004_tls_007-6a.4: 據於德，
      KR1h0004_tls_007-6a.5: 依於仁，
      KR1h0004_tls_007-7a.1: 遊於藝。」
      KR1h0004_tls_007-7a.3: 「自行束脩以上，
      KR1h0004_tls_007-8a.1: 吾未嘗無誨焉。」
      KR1h0004_tls_007-8a.3: 「不憤不啟，
      KR1h0004_tls_007-8a.4: 不悱不發。
      KR1h0004_tls_007-8a.5: 舉一隅不以三隅反，
      KR1h0004_tls_007-9a.1: 則不復也。」
      KR1h0004_tls_007-9a.2: 7.9子食於有喪者之側，
      KR1h0004_tls_007-9a.3: 未嘗飽也。
      KR1h0004_tls_007-10a.2: 7.10子於是日哭，
      KR1h0004_tls_007-10a.3: 則不歌。
      KR1h0004_tls_007-11a.3: 「用之則行，
      KR1h0004_tls_007-11a.4: 舍之則藏，
      KR1h0004_tls_007-12a.1: 唯我與爾有是夫！」
      KR1h0004_tls_007-12a.3: 「子行三軍，
      KR1h0004_tls_007-13a.1: 則誰與？」
      KR1h0004_tls_007-13a.3: 「暴虎馮河，
      KR1h0004_tls_007-13a.4: 死而無悔者，
      KR1h0004_tls_007-13a.6: 必也臨事而懼，
      KR1h0004_tls_007-14a.1: 好謀而成者也。」
      KR1h0004_tls_007-14a.3: 「富而可求也，
      KR1h0004_tls_007-14a.4: 雖執鞭之士，
      KR1h0004_tls_007-14a.5: 吾亦為之。
      KR1h0004_tls_007-14a.6: 如不可求，
      KR1h0004_tls_007-15a.1: 從吾所好。」
      KR1h0004_tls_007-15a.2: 7.13子之所慎：
      KR1h0004_tls_007-15a.3: 齋、戰、疾。
      KR1h0004_tls_007-16a.2: 7.14子在齊聞《韶》，
      KR1h0004_tls_007-16a.3: 三月不知肉味，
      KR1h0004_tls_007-17a.1: 「不圖為樂之至於斯也。」
      KR1h0004_tls_007-17a.3: 「夫子為衛君乎？」
      KR1h0004_tls_007-18a.1: 「諾；吾將問之。」
      KR1h0004_tls_007-18a.2: 入，
      KR1h0004_tls_007-18a.4: 「伯夷、叔齊何人也？」
      KR1h0004_tls_007-18a.6: 「古之賢人也。」
      KR1h0004_tls_007-18a.8: 「怨乎？」
      KR1h0004_tls_007-18a.10: 「求仁而得仁，
      KR1h0004_tls_007-19a.1: 又何怨？」
      KR1h0004_tls_007-20a.1: 「夫子不為也。」
      KR1h0004_tls_007-20a.3: 「飯疏食飲水，
      KR1h0004_tls_007-20a.4: 曲肱而枕之，
      KR1h0004_tls_007-20a.5: 樂亦在其中矣。
      KR1h0004_tls_007-20a.6: 不義而富且貴，
      KR1h0004_tls_007-21a.1: 於我如浮雲。」
      KR1h0004_tls_007-21a.3: 「加我數年，
      KR1h0004_tls_007-21a.4: 五十以學，
      KR1h0004_tls_007-22a.1: 亦可以無大過矣。」
      KR1h0004_tls_007-22a.2: 7.18子所雅言，
      KR1h0004_tls_007-22a.3: 《詩》、《書》、執禮，
      KR1h0004_tls_007-22a.4: 皆雅言也。
      KR1h0004_tls_007-23a.2: 7.19葉公問孔子於子路，
      KR1h0004_tls_007-23a.3: 子路不對。
      KR1h0004_tls_007-23a.5: 「女奚不曰，
      KR1h0004_tls_007-23a.6: 其為人也，
      KR1h0004_tls_007-23a.7: 發憤忘食，
      KR1h0004_tls_007-23a.8: 樂以忘憂，
      KR1h0004_tls_007-24a.1: 不知老之將至云爾。」
      KR1h0004_tls_007-24a.3: 「我非生而知之者，
      KR1h0004_tls_007-24a.4: 好古，
      KR1h0004_tls_007-25a.1: 敏以求之者也。」
      KR1h0004_tls_007-25a.2: 7.21子不語：怪、力、亂、神。
      KR1h0004_tls_007-26a.3: 「三人行，
      KR1h0004_tls_007-26a.4: 必有我師焉，
      KR1h0004_tls_007-26a.5: 擇其善者而從之，
      KR1h0004_tls_007-27a.1: 其不善者而改之。」
      KR1h0004_tls_007-27a.3: 「天生德於予，
      KR1h0004_tls_007-28a.1: 桓魋其如予何？」
      KR1h0004_tls_007-28a.3: 「二三子以我為隱乎？
      KR1h0004_tls_007-28a.4: 吾無隱乎爾。
      KR1h0004_tls_007-28a.5: 吾無行而不與二三子者，
      KR1h0004_tls_007-29a.1: 是丘也。」
      KR1h0004_tls_007-29a.2: 7.25子以四教：
      KR1h0004_tls_007-29a.3: 文、行、忠、信。
      KR1h0004_tls_007-30a.4: 吾不得而見之矣；
      KR1h0004_tls_007-30a.5: 得見君子者，
      KR1h0004_tls_007-31a.3: 善人，
      KR1h0004_tls_007-31a.4: 吾不得而見之矣；
      KR1h0004_tls_007-31a.5: 得見有恆者，
      KR1h0004_tls_007-31a.6: 斯可矣。
      KR1h0004_tls_007-31a.7: 亡而為有，
      KR1h0004_tls_007-31a.8: 虛而為盈，
      KR1h0004_tls_007-31a.9: 約而為泰，
      KR1h0004_tls_007-31a.10: 難乎有恆矣。」
      KR1h0004_tls_007-32a.1: 7.27子釣而不綱，
      KR1h0004_tls_007-32a.2: 弋不射宿。
      KR1h0004_tls_007-33a.3: 「蓋有不知而作之者，
      KR1h0004_tls_007-33a.4: 我無是也。
      KR1h0004_tls_007-33a.5: 多聞，
      KR1h0004_tls_007-33a.6: 擇其善者而從之；
      KR1h0004_tls_007-33a.7: 多見而識之；
      KR1h0004_tls_007-34a.1: 知之次也。」
      KR1h0004_tls_007-34a.2: 7.29互鄉難與言，
      KR1h0004_tls_007-34a.3: 童子見，
      KR1h0004_tls_007-34a.4: 門人惑。
      KR1h0004_tls_007-34a.6: 「與其進也，
      KR1h0004_tls_007-34a.8: 唯何甚？
      KR1h0004_tls_007-34a.9: 人絜己以進，
      KR1h0004_tls_007-34a.10: 與其絜也，
      KR1h0004_tls_007-35a.3: 「仁遠乎哉？
      KR1h0004_tls_007-35a.4: 我欲仁，
      KR1h0004_tls_007-36a.1: 斯仁至矣。」
      KR1h0004_tls_007-36a.2: 7.31陳司敗問
      KR1h0004_tls_007-36a.3: 「昭公知禮乎？
      KR1h0004_tls_007-37a.2: 孔子退，
      KR1h0004_tls_007-37a.3: 揖巫馬期而進之，
      KR1h0004_tls_007-37a.5: 「吾聞君子不黨，
      KR1h0004_tls_007-37a.6: 君子亦黨乎？
      KR1h0004_tls_007-37a.7: 君取於吳，
      KR1h0004_tls_007-37a.8: 為同姓，
      KR1h0004_tls_007-37a.10: 君而知禮，
      KR1h0004_tls_007-38a.2: 巫馬期以告。
      KR1h0004_tls_007-38a.4: 「丘也幸，
      KR1h0004_tls_007-38a.5: 苟有過，
      KR1h0004_tls_007-39a.1: 人必知之。」
      KR1h0004_tls_007-39a.2: 7.32子與人歌而善，
      KR1h0004_tls_007-39a.3: 必使反之，
      KR1h0004_tls_007-39a.4: 而後和之。
      KR1h0004_tls_007-40a.3: 「文
      KR1h0004_tls_007-40a.4: 莫吾猶人也。
      KR1h0004_tls_007-40a.5: 躬行君子，
      KR1h0004_tls_007-41a.1: 則吾未之有得。」
      KR1h0004_tls_007-41a.3: 「若聖與仁，
      KR1h0004_tls_007-41a.4: 則吾豈敢？
      KR1h0004_tls_007-41a.5: 抑為之不厭，
      KR1h0004_tls_007-41a.6: 誨人不倦，
      KR1h0004_tls_007-41a.7: 則可謂云爾已矣。」
      KR1h0004_tls_007-42a.1: 唯弟子不能學也。」
      KR1h0004_tls_007-42a.2: 7.35子疾病，
      KR1h0004_tls_007-42a.3: 子路請禱。
      KR1h0004_tls_007-42a.8: 《誄》曰：
      KR1h0004_tls_007-42a.9: 『禱爾于上下神祇。』」
      KR1h0004_tls_007-43a.3: 「奢則不孫，
      KR1h0004_tls_007-43a.4: 儉則固。
      KR1h0004_tls_007-43a.5: 與其不孫也，
      KR1h0004_tls_007-44a.1: 寧固。」
      KR1h0004_tls_007-44a.3: 「君子坦蕩蕩，
      KR1h0004_tls_007-45a.1: 小人長戚戚。」
      KR1h0004_tls_007-45a.2: 7.38子溫而厲，
      KR1h0004_tls_007-45a.3: 威而不猛，
      KR1h0004_tls_007-45a.4: 恭而安。
      KR1h0004_tls_008-1a.5: 其可謂至德也已矣。
      KR1h0004_tls_008-1a.6: 三以天下讓，
      KR1h0004_tls_008-2a.1: 民無得而稱焉。」
      KR1h0004_tls_008-2a.3: 「恭而無禮則勞，
      KR1h0004_tls_008-2a.4: 慎而無禮則葸，
      KR1h0004_tls_008-2a.5: 勇而無禮則亂，
      KR1h0004_tls_008-2a.6: 直而無禮則絞。
      KR1h0004_tls_008-2a.7: 君子篤於親，
      KR1h0004_tls_008-2a.8: 則民興於仁；
      KR1h0004_tls_008-2a.9: 故舊不遺，
      KR1h0004_tls_008-3a.1: 則民不偷。」
      KR1h0004_tls_008-3a.2: 8.3曾子有疾，
      KR1h0004_tls_008-3a.3: 召門弟子曰：
      KR1h0004_tls_008-3a.4: 「啟予足！
      KR1h0004_tls_008-3a.5: 啟予手！
      KR1h0004_tls_008-3a.7: 『戰戰兢兢，
      KR1h0004_tls_008-3a.8: 如臨深淵，
      KR1h0004_tls_008-3a.9: 如履薄冰。』
      KR1h0004_tls_008-3a.10: 而今而後吾知免夫！
      KR1h0004_tls_008-4a.2: 8.4曾子有疾，
      KR1h0004_tls_008-4a.3: 孟敬子問之。
      KR1h0004_tls_008-4a.4: 曾子言曰：
      KR1h0004_tls_008-4a.5: 「鳥之將死，
      KR1h0004_tls_008-4a.6: 其鳴也哀；
      KR1h0004_tls_008-4a.8: 其言也善。
      KR1h0004_tls_008-4a.9: 君子所貴乎道者三：
      KR1h0004_tls_008-4a.10: 動容貌，
      KR1h0004_tls_008-4a.11: 斯遠暴慢矣；
      KR1h0004_tls_008-4a.12: 正顏色，
      KR1h0004_tls_008-4a.13: 斯近信矣；
      KR1h0004_tls_008-4a.14: 出辭氣，
      KR1h0004_tls_008-4a.15: 斯遠鄙倍矣。
      KR1h0004_tls_008-4a.16: 籩豆之事，
      KR1h0004_tls_008-5a.1: 則有司存。」
      KR1h0004_tls_008-5a.3: 「以能問於不能，
      KR1h0004_tls_008-5a.4: 以多問於寡；
      KR1h0004_tls_008-5a.5: 有若無，
      KR1h0004_tls_008-5a.6: 實若虛，
      KR1h0004_tls_008-5a.7: 犯而不校。
      KR1h0004_tls_008-6a.1: 昔者吾友嘗從事於斯矣。」
      KR1h0004_tls_008-6a.3: 「可以託六尺之孤，
      KR1h0004_tls_008-6a.4: 可以寄百里之命，
      KR1h0004_tls_008-6a.5: 臨大節而不可奪也。
      KR1h0004_tls_008-6a.6: 君子人與？
      KR1h0004_tls_008-7a.1: 君子人也。」
      KR1h0004_tls_008-7a.3: 「士不可以不弘毅，
      KR1h0004_tls_008-7a.4: 任重而道遠。
      KR1h0004_tls_008-7a.5: 仁以為己任，
      KR1h0004_tls_008-7a.6: 不亦重乎？
      KR1h0004_tls_008-7a.7: 死而後已，
      KR1h0004_tls_008-8a.1: 不亦遠乎？」
      KR1h0004_tls_008-8a.3: 「興於《詩》，
      KR1h0004_tls_008-8a.4: 立於禮，
      KR1h0004_tls_008-9a.1: 成於樂。」
      KR1h0004_tls_008-9a.3: 「民可使由之，
      KR1h0004_tls_008-10a.1: 不可使知之。」
      KR1h0004_tls_008-10a.3: 「好勇疾貧，
      KR1h0004_tls_008-10a.4: 亂也。
      KR1h0004_tls_008-10a.5: 人而不仁，
      KR1h0004_tls_008-10a.6: 疾之已甚，
      KR1h0004_tls_008-11a.1: 亂也。」
      KR1h0004_tls_008-11a.3: 「如有周公之才之美，
      KR1h0004_tls_008-11a.4: 使驕且吝，
      KR1h0004_tls_008-12a.1: 其餘不足觀也已。」
      KR1h0004_tls_008-12a.3: 「三年學，
      KR1h0004_tls_008-12a.4: 不至於穀，
      KR1h0004_tls_008-13a.1: 不易得也。」
      KR1h0004_tls_008-13a.3: 「篤信好學，
      KR1h0004_tls_008-13a.4: 守死善道。
      KR1h0004_tls_008-13a.5: 危邦不入，
      KR1h0004_tls_008-13a.6: 亂邦不居。
      KR1h0004_tls_008-13a.7: 天下有道則見，
      KR1h0004_tls_008-13a.8: 無道則隱。
      KR1h0004_tls_008-13a.10: 貧且賤焉，
      KR1h0004_tls_008-13a.11: 恥也；
      KR1h0004_tls_008-13a.13: 富且貴焉，
      KR1h0004_tls_008-14a.1: 恥也。」
      KR1h0004_tls_008-14a.3: 「不在其位，
      KR1h0004_tls_008-15a.1: 不謀其政。」
      KR1h0004_tls_008-15a.3: 「師摯之始，
      KR1h0004_tls_008-15a.4: 《關雎》之亂，
      KR1h0004_tls_008-16a.1: 洋洋乎盈耳哉！」
      KR1h0004_tls_008-16a.3: 「狂而不直，
      KR1h0004_tls_008-16a.4: 侗而不愿，
      KR1h0004_tls_008-16a.5: 悾悾而不信，
      KR1h0004_tls_008-17a.1: 吾不知之矣。」
      KR1h0004_tls_008-17a.3: 「學如不及，
      KR1h0004_tls_008-18a.1: 猶恐失之。」
      KR1h0004_tls_008-18a.3: 「巍巍乎，
      KR1h0004_tls_008-19a.1: 舜、禹之有天下也而不與焉！」
      KR1h0004_tls_008-19a.3: 「大哉！堯之為君也！
      KR1h0004_tls_008-19a.4: 巍巍乎！
      KR1h0004_tls_008-19a.5: 唯天為大，
      KR1h0004_tls_008-19a.6: 唯堯則之。
      KR1h0004_tls_008-19a.7: 蕩蕩乎！
      KR1h0004_tls_008-19a.8: 民無能名焉。
      KR1h0004_tls_008-19a.9: 巍巍乎！其有成功也，
      KR1h0004_tls_008-19a.10: 煥乎！其有文章也！」
      KR1h0004_tls_008-20a.1: 8.20舜有臣五人而天下治。
      KR1h0004_tls_008-20a.3: 「予有亂臣十人。」
      KR1h0004_tls_008-20a.5: 「才難，
      KR1h0004_tls_008-20a.6: 不其然乎？
      KR1h0004_tls_008-20a.7: 唐、虞之際，
      KR1h0004_tls_008-20a.8: 於斯為盛。
      KR1h0004_tls_008-20a.9: 有婦人焉，
      KR1h0004_tls_008-20a.10: 九人而已。
      KR1h0004_tls_008-20a.11: 三分天下有其二，
      KR1h0004_tls_008-20a.12: 以服事殷。
      KR1h0004_tls_008-20a.13: 周之德，
      KR1h0004_tls_008-21a.1: 其可謂至德也已矣。」
      KR1h0004_tls_008-21a.3: 「禹，吾無間然矣。
      KR1h0004_tls_008-21a.4: 菲飲食而致孝乎鬼神，
      KR1h0004_tls_008-21a.5: 惡衣服而致美乎黻冕，
      KR1h0004_tls_008-21a.6: 卑宮室而盡力乎溝洫。
      KR1h0004_tls_008-21a.7: 禹，吾無間然矣。」
      KR1h0004_tls_009-1a.3: 9.1子罕言利與命與仁。
      KR1h0004_tls_009-2a.2: 9.2達巷黨人曰：
      KR1h0004_tls_009-2a.3: 「大哉孔子！
      KR1h0004_tls_009-2a.4: 博學而無所成名。」
      KR1h0004_tls_009-2a.5: 子聞之，
      KR1h0004_tls_009-2a.6: 謂門弟子曰：
      KR1h0004_tls_009-2a.7: 「吾何執？
      KR1h0004_tls_009-2a.8: 執御乎？
      KR1h0004_tls_009-2a.9: 執射乎？
      KR1h0004_tls_009-3a.3: 「麻冕，
      KR1h0004_tls_009-3a.4: 禮也；
      KR1h0004_tls_009-3a.5: 今也純，儉，
      KR1h0004_tls_009-3a.6: 吾從眾。
      KR1h0004_tls_009-3a.7: 拜下，
      KR1h0004_tls_009-3a.8: 禮也；
      KR1h0004_tls_009-3a.9: 今拜乎上，
      KR1h0004_tls_009-3a.10: 泰也。
      KR1h0004_tls_009-3a.11: 雖違眾，
      KR1h0004_tls_009-3a.12: 吾從下。」
      KR1h0004_tls_009-4a.2: 9.4子絕四：
      KR1h0004_tls_009-4a.3: 毋意，
      KR1h0004_tls_009-4a.4: 毋必，
      KR1h0004_tls_009-4a.5: 毋固，
      KR1h0004_tls_009-4a.6: 毋我。
      KR1h0004_tls_009-5a.2: 9.5子畏於匡，
      KR1h0004_tls_009-5a.4: 「文王既沒，
      KR1h0004_tls_009-5a.5: 文不在茲乎？
      KR1h0004_tls_009-5a.6: 天之將喪斯文也，
      KR1h0004_tls_009-5a.7: 後死者不得與於斯文也；
      KR1h0004_tls_009-5a.8: 天之未喪斯文也，
      KR1h0004_tls_009-6a.1: 匡人其如予何？」
      KR1h0004_tls_009-6a.2: 9.6大宰問於子貢曰：
      KR1h0004_tls_009-6a.3: 「夫子聖者與？
      KR1h0004_tls_009-6a.4: 何其多能也？」
      KR1h0004_tls_009-6a.6: 「固天縱之將聖，
      KR1h0004_tls_009-7a.1: 又多能也。」
      KR1h0004_tls_009-7a.2: 子聞之，
      KR1h0004_tls_009-7a.4: 「大宰知我乎！
      KR1h0004_tls_009-7a.5: 吾少也賤，
      KR1h0004_tls_009-7a.6: 故多能鄙事。
      KR1h0004_tls_009-7a.7: 君子多乎哉？
      KR1h0004_tls_009-8a.3: 「子云：
      KR1h0004_tls_009-8a.4: 『吾不試，
      KR1h0004_tls_009-9a.1: 故藝。』」
      KR1h0004_tls_009-9a.3: 「吾有知乎哉？
      KR1h0004_tls_009-9a.5: 有鄙夫問於我，
      KR1h0004_tls_009-9a.6: 空空如也。
      KR1h0004_tls_009-10a.1: 我叩其兩端而竭焉。」
      KR1h0004_tls_009-10a.3: 「鳳鳥不至，
      KR1h0004_tls_009-10a.4: 河不出圖，
      KR1h0004_tls_009-11a.1: 吾已矣夫！」
      KR1h0004_tls_009-11a.2: 9.10子見齊衰者、冕衣裳者與瞽者，
      KR1h0004_tls_009-11a.4: 雖少，
      KR1h0004_tls_009-11a.5: 必作；
      KR1h0004_tls_009-11a.6: 過之，
      KR1h0004_tls_009-11a.7: 必趨。
      KR1h0004_tls_009-12a.2: 9.11顏淵喟然歎曰：
      KR1h0004_tls_009-12a.3: 「仰之彌高，
      KR1h0004_tls_009-12a.4: 鑽之彌堅。
      KR1h0004_tls_009-12a.5: 瞻之在前，
      KR1h0004_tls_009-12a.6: 忽焉在後。
      KR1h0004_tls_009-12a.7: 夫子循循然善誘人，
      KR1h0004_tls_009-12a.8: 博我以文，
      KR1h0004_tls_009-12a.9: 約我以禮，
      KR1h0004_tls_009-12a.10: 欲罷不能。
      KR1h0004_tls_009-12a.11: 既竭吾才，
      KR1h0004_tls_009-12a.12: 如有所立卓爾。
      KR1h0004_tls_009-12a.13: 雖欲從之，
      KR1h0004_tls_009-13a.1: 末由也已。」
      KR1h0004_tls_009-13a.2: 9.12子疾病，
      KR1h0004_tls_009-13a.3: 子路使門人為臣。
      KR1h0004_tls_009-13a.4: 病間，
      KR1h0004_tls_009-13a.6: 「久矣哉，
      KR1h0004_tls_009-13a.7: 由之行詐也！
      KR1h0004_tls_009-13a.8: 無臣而為有臣。
      KR1h0004_tls_009-13a.9: 吾誰欺？
      KR1h0004_tls_009-13a.10: 欺天乎！
      KR1h0004_tls_009-13a.11: 且予與其死於臣之手也，
      KR1h0004_tls_009-13a.12: 無寧死於二三子之手乎！
      KR1h0004_tls_009-13a.13: 且予縱不得大葬，
      KR1h0004_tls_009-14a.1: 予死於道路乎！」
      KR1h0004_tls_009-14a.3: 「有美玉於斯，
      KR1h0004_tls_009-14a.4: 韞匵
      KR1h0004_tls_009-14a.5: 而藏諸？
      KR1h0004_tls_009-14a.6: 求善賈而沽諸？」
      KR1h0004_tls_009-14a.8: 「沽之哉！
      KR1h0004_tls_009-14a.9: 沽之哉！
      KR1h0004_tls_009-15a.1: 我待賈者也。」
      KR1h0004_tls_009-15a.2: 9.14子欲居九夷。
      KR1h0004_tls_009-15a.3: 或曰：
      KR1h0004_tls_009-15a.4: 「陋。
      KR1h0004_tls_009-15a.5: 如之何？」
      KR1h0004_tls_009-15a.7: 「君子居之，
      KR1h0004_tls_009-16a.1: 何陋之有？」
      KR1h0004_tls_009-16a.3: 「吾自衛反魯，
      KR1h0004_tls_009-16a.4: 然後樂正，
      KR1h0004_tls_009-17a.1: 《雅》、《頌》各得其所。」
      KR1h0004_tls_009-17a.3: 「出則事公卿，
      KR1h0004_tls_009-17a.4: 入則事父兄，
      KR1h0004_tls_009-17a.5: 喪事不敢不勉，
      KR1h0004_tls_009-17a.6: 不為酒困，
      KR1h0004_tls_009-18a.1: 何有於我哉？」
      KR1h0004_tls_009-18a.2: 9.17子在川上，曰：
      KR1h0004_tls_009-18a.3: 「逝者如斯夫！
      KR1h0004_tls_009-19a.1: 不舍晝夜。」
      KR1h0004_tls_009-20a.1: 「吾未見好德如好色者也。」
      KR1h0004_tls_009-20a.3: 「譬如為山，
      KR1h0004_tls_009-20a.4: 未成一簣，
      KR1h0004_tls_009-20a.5: 止，
      KR1h0004_tls_009-20a.6: 吾止也。
      KR1h0004_tls_009-20a.7: 譬如平地，
      KR1h0004_tls_009-20a.9: 進，
      KR1h0004_tls_009-21a.1: 吾往也。」
      KR1h0004_tls_009-21a.3: 「語之而不惰者，
      KR1h0004_tls_009-22a.1: 其回也與！」
      KR1h0004_tls_009-22a.2: 9.21子謂顏淵，
      KR1h0004_tls_009-22a.4: 「惜乎！
      KR1h0004_tls_009-22a.5: 吾見其進也，
      KR1h0004_tls_009-23a.1: 未見其止也。」
      KR1h0004_tls_009-23a.3: 「苗而不秀者
      KR1h0004_tls_009-23a.4: 有矣夫！
      KR1h0004_tls_009-23a.5: 秀而不實者
      KR1h0004_tls_009-24a.3: 「後生可畏，
      KR1h0004_tls_009-24a.4: 焉知來者之不如今也？
      KR1h0004_tls_009-24a.5: 四十、五十而無聞焉，
      KR1h0004_tls_009-25a.1: 斯亦不足畏也已。」
      KR1h0004_tls_009-25a.3: 「法語之言，
      KR1h0004_tls_009-25a.4: 能無從乎？
      KR1h0004_tls_009-25a.5: 改之為貴。
      KR1h0004_tls_009-25a.7: 能無說乎？
      KR1h0004_tls_009-25a.8: 繹之為貴。
      KR1h0004_tls_009-25a.9: 說而不繹，
      KR1h0004_tls_009-25a.10: 從而不改，
      KR1h0004_tls_009-26a.3: 「主忠信，
      KR1h0004_tls_009-26a.4: 毋友不如己者，
      KR1h0004_tls_009-27a.1: 過則勿憚改。」
      KR1h0004_tls_009-27a.3: 「三軍可奪帥也，
      KR1h0004_tls_009-28a.1: 匹夫不可奪志也。」
      KR1h0004_tls_009-28a.3: 「衣敝縕袍，
      KR1h0004_tls_009-28a.4: 與衣狐貉者立，
      KR1h0004_tls_009-28a.5: 而不恥者，
      KR1h0004_tls_009-28a.6: 其由也與？
      KR1h0004_tls_009-28a.7: 『不忮不求，
      KR1h0004_tls_009-28a.8: 何用不臧？』」
      KR1h0004_tls_009-28a.9: 子路終身誦之。
      KR1h0004_tls_009-29a.1: 何足以臧？」
      KR1h0004_tls_009-29a.3: 「歲寒，
      KR1h0004_tls_009-30a.1: 然後知松柏之後彫也。」
      KR1h0004_tls_009-30a.3: 「知者不惑，
      KR1h0004_tls_009-30a.4: 仁者不憂，
      KR1h0004_tls_009-31a.1: 勇者不懼。」
      KR1h0004_tls_009-31a.3: 「可與共學，
      KR1h0004_tls_009-31a.4: 未可與適道；
      KR1h0004_tls_009-31a.6: 未可與立；
      KR1h0004_tls_009-32a.1: 未可與權。」
      KR1h0004_tls_009-32a.2: 9.31「唐棣之華，
      KR1h0004_tls_009-32a.3: 偏其反而。
      KR1h0004_tls_009-32a.4: 豈不爾思？
      KR1h0004_tls_009-32a.5: 室是遠而。」
      KR1h0004_tls_009-32a.7: 「未之思也，
      KR1h0004_tls_009-32a.8: 夫何遠之有？」
      KR1h0004_tls_010-1a.3: 10.1孔子於鄉黨，
      KR1h0004_tls_010-1a.4: 恂恂如也，
      KR1h0004_tls_010-1a.5: 似不能言者。
      KR1h0004_tls_010-1a.6: 其在宗廟朝廷，
      KR1h0004_tls_010-1a.7: 便便言，
      KR1h0004_tls_010-1a.8: 唯謹爾。
      KR1h0004_tls_010-2a.2: 10.2朝，
      KR1h0004_tls_010-2a.3: 與下大夫言，
      KR1h0004_tls_010-2a.4: 侃侃如也；
      KR1h0004_tls_010-2a.5: 與上大夫言，
      KR1h0004_tls_010-2a.6: 誾誾如也。
      KR1h0004_tls_010-2a.7: 君在，
      KR1h0004_tls_010-2a.8: 踧踖如也，
      KR1h0004_tls_010-2a.9: 與與如也。
      KR1h0004_tls_010-3a.2: 10.3君召使擯，
      KR1h0004_tls_010-3a.3: 色勃如也，
      KR1h0004_tls_010-3a.4: 足躩如也。
      KR1h0004_tls_010-3a.5: 揖所與立，
      KR1h0004_tls_010-3a.6: 左右手，
      KR1h0004_tls_010-3a.7: 衣前後，
      KR1h0004_tls_010-3a.8: 襜如也。
      KR1h0004_tls_010-3a.9: 趨進，
      KR1h0004_tls_010-3a.10: 翼如也。
      KR1h0004_tls_010-4a.1: 「賓不顧矣。」
      KR1h0004_tls_010-4a.2: 10.4入公門，
      KR1h0004_tls_010-4a.3: 鞠躬如也，
      KR1h0004_tls_010-4a.4: 如不容。
      KR1h0004_tls_010-5a.2: 立不中門，
      KR1h0004_tls_010-5a.3: 行不履閾。
      KR1h0004_tls_010-6a.2: 過位，
      KR1h0004_tls_010-6a.3: 色勃如也，
      KR1h0004_tls_010-6a.4: 足躩如也，
      KR1h0004_tls_010-6a.5: 其言似不足者。
      KR1h0004_tls_010-7a.2: 攝齊升堂，
      KR1h0004_tls_010-7a.3: 鞠躬如也，
      KR1h0004_tls_010-7a.4: 屏氣似不息者。
      KR1h0004_tls_010-8a.2: 出，
      KR1h0004_tls_010-8a.3: 降一等，
      KR1h0004_tls_010-8a.4: 逞顏色，
      KR1h0004_tls_010-8a.5: 怡怡如也。
      KR1h0004_tls_010-9a.2: 沒階，趨進，
      KR1h0004_tls_010-9a.3: 翼如也。
      KR1h0004_tls_010-10a.3: 踧踖如也。
      KR1h0004_tls_010-11a.2: 10.5執圭，
      KR1h0004_tls_010-11a.3: 鞠躬如也，
      KR1h0004_tls_010-11a.4: 如不勝。
      KR1h0004_tls_010-11a.5: 上如揖，
      KR1h0004_tls_010-11a.6: 下如授。
      KR1h0004_tls_010-11a.7: 勃如戰色，
      KR1h0004_tls_010-11a.8: 足蹜蹜
      KR1h0004_tls_010-11a.9: 如有循。
      KR1h0004_tls_010-12a.2: 享禮，
      KR1h0004_tls_010-12a.3: 有容色。
      KR1h0004_tls_010-13a.2: 私覿，
      KR1h0004_tls_010-13a.3: 愉愉如也。
      KR1h0004_tls_010-14a.2: 10.6君子不以紺緅飾，
      KR1h0004_tls_010-14a.3: 紅紫不以為褻服。
      KR1h0004_tls_010-15a.2: 當暑，
      KR1h0004_tls_010-15a.3: 袗絺綌，
      KR1h0004_tls_010-15a.4: 必表而出之。
      KR1h0004_tls_010-16a.2: 緇衣，
      KR1h0004_tls_010-16a.3: 羔裘；
      KR1h0004_tls_010-16a.4: 素衣，
      KR1h0004_tls_010-16a.5: 麑裘；
      KR1h0004_tls_010-16a.7: 狐裘。
      KR1h0004_tls_010-17a.2: 褻裘長，
      KR1h0004_tls_010-17a.3: 短右袂。
      KR1h0004_tls_010-18a.2: 必有寢衣，
      KR1h0004_tls_010-18a.3: 長一身有半。
      KR1h0004_tls_010-19a.2: 狐貉之厚以居。
      KR1h0004_tls_010-20a.2: 去喪，無所不佩。
      KR1h0004_tls_010-21a.2: 非帷裳，必殺之。
      KR1h0004_tls_010-21a.3: 羔裘玄冠，不以弔。
      KR1h0004_tls_010-22a.2: 吉月，必朝服而朝。
      KR1h0004_tls_010-23a.3: 必有明衣，布。
      KR1h0004_tls_010-24a.2: 齊必變食，
      KR1h0004_tls_010-24a.3: 居必遷坐。
      KR1h0004_tls_010-25a.2: 10.8食不厭精，
      KR1h0004_tls_010-25a.3: 膾不厭細。
      KR1h0004_tls_010-25a.4: 食饐而餲，
      KR1h0004_tls_010-25a.5: 魚餒而肉敗，
      KR1h0004_tls_010-25a.7: 色惡，
      KR1h0004_tls_010-25a.9: 臭惡，
      KR1h0004_tls_010-25a.11: 失飪，
      KR1h0004_tls_010-25a.15: 割不正，
      KR1h0004_tls_010-25a.17: 不得其醬，
      KR1h0004_tls_010-25a.20: 不使勝食氣。
      KR1h0004_tls_010-25a.21: 唯酒無量，
      KR1h0004_tls_010-25a.22: 不及亂。
      KR1h0004_tls_010-25a.23: 沽酒市脯，
      KR1h0004_tls_010-25a.25: 不撤薑食，
      KR1h0004_tls_010-25a.26: 不多食。
      KR1h0004_tls_010-26a.3: 不宿肉。
      KR1h0004_tls_010-26a.4: 祭肉不出三日。
      KR1h0004_tls_010-27a.2: 10.10食不語，
      KR1h0004_tls_010-27a.3: 寢不言。
      KR1h0004_tls_010-28a.2: 10.11雖蔬食菜羹，
      KR1h0004_tls_010-29a.2: 10.12席不正，
      KR1h0004_tls_010-29a.3: 不坐。
      KR1h0004_tls_010-30a.2: 10.13鄉人飲酒，
      KR1h0004_tls_010-30a.3: 杖者出，
      KR1h0004_tls_010-30a.4: 斯出矣。
      KR1h0004_tls_010-31a.2: 10.14鄉人儺，
      KR1h0004_tls_010-31a.3: 朝服
      KR1h0004_tls_010-31a.4: 而立於阼階。
      KR1h0004_tls_010-32a.2: 10.15問人於他邦，
      KR1h0004_tls_010-32a.3: 再拜而送之。
      KR1h0004_tls_010-33a.2: 10.16康子饋藥，
      KR1h0004_tls_010-33a.3: 拜而受之。
      KR1h0004_tls_010-33a.5: 「丘未達，
      KR1h0004_tls_010-34a.1: 不敢嘗。」
      KR1h0004_tls_010-34a.2: 10.17廄焚。
      KR1h0004_tls_010-34a.3: 子退朝，
      KR1h0004_tls_010-34a.5: 「傷人乎？」
      KR1h0004_tls_010-34a.6: 不問馬。
      KR1h0004_tls_010-35a.2: 10.18君賜食，
      KR1h0004_tls_010-35a.3: 必正席，先嘗之。
      KR1h0004_tls_010-35a.4: 君賜腥，
      KR1h0004_tls_010-35a.5: 必熟而薦之。
      KR1h0004_tls_010-35a.6: 君賜生，
      KR1h0004_tls_010-35a.7: 必畜之。
      KR1h0004_tls_010-35a.8: 侍食於君，
      KR1h0004_tls_010-36a.2: 10.19疾，
      KR1h0004_tls_010-36a.3: 君視之，
      KR1h0004_tls_010-36a.4: 東首，
      KR1h0004_tls_010-36a.5: 加朝服，
      KR1h0004_tls_010-36a.6: 拖紳。
      KR1h0004_tls_010-37a.2: 10.20君命召，
      KR1h0004_tls_010-37a.3: 不俟駕行矣。
      KR1h0004_tls_010-38a.2: 10.21入太廟，
      KR1h0004_tls_010-38a.3: 每事問。
      KR1h0004_tls_010-39a.2: 10.22朋友死，
      KR1h0004_tls_010-39a.3: 無所歸，
      KR1h0004_tls_010-40a.1: 「於我殯。」
      KR1h0004_tls_010-40a.2: 10.23朋友之饋，
      KR1h0004_tls_010-41a.2: 10.24寢不尸，
      KR1h0004_tls_010-41a.3: 居不客。
      KR1h0004_tls_010-42a.2: 10.25見齊衰者，
      KR1h0004_tls_010-42a.3: 雖狎，
      KR1h0004_tls_010-42a.4: 必變。
      KR1h0004_tls_010-42a.5: 見冕者與瞽者，
      KR1h0004_tls_010-42a.6: 雖褻，
      KR1h0004_tls_010-42a.7: 必以貌。
      KR1h0004_tls_010-43a.2: 凶服者式之。
      KR1h0004_tls_010-43a.3: 式負版者。
      KR1h0004_tls_010-44a.2: 有盛饌，
      KR1h0004_tls_010-45a.2: 迅雷風烈必變。
      KR1h0004_tls_010-46a.2: 10.26升車，
      KR1h0004_tls_010-46a.3: 必正立，
      KR1h0004_tls_010-46a.4: 執綏。
      KR1h0004_tls_010-47a.2: 車中，不內顧，
      KR1h0004_tls_010-47a.3: 不疾言，
      KR1h0004_tls_010-47a.4: 不親指。
      KR1h0004_tls_010-48a.2: 10.27色斯舉矣，
      KR1h0004_tls_010-48a.3: 翔而後集。
      KR1h0004_tls_010-48a.5: 「山梁雌雉，
      KR1h0004_tls_010-48a.7: 子路共之，
      KR1h0004_tls_010-48a.8: 三嗅而作。
      KR1h0004_tls_011-1a.4: 「先進於禮樂，
      KR1h0004_tls_011-1a.5: 野人也；
      KR1h0004_tls_011-1a.6: 後進於禮樂，
      KR1h0004_tls_011-1a.7: 君子也。
      KR1h0004_tls_011-1a.8: 如用之，
      KR1h0004_tls_011-2a.1: 則吾從先進。」
      KR1h0004_tls_011-2a.3: 「從我於陳、蔡者，
      KR1h0004_tls_011-3a.1: 皆不及門也。」
      KR1h0004_tls_011-3a.2: 11.3德行：顏淵、閔子騫、冉伯牛、仲弓。
      KR1h0004_tls_011-3a.3: 言語：宰我、子貢。
      KR1h0004_tls_011-3a.4: 政事：冉有、季路。
      KR1h0004_tls_011-3a.5: 文學：子游、子夏。
      KR1h0004_tls_011-4a.3: 「回也
      KR1h0004_tls_011-4a.4: 非助我者也，
      KR1h0004_tls_011-5a.1: 於吾言無所不說。」
      KR1h0004_tls_011-5a.3: 「孝哉閔子騫！
      KR1h0004_tls_011-6a.1: 人不間於其父母、昆弟之言。」
      KR1h0004_tls_011-6a.2: 11.6南容三復白圭，
      KR1h0004_tls_011-6a.3: 孔子以其兄之子妻之。
      KR1h0004_tls_011-7a.2: 11.7季康子問
      KR1h0004_tls_011-7a.3: 「弟子孰為好學。」
      KR1h0004_tls_011-7a.4: 孔子對曰：
      KR1h0004_tls_011-7a.5: 「有顏回者好學，
      KR1h0004_tls_011-7a.6: 不幸短命死矣，
      KR1h0004_tls_011-8a.1: 今也則亡。」
      KR1h0004_tls_011-8a.3: 顏路請子之車
      KR1h0004_tls_011-8a.6: 「才不才，
      KR1h0004_tls_011-8a.7: 亦各言其子也。
      KR1h0004_tls_011-8a.8: 鯉也死，
      KR1h0004_tls_011-8a.9: 有棺而無椁。
      KR1h0004_tls_011-8a.10: 吾不徒行以為之椁。
      KR1h0004_tls_011-9a.4: 「噫！
      KR1h0004_tls_011-9a.5: 天喪予！
      KR1h0004_tls_011-10a.3: 子哭之慟。
      KR1h0004_tls_011-10a.4: 從者曰：
      KR1h0004_tls_011-10a.7: 「有慟乎？
      KR1h0004_tls_011-11a.1: 非夫人之為慟而誰為？」
      KR1h0004_tls_011-11a.3: 門人欲厚葬之。
      KR1h0004_tls_011-12a.1: 「不可。」
      KR1h0004_tls_011-12a.2: 門人厚葬之。
      KR1h0004_tls_011-12a.4: 「回也
      KR1h0004_tls_011-12a.5: 視予猶父也，
      KR1h0004_tls_011-12a.6: 予不得視猶子也。
      KR1h0004_tls_011-13a.1: 夫二三子也。」
      KR1h0004_tls_011-13a.2: 11.12季路問事鬼神。
      KR1h0004_tls_011-13a.4: 「未能事人，
      KR1h0004_tls_011-14a.1: 焉能事鬼？」
      KR1h0004_tls_011-14a.3: 「敢問死。」
      KR1h0004_tls_011-14a.5: 「未知生，
      KR1h0004_tls_011-15a.1: 焉知死？」
      KR1h0004_tls_011-15a.2: 11.13閔子侍側，
      KR1h0004_tls_011-15a.3: 誾誾如也；
      KR1h0004_tls_011-15a.5: 行行如也；
      KR1h0004_tls_011-15a.7: 侃侃如也。
      KR1h0004_tls_011-15a.8: 子樂。
      KR1h0004_tls_011-15a.9: 「若由也，
      KR1h0004_tls_011-16a.1: 不得其死然。」
      KR1h0004_tls_011-16a.2: 11.14魯人為長府。
      KR1h0004_tls_011-16a.4: 「仍舊貫，
      KR1h0004_tls_011-16a.5: 如之何？
      KR1h0004_tls_011-16a.6: 何必改作？」
      KR1h0004_tls_011-16a.8: 「夫人不言，
      KR1h0004_tls_011-17a.1: 言必有中。」
      KR1h0004_tls_011-17a.3: 「由之瑟奚為於丘之門？」
      KR1h0004_tls_011-17a.4: 門人不敬子路。
      KR1h0004_tls_011-17a.6: 「由也升堂矣，
      KR1h0004_tls_011-18a.1: 未入於室也。」
      KR1h0004_tls_011-18a.2: 11.16子貢問：
      KR1h0004_tls_011-18a.3: 「師與商也孰賢？」
      KR1h0004_tls_011-18a.5: 「師也過，
      KR1h0004_tls_011-19a.1: 商也不及。」
      KR1h0004_tls_011-19a.3: 「然則師愈與？」
      KR1h0004_tls_011-20a.1: 「過猶不及。」
      KR1h0004_tls_011-20a.2: 11.17季氏富於周公，
      KR1h0004_tls_011-20a.3: 而求也為之聚斂而附益之。
      KR1h0004_tls_011-20a.5: 「非吾徒也。
      KR1h0004_tls_011-20a.6: 小子鳴鼓而攻之，
      KR1h0004_tls_011-21a.1: 可也。」
      KR1h0004_tls_011-21a.2: 11.18柴也愚，
      KR1h0004_tls_011-21a.3: 參也魯，
      KR1h0004_tls_011-21a.4: 師也辟，
      KR1h0004_tls_011-21a.5: 由也喭。
      KR1h0004_tls_011-22a.3: 「回也其庶乎，
      KR1h0004_tls_011-22a.4: 屢空。
      KR1h0004_tls_011-22a.5: 賜不受命，
      KR1h0004_tls_011-22a.6: 而貨殖焉，
      KR1h0004_tls_011-23a.1: 億則屢中。」
      KR1h0004_tls_011-23a.2: 11.20子張問善人之道。
      KR1h0004_tls_011-23a.4: 「不踐迹，
      KR1h0004_tls_011-24a.1: 亦不入於室。」
      KR1h0004_tls_011-24a.3: 「論篤是與，
      KR1h0004_tls_011-24a.4: 君子者乎？
      KR1h0004_tls_011-25a.1: 色莊者乎？」
      KR1h0004_tls_011-25a.2: 11.22子路問：
      KR1h0004_tls_011-25a.3: 「聞斯行諸？」
      KR1h0004_tls_011-25a.5: 「有父兄在，
      KR1h0004_tls_011-26a.1: 如之何其聞斯行之？」
      KR1h0004_tls_011-26a.3: 「聞斯行諸？」
      KR1h0004_tls_011-27a.1: 「聞斯行之。」
      KR1h0004_tls_011-27a.3: 「由也問
      KR1h0004_tls_011-27a.4: 『聞斯行諸』，
      KR1h0004_tls_011-27a.6: 『有父兄在』；
      KR1h0004_tls_011-27a.7: 求也問
      KR1h0004_tls_011-27a.8: 『聞斯行諸』，
      KR1h0004_tls_011-27a.10: 『聞斯行之』。
      KR1h0004_tls_011-27a.12: 敢問。」
      KR1h0004_tls_011-27a.14: 「求也退，
      KR1h0004_tls_011-27a.15: 故進之；
      KR1h0004_tls_011-28a.1: 故退之。」
      KR1h0004_tls_011-28a.2: 11.23子畏於匡，
      KR1h0004_tls_011-28a.3: 顏淵後。
      KR1h0004_tls_011-28a.5: 「吾以女為死矣。」
      KR1h0004_tls_011-28a.7: 「子在，
      KR1h0004_tls_011-29a.1: 回何敢死？」
      KR1h0004_tls_011-29a.2: 11.24季子然問：
      KR1h0004_tls_011-29a.3: 「仲由、冉求可謂大臣與？」
      KR1h0004_tls_011-29a.5: 「吾以子為異之問，
      KR1h0004_tls_011-29a.6: 曾由與求之問。
      KR1h0004_tls_011-29a.8: 以道事君，
      KR1h0004_tls_011-29a.9: 不可則止。
      KR1h0004_tls_011-29a.10: 今由與求也，
      KR1h0004_tls_011-30a.3: 「然則從之者與？」
      KR1h0004_tls_011-30a.5: 「弒父與君，
      KR1h0004_tls_011-31a.1: 亦不從也。」
      KR1h0004_tls_011-31a.2: 11.25子路使子羔為費宰。
      KR1h0004_tls_011-32a.1: 「賊夫人之子。」
      KR1h0004_tls_011-32a.3: 「有民人焉，
      KR1h0004_tls_011-32a.4: 有社稷焉，
      KR1h0004_tls_011-32a.5: 何必讀書，
      KR1h0004_tls_011-33a.1: 然後為學？」
      KR1h0004_tls_011-34a.2: 11.26子路、曾晳、冉有、公西華侍坐。
      KR1h0004_tls_011-35a.3: 「以吾一日長乎爾，
      KR1h0004_tls_011-35a.4: 毋吾以也。
      KR1h0004_tls_011-35a.5: 居則曰：
      KR1h0004_tls_011-35a.6: 『不吾知也！』
      KR1h0004_tls_011-35a.7: 如或知爾，
      KR1h0004_tls_011-36a.1: 則何以哉？」
      KR1h0004_tls_011-36a.2: 子路率爾而對曰：
      KR1h0004_tls_011-36a.4: 攝乎大國之間，
      KR1h0004_tls_011-36a.5: 加之以師旅，
      KR1h0004_tls_011-36a.6: 因之以饑饉；
      KR1h0004_tls_011-36a.7: 由也為之，
      KR1h0004_tls_011-36a.8: 比及三年，
      KR1h0004_tls_011-37a.1: 可使有勇，且知方也。」
      KR1h0004_tls_011-37a.2: 夫子哂之。
      KR1h0004_tls_011-39a.1: 爾何如？」
      KR1h0004_tls_011-39a.3: 「方六七十，
      KR1h0004_tls_011-39a.4: 如五六十，
      KR1h0004_tls_011-39a.5: 求也為之，
      KR1h0004_tls_011-39a.6: 比及三年，
      KR1h0004_tls_011-39a.7: 可使足民。
      KR1h0004_tls_011-39a.8: 如其禮樂，
      KR1h0004_tls_011-41a.1: 爾何如？」
      KR1h0004_tls_011-41a.3: 「非曰能之，
      KR1h0004_tls_011-41a.4: 願學焉。
      KR1h0004_tls_011-41a.5: 宗廟之事，
      KR1h0004_tls_011-41a.6: 如會同，
      KR1h0004_tls_011-41a.7: 端章甫，
      KR1h0004_tls_011-42a.1: 願為小相焉。」
      KR1h0004_tls_011-43a.1: 爾何如？」
      KR1h0004_tls_011-43a.2: 鼓瑟希，
      KR1h0004_tls_011-43a.3: 鏗爾，
      KR1h0004_tls_011-43a.4: 舍瑟而作，
      KR1h0004_tls_011-44a.1: 「異乎三子者之撰。」
      KR1h0004_tls_011-44a.3: 「何傷乎？
      KR1h0004_tls_011-45a.1: 亦各言其志也。」
      KR1h0004_tls_011-45a.3: 「莫春者，
      KR1h0004_tls_011-45a.4: 春服既成，
      KR1h0004_tls_011-45a.5: 冠者五六人，
      KR1h0004_tls_011-45a.6: 童子六七人，
      KR1h0004_tls_011-45a.7: 浴乎沂，
      KR1h0004_tls_011-46a.1: 詠而歸。」
      KR1h0004_tls_011-46a.2: 夫子喟然歎曰：
      KR1h0004_tls_011-46a.3: 「吾與點也！」
      KR1h0004_tls_011-46a.4: 三子者出，
      KR1h0004_tls_011-46a.5: 曾晳後。
      KR1h0004_tls_011-47a.1: 「夫三子者之言何如？」
      KR1h0004_tls_011-48a.1: 「亦各言其志也已矣。」
      KR1h0004_tls_011-49a.1: 「夫子何哂由也？」
      KR1h0004_tls_011-49a.4: 其言不讓，
      KR1h0004_tls_011-50a.1: 是故哂之。」
      KR1h0004_tls_011-51a.1: 「唯求則非邦也與？」
      KR1h0004_tls_011-51a.2: 「安見方六七十
      KR1h0004_tls_011-52a.1: 如五六十而非邦也者？」
      KR1h0004_tls_011-53a.2: 「宗廟會同，
      KR1h0004_tls_011-53a.3: 非諸侯而何？
      KR1h0004_tls_011-53a.4: 赤也為之小，
      KR1h0004_tls_011-53a.5: 孰能為之大？」
      KR1h0004_tls_012-1a.3: 12.1顏淵問仁。
      KR1h0004_tls_012-1a.5: 「克己復禮為仁。
      KR1h0004_tls_012-1a.6: 一日克己復禮，
      KR1h0004_tls_012-1a.7: 天下歸仁焉。
      KR1h0004_tls_012-1a.8: 為仁由己，
      KR1h0004_tls_012-2a.1: 而由人乎哉？」
      KR1h0004_tls_012-2a.3: 「請問其目。」
      KR1h0004_tls_012-2a.5: 「非禮勿視，
      KR1h0004_tls_012-2a.6: 非禮勿聽，
      KR1h0004_tls_012-2a.7: 非禮勿言，
      KR1h0004_tls_012-3a.1: 非禮勿動。」
      KR1h0004_tls_012-3a.3: 「回雖不敏，
      KR1h0004_tls_012-4a.2: 12.2仲弓問仁。
      KR1h0004_tls_012-4a.4: 「出門如見大賓，
      KR1h0004_tls_012-4a.5: 使民如承大祭。
      KR1h0004_tls_012-4a.6: 己所不欲，
      KR1h0004_tls_012-4a.7: 勿施於人。
      KR1h0004_tls_012-4a.8: 在邦無怨，
      KR1h0004_tls_012-5a.1: 在家無怨。」
      KR1h0004_tls_012-6a.1: 請事斯語矣。」
      KR1h0004_tls_012-6a.2: 12.3司馬牛問仁。
      KR1h0004_tls_012-6a.4: 「仁者，
      KR1h0004_tls_012-7a.1: 其言也訒。」
      KR1h0004_tls_012-7a.3: 「其言也訒，
      KR1h0004_tls_012-7a.4: 斯謂之仁已乎？」
      KR1h0004_tls_012-7a.6: 「為之難，
      KR1h0004_tls_012-8a.2: 12.4司馬牛問君子。
      KR1h0004_tls_012-9a.1: 「君子不憂不懼。」
      KR1h0004_tls_012-9a.3: 「不憂不懼，
      KR1h0004_tls_012-9a.4: 斯謂之君子已乎？」
      KR1h0004_tls_012-9a.6: 「內省不疚，
      KR1h0004_tls_012-10a.1: 夫何憂何懼？」
      KR1h0004_tls_012-10a.2: 12.5司馬牛憂曰：
      KR1h0004_tls_012-10a.3: 「人皆有兄弟，
      KR1h0004_tls_012-10a.4: 我獨亡。」
      KR1h0004_tls_012-10a.6: 「商聞之矣：
      KR1h0004_tls_012-10a.7: 『死生有命，
      KR1h0004_tls_012-10a.8: 富貴在天。』
      KR1h0004_tls_012-10a.9: 君子敬而無失，
      KR1h0004_tls_012-10a.10: 與人恭而有禮。
      KR1h0004_tls_012-10a.11: 四海之內，
      KR1h0004_tls_012-10a.12: 皆兄弟也。
      KR1h0004_tls_012-11a.1: 君子何患乎無兄弟也？」
      KR1h0004_tls_012-11a.2: 12.6子張問明。
      KR1h0004_tls_012-11a.4: 「浸潤之譖，
      KR1h0004_tls_012-11a.5: 膚受之愬，
      KR1h0004_tls_012-11a.7: 可謂明也已矣。
      KR1h0004_tls_012-11a.9: 膚受之愬，
      KR1h0004_tls_012-12a.2: 12.7子貢問政。
      KR1h0004_tls_012-12a.4: 「足食，
      KR1h0004_tls_012-12a.5: 足兵，
      KR1h0004_tls_012-13a.1: 民信之矣。」
      KR1h0004_tls_012-13a.3: 「必不得已而去，
      KR1h0004_tls_012-13a.4: 於斯三者何先？」
      KR1h0004_tls_012-14a.3: 「必不得已而去，
      KR1h0004_tls_012-14a.4: 於斯二者何先？」
      KR1h0004_tls_012-14a.6: 「去食。
      KR1h0004_tls_012-14a.7: 自古皆有死，
      KR1h0004_tls_012-15a.1: 民無信不立。」
      KR1h0004_tls_012-15a.3: 「君子質而已矣，
      KR1h0004_tls_012-15a.4: 何以文為？」
      KR1h0004_tls_012-15a.6: 「惜乎，
      KR1h0004_tls_012-15a.7: 夫子之說君子也！
      KR1h0004_tls_012-15a.8: 駟不及舌。
      KR1h0004_tls_012-16a.3: 「年饑，
      KR1h0004_tls_012-16a.4: 用不足，
      KR1h0004_tls_012-17a.1: 如之何？」
      KR1h0004_tls_012-18a.1: 「盍徹乎？」
      KR1h0004_tls_012-18a.4: 吾猶不足，
      KR1h0004_tls_012-19a.3: 「百姓足，
      KR1h0004_tls_012-19a.4: 君孰與不足？
      KR1h0004_tls_012-19a.5: 百姓不足，
      KR1h0004_tls_012-20a.1: 君孰與足？」
      KR1h0004_tls_012-20a.2: 12.10子張問崇德、辨惑。
      KR1h0004_tls_012-20a.4: 「主忠信、
      KR1h0004_tls_012-20a.5: 徙義，
      KR1h0004_tls_012-20a.6: 崇德也。
      KR1h0004_tls_012-20a.7: 愛之欲其生，
      KR1h0004_tls_012-20a.8: 惡之欲其死。
      KR1h0004_tls_012-20a.9: 既欲其生，
      KR1h0004_tls_012-20a.10: 又欲其死，
      KR1h0004_tls_012-21a.1: 『誠不以富，亦祗以異。』」
      KR1h0004_tls_012-21a.2: 12.11齊景公問政於孔子。
      KR1h0004_tls_012-21a.4: 「君君，
      KR1h0004_tls_012-21a.5: 臣臣，
      KR1h0004_tls_012-21a.6: 父父，
      KR1h0004_tls_012-21a.7: 子子。」
      KR1h0004_tls_012-21a.9: 「善哉！
      KR1h0004_tls_012-21a.10: 信如君不君，
      KR1h0004_tls_012-21a.11: 臣不臣，
      KR1h0004_tls_012-21a.12: 父不父，
      KR1h0004_tls_012-21a.13: 子不子，
      KR1h0004_tls_012-21a.14: 雖有粟，
      KR1h0004_tls_012-22a.1: 吾得而食諸？」
      KR1h0004_tls_012-22a.3: 「片言可以折獄者，
      KR1h0004_tls_012-23a.1: 其由也與？」
      KR1h0004_tls_012-23a.2: 子路無宿諾。
      KR1h0004_tls_012-24a.3: 「聽訟，
      KR1h0004_tls_012-24a.4: 吾猶人也。
      KR1h0004_tls_012-25a.1: 必也使無訟乎！」
      KR1h0004_tls_012-25a.2: 12.14子張問政。
      KR1h0004_tls_012-25a.4: 「居之無倦，
      KR1h0004_tls_012-26a.1: 行之以忠。」
      KR1h0004_tls_012-26a.3: 「博學於文，
      KR1h0004_tls_012-26a.4: 約之以禮，
      KR1h0004_tls_012-27a.1: 亦可以弗畔矣夫！」
      KR1h0004_tls_012-27a.3: 「君子成人之美，
      KR1h0004_tls_012-27a.4: 不成人之惡。
      KR1h0004_tls_012-28a.1: 小人反是。」
      KR1h0004_tls_012-28a.2: 12.17季康子問政於孔子。
      KR1h0004_tls_012-28a.3: 孔子對曰：
      KR1h0004_tls_012-28a.4: 「政者、
      KR1h0004_tls_012-28a.5: 正也。
      KR1h0004_tls_012-28a.6: 子帥以正，
      KR1h0004_tls_012-29a.1: 孰敢不正？」
      KR1h0004_tls_012-29a.2: 12.18季康子患盜，
      KR1h0004_tls_012-29a.3: 問於孔子。
      KR1h0004_tls_012-29a.5: 「苟子之不欲，
      KR1h0004_tls_012-30a.1: 雖賞之不竊。」
      KR1h0004_tls_012-30a.2: 12.19季康子問政於孔子曰：
      KR1h0004_tls_012-30a.3: 「如殺無道，
      KR1h0004_tls_012-30a.5: 何如？」
      KR1h0004_tls_012-30a.6: 孔子對曰：
      KR1h0004_tls_012-30a.7: 「子為政，
      KR1h0004_tls_012-30a.8: 焉用殺？
      KR1h0004_tls_012-30a.9: 子欲善而民善矣。
      KR1h0004_tls_012-30a.10: 君子之德
      KR1h0004_tls_012-30a.11: 風，
      KR1h0004_tls_012-30a.12: 小人之德
      KR1h0004_tls_012-30a.13: 草。
      KR1h0004_tls_012-31a.1: 必偃。」
      KR1h0004_tls_012-31a.2: 12.20子張問：
      KR1h0004_tls_012-31a.3: 「士何如斯可謂之達矣？」
      KR1h0004_tls_012-31a.4: 子曰：
      KR1h0004_tls_012-31a.5: 「何哉，
      KR1h0004_tls_012-31a.6: 爾所謂達者？」
      KR1h0004_tls_012-31a.8: 「在邦必聞，
      KR1h0004_tls_012-31a.9: 在家必聞。」
      KR1h0004_tls_012-31a.11: 「是聞也，
      KR1h0004_tls_012-31a.12: 非達也。夫達也者，
      KR1h0004_tls_012-31a.13: 質直而好義，
      KR1h0004_tls_012-31a.14: 察言而觀色，
      KR1h0004_tls_012-31a.15: 慮以下人。
      KR1h0004_tls_012-31a.18: 夫聞也者，
      KR1h0004_tls_012-31a.19: 色取仁而行違，
      KR1h0004_tls_012-31a.20: 居之不疑。
      KR1h0004_tls_012-31a.21: 在邦必聞，
      KR1h0004_tls_012-32a.1: 在家必聞。」
      KR1h0004_tls_012-32a.2: 12.21樊遲從遊於舞雩之下，
      KR1h0004_tls_012-32a.5: 脩慝、辨惑。」
      KR1h0004_tls_012-32a.7: 「善哉問！
      KR1h0004_tls_012-32a.8: 先事後得，
      KR1h0004_tls_012-32a.9: 非崇德與？
      KR1h0004_tls_012-32a.10: 攻其惡，
      KR1h0004_tls_012-32a.11: 無攻人之惡，
      KR1h0004_tls_012-32a.12: 非脩慝與？
      KR1h0004_tls_012-32a.13: 一朝之忿，
      KR1h0004_tls_012-32a.14: 忘其身，
      KR1h0004_tls_012-33a.2: 12.22樊遲問仁。
      KR1h0004_tls_012-34a.2: 問知。
      KR1h0004_tls_012-34a.4: 「知人。」
      KR1h0004_tls_012-34a.5: 樊遲未達。
      KR1h0004_tls_012-34a.7: 「舉直錯諸枉，
      KR1h0004_tls_012-35a.2: 樊遲退，
      KR1h0004_tls_012-35a.5: 「鄉也
      KR1h0004_tls_012-35a.6: 吾見於夫子而問知，
      KR1h0004_tls_012-35a.8: 「『舉直錯諸枉，
      KR1h0004_tls_012-35a.9: 能使枉者直。』
      KR1h0004_tls_012-36a.1: 何謂也？」
      KR1h0004_tls_012-36a.3: 「富哉言乎！
      KR1h0004_tls_012-36a.4: 舜有天下，
      KR1h0004_tls_012-36a.5: 選於眾，
      KR1h0004_tls_012-36a.6: 舉皋陶，
      KR1h0004_tls_012-36a.7: 不仁者遠矣。
      KR1h0004_tls_012-36a.9: 選於眾，
      KR1h0004_tls_012-36a.10: 舉伊尹，
      KR1h0004_tls_012-37a.2: 12.23子貢問友。
      KR1h0004_tls_012-37a.4: 「忠告而善道之，
      KR1h0004_tls_012-37a.5: 不可則止，
      KR1h0004_tls_012-38a.1: 毋自辱焉。」
      KR1h0004_tls_012-38a.3: 「君子以文會友，
      KR1h0004_tls_012-38a.4: 以友輔仁。」
      KR1h0004_tls_013-1a.3: 13.1子路問政。
      KR1h0004_tls_013-1a.5: 「先之
      KR1h0004_tls_013-1a.6: 勞之。」
      KR1h0004_tls_013-1a.7: 請益。
      KR1h0004_tls_013-2a.1: 「無倦。」
      KR1h0004_tls_013-2a.3: 問政。
      KR1h0004_tls_013-2a.5: 「先有司，
      KR1h0004_tls_013-2a.6: 赦小過，
      KR1h0004_tls_013-3a.1: 舉賢才。」
      KR1h0004_tls_013-3a.3: 「焉知賢才而舉之？」
      KR1h0004_tls_013-3a.5: 「舉爾所知；
      KR1h0004_tls_013-4a.1: 人其舍諸？」
      KR1h0004_tls_013-4a.3: 「衛君待子而為政，
      KR1h0004_tls_013-5a.1: 子將奚先？」
      KR1h0004_tls_013-6a.1: 「必也正名乎！」
      KR1h0004_tls_013-6a.3: 「有是哉，
      KR1h0004_tls_013-6a.4: 子之迂也！
      KR1h0004_tls_013-7a.1: 奚其正？」
      KR1h0004_tls_013-7a.3: 「野哉
      KR1h0004_tls_013-7a.5: 君子於其所不知，
      KR1h0004_tls_013-7a.6: 蓋闕如也。
      KR1h0004_tls_013-7a.7: 名不正，
      KR1h0004_tls_013-7a.8: 則言不順；
      KR1h0004_tls_013-7a.9: 言不順，
      KR1h0004_tls_013-7a.10: 則事不成；
      KR1h0004_tls_013-7a.12: 則禮樂不興；
      KR1h0004_tls_013-7a.13: 禮樂不興，
      KR1h0004_tls_013-7a.14: 則刑罰不中；
      KR1h0004_tls_013-7a.16: 則民無所錯手足。
      KR1h0004_tls_013-7a.17: 故君子名之必可言也，
      KR1h0004_tls_013-7a.18: 言之必可行也。
      KR1h0004_tls_013-7a.19: 君子於其言，
      KR1h0004_tls_013-8a.1: 無所苟而已矣。」
      KR1h0004_tls_013-8a.2: 13.4樊遲請學稼。
      KR1h0004_tls_013-8a.4: 「吾不如老農。」
      KR1h0004_tls_013-8a.5: 請學為圃。
      KR1h0004_tls_013-9a.1: 「吾不如老圃。」
      KR1h0004_tls_013-9a.2: 樊遲出。
      KR1h0004_tls_013-9a.4: 「小人哉，
      KR1h0004_tls_013-9a.6: 上好禮，
      KR1h0004_tls_013-9a.8: 上好義，
      KR1h0004_tls_013-9a.10: 上好信，
      KR1h0004_tls_013-9a.12: 夫如是，
      KR1h0004_tls_013-9a.13: 則四方之民
      KR1h0004_tls_013-9a.14: 襁負其子而至矣，
      KR1h0004_tls_013-10a.1: 焉用稼？」
      KR1h0004_tls_013-10a.3: 「誦《詩》三百，
      KR1h0004_tls_013-10a.4: 授之以政，
      KR1h0004_tls_013-10a.5: 不達；
      KR1h0004_tls_013-10a.6: 使於四方，
      KR1h0004_tls_013-10a.7: 不能專對；
      KR1h0004_tls_013-11a.1: 亦奚以為？」
      KR1h0004_tls_013-11a.3: 「其身正，
      KR1h0004_tls_013-11a.4: 不令而行；
      KR1h0004_tls_013-11a.5: 其身不正，
      KR1h0004_tls_013-12a.1: 雖令不從。」
      KR1h0004_tls_013-12a.3: 「魯、衛之政，
      KR1h0004_tls_013-13a.1: 兄弟也。」
      KR1h0004_tls_013-13a.2: 13.8子謂衛公子荊善居室。
      KR1h0004_tls_013-13a.3: 始有，
      KR1h0004_tls_013-13a.5: 「苟合矣。」
      KR1h0004_tls_013-13a.6: 少有，
      KR1h0004_tls_013-13a.8: 「苟完矣。」
      KR1h0004_tls_013-13a.9: 富有，
      KR1h0004_tls_013-14a.3: 冉有僕。
      KR1h0004_tls_013-15a.1: 「庶矣哉！」
      KR1h0004_tls_013-15a.3: 「既庶矣，
      KR1h0004_tls_013-15a.4: 又何加焉？」
      KR1h0004_tls_013-15a.6: 「富之。」
      KR1h0004_tls_013-17a.3: 「苟有用我者，
      KR1h0004_tls_013-17a.4: 期月而已可也，
      KR1h0004_tls_013-18a.1: 三年有成。」
      KR1h0004_tls_013-18a.3: 「『善人為邦百年，
      KR1h0004_tls_013-18a.4: 亦可以勝殘去殺矣。』
      KR1h0004_tls_013-19a.1: 誠哉是言也！」
      KR1h0004_tls_013-19a.3: 「如有王者，
      KR1h0004_tls_013-20a.1: 必世而後仁。」
      KR1h0004_tls_013-20a.3: 「苟正其身矣，
      KR1h0004_tls_013-20a.4: 於從政乎何有？
      KR1h0004_tls_013-20a.5: 不能正其身，
      KR1h0004_tls_013-21a.1: 如正人何？」
      KR1h0004_tls_013-21a.2: 13.14冉子退朝。
      KR1h0004_tls_013-21a.4: 「何晏也？」
      KR1h0004_tls_013-21a.6: 「有政。」
      KR1h0004_tls_013-21a.8: 「其事也。
      KR1h0004_tls_013-21a.10: 雖不吾以，
      KR1h0004_tls_013-22a.2: 13.15.定公問：
      KR1h0004_tls_013-22a.3: 「一言而可以興邦，
      KR1h0004_tls_013-23a.3: 「言不可以若是其幾也。
      KR1h0004_tls_013-23a.4: 人之言曰：
      KR1h0004_tls_013-23a.5: 『為君難，
      KR1h0004_tls_013-23a.6: 為臣不易。』
      KR1h0004_tls_013-23a.7: 如知為君之難也，
      KR1h0004_tls_013-24a.2: 曰：
      KR1h0004_tls_013-25a.1: 「一言而喪邦，有諸？」
      KR1h0004_tls_013-25a.2: 孔子對曰：
      KR1h0004_tls_013-25a.3: 「言不可以若是其幾也。
      KR1h0004_tls_013-25a.4: 人之言曰：
      KR1h0004_tls_013-25a.5: 『予無樂乎為君，
      KR1h0004_tls_013-25a.6: 唯其言而莫予違也。』
      KR1h0004_tls_013-25a.7: 如其善而莫之違也，
      KR1h0004_tls_013-25a.9: 如不善而莫之違也，
      KR1h0004_tls_013-26a.1: 不幾乎一言而喪邦乎？」
      KR1h0004_tls_013-26a.2: 13.16葉公問政。
      KR1h0004_tls_013-26a.4: 「近者說，
      KR1h0004_tls_013-27a.1: 遠者來。」
      KR1h0004_tls_013-27a.2: 13.17子夏為莒父宰，
      KR1h0004_tls_013-27a.3: 問政。
      KR1h0004_tls_013-27a.5: 「無欲速，
      KR1h0004_tls_013-27a.6: 無見小利。
      KR1h0004_tls_013-27a.7: 欲速，則不達；
      KR1h0004_tls_013-28a.1: 見小利，則大事不成。」
      KR1h0004_tls_013-28a.2: 13.18葉公語孔子曰：
      KR1h0004_tls_013-28a.3: 「吾黨有直躬者，
      KR1h0004_tls_013-28a.4: 其父攘羊，而子證之。」
      KR1h0004_tls_013-28a.6: 「吾黨之直者異於是：
      KR1h0004_tls_013-29a.1: 直在其中矣。」
      KR1h0004_tls_013-29a.2: 13.19樊遲問仁。
      KR1h0004_tls_013-29a.4: 「居處恭，
      KR1h0004_tls_013-29a.5: 執事敬，
      KR1h0004_tls_013-29a.6: 與人忠。
      KR1h0004_tls_013-29a.7: 雖之夷狄，
      KR1h0004_tls_013-30a.1: 不可棄也。」
      KR1h0004_tls_013-30a.2: 13.20子貢問曰：
      KR1h0004_tls_013-30a.3: 「何如斯可謂之士矣？」
      KR1h0004_tls_013-30a.5: 「行己有恥，
      KR1h0004_tls_013-30a.6: 使於四方，不辱君命，
      KR1h0004_tls_013-31a.1: 可謂士矣。」
      KR1h0004_tls_013-31a.2: 曰：
      KR1h0004_tls_013-31a.3: 「敢問其次。」
      KR1h0004_tls_013-31a.5: 「宗族稱孝焉，
      KR1h0004_tls_013-32a.1: 鄉黨稱弟焉。」
      KR1h0004_tls_013-32a.2: 曰：
      KR1h0004_tls_013-32a.3: 「敢問其次。」
      KR1h0004_tls_013-32a.5: 「言必信，
      KR1h0004_tls_013-32a.6: 行必果，
      KR1h0004_tls_013-32a.7: 硜硜然
      KR1h0004_tls_013-32a.8: 小人哉！
      KR1h0004_tls_013-33a.1: 抑亦可以為次矣。」
      KR1h0004_tls_013-33a.2: 曰：
      KR1h0004_tls_013-33a.3: 「今之從政者何如？」
      KR1h0004_tls_013-33a.6: 斗筲之人，
      KR1h0004_tls_013-34a.1: 何足算也？」
      KR1h0004_tls_013-34a.3: 「不得中行而與之，
      KR1h0004_tls_013-34a.4: 必也狂狷乎！
      KR1h0004_tls_013-34a.5: 狂者進取，
      KR1h0004_tls_013-35a.1: 狷者有所不為也。」
      KR1h0004_tls_013-35a.3: 「南人有言曰：
      KR1h0004_tls_013-35a.4: 『人而無恆，
      KR1h0004_tls_013-35a.5: 不可以作巫醫。』
      KR1h0004_tls_013-35a.6: 善夫！
      KR1h0004_tls_013-35a.7: 『不恆其德，
      KR1h0004_tls_013-35a.8: 或承之羞。』」
      KR1h0004_tls_013-36a.1: 「不占而已矣。」
      KR1h0004_tls_013-36a.3: 「君子和而不同，
      KR1h0004_tls_013-37a.1: 小人同而不和。」
      KR1h0004_tls_013-37a.2: 13.24子貢問曰：
      KR1h0004_tls_013-37a.3: 「鄉人皆好之，
      KR1h0004_tls_013-37a.4: 何如？」
      KR1h0004_tls_013-38a.1: 「未可也。」
      KR1h0004_tls_013-38a.2: 「鄉人皆惡之，
      KR1h0004_tls_013-38a.5: 「未可也；
      KR1h0004_tls_013-38a.6: 不如鄉人之善者好之，
      KR1h0004_tls_013-39a.1: 其不善者惡之。」
      KR1h0004_tls_013-39a.3: 「君子易事而難說也。
      KR1h0004_tls_013-39a.4: 說之不以道，
      KR1h0004_tls_013-39a.5: 不說也；
      KR1h0004_tls_013-39a.6: 及其使人也，
      KR1h0004_tls_013-39a.7: 器之。
      KR1h0004_tls_013-39a.8: 小人難事而易說也。
      KR1h0004_tls_013-39a.9: 說之雖不以道，
      KR1h0004_tls_013-40a.1: 求備焉。」
      KR1h0004_tls_013-40a.3: 「君子泰而不驕，
      KR1h0004_tls_013-41a.1: 小人驕而不泰。」
      KR1h0004_tls_013-41a.3: 「剛、毅、木、訥
      KR1h0004_tls_013-42a.1: 近仁。」
      KR1h0004_tls_013-42a.2: 13.28子路問曰：
      KR1h0004_tls_013-42a.3: 「何如斯可謂之士矣？」
      KR1h0004_tls_013-42a.5: 「切切偲偲，怡怡如也，
      KR1h0004_tls_013-42a.7: 朋友切切偲偲，
      KR1h0004_tls_013-43a.1: 兄弟怡怡。」
      KR1h0004_tls_013-43a.3: 「善人教民七年，
      KR1h0004_tls_013-44a.1: 亦可以即戎矣。」
      KR1h0004_tls_013-44a.3: 「以不教民戰，
      KR1h0004_tls_013-44a.4: 是謂棄之。」
      KR1h0004_tls_014-1a.3: 14.1憲問恥。
      KR1h0004_tls_014-1a.5: 「邦有道、穀，
      KR1h0004_tls_014-1a.6: 邦無道、穀，
      KR1h0004_tls_014-2a.1: 恥也。」
      KR1h0004_tls_014-2a.2: 「克、伐、怨、欲
      KR1h0004_tls_014-2a.3: 不行焉，
      KR1h0004_tls_014-2a.4: 可以為仁矣？」
      KR1h0004_tls_014-2a.6: 「可以為難矣，
      KR1h0004_tls_014-3a.1: 仁則吾不知也。」
      KR1h0004_tls_014-3a.4: 士@shì
      KR1h0004_tls_014-4a.1: 不足以為士矣。」
      KR1h0004_tls_014-4a.2: 14.3子曰：
      KR1h0004_tls_014-4a.3: 「邦有道，
      KR1h0004_tls_014-4a.4: 危言
      KR1h0004_tls_014-4a.5: 危行；
      KR1h0004_tls_014-4a.7: 危行
      KR1h0004_tls_014-5a.1: 言孫。」
      KR1h0004_tls_014-5a.3: 「有德者
      KR1h0004_tls_014-5a.4: 必有言，
      KR1h0004_tls_014-5a.5: 有言者
      KR1h0004_tls_014-5a.6: 不必有德。
      KR1h0004_tls_014-5a.7: 仁者
      KR1h0004_tls_014-5a.8: 必有勇，
      KR1h0004_tls_014-5a.9: 勇者
      KR1h0004_tls_014-6a.1: 不必有仁。」
      KR1h0004_tls_014-6a.2: 14.5南宮适問於孔子曰：
      KR1h0004_tls_014-6a.3: 「羿善射，
      KR1h0004_tls_014-6a.4: 奡盪舟，
      KR1h0004_tls_014-6a.5: 俱不得其死
      KR1h0004_tls_014-6a.6: 然。禹、稷躬稼而有天下。」
      KR1h0004_tls_014-6a.7: 夫子不答。
      KR1h0004_tls_014-7a.2: 南宮适出，
      KR1h0004_tls_014-7a.4: 「君子哉若人！
      KR1h0004_tls_014-8a.3: 「君子而不仁者有矣夫，
      KR1h0004_tls_014-9a.1: 未有小人而仁者也。」
      KR1h0004_tls_014-9a.3: 「愛之，
      KR1h0004_tls_014-9a.4: 能勿勞乎？
      KR1h0004_tls_014-9a.5: 忠焉，
      KR1h0004_tls_014-10a.1: 能勿誨乎？」
      KR1h0004_tls_014-10a.3: 「為命，
      KR1h0004_tls_014-10a.4: 裨諶草創之，
      KR1h0004_tls_014-10a.5: 世叔討論之，
      KR1h0004_tls_014-10a.6: 行人子羽脩飾之，
      KR1h0004_tls_014-11a.1: 東里子產潤色之。」
      KR1h0004_tls_014-11a.2: 14.9或問子產。
      KR1h0004_tls_014-12a.1: 「惠人也。」
      KR1h0004_tls_014-13a.1: 「彼哉！彼哉！」
      KR1h0004_tls_014-13a.2: 問管仲。
      KR1h0004_tls_014-13a.5: 奪伯氏駢邑三百，
      KR1h0004_tls_014-13a.6: 飯疏食，
      KR1h0004_tls_014-13a.7: 沒齒
      KR1h0004_tls_014-14a.1: 無怨言。」
      KR1h0004_tls_014-14a.3: 「貧而無怨、
      KR1h0004_tls_014-14a.4: 難，
      KR1h0004_tls_014-14a.5: 富而無驕、
      KR1h0004_tls_014-15a.1: 易。」
      KR1h0004_tls_014-15a.4: 為趙、魏老則優，
      KR1h0004_tls_014-16a.1: 不可以為滕、薛大夫。」
      KR1h0004_tls_014-16a.2: 14.12子路問成人。
      KR1h0004_tls_014-16a.4: 「若臧武仲之知，
      KR1h0004_tls_014-16a.5: 公綽之不欲，
      KR1h0004_tls_014-16a.7: 冉求之藝，
      KR1h0004_tls_014-16a.8: 文之以禮樂，
      KR1h0004_tls_014-16a.9: 亦可以為成人矣。」
      KR1h0004_tls_014-16a.11: 「今之成人者
      KR1h0004_tls_014-16a.12: 何必然？
      KR1h0004_tls_014-16a.13: 見利思義，
      KR1h0004_tls_014-16a.14: 見危授命，
      KR1h0004_tls_014-16a.15: 久要不忘平生之言，
      KR1h0004_tls_014-17a.1: 亦可以為成人矣。」
      KR1h0004_tls_014-17a.2: 14.13子問公叔文子於公明賈
      KR1h0004_tls_014-17a.4: 「信乎，
      KR1h0004_tls_014-18a.1: 不笑、不取乎？」
      KR1h0004_tls_014-18a.2: 公明賈對曰：
      KR1h0004_tls_014-18a.3: 「以告者過也。
      KR1h0004_tls_014-18a.4: 夫子時然後言，
      KR1h0004_tls_014-18a.5: 人不厭其言；
      KR1h0004_tls_014-18a.6: 樂然後笑，
      KR1h0004_tls_014-18a.7: 人不厭其笑；
      KR1h0004_tls_014-18a.8: 義然後取，
      KR1h0004_tls_014-19a.1: 人不厭其取。」
      KR1h0004_tls_014-19a.3: 「其然？
      KR1h0004_tls_014-20a.1: 豈其然乎？」
      KR1h0004_tls_014-20a.3: 「臧武仲以防求為後於魯，
      KR1h0004_tls_014-20a.4: 雖曰不要君，
      KR1h0004_tls_014-21a.3: 「晉文公譎而不正，
      KR1h0004_tls_014-22a.1: 齊桓公正而不譎。」
      KR1h0004_tls_014-22a.4: 召忽死之，
      KR1h0004_tls_014-22a.5: 管仲不死。」
      KR1h0004_tls_014-22a.6: 曰：
      KR1h0004_tls_014-22a.7: 「未仁乎？」
      KR1h0004_tls_014-22a.9: 「桓公九合諸侯，
      KR1h0004_tls_014-22a.10: 不以兵車，
      KR1h0004_tls_014-22a.12: 如其仁，
      KR1h0004_tls_014-23a.2: 14.17子貢曰：
      KR1h0004_tls_014-23a.3: 「管仲非仁者與？
      KR1h0004_tls_014-23a.5: 不能死，
      KR1h0004_tls_014-23a.6: 又相之。」
      KR1h0004_tls_014-23a.8: 「管仲相桓公，
      KR1h0004_tls_014-23a.9: 霸諸侯，
      KR1h0004_tls_014-23a.10: 一匡天下，
      KR1h0004_tls_014-23a.11: 民到于今受其賜。
      KR1h0004_tls_014-23a.12: 微管仲，
      KR1h0004_tls_014-23a.13: 吾其被髮左衽矣。
      KR1h0004_tls_014-23a.14: 豈若匹夫匹婦之為諒也，
      KR1h0004_tls_014-23a.15: 自經於溝瀆
      KR1h0004_tls_014-24a.3: 與文子同升諸公。
      KR1h0004_tls_014-24a.4: 子聞之，曰：
      KR1h0004_tls_014-25a.1: 「可以為『文』矣。」
      KR1h0004_tls_014-25a.2: 14.19子言衛靈公之無道也，
      KR1h0004_tls_014-25a.4: 「夫如是，
      KR1h0004_tls_014-25a.5: 奚而不喪？」
      KR1h0004_tls_014-25a.7: 「仲叔圉治賓客，
      KR1h0004_tls_014-25a.8: 祝鮀治宗廟，
      KR1h0004_tls_014-25a.9: 王孫賈治軍旅。
      KR1h0004_tls_014-25a.10: 夫如是，
      KR1h0004_tls_014-26a.3: 「其言之不怍，
      KR1h0004_tls_014-27a.1: 則為之也難。」
      KR1h0004_tls_014-27a.2: 14.21陳成子弒簡公。
      KR1h0004_tls_014-27a.3: 孔子沐浴而朝，
      KR1h0004_tls_014-27a.4: 告於哀公曰：
      KR1h0004_tls_014-27a.6: 請討之。」
      KR1h0004_tls_014-28a.3: 「以吾從大夫之後，
      KR1h0004_tls_014-28a.5: 君曰：
      KR1h0004_tls_014-29a.1: 『告夫三子者！』」
      KR1h0004_tls_014-29a.2: 之三子告，
      KR1h0004_tls_014-29a.3: 不可。
      KR1h0004_tls_014-29a.5: 「以吾從大夫之後，
      KR1h0004_tls_014-30a.2: 14.22子路問事君。
      KR1h0004_tls_014-30a.4: 「勿欺也
      KR1h0004_tls_014-31a.1: 而犯之。」
      KR1h0004_tls_014-31a.3: 「君子上達，
      KR1h0004_tls_014-32a.1: 小人下達。」
      KR1h0004_tls_014-32a.3: 「古之學者為己，
      KR1h0004_tls_014-33a.1: 今之學者為人。」
      KR1h0004_tls_014-33a.2: 14.25蘧伯玉使人於孔子。
      KR1h0004_tls_014-33a.3: 孔子與之坐
      KR1h0004_tls_014-33a.4: 而問焉，
      KR1h0004_tls_014-33a.6: 「夫子何為？」
      KR1h0004_tls_014-34a.1: 「夫子欲寡其過而未能也。」
      KR1h0004_tls_014-34a.2: 使者出。
      KR1h0004_tls_014-34a.4: 「使乎！
      KR1h0004_tls_014-35a.3: 「不在其位，
      KR1h0004_tls_014-36a.1: 不謀其政。」
      KR1h0004_tls_014-37a.1: 「君子思不出其位。」
      KR1h0004_tls_014-37a.3: 「君子恥其言
      KR1h0004_tls_014-38a.1: 而過其行。」
      KR1h0004_tls_014-38a.3: 「君子道者三，
      KR1h0004_tls_014-38a.4: 我無能焉：
      KR1h0004_tls_014-38a.5: 仁者不憂，
      KR1h0004_tls_014-38a.6: 知者不惑，
      KR1h0004_tls_014-38a.7: 勇者不懼。」
      KR1h0004_tls_014-39a.1: 「夫子自道也。」
      KR1h0004_tls_014-39a.2: 14.29子貢方人。
      KR1h0004_tls_014-40a.1: 夫我則不暇。」
      KR1h0004_tls_014-40a.3: 「不患人之不己知，
      KR1h0004_tls_014-41a.1: 患其不能也。」
      KR1h0004_tls_014-41a.3: 「不逆詐，
      KR1h0004_tls_014-41a.4: 不億不信，
      KR1h0004_tls_014-41a.5: 抑亦先覺者，
      KR1h0004_tls_014-42a.1: 是賢乎！」
      KR1h0004_tls_014-42a.3: 「丘何為是栖栖者與？
      KR1h0004_tls_014-42a.4: 無乃為佞乎？」
      KR1h0004_tls_014-42a.6: 「非敢為佞也，
      KR1h0004_tls_014-43a.1: 疾固也。」
      KR1h0004_tls_014-43a.3: 「驥不稱其力，
      KR1h0004_tls_014-44a.1: 稱其德也。」
      KR1h0004_tls_014-44a.2: 14.34或曰：
      KR1h0004_tls_014-44a.3: 「『以德報怨』，
      KR1h0004_tls_014-44a.4: 何如？」
      KR1h0004_tls_014-44a.6: 「何以報德？
      KR1h0004_tls_014-44a.7: 『以直報怨，
      KR1h0004_tls_014-45a.1: 以德報德。』」
      KR1h0004_tls_014-45a.3: 「莫我知也夫！」
      KR1h0004_tls_014-45a.5: 「何為其莫知子也？」
      KR1h0004_tls_014-45a.7: 「不怨天，
      KR1h0004_tls_014-45a.8: 不尤人，
      KR1h0004_tls_014-45a.9: 下學而上達。
      KR1h0004_tls_014-45a.10: 知我者
      KR1h0004_tls_014-46a.2: 14.36公伯寮愬子路於季孫。
      KR1h0004_tls_014-46a.3: 子服景伯以告，
      KR1h0004_tls_014-46a.5: 「夫子固有惑志於公伯寮，
      KR1h0004_tls_014-47a.1: 吾力猶能肆諸市朝。」
      KR1h0004_tls_014-47a.3: 「道之將行也與，
      KR1h0004_tls_014-47a.4: 命也；
      KR1h0004_tls_014-47a.5: 道之將廢也與，
      KR1h0004_tls_014-48a.1: 公伯寮其如命何！」
      KR1h0004_tls_014-48a.3: 「賢者辟世，
      KR1h0004_tls_014-48a.4: 其次辟地，
      KR1h0004_tls_014-48a.5: 其次辟色，
      KR1h0004_tls_014-49a.1: 其次辟言。」
      KR1h0004_tls_014-50a.1: 「作者七人矣。」
      KR1h0004_tls_014-50a.2: 14.38子路宿於石門。
      KR1h0004_tls_014-50a.3: 晨門曰：
      KR1h0004_tls_014-50a.4: 「奚自？」
      KR1h0004_tls_014-50a.6: 「自孔氏。」
      KR1h0004_tls_014-50a.7: 曰：
      KR1h0004_tls_014-51a.1: 「是知其不可而為之者與？」
      KR1h0004_tls_014-51a.2: 14.39子擊磬於衛，
      KR1h0004_tls_014-51a.3: 有荷蕢而過孔氏之門者，
      KR1h0004_tls_014-51a.5: 「有心哉，
      KR1h0004_tls_014-51a.7: 既而曰：
      KR1h0004_tls_014-51a.8: 「鄙哉，
      KR1h0004_tls_014-51a.9: 硜硜乎！
      KR1h0004_tls_014-51a.10: 莫己知也，
      KR1h0004_tls_014-51a.11: 斯已而已矣。
      KR1h0004_tls_014-51a.12: 『深則厲，
      KR1h0004_tls_014-52a.1: 淺則揭。』」
      KR1h0004_tls_014-52a.3: 「果哉！
      KR1h0004_tls_014-53a.3: 「《書》云：
      KR1h0004_tls_014-53a.4: 『高宗諒陰，三年不言。』
      KR1h0004_tls_014-53a.5: 何謂也？」
      KR1h0004_tls_014-53a.7: 「何必高宗，
      KR1h0004_tls_014-53a.8: 古之人皆然。
      KR1h0004_tls_014-53a.9: 君薨，
      KR1h0004_tls_014-53a.10: 百官總己以聽於冢宰
      KR1h0004_tls_014-54a.3: 「上好禮，
      KR1h0004_tls_014-55a.1: 則民易使也。」
      KR1h0004_tls_014-55a.2: 14.42子路問君子。
      KR1h0004_tls_014-56a.1: 「脩己以敬。」
      KR1h0004_tls_014-56a.2: 曰：
      KR1h0004_tls_014-56a.3: 「如斯而已乎？」
      KR1h0004_tls_014-57a.1: 「脩己以安人。」
      KR1h0004_tls_014-57a.2: 曰：
      KR1h0004_tls_014-57a.3: 「如斯而已乎？」
      KR1h0004_tls_014-57a.5: 「脩己以安百姓。
      KR1h0004_tls_014-57a.6: 脩己以安百姓，
      KR1h0004_tls_014-58a.1: 堯、舜其猶病諸？」
      KR1h0004_tls_014-58a.2: 14.43原壤夷俟。
      KR1h0004_tls_014-58a.4: 「幼而不孫弟，
      KR1h0004_tls_014-58a.5: 長而無述焉，
      KR1h0004_tls_014-58a.6: 老而不死，
      KR1h0004_tls_014-58a.7: 是為賊。」
      KR1h0004_tls_014-58a.8: 以杖叩其脛。
      KR1h0004_tls_014-59a.2: 14.44闕黨童子將命。
      KR1h0004_tls_014-59a.3: 或問之曰：
      KR1h0004_tls_014-59a.4: 「益者與？」
      KR1h0004_tls_014-59a.6: 「吾見其居於位也，
      KR1h0004_tls_014-59a.7: 見其與先生並行也。
      KR1h0004_tls_014-59a.8: 非求益者也，
      KR1h0004_tls_014-59a.9: 欲速成者也。」
      KR1h0004_tls_015-1a.3: 15.1衛靈公問陳於孔子。
      KR1h0004_tls_015-1a.5: 「俎豆之事，
      KR1h0004_tls_015-1a.6: 則嘗聞之矣；
      KR1h0004_tls_015-1a.7: 軍旅之事，
      KR1h0004_tls_015-1a.8: 未之學也。」
      KR1h0004_tls_015-1a.9: 明日遂行。
      KR1h0004_tls_015-2a.2: 15.2在陳絕糧，
      KR1h0004_tls_015-2a.3: 從者病，
      KR1h0004_tls_015-2a.4: 莫能興。
      KR1h0004_tls_015-2a.5: 子路慍見曰：
      KR1h0004_tls_015-2a.6: 「君子亦有窮乎？」
      KR1h0004_tls_015-2a.8: 「君子固窮，
      KR1h0004_tls_015-3a.1: 小人窮斯濫矣。」
      KR1h0004_tls_015-3a.4: 女以予為多學而識之者與？」
      KR1h0004_tls_015-3a.6: 「然，
      KR1h0004_tls_015-3a.7: 非與？」
      KR1h0004_tls_015-3a.9: 「非也，
      KR1h0004_tls_015-3a.10: 予一以貫之。」
      KR1h0004_tls_015-4a.4: 知德者鮮矣。」
      KR1h0004_tls_015-5a.3: 「無為而治者
      KR1h0004_tls_015-5a.4: 其舜也與？
      KR1h0004_tls_015-5a.5: 夫何為哉？
      KR1h0004_tls_015-6a.1: 恭己正南面而已矣。」
      KR1h0004_tls_015-6a.2: 15.6子張問行。
      KR1h0004_tls_015-6a.4: 「言忠信，
      KR1h0004_tls_015-6a.5: 行篤敬，
      KR1h0004_tls_015-6a.6: 雖蠻貊之邦，行矣。
      KR1h0004_tls_015-6a.7: 言不忠信，
      KR1h0004_tls_015-6a.8: 行不篤敬，
      KR1h0004_tls_015-6a.9: 雖州里，行乎哉？
      KR1h0004_tls_015-6a.10: 立
      KR1h0004_tls_015-6a.12: 在輿
      KR1h0004_tls_015-6a.13: 則見其倚於衡也，
      KR1h0004_tls_015-6a.14: 夫然後行。」
      KR1h0004_tls_015-6a.15: 子張書諸紳。
      KR1h0004_tls_015-7a.3: 「直哉史魚！
      KR1h0004_tls_015-7a.4: 邦有道，
      KR1h0004_tls_015-7a.5: 如矢；
      KR1h0004_tls_015-7a.7: 如矢。
      KR1h0004_tls_015-7a.8: 君子哉蘧伯玉！
      KR1h0004_tls_015-7a.10: 則仕；
      KR1h0004_tls_015-8a.1: 則可卷而懷之。」
      KR1h0004_tls_015-8a.3: 「可與言
      KR1h0004_tls_015-8a.4: 而不與言，
      KR1h0004_tls_015-8a.8: 失言。
      KR1h0004_tls_015-8a.9: 知者不失人，
      KR1h0004_tls_015-9a.1: 亦不失言。」
      KR1h0004_tls_015-9a.3: 「志士仁人，
      KR1h0004_tls_015-9a.4: 無求生以害仁，
      KR1h0004_tls_015-10a.1: 有殺身以成仁。」
      KR1h0004_tls_015-10a.2: 15.10子貢問為仁。
      KR1h0004_tls_015-10a.4: 「工欲善其事，
      KR1h0004_tls_015-10a.5: 必先利其器。
      KR1h0004_tls_015-10a.6: 居是邦也，
      KR1h0004_tls_015-10a.7: 事其大夫之賢者，
      KR1h0004_tls_015-11a.1: 友其士之仁者。」
      KR1h0004_tls_015-11a.2: 15.11顏淵問為邦。
      KR1h0004_tls_015-11a.4: 「行夏之時，
      KR1h0004_tls_015-11a.5: 乘殷之輅，
      KR1h0004_tls_015-11a.6: 服周之冕，
      KR1h0004_tls_015-11a.7: 樂則《韶》《舞》。
      KR1h0004_tls_015-11a.8: 放鄭聲，
      KR1h0004_tls_015-11a.9: 遠佞人。
      KR1h0004_tls_015-11a.10: 鄭聲淫，
      KR1h0004_tls_015-12a.1: 佞人殆。」
      KR1h0004_tls_015-12a.3: 「人無遠慮，
      KR1h0004_tls_015-13a.1: 必有近憂。」
      KR1h0004_tls_015-14a.1: 吾未見好德如好色者也。」
      KR1h0004_tls_015-14a.4: 其竊位者與！
      KR1h0004_tls_015-14a.5: 知柳下惠之賢
      KR1h0004_tls_015-14a.6: 而不與立也。」
      KR1h0004_tls_015-14a.8: 「躬自厚
      KR1h0004_tls_015-14a.9: 而薄責於人，
      KR1h0004_tls_015-16a.1: 則遠怨矣。」
      KR1h0004_tls_015-16a.4: 『如之何、
      KR1h0004_tls_015-16a.5: 如之何』者，
      KR1h0004_tls_015-17a.1: 吾末如之何也已矣。」
      KR1h0004_tls_015-17a.3: 「群居終日，
      KR1h0004_tls_015-17a.4: 言不及義，
      KR1h0004_tls_015-17a.5: 好行小慧，
      KR1h0004_tls_015-18a.1: 難矣哉！」
      KR1h0004_tls_015-18a.3: 「君子義以為質，
      KR1h0004_tls_015-18a.4: 禮以行之，
      KR1h0004_tls_015-18a.5: 孫以出之，
      KR1h0004_tls_015-18a.6: 信以成之。
      KR1h0004_tls_015-19a.1: 君子哉！」
      KR1h0004_tls_015-19a.3: 「君子病無能焉，
      KR1h0004_tls_015-20a.1: 不病人之不己知也。」
      KR1h0004_tls_015-21a.1: 「君子疾沒世而名不稱焉。」
      KR1h0004_tls_015-21a.3: 「君子求諸己，
      KR1h0004_tls_015-22a.1: 小人求諸人。」
      KR1h0004_tls_015-22a.3: 「君子矜而不爭，
      KR1h0004_tls_015-23a.1: 群而不黨。」
      KR1h0004_tls_015-23a.3: 「君子不以言舉人，
      KR1h0004_tls_015-24a.1: 不以人廢言。」
      KR1h0004_tls_015-24a.2: 15.24子貢問曰：
      KR1h0004_tls_015-24a.3: 「有一言而可以終身行之者乎？」
      KR1h0004_tls_015-24a.5: 「其恕乎！
      KR1h0004_tls_015-24a.6: 己所不欲，
      KR1h0004_tls_015-25a.1: 勿施於人。」
      KR1h0004_tls_015-25a.3: 「吾之於人也，
      KR1h0004_tls_015-25a.4: 誰毀誰譽？
      KR1h0004_tls_015-25a.5: 如有所譽者，
      KR1h0004_tls_015-25a.6: 其有所試矣。
      KR1h0004_tls_015-25a.7: 斯民也，
      KR1h0004_tls_015-26a.1: 三代之所以直道而行也。」
      KR1h0004_tls_015-26a.3: 「吾猶及史之闕文也。
      KR1h0004_tls_015-26a.4: 有馬者
      KR1h0004_tls_015-26a.5: 借人乘之，
      KR1h0004_tls_015-27a.1: 今亡矣夫！」
      KR1h0004_tls_015-27a.3: 「巧言亂德。
      KR1h0004_tls_015-27a.4: 小不忍，
      KR1h0004_tls_015-28a.1: 則亂大謀。」
      KR1h0004_tls_015-28a.3: 「眾惡之，
      KR1h0004_tls_015-28a.4: 必察焉；
      KR1h0004_tls_015-28a.5: 眾好之，
      KR1h0004_tls_015-29a.1: 必察焉。」
      KR1h0004_tls_015-29a.3: 「人能弘道，
      KR1h0004_tls_015-30a.1: 非道弘人。」
      KR1h0004_tls_015-30a.3: 「過而不改，
      KR1h0004_tls_015-31a.3: 「吾嘗終日不食，
      KR1h0004_tls_015-31a.4: 終夜不寢，
      KR1h0004_tls_015-31a.5: 以思，
      KR1h0004_tls_015-31a.6: 無益，
      KR1h0004_tls_015-32a.1: 不如學也。」
      KR1h0004_tls_015-32a.3: 「君子謀道不謀食。
      KR1h0004_tls_015-32a.4: 耕也，
      KR1h0004_tls_015-32a.5: 餒在其中矣；
      KR1h0004_tls_015-32a.6: 學也，
      KR1h0004_tls_015-32a.7: 祿在其中矣。
      KR1h0004_tls_015-33a.1: 君子憂道不憂貧。」
      KR1h0004_tls_015-33a.3: 「知及之，
      KR1h0004_tls_015-33a.4: 仁不能守之；
      KR1h0004_tls_015-33a.7: 知及之，
      KR1h0004_tls_015-33a.9: 不莊以涖之，
      KR1h0004_tls_015-33a.10: 則民不敬。
      KR1h0004_tls_015-33a.13: 莊以涖之，
      KR1h0004_tls_015-33a.14: 動之不以禮，
      KR1h0004_tls_015-34a.1: 未善也。」
      KR1h0004_tls_015-34a.3: 「君子不可小知
      KR1h0004_tls_015-34a.4: 而可大受也，
      KR1h0004_tls_015-34a.5: 小人不可大受
      KR1h0004_tls_015-35a.3: 「民之於仁也，
      KR1h0004_tls_015-35a.4: 甚於水火。
      KR1h0004_tls_015-35a.6: 吾見蹈而死者矣，
      KR1h0004_tls_015-36a.1: 未見蹈仁而死者也。」
      KR1h0004_tls_015-36a.3: 「當仁，
      KR1h0004_tls_015-37a.1: 不讓於師。」
      KR1h0004_tls_015-38a.1: 「君子貞而不諒。」
      KR1h0004_tls_015-39a.1: 「事君，敬其事而後其食。」
      KR1h0004_tls_015-40a.1: 「有教無類。」
      KR1h0004_tls_015-40a.3: 「道不同，
      KR1h0004_tls_015-41a.1: 不相為謀。」
      KR1h0004_tls_015-41a.3: 「辭
      KR1h0004_tls_015-42a.1: 達而已矣。」
      KR1h0004_tls_015-42a.2: 15.42師冕見，
      KR1h0004_tls_015-42a.3: 及階，
      KR1h0004_tls_015-42a.6: 及席，
      KR1h0004_tls_015-42a.10: 子告之曰：
      KR1h0004_tls_015-42a.11: 「某在斯，
      KR1h0004_tls_015-43a.3: 子張問曰：
      KR1h0004_tls_015-43a.4: 「與師言之道與？」
      KR1h0004_tls_015-43a.7: 固相師之道也。」
      KR1h0004_tls_016-1a.3: 16.1季氏將伐顓臾。
      KR1h0004_tls_016-1a.4: 冉有、季路見於孔子曰：
      KR1h0004_tls_016-2a.1: 「季氏將有事於顓臾。」
      KR1h0004_tls_016-2a.4: 無乃爾是過與？
      KR1h0004_tls_016-2a.6: 昔者先王以為東蒙主，
      KR1h0004_tls_016-2a.7: 且在邦域之中矣，
      KR1h0004_tls_016-3a.1: 何以伐為？」
      KR1h0004_tls_016-3a.3: 「夫子欲之，
      KR1h0004_tls_016-3a.4: 吾二臣者
      KR1h0004_tls_016-4a.1: 皆不欲也。」
      KR1h0004_tls_016-4a.4: 周任有言曰：
      KR1h0004_tls_016-4a.5: 『陳力就列，
      KR1h0004_tls_016-4a.6: 不能者止。』
      KR1h0004_tls_016-4a.7: 危而不持，
      KR1h0004_tls_016-4a.9: 則將焉用彼相矣？
      KR1h0004_tls_016-4a.10: 且爾言過矣，
      KR1h0004_tls_016-4a.12: 龜玉毀於櫝中，
      KR1h0004_tls_016-5a.1: 是誰之過與？」
      KR1h0004_tls_016-5a.4: 固而近於費。
      KR1h0004_tls_016-5a.5: 今不取，
      KR1h0004_tls_016-6a.1: 後世必為子孫憂。」
      KR1h0004_tls_016-6a.4: 君子疾夫舍曰欲之
      KR1h0004_tls_016-6a.5: 而必為之辭。
      KR1h0004_tls_016-6a.6: 丘也
      KR1h0004_tls_016-6a.7: 聞有國有家者，
      KR1h0004_tls_016-6a.8: 不患寡而患不均，
      KR1h0004_tls_016-6a.9: 不患貧而患不安。
      KR1h0004_tls_016-6a.10: 蓋均無貧，
      KR1h0004_tls_016-6a.12: 安無傾。
      KR1h0004_tls_016-6a.13: 夫如是，
      KR1h0004_tls_016-6a.14: 故遠人不服，
      KR1h0004_tls_016-6a.15: 則脩文德以來之。
      KR1h0004_tls_016-6a.16: 既來之，
      KR1h0004_tls_016-6a.17: 則安之。
      KR1h0004_tls_016-6a.18: 今由與求也，
      KR1h0004_tls_016-6a.19: 相夫子，
      KR1h0004_tls_016-6a.20: 遠人不服而不能來也；
      KR1h0004_tls_016-6a.21: 邦分崩離析
      KR1h0004_tls_016-6a.23: 而謀動干戈於邦內。
      KR1h0004_tls_016-6a.24: 吾恐季孫之憂，
      KR1h0004_tls_016-7a.1: 而在蕭牆之內也。」
      KR1h0004_tls_016-7a.3: 「天下有道，
      KR1h0004_tls_016-7a.4: 則禮樂征伐自天子出；
      KR1h0004_tls_016-7a.5: 天下無道，
      KR1h0004_tls_016-7a.6: 則禮樂征伐自諸侯出。
      KR1h0004_tls_016-7a.7: 自諸侯出，
      KR1h0004_tls_016-7a.8: 蓋十世希不失矣；
      KR1h0004_tls_016-7a.9: 自大夫出，
      KR1h0004_tls_016-7a.10: 五世希不失矣；
      KR1h0004_tls_016-7a.11: 陪臣執國命，
      KR1h0004_tls_016-7a.12: 三世希不失矣。
      KR1h0004_tls_016-7a.13: 天下有道，
      KR1h0004_tls_016-7a.14: 則政不在大夫。
      KR1h0004_tls_016-7a.15: 天下有道，
      KR1h0004_tls_016-8a.1: 則庶人不議。」
      KR1h0004_tls_016-8a.3: 「祿之去公室
      KR1h0004_tls_016-8a.4: 五世矣，
      KR1h0004_tls_016-8a.5: 政逮於大夫
      KR1h0004_tls_016-9a.1: 故夫三桓之子孫微矣。」
      KR1h0004_tls_016-9a.3: 「益者三友，
      KR1h0004_tls_016-9a.4: 損者三友。
      KR1h0004_tls_016-9a.5: 友直，
      KR1h0004_tls_016-9a.6: 友諒，
      KR1h0004_tls_016-9a.7: 友多聞，
      KR1h0004_tls_016-9a.8: 益矣。
      KR1h0004_tls_016-9a.9: 友便辟，
      KR1h0004_tls_016-9a.10: 友善柔，
      KR1h0004_tls_016-10a.1: 損矣。」
      KR1h0004_tls_016-10a.3: 「益者三樂，
      KR1h0004_tls_016-10a.4: 損者三樂。
      KR1h0004_tls_016-10a.5: 樂節禮樂，
      KR1h0004_tls_016-10a.6: 樂道人之善，
      KR1h0004_tls_016-10a.7: 樂多賢友，
      KR1h0004_tls_016-10a.8: 益矣。
      KR1h0004_tls_016-10a.9: 樂驕樂，
      KR1h0004_tls_016-10a.10: 樂佚遊，
      KR1h0004_tls_016-11a.1: 損矣。」
      KR1h0004_tls_016-11a.3: 「侍於君子有三愆：
      KR1h0004_tls_016-11a.4: 言未及之而言
      KR1h0004_tls_016-11a.5: 謂之躁，
      KR1h0004_tls_016-11a.6: 言及之而不言
      KR1h0004_tls_016-11a.7: 謂之隱，
      KR1h0004_tls_016-11a.8: 未見顏色而言
      KR1h0004_tls_016-12a.1: 謂之瞽。」
      KR1h0004_tls_016-12a.3: 「君子有三戒：
      KR1h0004_tls_016-12a.4: 少之時，
      KR1h0004_tls_016-12a.5: 血氣未定，
      KR1h0004_tls_016-12a.6: 戒之在色；
      KR1h0004_tls_016-12a.7: 及其壯也，
      KR1h0004_tls_016-12a.8: 血氣方剛，
      KR1h0004_tls_016-12a.9: 戒之在鬭；
      KR1h0004_tls_016-12a.10: 及其老也，
      KR1h0004_tls_016-13a.1: 戒之在得。」
      KR1h0004_tls_016-13a.3: 「君子有三畏：
      KR1h0004_tls_016-13a.4: 畏天命，
      KR1h0004_tls_016-13a.5: 畏大人，
      KR1h0004_tls_016-13a.6: 畏聖人之言。
      KR1h0004_tls_016-13a.7: 小人不知天命而不畏也，
      KR1h0004_tls_016-13a.8: 狎大人，
      KR1h0004_tls_016-14a.1: 侮聖人之言。」
      KR1h0004_tls_016-14a.3: 「生而知之者
      KR1h0004_tls_016-14a.4: 上也，
      KR1h0004_tls_016-14a.5: 學而知之者
      KR1h0004_tls_016-14a.6: 次也；
      KR1h0004_tls_016-14a.7: 困而學之，
      KR1h0004_tls_016-14a.8: 又其次也；
      KR1h0004_tls_016-15a.1: 民斯為下矣。」
      KR1h0004_tls_016-15a.3: 「君子有九思：
      KR1h0004_tls_016-15a.4: 視思明，
      KR1h0004_tls_016-15a.5: 聽思聰，
      KR1h0004_tls_016-15a.6: 色思溫，
      KR1h0004_tls_016-15a.7: 貌思恭，
      KR1h0004_tls_016-15a.8: 言思忠，
      KR1h0004_tls_016-15a.9: 事思敬，
      KR1h0004_tls_016-15a.10: 疑思問，
      KR1h0004_tls_016-16a.1: 見得思義。」
      KR1h0004_tls_016-16a.3: 「『見善如不及，
      KR1h0004_tls_016-16a.4: 見不善如探湯。』
      KR1h0004_tls_016-16a.5: 吾見其人矣，
      KR1h0004_tls_016-16a.6: 吾聞其語矣。
      KR1h0004_tls_016-16a.7: 『隱居以求其志，
      KR1h0004_tls_016-16a.8: 行義以達其道。』
      KR1h0004_tls_016-16a.9: 吾聞其語矣，
      KR1h0004_tls_016-17a.1: 未見其人也。」
      KR1h0004_tls_016-17a.2: 16.12齊景公有馬千駟，
      KR1h0004_tls_016-17a.3: 死之日，
      KR1h0004_tls_016-17a.4: 民無得而稱焉。
      KR1h0004_tls_016-17a.5: 伯夷、叔齊餓于首陽之下，
      KR1h0004_tls_016-17a.6: 民到于今稱之。
      KR1h0004_tls_016-18a.1: 其斯之謂與？
      KR1h0004_tls_016-18a.2: 16.13陳亢問於伯魚曰：
      KR1h0004_tls_016-19a.1: 「子亦有異聞乎？」
      KR1h0004_tls_016-19a.3: 「未也。
      KR1h0004_tls_016-19a.4: 嘗獨立，
      KR1h0004_tls_016-19a.5: 鯉趨而過庭。」
      KR1h0004_tls_016-19a.7: 『學《詩》乎？』
      KR1h0004_tls_016-19a.9: 『未也。』
      KR1h0004_tls_016-19a.11: 無以言。』
      KR1h0004_tls_016-19a.12: 鯉退而學《詩》。
      KR1h0004_tls_016-19a.13: 他日，
      KR1h0004_tls_016-19a.14: 又獨立，
      KR1h0004_tls_016-19a.16: 曰：
      KR1h0004_tls_016-19a.19: 『未也。』
      KR1h0004_tls_016-19a.21: 無以立。』
      KR1h0004_tls_016-20a.1: 聞斯二者。」
      KR1h0004_tls_016-20a.2: 陳亢退而喜曰：
      KR1h0004_tls_016-20a.3: 「問一得三，
      KR1h0004_tls_016-20a.4: 聞《詩》，
      KR1h0004_tls_016-21a.1: 又聞君子之遠其子也。」
      KR1h0004_tls_016-21a.2: 16.14邦君之妻，
      KR1h0004_tls_016-21a.3: 君稱之曰夫人，
      KR1h0004_tls_016-21a.4: 夫人自稱曰小童；
      KR1h0004_tls_016-21a.5: 邦人稱之曰君夫人，
      KR1h0004_tls_016-21a.6: 稱諸異邦曰寡小君；
      KR1h0004_tls_016-21a.7: 異邦人稱之
      KR1h0004_tls_016-21a.8: 亦曰君夫人。
      KR1h0004_tls_017-1a.3: 17.1陽貨欲見孔子，
      KR1h0004_tls_017-1a.4: 孔子不見，
      KR1h0004_tls_017-1a.5: 歸孔子豚。
      KR1h0004_tls_017-2a.2: 孔子時其亡也，
      KR1h0004_tls_017-2a.3: 而往拜之。
      KR1h0004_tls_017-3a.2: 遇諸塗。
      KR1h0004_tls_017-4a.3: 「來！
      KR1h0004_tls_017-4a.4: 予與爾言。」
      KR1h0004_tls_017-4a.6: 「懷其寶而迷其邦，
      KR1h0004_tls_017-4a.7: 可謂仁乎？」
      KR1h0004_tls_017-4a.9: 「不可。」
      KR1h0004_tls_017-4a.10: 「好從事而亟失時，
      KR1h0004_tls_017-4a.11: 可謂知乎？」
      KR1h0004_tls_017-5a.1: 歲不我與。」
      KR1h0004_tls_017-5a.3: 「諾。
      KR1h0004_tls_017-6a.3: 「諾，
      KR1h0004_tls_017-6a.4: 吾將仕矣！」
      KR1h0004_tls_017-6a.6: 「性相近也，
      KR1h0004_tls_017-7a.1: 習相遠也。」
      KR1h0004_tls_017-7a.3: 「唯上知與下愚
      KR1h0004_tls_017-8a.1: 不移。」
      KR1h0004_tls_017-8a.2: 17.4子之武城，
      KR1h0004_tls_017-8a.3: 聞弦歌之聲。
      KR1h0004_tls_017-8a.4: 夫子莞爾而笑，曰：
      KR1h0004_tls_017-9a.1: 「割雞焉用牛刀？」
      KR1h0004_tls_017-9a.2: 子游對曰：
      KR1h0004_tls_017-9a.3: 「昔者
      KR1h0004_tls_017-9a.4: 偃也聞諸夫子曰：
      KR1h0004_tls_017-9a.5: 『君子學道則愛人，
      KR1h0004_tls_017-10a.1: 小人學道則易使也。』」
      KR1h0004_tls_017-10a.3: 「二三子！
      KR1h0004_tls_017-10a.4: 偃之言是也。
      KR1h0004_tls_017-11a.1: 前言戲之耳。」
      KR1h0004_tls_017-11a.2: 17.5公山弗擾以費畔，
      KR1h0004_tls_017-11a.3: 召，
      KR1h0004_tls_017-11a.4: 子欲往。
      KR1h0004_tls_017-12a.2: 子路不說，
      KR1h0004_tls_017-12a.4: 「末之也已，
      KR1h0004_tls_017-13a.1: 何必公山氏之之也？」
      KR1h0004_tls_017-13a.3: 「夫召我者，
      KR1h0004_tls_017-13a.4: 而豈徒哉？
      KR1h0004_tls_017-14a.1: 吾其為東周乎？」
      KR1h0004_tls_017-14a.2: 17.6子張問仁於孔子。
      KR1h0004_tls_017-14a.4: 「能行五者於天下
      KR1h0004_tls_017-15a.1: 為仁矣。」
      KR1h0004_tls_017-15a.2: 「請問之。」
      KR1h0004_tls_017-15a.4: 「恭、寬、信、敏、惠。
      KR1h0004_tls_017-15a.5: 恭則不侮，
      KR1h0004_tls_017-15a.6: 寬則得眾，
      KR1h0004_tls_017-15a.7: 信則人任焉，
      KR1h0004_tls_017-15a.8: 敏則有功，
      KR1h0004_tls_017-16a.1: 惠則足以使人。」
      KR1h0004_tls_017-16a.2: 17.7佛肸召，
      KR1h0004_tls_017-16a.3: 子欲往。
      KR1h0004_tls_017-17a.3: 「昔者由也聞諸夫子曰：
      KR1h0004_tls_017-17a.4: 『親於其身為不善者，
      KR1h0004_tls_017-17a.5: 君子不入也。』
      KR1h0004_tls_017-17a.6: 佛肸以中牟畔，
      KR1h0004_tls_017-18a.1: 子之往也，如之何？」
      KR1h0004_tls_017-18a.3: 「然，
      KR1h0004_tls_017-18a.4: 有是言也。
      KR1h0004_tls_017-18a.6: 堅乎磨而不磷；
      KR1h0004_tls_017-18a.8: 白乎涅而不緇。
      KR1h0004_tls_017-18a.9: 吾豈匏瓜也哉？
      KR1h0004_tls_017-19a.1: 焉能繫而不食？」
      KR1h0004_tls_017-19a.3: 「由也！
      KR1h0004_tls_017-19a.4: 女聞六言六蔽矣乎？」
      KR1h0004_tls_017-20a.1: 「未也。」
      KR1h0004_tls_017-20a.2: 「居！
      KR1h0004_tls_017-20a.3: 吾語女。
      KR1h0004_tls_017-20a.4: 好仁不好學，
      KR1h0004_tls_017-20a.5: 其蔽也愚；
      KR1h0004_tls_017-20a.7: 其蔽也蕩；
      KR1h0004_tls_017-20a.8: 好信不好學，
      KR1h0004_tls_017-20a.9: 其蔽也賊；
      KR1h0004_tls_017-20a.10: 好直不好學，
      KR1h0004_tls_017-20a.12: 好勇不好學，
      KR1h0004_tls_017-20a.13: 其蔽也亂；
      KR1h0004_tls_017-20a.14: 好剛不好學，
      KR1h0004_tls_017-21a.1: 其蔽也狂。」
      KR1h0004_tls_017-21a.3: 「小子
      KR1h0004_tls_017-21a.4: 何莫學夫《詩》？
      KR1h0004_tls_017-21a.6: 可以興，
      KR1h0004_tls_017-21a.7: 可以觀，
      KR1h0004_tls_017-21a.8: 可以群，
      KR1h0004_tls_017-21a.9: 可以怨。
      KR1h0004_tls_017-21a.10: 邇之事父，
      KR1h0004_tls_017-22a.1: 多識於鳥獸草木之名。」
      KR1h0004_tls_017-22a.3: 「女為《周南》、《召南》矣乎？
      KR1h0004_tls_017-22a.4: 人而不為《周南》、《召南》，
      KR1h0004_tls_017-23a.3: 「禮云禮云，
      KR1h0004_tls_017-23a.4: 玉帛云乎哉？
      KR1h0004_tls_017-24a.3: 「色厲而內荏，
      KR1h0004_tls_017-24a.4: 譬諸小人，
      KR1h0004_tls_017-25a.1: 其猶穿窬之盜也與？」
      KR1h0004_tls_017-26a.1: 德之賊也。」
      KR1h0004_tls_017-26a.3: 「道聽而塗說，
      KR1h0004_tls_017-27a.1: 德之棄也。」
      KR1h0004_tls_017-27a.3: 「鄙夫
      KR1h0004_tls_017-27a.4: 可與事君也與哉？
      KR1h0004_tls_017-27a.5: 其未得之也，
      KR1h0004_tls_017-27a.6: 患不得之。
      KR1h0004_tls_017-27a.7: 既得之，
      KR1h0004_tls_017-27a.8: 患失之。
      KR1h0004_tls_017-27a.9: 苟患失之，
      KR1h0004_tls_017-28a.3: 「古者民有三疾，
      KR1h0004_tls_017-28a.4: 今也或是之亡也。
      KR1h0004_tls_017-28a.5: 古之狂也肆，
      KR1h0004_tls_017-28a.6: 今之狂也蕩；
      KR1h0004_tls_017-28a.7: 古之矜也廉，
      KR1h0004_tls_017-28a.8: 今之矜也忿戾；
      KR1h0004_tls_017-28a.9: 古之愚也直，
      KR1h0004_tls_017-29a.1: 今之愚也詐而已矣。」
      KR1h0004_tls_017-29a.3: 「巧言令色，
      KR1h0004_tls_017-30a.1: 鮮矣仁。」
      KR1h0004_tls_017-30a.3: 「惡紫之奪朱也，
      KR1h0004_tls_017-30a.4: 惡鄭聲之亂雅樂也，
      KR1h0004_tls_017-31a.1: 惡利口之覆邦家者。」
      KR1h0004_tls_017-31a.3: 「予欲無言。」
      KR1h0004_tls_017-31a.5: 「子如不言，
      KR1h0004_tls_017-31a.6: 則小子何述焉？」
      KR1h0004_tls_017-31a.8: 「天何言哉？
      KR1h0004_tls_017-31a.9: 四時行焉，
      KR1h0004_tls_017-31a.10: 百物生焉，
      KR1h0004_tls_017-32a.2: 17.20孺悲欲見孔子，
      KR1h0004_tls_017-32a.3: 孔子辭以疾。
      KR1h0004_tls_017-32a.4: 將命者出戶，
      KR1h0004_tls_017-32a.5: 取瑟而歌，
      KR1h0004_tls_017-32a.6: 使之聞之。
      KR1h0004_tls_017-33a.2: 17.21宰我問：
      KR1h0004_tls_017-33a.3: 「三年之喪，期已久矣。
      KR1h0004_tls_017-33a.4: 君子三年不為禮，
      KR1h0004_tls_017-33a.5: 禮必壞；
      KR1h0004_tls_017-33a.6: 三年不為樂，
      KR1h0004_tls_017-33a.7: 樂必崩。
      KR1h0004_tls_017-33a.8: 舊穀既沒，
      KR1h0004_tls_017-33a.9: 新穀既升，
      KR1h0004_tls_017-33a.10: 鑽燧改火，
      KR1h0004_tls_017-34a.3: 「食夫稻，
      KR1h0004_tls_017-34a.4: 衣夫錦，
      KR1h0004_tls_017-35a.1: 於女安乎？」
      KR1h0004_tls_017-36a.2: 「女安，
      KR1h0004_tls_017-36a.3: 則為之！
      KR1h0004_tls_017-36a.4: 夫君子之居喪，
      KR1h0004_tls_017-36a.5: 食旨不甘，
      KR1h0004_tls_017-36a.6: 聞樂不樂，
      KR1h0004_tls_017-36a.7: 居處不安，
      KR1h0004_tls_017-37a.1: 則為之！」
      KR1h0004_tls_017-37a.4: 「予之不仁也！
      KR1h0004_tls_017-37a.5: 子生三年，
      KR1h0004_tls_017-37a.6: 然後免於父母之懷。
      KR1h0004_tls_017-37a.7: 夫三年之喪，
      KR1h0004_tls_017-37a.8: 天下之通喪也，
      KR1h0004_tls_017-37a.9: 予也
      KR1h0004_tls_017-38a.1: 有三年之愛於其父母乎！」
      KR1h0004_tls_017-38a.3: 「飽食終日，
      KR1h0004_tls_017-38a.4: 無所用心，
      KR1h0004_tls_017-38a.5: 難矣哉！
      KR1h0004_tls_017-38a.6: 不有博弈者乎？
      KR1h0004_tls_017-39a.1: 為之，猶賢乎已。」
      KR1h0004_tls_017-39a.3: 「君子尚勇乎？」
      KR1h0004_tls_017-39a.5: 「君子義之為上，
      KR1h0004_tls_017-39a.6: 君子有勇而無義為亂，
      KR1h0004_tls_017-40a.1: 小人有勇而無義為盜。」
      KR1h0004_tls_017-40a.3: 「君子亦有惡乎？」
      KR1h0004_tls_017-40a.5: 「有惡：
      KR1h0004_tls_017-40a.6: 惡稱人之惡者，
      KR1h0004_tls_017-40a.7: 惡居下流而訕上者，
      KR1h0004_tls_017-40a.8: 惡勇而無禮者，
      KR1h0004_tls_017-41a.1: 惡果敢而窒者。」
      KR1h0004_tls_017-41a.3: 「賜也亦有惡乎？」
      KR1h0004_tls_017-41a.4: 「惡徼以為知者，
      KR1h0004_tls_017-41a.5: 惡不孫以為勇者，
      KR1h0004_tls_017-42a.1: 惡訐以為直者。」
      KR1h0004_tls_017-42a.3: 「唯女子與小人為難養也，
      KR1h0004_tls_017-42a.4: 近之則不孫，
      KR1h0004_tls_017-43a.1: 遠之則怨。」
      KR1h0004_tls_017-43a.3: 「年四十而見惡焉，
      KR1h0004_tls_017-43a.4: 其終也已。」
      KR1h0004_tls_018-1a.3: 18.1微子去之，
      KR1h0004_tls_018-1a.4: 箕子為之奴，
      KR1h0004_tls_018-1a.5: 比干諫而死。
      KR1h0004_tls_018-2a.1: 「殷有三仁焉。」
      KR1h0004_tls_018-2a.2: 18.2柳下惠為士師，
      KR1h0004_tls_018-2a.3: 三黜。
      KR1h0004_tls_018-2a.5: 「子未可以去乎？」
      KR1h0004_tls_018-2a.7: 「直道而事人，
      KR1h0004_tls_018-2a.8: 焉往而不三黜？
      KR1h0004_tls_018-2a.9: 枉道而事人，
      KR1h0004_tls_018-3a.1: 何必去父母之邦？」
      KR1h0004_tls_018-3a.2: 18.3齊景公待孔子
      KR1h0004_tls_018-3a.4: 「若季氏，則吾不能；
      KR1h0004_tls_018-3a.5: 以季、孟之間待之。」
      KR1h0004_tls_018-3a.7: 「吾老矣，
      KR1h0004_tls_018-3a.8: 不能用也。」
      KR1h0004_tls_018-3a.9: 孔子行。
      KR1h0004_tls_018-4a.2: 18.4齊人歸女樂，
      KR1h0004_tls_018-4a.3: 季桓子受之，
      KR1h0004_tls_018-4a.4: 三日不朝，
      KR1h0004_tls_018-4a.5: 孔子行。
      KR1h0004_tls_018-5a.2: 18.5楚狂接輿
      KR1h0004_tls_018-5a.3: 歌而過孔子
      KR1h0004_tls_018-5a.5: 「鳳兮鳳兮！
      KR1h0004_tls_018-5a.6: 何德之衰？
      KR1h0004_tls_018-5a.7: 往者不可諫，
      KR1h0004_tls_018-5a.8: 來者猶可追。
      KR1h0004_tls_018-5a.9: 已而，
      KR1h0004_tls_018-5a.10: 已而！
      KR1h0004_tls_018-6a.2: 孔子下，
      KR1h0004_tls_018-6a.3: 欲與之言。
      KR1h0004_tls_018-6a.4: 趨而辟之，
      KR1h0004_tls_018-6a.5: 不得與之言。
      KR1h0004_tls_018-7a.2: 18.6長沮、桀溺耦而耕，
      KR1h0004_tls_018-7a.3: 孔子過之，
      KR1h0004_tls_018-7a.4: 使子路問津焉。
      KR1h0004_tls_018-9a.1: 「夫執輿者為誰？」
      KR1h0004_tls_018-10a.1: 「為孔丘。」
      KR1h0004_tls_018-12a.1: 「是也。」
      KR1h0004_tls_018-13a.1: 「是知津矣。」
      KR1h0004_tls_018-13a.2: 問於桀溺。
      KR1h0004_tls_018-15a.1: 「子為誰？」
      KR1h0004_tls_018-16a.1: 「為仲由。」
      KR1h0004_tls_018-17a.1: 「是魯孔丘之徒與？」
      KR1h0004_tls_018-18a.1: 「然。」
      KR1h0004_tls_018-18a.3: 「滔滔者
      KR1h0004_tls_018-18a.4: 天下皆是也，
      KR1h0004_tls_018-18a.5: 而誰以易之？
      KR1h0004_tls_018-18a.6: 且而與其從辟人之士也，
      KR1h0004_tls_018-18a.7: 豈若從辟世之士哉？」
      KR1h0004_tls_018-18a.8: 耰而不輟。
      KR1h0004_tls_018-19a.2: 子路行以告。
      KR1h0004_tls_018-20a.2: 夫子憮然曰：
      KR1h0004_tls_018-20a.3: 「鳥獸不可與同群，
      KR1h0004_tls_018-20a.4: 吾非斯人之徒與
      KR1h0004_tls_018-20a.5: 而誰與？
      KR1h0004_tls_018-20a.6: 天下有道，
      KR1h0004_tls_018-21a.1: 丘不與易也。」
      KR1h0004_tls_018-21a.2: 18.7子路從而後，
      KR1h0004_tls_018-21a.3: 遇丈人，
      KR1h0004_tls_018-21a.4: 以杖荷蓧。
      KR1h0004_tls_018-22a.2: 子路問曰：
      KR1h0004_tls_018-23a.1: 「子見夫子乎？」
      KR1h0004_tls_018-23a.3: 「四體不勤，
      KR1h0004_tls_018-23a.4: 五穀不分。
      KR1h0004_tls_018-23a.5: 孰為夫子？」
      KR1h0004_tls_018-24a.2: 子路拱而立。
      KR1h0004_tls_018-25a.2: 止子路宿，
      KR1h0004_tls_018-25a.3: 殺雞為黍而食之，
      KR1h0004_tls_018-25a.4: 見其二子焉。
      KR1h0004_tls_018-26a.2: 明日，
      KR1h0004_tls_018-26a.3: 子路行以告。
      KR1h0004_tls_018-27a.3: 「隱者也。」
      KR1h0004_tls_018-27a.4: 使子路反見之。
      KR1h0004_tls_018-27a.5: 至，則行矣。
      KR1h0004_tls_018-28a.3: 「不仕無義。
      KR1h0004_tls_018-28a.4: 長幼之節，
      KR1h0004_tls_018-28a.5: 不可廢也；
      KR1h0004_tls_018-28a.6: 君臣之義，
      KR1h0004_tls_018-28a.7: 如之何其廢之？
      KR1h0004_tls_018-28a.8: 欲絜其身，
      KR1h0004_tls_018-28a.9: 而亂大倫。
      KR1h0004_tls_018-28a.10: 君子之仕也，
      KR1h0004_tls_018-28a.12: 道之不行，
      KR1h0004_tls_018-29a.1: 已知之矣。」
      KR1h0004_tls_018-29a.2: 18.8逸民：
      KR1h0004_tls_018-29a.5: 「不降其志，
      KR1h0004_tls_018-29a.6: 不辱其身，
      KR1h0004_tls_018-29a.8: 謂柳下惠、少連，
      KR1h0004_tls_018-29a.10: 言中倫，
      KR1h0004_tls_018-29a.12: 其斯而已矣。」
      KR1h0004_tls_018-29a.13: 謂虞仲、夷逸，
      KR1h0004_tls_018-29a.14: 隱居放言，
      KR1h0004_tls_018-29a.15: 身中清，
      KR1h0004_tls_018-29a.16: 廢中權。
      KR1h0004_tls_018-29a.17: 「我則異於是，
      KR1h0004_tls_018-30a.1: 無可無不可。」
      KR1h0004_tls_018-30a.2: 18.9大師摯適齊，
      KR1h0004_tls_018-30a.3: 亞飯干適楚，
      KR1h0004_tls_018-30a.4: 三飯繚適蔡，
      KR1h0004_tls_018-30a.5: 四飯缺適秦，
      KR1h0004_tls_018-30a.6: 鼓方叔入於河，
      KR1h0004_tls_018-30a.8: 少師陽、擊磬襄入於海。
      KR1h0004_tls_018-31a.2: 18.10周公謂魯公曰：
      KR1h0004_tls_018-31a.3: 「君子不弛其親，
      KR1h0004_tls_018-31a.4: 不使大臣怨乎不以。
      KR1h0004_tls_018-31a.5: 故舊無大故，則不棄也。
      KR1h0004_tls_018-32a.1: 無求備於一人！」
      KR1h0004_tls_018-32a.2: 18.11周有八士：
      KR1h0004_tls_019-1a.4: 「士見危致命，
      KR1h0004_tls_019-1a.5: 見得思義，
      KR1h0004_tls_019-1a.6: 祭思敬，
      KR1h0004_tls_019-1a.7: 喪思哀，
      KR1h0004_tls_019-2a.1: 其可已矣。」
      KR1h0004_tls_019-2a.3: 「執德不弘，
      KR1h0004_tls_019-2a.4: 信道不篤，
      KR1h0004_tls_019-2a.5: 焉能為有？
      KR1h0004_tls_019-3a.1: 焉能為亡？」
      KR1h0004_tls_019-3a.2: 19.3子夏之門人問交於子張。
      KR1h0004_tls_019-3a.3: 子張曰：
      KR1h0004_tls_019-4a.1: 「子夏云何？」
      KR1h0004_tls_019-4a.4: 『可者與之，
      KR1h0004_tls_019-5a.1: 其不可者拒之。』」
      KR1h0004_tls_019-5a.3: 「異乎吾所聞：
      KR1h0004_tls_019-5a.4: 『君子尊賢而容眾，
      KR1h0004_tls_019-5a.5: 嘉善而矜不能。
      KR1h0004_tls_019-5a.6: 我之大賢與，
      KR1h0004_tls_019-5a.7: 於人何所不容？
      KR1h0004_tls_019-5a.8: 我之不賢與，
      KR1h0004_tls_019-5a.9: 人將拒我，
      KR1h0004_tls_019-6a.1: 如之何其拒人也？」
      KR1h0004_tls_019-6a.3: 「雖小道，
      KR1h0004_tls_019-6a.4: 必有可觀者焉；
      KR1h0004_tls_019-6a.5: 致遠恐泥，
      KR1h0004_tls_019-7a.1: 是以君子不為也。」
      KR1h0004_tls_019-7a.3: 「日知其所亡，
      KR1h0004_tls_019-7a.4: 月無忘其所能，
      KR1h0004_tls_019-8a.1: 可謂好學也已矣。」
      KR1h0004_tls_019-8a.3: 「博學而篤志，
      KR1h0004_tls_019-8a.4: 切問而近思，
      KR1h0004_tls_019-9a.1: 仁在其中矣。」
      KR1h0004_tls_019-9a.3: 「百工居肆以成其事，
      KR1h0004_tls_019-10a.1: 君子學以致其道。」
      KR1h0004_tls_019-11a.1: 「小人之過也必文。」
      KR1h0004_tls_019-11a.3: 「君子有三變：
      KR1h0004_tls_019-11a.4: 望之儼然，
      KR1h0004_tls_019-11a.5: 即之也溫，
      KR1h0004_tls_019-12a.1: 聽其言也厲。」
      KR1h0004_tls_019-12a.3: 「君子信而後勞其民；
      KR1h0004_tls_019-12a.5: 則以為厲己也。
      KR1h0004_tls_019-12a.6: 信而後諫；
      KR1h0004_tls_019-13a.1: 則以為謗己也。」
      KR1h0004_tls_019-13a.3: 「大德不踰閑，
      KR1h0004_tls_019-14a.1: 小德出入可也。」
      KR1h0004_tls_019-14a.3: 「子夏之門人小子，
      KR1h0004_tls_019-14a.4: 當洒埽、應對、
      KR1h0004_tls_019-14a.5: 進退，則可矣，
      KR1h0004_tls_019-14a.6: 抑末也。
      KR1h0004_tls_019-14a.7: 本之則無，
      KR1h0004_tls_019-15a.1: 如之何？」
      KR1h0004_tls_019-15a.3: 「噫！
      KR1h0004_tls_019-15a.4: 言游過矣！
      KR1h0004_tls_019-15a.5: 君子之道，
      KR1h0004_tls_019-15a.6: 孰先傳焉？
      KR1h0004_tls_019-15a.7: 孰後倦焉？
      KR1h0004_tls_019-15a.8: 譬諸草木，
      KR1h0004_tls_019-15a.9: 區以別矣。
      KR1h0004_tls_019-15a.12: 有始有卒者，
      KR1h0004_tls_019-16a.1: 其唯聖人乎！」
      KR1h0004_tls_019-16a.3: 「仕而優則學，
      KR1h0004_tls_019-17a.1: 學而優則仕。」
      KR1h0004_tls_019-18a.1: 「喪致乎哀而止。」
      KR1h0004_tls_019-18a.3: 「吾友張也
      KR1h0004_tls_019-18a.4: 為難能也，
      KR1h0004_tls_019-19a.1: 然而未仁。」
      KR1h0004_tls_019-19a.3: 「堂堂乎張也，
      KR1h0004_tls_019-20a.1: 難與並為仁矣。」
      KR1h0004_tls_019-20a.3: 「吾聞諸夫子：
      KR1h0004_tls_019-20a.4: 『人未有自致者也，必也
      KR1h0004_tls_019-21a.1: 親喪乎！』」
      KR1h0004_tls_019-21a.3: 「吾聞諸夫子：
      KR1h0004_tls_019-21a.4: 『孟莊子之孝也，
      KR1h0004_tls_019-21a.5: 其他可能也；
      KR1h0004_tls_019-21a.6: 其不改父之臣與父之政，
      KR1h0004_tls_019-22a.1: 是難能也。』」
      KR1h0004_tls_019-22a.2: 19.19孟氏使陽膚為士師，
      KR1h0004_tls_019-22a.3: 問於曾子。
      KR1h0004_tls_019-22a.5: 「上失其道，
      KR1h0004_tls_019-22a.6: 民散久矣。
      KR1h0004_tls_019-22a.7: 如得其情，
      KR1h0004_tls_019-23a.1: 則哀矜而勿喜！」
      KR1h0004_tls_019-23a.3: 「紂之不善，
      KR1h0004_tls_019-23a.4: 不如是之甚也。
      KR1h0004_tls_019-23a.5: 是以君子惡居下流，
      KR1h0004_tls_019-24a.1: 天下之惡皆歸焉。」
      KR1h0004_tls_019-24a.3: 「君子之過也，
      KR1h0004_tls_019-24a.4: 如日月之食焉：
      KR1h0004_tls_019-24a.5: 過也，
      KR1h0004_tls_019-24a.6: 人皆見之；
      KR1h0004_tls_019-24a.7: 更也，
      KR1h0004_tls_019-25a.1: 人皆仰之。」
      KR1h0004_tls_019-25a.2: 19.22衛公孫朝問於子貢曰：
      KR1h0004_tls_019-25a.3: 「仲尼焉學？」
      KR1h0004_tls_019-25a.6: 未墜於地，
      KR1h0004_tls_019-25a.8: 賢者識其大者，
      KR1h0004_tls_019-25a.9: 不賢者識其小者。
      KR1h0004_tls_019-25a.10: 莫不有文武之道焉。
      KR1h0004_tls_019-26a.1: 而亦何常師之有？」
      KR1h0004_tls_019-26a.2: 19.23叔孫武叔語大夫於朝曰：
      KR1h0004_tls_019-27a.1: 「子貢賢於仲尼。」
      KR1h0004_tls_019-27a.2: 子服景伯以告子貢。
      KR1h0004_tls_019-28a.3: 「譬之宮牆，
      KR1h0004_tls_019-28a.4: 賜之牆也及肩，
      KR1h0004_tls_019-28a.5: 闚見室家之好。
      KR1h0004_tls_019-28a.6: 夫子之牆數仞，
      KR1h0004_tls_019-28a.7: 不得其門而入，
      KR1h0004_tls_019-28a.8: 不見宗廟之美，
      KR1h0004_tls_019-28a.9: 百官之富。
      KR1h0004_tls_019-28a.10: 得其門者或寡矣。
      KR1h0004_tls_019-29a.1: 不亦宜乎！」
      KR1h0004_tls_019-29a.2: 19.24叔孫武叔毀仲尼。
      KR1h0004_tls_019-29a.5: 仲尼不可毀也。
      KR1h0004_tls_019-29a.6: 他人之賢者，
      KR1h0004_tls_019-29a.7: 丘陵也，
      KR1h0004_tls_019-29a.8: 猶可踰也；
      KR1h0004_tls_019-29a.9: 仲尼、日月也，
      KR1h0004_tls_019-29a.10: 無得而踰焉。
      KR1h0004_tls_019-29a.11: 人雖欲自絕，
      KR1h0004_tls_019-29a.12: 其何傷於日月乎？
      KR1h0004_tls_019-30a.1: 多見其不知量也。」
      KR1h0004_tls_019-30a.3: 「子為恭也，
      KR1h0004_tls_019-31a.1: 仲尼豈賢於子乎？」
      KR1h0004_tls_019-31a.3: 「君子一言以為知，
      KR1h0004_tls_019-31a.4: 一言以為不知，
      KR1h0004_tls_019-31a.5: 言不可不慎也。
      KR1h0004_tls_019-31a.6: 夫子之不可及也，
      KR1h0004_tls_019-31a.7: 猶天之不可階而升也。
      KR1h0004_tls_019-31a.8: 夫子之得邦家者，
      KR1h0004_tls_019-31a.10: 『立之斯立，
      KR1h0004_tls_019-31a.11: 道之斯行，
      KR1h0004_tls_019-31a.12: 綏之斯來，
      KR1h0004_tls_019-31a.13: 動之斯和。
      KR1h0004_tls_019-31a.14: 其生也榮，
      KR1h0004_tls_019-31a.15: 其死也哀，
      KR1h0004_tls_019-31a.16: 如之何其可及也？』」
      KR1h0004_tls_020-1a.5: 爾舜！
      KR1h0004_tls_020-1a.6: 天之厤數在爾躬，
      KR1h0004_tls_020-1a.7: 允執其中。
      KR1h0004_tls_020-1a.8: 四海困窮，
      KR1h0004_tls_020-2a.1: 天祿永終。」
      KR1h0004_tls_020-2a.2: 舜亦以命禹。
      KR1h0004_tls_020-3a.2: 「予小子履
      KR1h0004_tls_020-3a.3: 敢用玄牡，
      KR1h0004_tls_020-3a.4: 敢昭告于皇皇后帝：
      KR1h0004_tls_020-3a.5: 有罪不敢赦。
      KR1h0004_tls_020-3a.6: 帝臣不蔽，
      KR1h0004_tls_020-3a.7: 簡在帝心。
      KR1h0004_tls_020-3a.8: 朕躬有罪，
      KR1h0004_tls_020-3a.9: 無以萬方；
      KR1h0004_tls_020-4a.1: 罪在朕躬。」
      KR1h0004_tls_020-4a.2: 「周有大賚，
      KR1h0004_tls_020-4a.3: 善人是富。
      KR1h0004_tls_020-4a.4: 雖有周親，
      KR1h0004_tls_020-4a.5: 不如仁人。
      KR1h0004_tls_020-4a.6: 百姓有過，
      KR1h0004_tls_020-5a.1: 在予一人。」
      KR1h0004_tls_020-5a.2: 謹權量，
      KR1h0004_tls_020-5a.3: 審法度，
      KR1h0004_tls_020-5a.4: 脩廢官，
      KR1h0004_tls_020-5a.6: 興滅國，
      KR1h0004_tls_020-5a.7: 繼絕世，
      KR1h0004_tls_020-5a.8: 舉逸民，
      KR1h0004_tls_020-5a.9: 天下之民歸心焉。
      KR1h0004_tls_020-6a.2: 所重：
      KR1h0004_tls_020-6a.3: 民、食、喪、祭。
      KR1h0004_tls_020-7a.2: 寬則得眾，
      KR1h0004_tls_020-7a.3: 信則民任焉，
      KR1h0004_tls_020-7a.4: 敏則有功，
      KR1h0004_tls_020-8a.2: 20.2子張問於孔子曰：
      KR1h0004_tls_020-8a.3: 「何如
      KR1h0004_tls_020-9a.1: 斯可以從政矣？」
      KR1h0004_tls_020-9a.3: 「尊五美，
      KR1h0004_tls_020-9a.4: 屏四惡，
      KR1h0004_tls_020-10a.1: 斯可以從政矣。」
      KR1h0004_tls_020-11a.1: 「何謂五美？」
      KR1h0004_tls_020-11a.3: 「君子惠而不費，
      KR1h0004_tls_020-11a.4: 勞而不怨，
      KR1h0004_tls_020-11a.5: 欲而不貪，
      KR1h0004_tls_020-11a.6: 泰而不驕，
      KR1h0004_tls_020-12a.1: 威而不猛。」
      KR1h0004_tls_020-13a.1: 「何謂惠而不費？」
      KR1h0004_tls_020-13a.3: 「因民之所利而利之，
      KR1h0004_tls_020-13a.4: 斯不亦惠而不費乎？
      KR1h0004_tls_020-13a.5: 擇可勞而勞之，
      KR1h0004_tls_020-13a.6: 又誰怨？
      KR1h0004_tls_020-13a.7: 欲仁而得仁，
      KR1h0004_tls_020-13a.8: 又焉貪？
      KR1h0004_tls_020-13a.9: 君子無眾寡，
      KR1h0004_tls_020-13a.10: 無小大，
      KR1h0004_tls_020-13a.11: 無敢慢，
      KR1h0004_tls_020-13a.12: 斯不亦泰而不驕乎？
      KR1h0004_tls_020-13a.13: 君子正其衣冠，
      KR1h0004_tls_020-13a.14: 尊其瞻視，
      KR1h0004_tls_020-13a.15: 儼然人望而畏之，
      KR1h0004_tls_020-14a.1: 斯不亦威而不猛乎？」
      KR1h0004_tls_020-15a.1: 「何謂四惡？」
      KR1h0004_tls_020-15a.3: 「不教而殺謂之虐，
      KR1h0004_tls_020-15a.4: 不戒視成謂之暴，
      KR1h0004_tls_020-15a.5: 慢令致期謂之賊，
      KR1h0004_tls_020-15a.7: 出納之吝
      KR1h0004_tls_020-16a.1: 謂之有司。」
      KR1h0004_tls_020-16a.3: 「不知命，
      KR1h0004_tls_020-16a.4: 無以為君子也；
      KR1h0004_tls_020-16a.5: 不知禮，
      KR1h0004_tls_020-16a.6: 無以立也；
      KR1h0004_tls_020-16a.7: 不知言，
      KR1h0004_tls_020-16a.8: 無以知人也。」
