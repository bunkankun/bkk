            transl-id: KR1h0004-en-ed54d4e4
            src: C. Harbsmeier
          text: 'one may become a teacher."  【1. Enthusiastic familiarity with the constitutive ancient tradition of the ancient founding fathers is not enough: a subtle understanding of what is radically new 新 in the present is taken equally to be of the essence.   2. Note the avoidance of the conventional standard opposition 古/今  in favour of the 古/新 which involves the nuance of the innovative rejection of the old.   3. 可以 "have the objective possibility for" is chosen as against  能 "have the internal ability for".  4. 為 "inchoative: become, come to act as" and not copulative "be".】'
