    seg_lines:
      KR1h0004_tls_001-2a.6: 未之有也。
      KR1h0004_tls_002-8a.2: 2.7子游問孝。
      KR1h0004_tls_002-18a.4: 誨女知之乎！
      KR1h0004_tls_002-18a.5: 知之為知之，
      KR1h0004_tls_002-18a.6: 不知為不知，
      KR1h0004_tls_002-19a.1: 是知也。」
      KR1h0004_tls_005-12a.4: 「朽木不可雕也，
      KR1h0004_tls_005-12a.5: 糞土之牆不可杇也；
      KR1h0004_tls_005-12a.6: 於予與何誅？」
      KR1h0004_tls_005-12a.8: 「始吾於人也，
      KR1h0004_tls_005-12a.9: 聽其言而信其行；
      KR1h0004_tls_005-12a.11: 聽其言而觀其行。
      KR1h0004_tls_005-13a.1: 於予與改是。」
      KR1h0004_tls_005-29a.4: 「盍各言爾志？」
      KR1h0004_tls_005-29a.6: 「願車馬衣（輕）裘
      KR1h0004_tls_005-29a.7: 與朋友共，
      KR1h0004_tls_005-29a.8: 敝之而無憾。」
      KR1h0004_tls_005-29a.11: 無施勞。」
      KR1h0004_tls_005-29a.13: 「願聞子之志。」
      KR1h0004_tls_005-29a.15: 「老者安之，
      KR1h0004_tls_005-30a.1: 少者懷之。」
      KR1h0004_tls_007-26a.3: 「三人行，
      KR1h0004_tls_007-26a.4: 必有我師焉，
      KR1h0004_tls_007-26a.5: 擇其善者而從之，
      KR1h0004_tls_007-27a.1: 其不善者而改之。」
      KR1h0004_tls_018-7a.3: 孔子過之，
      KR1h0004_tls_018-7a.4: 使子路問津焉。
      KR1h0004_tls_018-9a.1: 「夫執輿者為誰？」
      KR1h0004_tls_018-10a.1: 「為孔丘。」
      KR1h0004_tls_018-11a.1: 「是魯孔丘與？」
      KR1h0004_tls_018-13a.1: 「是知津矣。」
      KR1h0004_tls_018-15a.1: 「子為誰？」
      KR1h0004_tls_018-16a.1: 「為仲由。」
      KR1h0004_tls_018-17a.1: 「是魯孔丘之徒與？」
      KR1h0004_tls_018-18a.1: 「然。」
      KR1h0004_tls_018-18a.5: 而誰以易之？
      KR1h0004_tls_018-18a.6: 且而與其從辟人之士也，
      KR1h0004_tls_018-18a.7: 豈若從辟世之士哉？」
      KR1h0004_tls_018-19a.2: 子路行以告。
      KR1h0004_tls_018-20a.3: 「鳥獸不可與同群，
      KR1h0004_tls_018-20a.4: 吾非斯人之徒與
      KR1h0004_tls_018-20a.6: 天下有道，
      KR1h0004_tls_019-16a.1: 其唯聖人乎！」
      KR1h0004_tls_018-13a.2: 問於桀溺。
      KR1h0004_tls_019-22a.3: 問於曾子。
      KR1h0004_tls_020-5a.3: 審法度，
      KR1h0004_tls_019-23a.4: 不如是之甚也。
      KR1h0004_tls_015-11a.1: 友其士之仁者。」
      KR1h0004_tls_011-6a.1: 人不間於其父母、昆弟之言。」
      KR1h0004_tls_011-36a.1: 則何以哉？」
      KR1h0004_tls_013-31a.5: 「宗族稱孝焉，
      KR1h0004_tls_010-3a.5: "揖所與立，\n                    "
      KR1h0004_tls_002-11a.3: "「視其所以，\n                    "
      KR1h0004_tls_002-11a.4: "觀其所由，\n                    "
      KR1h0004_tls_002-11a.5: "察其所安。\n                    "
      KR1h0004_tls_005-8a.1: "無所取材。」\n                        \n                    "
      KR1h0004_tls_014-23a.5: "不能死，\n                    "
      KR1h0004_tls_003-18a.1: "古之道也。」\n                        \n                    "
      KR1h0004_tls_007-18a.6: "「古之賢人也。」\n                    "
      KR1h0004_tls_014-32a.3: "「古之學者為己，\n                    "
      KR1h0004_tls_014-53a.8: "古之人皆然。\n                    "
      KR1h0004_tls_017-28a.5: "古之狂也肆，\n                    "
      KR1h0004_tls_017-28a.7: "古之矜也廉，\n                    "
      KR1h0004_tls_017-28a.9: "古之愚也直，\n                    "
      KR1h0004_tls_001-12a.7: "小大由之。\n                    "
      KR1h0004_tls_003-28a.3: "「盡美矣，\n                    "
      KR1h0004_tls_012-27a.3: "「君子成人之美，\n                    "
      KR1h0004_tls_012-27a.4: "不成人之惡。\n                    "
      KR1h0004_tls_020-9a.4: "屏四惡，\n                    "
      KR1h0004_tls_014-27a.1: "則為之也難。」\n                        \n                    "
      KR1h0004_tls_001-6a.5: "出則悌，\n                    "
      KR1h0004_tls_004-5a.12: "惡乎成名？\n                    "
      KR1h0004_tls_016-9a.1: "故夫三桓之子孫微矣。」\n                        \n                    "
      KR1h0004_tls_002-10a.1: "曾是以為孝乎？」\n                        \n                    "
      KR1h0004_tls_018-6a.1: "今之從政者殆而！」\n                        \n                    "
      KR1h0004_tls_018-23a.6: 植其杖而芸。
      KR1h0004_tls_018-28a.3: "「不仕無義。\n                    "
      KR1h0004_tls_002-2a.4: "一言以蔽之，\n                    "
      KR1h0004_tls_002-6a.11: "死，葬之以禮，\n                    "
      KR1h0004_tls_005-14a.3: "「我不欲人之加諸我也，\n                    "
      KR1h0004_tls_005-14a.4: "吾亦欲無加諸人。」\n                    "
      KR1h0004_tls_007-36a.2: 7.31陳司敗問
      KR1h0004_tls_010-38a.2: "10.21入太廟，\n                    "
      KR1h0004_tls_010-41a.2: "10.24寢不尸，\n                    "
      KR1h0004_tls_011-10a.3: "子哭之慟。\n                    "
      KR1h0004_tls_011-25a.3: "「聞斯行諸？」\n                    "
      KR1h0004_tls_011-29a.5: "「吾以子為異之問，\n                    "
      KR1h0004_tls_012-11a.5: "膚受之愬，\n                    "
      KR1h0004_tls_013-2a.6: "赦小過，\n                    "
      KR1h0004_tls_002-6a.8: "「何謂也？」\n                    "
      KR1h0004_tls_016-9a.11: "友便佞，\n                    "
      KR1h0004_tls_002-8a.4: "「今之孝者，\n                    "
      KR1h0004_tls_002-8a.5: "是謂能養。\n                    "
      KR1h0004_tls_002-8a.6: "至於犬馬，\n                    "
      KR1h0004_tls_002-8a.7: "皆能有養；\n                    "
      KR1h0004_tls_002-9a.1: "何以別乎？」\n                        \n                    "
      KR1h0004_tls_002-9a.4: "「色難。\n                    "
      KR1h0004_tls_002-9a.5: "有事，\n                    "
      KR1h0004_tls_002-9a.6: "弟子服其勞；\n                    "
      KR1h0004_tls_002-9a.7: "有酒食，\n                    "
      KR1h0004_tls_002-10a.3: 「吾與回言
      KR1h0004_tls_002-10a.5: "如愚。\n                    "
      KR1h0004_tls_002-10a.6: "退而省其私，\n                    "
      KR1h0004_tls_002-10a.7: "亦足以發，\n                    "
      KR1h0004_tls_002-18a.1: "斯害也已。」\n                        \n                    "
      KR1h0004_tls_002-20a.1: "祿在其中矣。」\n                        \n                    "
      KR1h0004_tls_002-23a.4: "不知其可也。\n                    "
      KR1h0004_tls_002-24a.1: "其何以行之哉？」\n                        \n                    "
      KR1h0004_tls_002-24a.3: "「十世可知也？」\n                    "
      KR1h0004_tls_002-25a.1: "雖百世可知也。」\n                        \n                    "
      KR1h0004_tls_002-25a.5: 無勇也。」
      KR1h0004_tls_003-2a.1: "孰不可忍也？」\n                        \n                    "
      KR1h0004_tls_003-4a.6: "與其奢也，\n                    "
      KR1h0004_tls_003-6a.4: "「女弗能救與？」\n                    "
      KR1h0004_tls_003-7a.1: "曾謂泰山不如林放乎？」\n                        \n                    "
      KR1h0004_tls_003-8a.6: "何謂也？」\n                    "
      KR1h0004_tls_003-9a.3: "「禮後乎？」\n                    "
      KR1h0004_tls_003-9a.5: "「起予者商也！\n                    "
      KR1h0004_tls_003-10a.1: "始可與言《詩》已矣。」\n                        \n                    "
      KR1h0004_tls_003-10a.9: "文獻不足故也。\n                    "
      KR1h0004_tls_003-11a.1: "則吾能徵之矣。」\n                        \n                    "
      KR1h0004_tls_003-12a.1: "吾不欲觀之矣。」\n                        \n                    "
      KR1h0004_tls_003-12a.4: "「不知也；\n                    "
      KR1h0004_tls_003-12a.6: "其如示諸斯乎！」\n                    "
      KR1h0004_tls_003-14a.5: "何謂也？」\n                    "
      KR1h0004_tls_003-14a.8: "獲罪於天，\n                    "
      KR1h0004_tls_003-15a.1: "無所禱也。」\n                        \n                    "
      KR1h0004_tls_003-15a.4: "郁郁乎文哉！\n                    "
      KR1h0004_tls_003-16a.5: "「孰謂鄹人之子知禮乎？\n                    "
      KR1h0004_tls_003-17a.1: "「是禮也。」\n                        \n                    "
      KR1h0004_tls_003-24a.3: "「管仲儉乎？」\n                    "
      KR1h0004_tls_003-26a.4: "「樂其可知也：\n                    "
      KR1h0004_tls_003-26a.6: "翕如也；\n                    "
      KR1h0004_tls_003-26a.8: "純如也，\n                    "
      KR1h0004_tls_003-26a.9: "皦如也，\n                    "
      KR1h0004_tls_003-26a.10: "繹如也，\n                    "
      KR1h0004_tls_003-27a.4: "「君子之至於斯也，\n                    "
      KR1h0004_tls_003-27a.5: "吾未嘗不得見也。」\n                    "
      KR1h0004_tls_003-27a.8: "「二三子何患於喪乎？\n                    "
      KR1h0004_tls_003-27a.9: "天下之無道也久矣，\n                    "
      KR1h0004_tls_003-28a.4: "又盡善也。」\n                    "
      KR1h0004_tls_003-29a.6: 吾何以觀之哉？」
      KR1h0004_tls_004-5a.1: "無惡也。」\n                        \n                    "
      KR1h0004_tls_004-5a.4: "是人之所欲也；\n                    "
      KR1h0004_tls_004-5a.6: "不處也。\n                    "
      KR1h0004_tls_004-5a.8: "是人之所惡也；\n                    "
      KR1h0004_tls_004-5a.10: "不去也。\n                    "
      KR1h0004_tls_004-6a.10: "有能一日用其力於仁矣乎？\n                    "
      KR1h0004_tls_004-6a.8: "其為仁矣，\n                    "
      KR1h0004_tls_004-7a.1: "蓋有之矣，我未之見也。」\n                        \n                    "
      KR1h0004_tls_004-8a.1: "斯知人矣。」\n                        \n                    "
      KR1h0004_tls_004-9a.1: "夕死可矣。」\n                        \n                    "
      KR1h0004_tls_004-10a.1: "未足與議也。」\n                        \n                    "
      KR1h0004_tls_004-10a.4: "無適也，\n                    "
      KR1h0004_tls_004-10a.5: "無莫也，\n                    "
      KR1h0004_tls_004-13a.3: 「能以禮讓為國，於從政乎
      KR1h0004_tls_004-13a.4: "何有？\n                    "
      KR1h0004_tls_004-15a.1: "求為可知也。」\n                        \n                    "
      KR1h0004_tls_004-16a.4: "「何謂也？」\n                    "
      KR1h0004_tls_004-17a.1: "忠恕而已矣。」\n                        \n                    "
      KR1h0004_tls_004-22a.1: "可謂孝矣。」\n                        \n                    "
      KR1h0004_tls_004-22a.4: "不可不知也。\n                    "
      KR1h0004_tls_004-24a.1: "恥躬之不逮也。」\n                        \n                    "
      KR1h0004_tls_004-25a.1: "鮮矣。」\n                        \n                    "
      KR1h0004_tls_004-27a.4: "斯辱矣；\n                    "
      KR1h0004_tls_004-27a.6: 斯疏矣。」
      KR1h0004_tls_005-1a.4: "「可妻也。\n                    "
      KR1h0004_tls_005-1a.6: "非其罪也。」\n                    "
      KR1h0004_tls_005-4a.5: 「女器也。」
      KR1h0004_tls_005-4a.7: "「何器也？」\n                    "
      KR1h0004_tls_005-5a.1: "「瑚璉也。」\n                        \n                    "
      KR1h0004_tls_005-5a.3: "「雍也仁而不佞。」\n                    "
      KR1h0004_tls_005-8a.3: "「子路仁乎？」\n                    "
      KR1h0004_tls_005-8a.5: "「不知也。」\n                    "
      KR1h0004_tls_005-8a.8: "「由也，\n                    "
      KR1h0004_tls_005-8a.10: "可使治其賦也，\n                    "
      KR1h0004_tls_005-9a.4: "「求也，\n                    "
      KR1h0004_tls_005-9a.7: "可使為之宰也，\n                    "
      KR1h0004_tls_005-10a.1: "不知其仁也。」\n                        \n                    "
      KR1h0004_tls_005-10a.4: "「赤也，束帶立於朝，\n                    "
      KR1h0004_tls_005-10a.5: "可使與賓客言也，\n                    "
      KR1h0004_tls_005-11a.1: "不知其仁也。」\n                        \n                    "
      KR1h0004_tls_005-11a.11: "「弗如也；\n                    "
      KR1h0004_tls_005-12a.1: "吾與女弗如也。」\n                        \n                    "
      KR1h0004_tls_005-14a.6: "「賜也，\n                    "
      KR1h0004_tls_005-15a.1: "非爾所及也。」\n                        \n                    "
      KR1h0004_tls_005-16a.1: "不可得而聞也。」\n                        \n                    "
      KR1h0004_tls_005-17a.4: "『文』也？」\n                    "
      KR1h0004_tls_005-18a.1: "『文』也。」\n                        \n                    "
      KR1h0004_tls_005-21a.11: "「忠矣。」\n                    "
      KR1h0004_tls_005-21a.13: "「仁矣乎？」\n                    "
      KR1h0004_tls_005-22a.7: "『猶吾大夫崔子也。』\n                    "
      KR1h0004_tls_005-22a.11: "『猶吾大夫崔子也。』\n                    "
      KR1h0004_tls_005-22a.15: "「清矣。」\n                    "
      KR1h0004_tls_005-22a.17: "「仁矣乎？」\n                    "
      KR1h0004_tls_005-24a.1: "斯可矣。」\n                        \n                    "
      KR1h0004_tls_005-24a.8: "其知可及也，\n                    "
      KR1h0004_tls_005-25a.1: "其愚不可及也。」\n                        \n                    "
      KR1h0004_tls_005-30a.3: "「已矣乎！\n                    "
      KR1h0004_tls_005-31a.1: "而內自訟者也。」\n                        \n                    "
      KR1h0004_tls_006-2a.1: "「雍也可使南面。」\n                        \n                    "
      KR1h0004_tls_006-3a.1: "「可也簡。」\n                        \n                    "
      KR1h0004_tls_006-3a.5: "不亦可乎？\n                    "
      KR1h0004_tls_006-3a.7: "無乃大簡乎？」\n                    "
      KR1h0004_tls_006-4a.8: "不幸短命死矣，\n                    "
      KR1h0004_tls_006-5a.1: "未聞好學者也。」\n                        \n                    "
      KR1h0004_tls_006-8a.3: "「赤之適齊也，\n                    "
      KR1h0004_tls_006-8a.6: "吾聞之也：\n                    "
      KR1h0004_tls_006-11a.3: "「回也，\n                    "
      KR1h0004_tls_006-12a.1: "其餘則日月至焉而已矣。」\n                        \n                    "
      KR1h0004_tls_006-12a.5: "「由也果，\n                    "
      KR1h0004_tls_006-13a.3: "「賜也可使從政也與？」\n                    "
      KR1h0004_tls_006-13a.5: "「賜也達，\n                    "
      KR1h0004_tls_006-14a.3: "「求也可使從政也與？」\n                    "
      KR1h0004_tls_006-14a.5: "「求也藝，\n                    "
      KR1h0004_tls_006-16a.1: "則吾必在汶上矣。」\n                        \n                    "
      KR1h0004_tls_006-16a.7: "命矣夫！\n                    "
      KR1h0004_tls_006-16a.8: "斯人也而有斯疾也！\n                    "
      KR1h0004_tls_006-17a.3: "「賢哉回也！\n                    "
      KR1h0004_tls_006-18a.1: "賢哉回也！」\n                        \n                    "
      KR1h0004_tls_006-18a.4: "力不足也。」\n                    "
      KR1h0004_tls_006-20a.4: "「女得人焉耳乎？」\n                    "
      KR1h0004_tls_006-21a.1: "未嘗至於偃之室也。」\n                        \n                    "
      KR1h0004_tls_006-22a.1: "馬不進也。』」\n                        \n                    "
      KR1h0004_tls_006-23a.1: "難乎免於今之世矣。」\n                        \n                    "
      KR1h0004_tls_006-24a.1: "何莫由斯道也？」\n                        \n                    "
      KR1h0004_tls_006-27a.4: "可以語上也；\n                    "
      KR1h0004_tls_006-28a.1: "不可以語上也。」\n                        \n                    "
      KR1h0004_tls_006-29a.1: "可謂知矣。」\n                        \n                    "
      KR1h0004_tls_006-30a.1: "可謂仁矣。」\n                        \n                    "
      KR1h0004_tls_006-32a.4: "觚哉！\n                    "
      KR1h0004_tls_006-33a.1: "觚哉！」\n                        \n                    "
      KR1h0004_tls_006-33a.5: "其從之也？」\n                    "
      KR1h0004_tls_006-33a.7: "「何為其然也。\n                    "
      KR1h0004_tls_006-33a.8: "君子可逝也，\n                    "
      KR1h0004_tls_006-33a.9: "不可陷也；\n                    "
      KR1h0004_tls_006-33a.10: "可欺也，\n                    "
      KR1h0004_tls_006-34a.1: "不可罔也。」\n                        \n                    "
      KR1h0004_tls_006-35a.1: "亦可以弗畔矣夫！」\n                        \n                    "
      KR1h0004_tls_006-36a.3: "「中庸之為德也，\n                    "
      KR1h0004_tls_006-36a.4: "其至矣乎！\n                    "
      KR1h0004_tls_006-37a.1: "民鮮久矣。」\n                        \n                    "
      KR1h0004_tls_006-37a.14: 可謂仁之方也已。」
      KR1h0004_tls_007-3a.1: "何有於我哉？」\n                        \n                    "
      KR1h0004_tls_007-4a.1: "是吾憂也。」\n                        \n                    "
      KR1h0004_tls_007-4a.3: "申申如也，\n                    "
      KR1h0004_tls_007-4a.4: 夭夭如也。
      KR1h0004_tls_007-5a.3: "「甚矣吾衰也！\n                    "
      KR1h0004_tls_007-6a.1: "久矣吾不復夢見周公！」\n                        \n                    "
      KR1h0004_tls_007-9a.1: "則不復也。」\n                        \n                    "
      KR1h0004_tls_007-9a.3: 未嘗飽也。
      KR1h0004_tls_007-13a.6: "必也臨事而懼，\n                    "
      KR1h0004_tls_007-14a.1: "好謀而成者也。」\n                        \n                    "
      KR1h0004_tls_007-14a.3: "「富而可求也，\n                    "
      KR1h0004_tls_007-17a.1: "「不圖為樂之至於斯也。」\n                        \n                    "
      KR1h0004_tls_007-18a.4: "「伯夷、叔齊何人也？」\n                    "
      KR1h0004_tls_007-18a.8: "「怨乎？」\n                    "
      KR1h0004_tls_007-20a.1: "「夫子不為也。」\n                        \n                    "
      KR1h0004_tls_007-20a.5: "樂亦在其中矣。\n                    "
      KR1h0004_tls_007-22a.1: "亦可以無大過矣。」\n                        \n                    "
      KR1h0004_tls_007-22a.4: 皆雅言也。
      KR1h0004_tls_007-25a.1: "敏以求之者也。」\n                        \n                    "
      KR1h0004_tls_007-28a.3: "「二三子以我為隱乎？\n                    "
      KR1h0004_tls_007-30a.4: "吾不得而見之矣；\n                    "
      KR1h0004_tls_007-31a.1: "斯可矣。」\n                        \n                    "
      KR1h0004_tls_007-31a.4: "吾不得而見之矣；\n                    "
      KR1h0004_tls_007-31a.6: "斯可矣。\n                    "
      KR1h0004_tls_007-31a.10: "難乎有恆矣。」\n                    "
      KR1h0004_tls_007-33a.4: "我無是也。\n                    "
      KR1h0004_tls_007-34a.1: "知之次也。」\n                        \n                    "
      KR1h0004_tls_007-34a.6: "「與其進也，\n                    "
      KR1h0004_tls_007-34a.7: "不與其退也，\n                    "
      KR1h0004_tls_007-34a.10: "與其絜也，\n                    "
      KR1h0004_tls_007-35a.3: "「仁遠乎哉？\n                    "
      KR1h0004_tls_007-36a.1: "斯仁至矣。」\n                        \n                    "
      KR1h0004_tls_007-36a.3: "「昭公知禮乎？\n                    "
      KR1h0004_tls_007-37a.6: "君子亦黨乎？\n                    "
      KR1h0004_tls_007-40a.4: "莫吾猶人也。\n                    "
      KR1h0004_tls_007-42a.1: "唯弟子不能學也。」\n                        \n                    "
      KR1h0004_tls_007-43a.1: "「丘之禱久矣。」\n                        \n                    "
      KR1h0004_tls_008-1a.5: "其可謂至德也已矣。\n                    "
      KR1h0004_tls_008-4a.13: "斯近信矣；\n                    "
      KR1h0004_tls_008-4a.15: "斯遠鄙倍矣。\n                    "
      KR1h0004_tls_008-6a.1: "昔者吾友嘗從事於斯矣。」\n                        \n                    "
      KR1h0004_tls_008-6a.5: "臨大節而不可奪也。\n                    "
      KR1h0004_tls_008-6a.6: "君子人與？\n                    "
      KR1h0004_tls_008-7a.1: "君子人也。」\n                        \n                    "
      KR1h0004_tls_008-7a.6: "不亦重乎？\n                    "
      KR1h0004_tls_008-8a.1: "不亦遠乎？」\n                        \n                    "
      KR1h0004_tls_008-11a.1: "亂也。」\n                        \n                    "
      KR1h0004_tls_008-12a.1: "其餘不足觀也已。」\n                        \n                    "
      KR1h0004_tls_008-14a.1: "恥也。」\n                        \n                    "
      KR1h0004_tls_008-16a.1: "洋洋乎盈耳哉！」\n                        \n                    "
      KR1h0004_tls_008-17a.1: "吾不知之矣。」\n                        \n                    "
      KR1h0004_tls_008-19a.1: "舜、禹之有天下也而不與焉！」\n                        \n                    "
      KR1h0004_tls_008-19a.3: "「大哉！堯之為君也！\n                    "
      KR1h0004_tls_008-19a.9: "巍巍乎！其有成功也，\n                    "
      KR1h0004_tls_008-19a.10: 煥乎！其有文章也！」
      KR1h0004_tls_008-20a.6: "不其然乎？\n                    "
      KR1h0004_tls_008-21a.1: "其可謂至德也已矣。」\n                        \n                    "
      KR1h0004_tls_008-21a.3: "「禹，吾無間然矣。\n                    "
      KR1h0004_tls_008-21a.7: 禹，吾無間然矣。」
      KR1h0004_tls_009-2a.3: "「大哉孔子！\n                    "
      KR1h0004_tls_009-2a.8: "執御乎？\n                    "
      KR1h0004_tls_009-2a.9: "執射乎？\n                    "
      KR1h0004_tls_009-3a.1: "吾執御矣。」\n                        \n                    "
      KR1h0004_tls_009-3a.4: "禮也；\n                    "
      KR1h0004_tls_009-3a.5: 今也純，儉，
      KR1h0004_tls_009-5a.5: "文不在茲乎？\n                    "
      KR1h0004_tls_009-5a.6: "天之將喪斯文也，\n                    "
      KR1h0004_tls_009-5a.7: "後死者不得與於斯文也；\n                    "
      KR1h0004_tls_009-5a.8: "天之未喪斯文也，\n                    "
      KR1h0004_tls_009-6a.3: "「夫子聖者與？\n                    "
      KR1h0004_tls_009-6a.4: "何其多能也？」\n                    "
      KR1h0004_tls_009-7a.1: "又多能也。」\n                        \n                    "
      KR1h0004_tls_009-7a.4: "「大宰知我乎！\n                    "
      KR1h0004_tls_009-7a.6: "故多能鄙事。\n                    "
      KR1h0004_tls_009-7a.7: "君子多乎哉？\n                    "
      KR1h0004_tls_009-8a.1: "不多也。」\n                        \n                    "
      KR1h0004_tls_009-9a.3: "「吾有知乎哉？\n                    "
      KR1h0004_tls_009-9a.4: "無知也。\n                    "
      KR1h0004_tls_009-9a.6: "空空如也。\n                    "
      KR1h0004_tls_009-11a.1: "吾已矣夫！」\n                        \n                    "
      KR1h0004_tls_009-13a.1: "末由也已。」\n                        \n                    "
      KR1h0004_tls_009-13a.6: "「久矣哉，\n                    "
      KR1h0004_tls_009-13a.7: "由之行詐也！\n                    "
      KR1h0004_tls_009-14a.1: "予死於道路乎！」\n                        \n                    "
      KR1h0004_tls_009-15a.1: "我待賈者也。」\n                        \n                    "
      KR1h0004_tls_009-18a.1: "何有於我哉？」\n                        \n                    "
      KR1h0004_tls_009-20a.1: "「吾未見好德如好色者也。」\n                        \n                    "
      KR1h0004_tls_009-20a.6: "吾止也。\n                    "
      KR1h0004_tls_009-21a.1: "吾往也。」\n                        \n                    "
      KR1h0004_tls_009-22a.1: "其回也與！」\n                        \n                    "
      KR1h0004_tls_009-22a.5: "吾見其進也，\n                    "
      KR1h0004_tls_009-23a.1: "未見其止也。」\n                        \n                    "
      KR1h0004_tls_009-23a.4: "有矣夫！\n                    "
      KR1h0004_tls_009-24a.1: "有矣夫！」\n                        \n                    "
      KR1h0004_tls_009-24a.4: "焉知來者之不如今也？\n                    "
      KR1h0004_tls_009-25a.1: "斯亦不足畏也已。」\n                        \n                    "
      KR1h0004_tls_009-25a.4: "能無從乎？\n                    "
      KR1h0004_tls_009-25a.7: "能無說乎？\n                    "
      KR1h0004_tls_009-26a.1: "吾末如之何也已矣。」\n                        \n                    "
      KR1h0004_tls_009-27a.3: "「三軍可奪帥也，\n                    "
      KR1h0004_tls_009-28a.1: "匹夫不可奪志也。」\n                        \n                    "
      KR1h0004_tls_009-28a.11: "「是道也，\n                    "
      KR1h0004_tls_009-30a.1: "然後知松柏之後彫也。」\n                        \n                    "
      KR1h0004_tls_010-1a.4: "恂恂如也，\n                    "
      KR1h0004_tls_010-2a.4: "侃侃如也；\n                    "
      KR1h0004_tls_010-2a.8: "踧踖如也，\n                    "
      KR1h0004_tls_010-2a.9: 與與如也。
      KR1h0004_tls_010-3a.4: "足躩如也。\n                    "
      KR1h0004_tls_010-3a.3: "色勃如也，\n                    "
      KR1h0004_tls_010-3a.8: "襜如也。\n                    "
      KR1h0004_tls_010-3a.10: "翼如也。\n                    "
      KR1h0004_tls_010-4a.3: "鞠躬如也，\n                    "
      KR1h0004_tls_010-6a.3: "色勃如也，\n                    "
      KR1h0004_tls_010-6a.4: "足躩如也，\n                    "
      KR1h0004_tls_010-7a.3: "鞠躬如也，\n                    "
      KR1h0004_tls_010-8a.5: 怡怡如也。
      KR1h0004_tls_010-9a.3: 翼如也。
      KR1h0004_tls_010-10a.3: 踧踖如也。
      KR1h0004_tls_010-11a.3: "鞠躬如也，\n                    "
      KR1h0004_tls_010-13a.3: 愉愉如也。
      KR1h0004_tls_010-26a.6: 不食之矣。
      KR1h0004_tls_010-28a.4: 必齊如也。
      KR1h0004_tls_010-30a.4: 斯出矣。
      KR1h0004_tls_010-37a.3: 不俟駕行矣。
      KR1h0004_tls_011-3a.1: "皆不及門也。」\n                        \n                    "
      KR1h0004_tls_011-4a.3: 「回也
      KR1h0004_tls_011-4a.4: "非助我者也，\n                    "
      KR1h0004_tls_011-8a.7: "亦各言其子也。\n                    "
      KR1h0004_tls_011-8a.8: "鯉也死，\n                    "
      KR1h0004_tls_011-9a.1: "不可徒行也。」\n                        \n                    "
      KR1h0004_tls_011-10a.5: "「子慟矣！」\n                    "
      KR1h0004_tls_011-10a.7: "「有慟乎？\n                    "
      KR1h0004_tls_011-12a.4: 「回也
      KR1h0004_tls_011-12a.5: "視予猶父也，\n                    "
      KR1h0004_tls_011-12a.6: "予不得視猶子也。\n                    "
      KR1h0004_tls_011-12a.7: "非我也，\n                    "
      KR1h0004_tls_011-13a.1: "夫二三子也。」\n                        \n                    "
      KR1h0004_tls_011-15a.3: "誾誾如也；\n                    "
      KR1h0004_tls_011-15a.5: "行行如也；\n                    "
      KR1h0004_tls_011-15a.9: "「若由也，\n                    "
      KR1h0004_tls_011-17a.6: "「由也升堂矣，\n                    "
      KR1h0004_tls_011-18a.1: "未入於室也。」\n                        \n                    "
      KR1h0004_tls_011-21a.1: "可也。」\n                        \n                    "
      KR1h0004_tls_011-21a.2: "11.18柴也愚，\n                    "
      KR1h0004_tls_011-21a.3: "參也魯，\n                    "
      KR1h0004_tls_011-21a.4: "師也辟，\n                    "
      KR1h0004_tls_011-21a.5: 由也喭。
      KR1h0004_tls_011-22a.3: "「回也其庶乎，\n                    "
      KR1h0004_tls_011-24a.4: "君子者乎？\n                    "
      KR1h0004_tls_011-25a.1: "色莊者乎？」\n                        \n                    "
      KR1h0004_tls_011-28a.5: "「吾以女為死矣。」\n                    "
      KR1h0004_tls_011-29a.3: "「仲由、冉求可謂大臣與？」\n                    "
      KR1h0004_tls_011-29a.10: "今由與求也，\n                    "
      KR1h0004_tls_011-30a.1: "可謂具臣矣。」\n                        \n                    "
      KR1h0004_tls_011-30a.3: "「然則從之者與？」\n                    "
      KR1h0004_tls_011-31a.1: "亦不從也。」\n                        \n                    "
      KR1h0004_tls_011-35a.6: "『不吾知也！』\n                    "
      KR1h0004_tls_011-37a.1: "可使有勇，且知方也。」\n                        \n                    "
      KR1h0004_tls_011-44a.3: "「何傷乎？\n                    "
      KR1h0004_tls_011-45a.1: "亦各言其志也。」\n                        \n                    "
      KR1h0004_tls_011-46a.3: "「吾與點也！」\n                    "
      KR1h0004_tls_011-48a.1: "「亦各言其志也已矣。」\n                        \n                    "
      KR1h0004_tls_011-49a.1: "「夫子何哂由也？」\n                        \n                    "
      KR1h0004_tls_011-53a.1: "「唯赤則非邦也與？」\n                        \n                    "
      KR1h0004_tls_012-2a.1: "而由人乎哉？」\n                        \n                    "
      KR1h0004_tls_012-4a.1: "請事斯語矣。」\n                        \n                    "
      KR1h0004_tls_012-6a.1: "請事斯語矣。」\n                        \n                    "
      KR1h0004_tls_012-7a.4: "斯謂之仁已乎？」\n                    "
      KR1h0004_tls_012-8a.1: "言之得無訒乎？」\n                        \n                    "
      KR1h0004_tls_012-9a.4: "斯謂之君子已乎？」\n                    "
      KR1h0004_tls_012-10a.6: "「商聞之矣：\n                    "
      KR1h0004_tls_012-10a.12: "皆兄弟也。\n                    "
      KR1h0004_tls_012-11a.1: "君子何患乎無兄弟也？」\n                        \n                    "
      KR1h0004_tls_012-11a.7: "可謂明也已矣。\n                    "
      KR1h0004_tls_012-12a.1: "可謂遠也已矣。」\n                        \n                    "
      KR1h0004_tls_012-13a.1: "民信之矣。」\n                        \n                    "
      KR1h0004_tls_012-15a.6: "「惜乎，\n                    "
      KR1h0004_tls_012-15a.7: "夫子之說君子也！\n                    "
      KR1h0004_tls_012-15a.9: "文猶質也，\n                    "
      KR1h0004_tls_012-15a.10: "質猶文也。\n                    "
      KR1h0004_tls_012-18a.1: "「盍徹乎？」\n                        \n                    "
      KR1h0004_tls_012-19a.1: "如之何其徹也？」\n                        \n                    "
      KR1h0004_tls_012-20a.11: "是惑也。\n                    "
      KR1h0004_tls_012-23a.1: "其由也與？」\n                        \n                    "
      KR1h0004_tls_012-24a.4: "吾猶人也。\n                    "
      KR1h0004_tls_012-27a.1: "亦可以弗畔矣夫！」\n                        \n                    "
      KR1h0004_tls_012-28a.5: "正也。\n                    "
      KR1h0004_tls_012-30a.9: "子欲善而民善矣。\n                    "
      KR1h0004_tls_012-31a.5: "「何哉，\n                    "
      KR1h0004_tls_012-32a.9: "非崇德與？\n                    "
      KR1h0004_tls_012-32a.12: "非脩慝與？\n                    "
      KR1h0004_tls_012-33a.1: "非惑與？」\n                        \n                    "
      KR1h0004_tls_012-36a.1: "何謂也？」\n                        \n                    "
      KR1h0004_tls_012-36a.3: "「富哉言乎！\n                    "
      KR1h0004_tls_012-36a.7: "不仁者遠矣。\n                    "
      KR1h0004_tls_013-6a.1: "「必也正名乎！」\n                        \n                    "
      KR1h0004_tls_013-6a.3: "「有是哉，\n                    "
      KR1h0004_tls_013-6a.4: "子之迂也！\n                    "
      KR1h0004_tls_013-7a.3: 「野哉
      KR1h0004_tls_013-7a.4: "由也！\n                    "
      KR1h0004_tls_013-7a.6: "蓋闕如也。\n                    "
      KR1h0004_tls_013-7a.17: "故君子名之必可言也，\n                    "
      KR1h0004_tls_013-7a.18: "言之必可行也。\n                    "
      KR1h0004_tls_013-8a.1: "無所苟而已矣。」\n                        \n                    "
      KR1h0004_tls_013-9a.5: "樊須也！\n                    "
      KR1h0004_tls_013-9a.4: "「小人哉，\n                    "
      KR1h0004_tls_013-9a.14: "襁負其子而至矣，\n                    "
      KR1h0004_tls_013-13a.1: "兄弟也。」\n                        \n                    "
      KR1h0004_tls_013-13a.5: "「苟合矣。」\n                    "
      KR1h0004_tls_013-13a.8: "「苟完矣。」\n                    "
      KR1h0004_tls_013-14a.1: "「苟美矣。」\n                        \n                    "
      KR1h0004_tls_013-15a.1: "「庶矣哉！」\n                        \n                    "
      KR1h0004_tls_013-15a.3: "「既庶矣，\n                    "
      KR1h0004_tls_013-16a.3: "「既富矣，\n                    "
      KR1h0004_tls_013-17a.4: "期月而已可也，\n                    "
      KR1h0004_tls_013-18a.4: "亦可以勝殘去殺矣。』\n                    "
      KR1h0004_tls_013-19a.1: "誠哉是言也！」\n                        \n                    "
      KR1h0004_tls_013-20a.3: "「苟正其身矣，\n                    "
      KR1h0004_tls_013-21a.4: "「何晏也？」\n                    "
      KR1h0004_tls_013-21a.8: "「其事也。\n                    "
      KR1h0004_tls_013-23a.3: "「言不可以若是其幾也。\n                    "
      KR1h0004_tls_013-23a.7: "如知為君之難也，\n                    "
      KR1h0004_tls_013-24a.1: "不幾乎一言而興邦乎？」\n                        \n                    "
      KR1h0004_tls_013-25a.3: "「言不可以若是其幾也。\n                    "
      KR1h0004_tls_013-25a.6: "唯其言而莫予違也。』\n                    "
      KR1h0004_tls_013-25a.7: "如其善而莫之違也，\n                    "
      KR1h0004_tls_013-25a.9: "如不善而莫之違也，\n                    "
      KR1h0004_tls_013-30a.3: "「何如斯可謂之士矣？」\n                    "
      KR1h0004_tls_013-30a.1: "不可棄也。」\n                        \n                    "
      KR1h0004_tls_013-31a.1: "可謂士矣。」\n                        \n                    "
      KR1h0004_tls_013-33a.1: "抑亦可以為次矣。」\n                        \n                    "
      KR1h0004_tls_013-34a.1: "何足算也？」\n                        \n                    "
      KR1h0004_tls_013-34a.4: "必也狂狷乎！\n                    "
      KR1h0004_tls_013-35a.1: "狷者有所不為也。」\n                        \n                    "
      KR1h0004_tls_013-35a.6: "善夫！\n                    "
      KR1h0004_tls_013-36a.1: "「不占而已矣。」\n                        \n                    "
      KR1h0004_tls_013-38a.5: "「未可也；\n                    "
      KR1h0004_tls_013-39a.3: "「君子易事而難說也。\n                    "
      KR1h0004_tls_013-39a.6: "及其使人也，\n                    "
      KR1h0004_tls_013-39a.8: "小人難事而易說也。\n                    "
      KR1h0004_tls_013-39a.10: "說也；\n                    "
      KR1h0004_tls_013-42a.3: "「何如斯可謂之士矣？」\n                    "
      KR1h0004_tls_013-42a.5: "「切切偲偲，怡怡如也，\n                    "
      KR1h0004_tls_013-42a.6: "可謂士矣。\n                    "
      KR1h0004_tls_013-44a.1: "亦可以即戎矣。」\n                        \n                    "
      KR1h0004_tls_014-2a.4: "可以為仁矣？」\n                    "
      KR1h0004_tls_014-2a.6: "「可以為難矣，\n                    "
      KR1h0004_tls_014-3a.1: "仁則吾不知也。」\n                        \n                    "
      KR1h0004_tls_014-4a.1: "不足以為士矣。」\n                        \n                    "
      KR1h0004_tls_014-8a.3: "「君子而不仁者有矣夫，\n                    "
      KR1h0004_tls_014-9a.1: "未有小人而仁者也。」\n                        \n                    "
      KR1h0004_tls_014-9a.4: "能勿勞乎？\n                    "
      KR1h0004_tls_014-10a.1: "能勿誨乎？」\n                        \n                    "
      KR1h0004_tls_014-12a.1: "「惠人也。」\n                        \n                    "
      KR1h0004_tls_014-13a.4: "「人也。\n                    "
      KR1h0004_tls_014-16a.1: "不可以為滕、薛大夫。」\n                        \n                    "
      KR1h0004_tls_014-16a.9: "亦可以為成人矣。」\n                    "
      KR1h0004_tls_014-17a.1: "亦可以為成人矣。」\n                        \n                    "
      KR1h0004_tls_014-18a.1: "不笑、不取乎？」\n                        \n                    "
      KR1h0004_tls_014-18a.3: "「以告者過也。\n                    "
      KR1h0004_tls_014-20a.1: "豈其然乎？」\n                        \n                    "
      KR1h0004_tls_014-22a.11: "管仲之力也。\n                    "
      KR1h0004_tls_014-23a.3: "「管仲非仁者與？\n                    "
      KR1h0004_tls_014-23a.13: "吾其被髮左衽矣。\n                    "
      KR1h0004_tls_014-23a.14: "豈若匹夫匹婦之為諒也，\n                    "
      KR1h0004_tls_014-24a.1: "而莫之知也？」\n                        \n                    "
      KR1h0004_tls_014-25a.1: "「可以為『文』矣。」\n                        \n                    "
      KR1h0004_tls_014-30a.1: "不敢不告也。」\n                        \n                    "
      KR1h0004_tls_014-34a.1: "「夫子欲寡其過而未能也。」\n                        \n                    "
      KR1h0004_tls_014-34a.4: "「使乎！\n                    "
      KR1h0004_tls_014-35a.1: "使乎！」\n                        \n                    "
      KR1h0004_tls_014-39a.1: "「夫子自道也。」\n                        \n                    "
      KR1h0004_tls_014-39a.4: 「賜也
      KR1h0004_tls_014-39a.5: "賢乎哉？\n                    "
      KR1h0004_tls_014-41a.1: "患其不能也。」\n                        \n                    "
      KR1h0004_tls_014-42a.1: "是賢乎！」\n                        \n                    "
      KR1h0004_tls_014-42a.4: "無乃為佞乎？」\n                    "
      KR1h0004_tls_014-42a.6: "「非敢為佞也，\n                    "
      KR1h0004_tls_014-43a.1: "疾固也。」\n                        \n                    "
      KR1h0004_tls_014-44a.1: "稱其德也。」\n                        \n                    "
      KR1h0004_tls_014-45a.3: "「莫我知也夫！」\n                    "
      KR1h0004_tls_014-45a.5: "「何為其莫知子也？」\n                    "
      KR1h0004_tls_014-46a.1: "其天乎！」\n                        \n                    "
      KR1h0004_tls_014-47a.3: "「道之將行也與，\n                    "
      KR1h0004_tls_014-47a.4: "命也；\n                    "
      KR1h0004_tls_014-50a.1: "「作者七人矣。」\n                        \n                    "
      KR1h0004_tls_014-51a.1: "「是知其不可而為之者與？」\n                        \n                    "
      KR1h0004_tls_014-51a.5: "「有心哉，\n                    "
      KR1h0004_tls_014-51a.8: "「鄙哉，\n                    "
      KR1h0004_tls_014-51a.9: "硜硜乎！\n                    "
      KR1h0004_tls_014-52a.3: "「果哉！\n                    "
      KR1h0004_tls_014-51a.10: "莫己知也，\n                    "
      KR1h0004_tls_014-51a.11: "斯已而已矣。\n                    "
      KR1h0004_tls_014-53a.5: "何謂也？」\n                    "
      KR1h0004_tls_014-55a.1: "則民易使也。」\n                        \n                    "
      KR1h0004_tls_014-56a.3: "「如斯而已乎？」\n                    "
      KR1h0004_tls_014-57a.3: "「如斯而已乎？」\n                    "
      KR1h0004_tls_014-59a.4: "「益者與？」\n                    "
      KR1h0004_tls_014-59a.6: "「吾見其居於位也，\n                    "
      KR1h0004_tls_014-59a.7: "見其與先生並行也。\n                    "
      KR1h0004_tls_014-59a.8: "非求益者也，\n                    "
      KR1h0004_tls_014-59a.9: 欲速成者也。」
      KR1h0004_tls_015-1a.8: "未之學也。」\n                    "
      KR1h0004_tls_015-1a.6: "則嘗聞之矣；\n                    "
      KR1h0004_tls_015-2a.6: "「君子亦有窮乎？」\n                    "
      KR1h0004_tls_015-3a.1: "小人窮斯濫矣。」\n                        \n                    "
      KR1h0004_tls_015-3a.3: "「賜也，\n                    "
      KR1h0004_tls_015-3a.4: "女以予為多學而識之者與？」\n                    "
      KR1h0004_tls_015-3a.7: "非與？」\n                    "
      KR1h0004_tls_015-4a.4: 知德者鮮矣。」
      KR1h0004_tls_015-5a.4: "其舜也與？\n                    "
      KR1h0004_tls_015-5a.5: "夫何為哉？\n                    "
      KR1h0004_tls_015-6a.9: "雖州里，行乎哉？\n                    "
      KR1h0004_tls_015-6a.11: "則見其參於前也，\n                    "
      KR1h0004_tls_015-6a.13: "則見其倚於衡也，\n                    "
      KR1h0004_tls_015-13a.3: "「已矣乎！\n                    "
      KR1h0004_tls_015-14a.1: "吾未見好德如好色者也。」\n                        \n                    "
      KR1h0004_tls_015-14a.4: "其竊位者與！\n                    "
      KR1h0004_tls_015-14a.6: 而不與立也。」
      KR1h0004_tls_015-16a.1: "則遠怨矣。」\n                        \n                    "
      KR1h0004_tls_015-17a.1: "吾末如之何也已矣。」\n                        \n                    "
      KR1h0004_tls_015-18a.1: "難矣哉！」\n                        \n                    "
      KR1h0004_tls_015-19a.1: "君子哉！」\n                        \n                    "
      KR1h0004_tls_015-20a.1: "不病人之不己知也。」\n                        \n                    "
      KR1h0004_tls_015-24a.3: "「有一言而可以終身行之者乎？」\n                    "
      KR1h0004_tls_015-24a.5: "「其恕乎！\n                    "
      KR1h0004_tls_015-25a.3: "「吾之於人也，\n                    "
      KR1h0004_tls_015-25a.6: "其有所試矣。\n                    "
      KR1h0004_tls_015-25a.7: "斯民也，\n                    "
      KR1h0004_tls_015-26a.1: "三代之所以直道而行也。」\n                        \n                    "
      KR1h0004_tls_015-27a.1: "今亡矣夫！」\n                        \n                    "
      KR1h0004_tls_015-31a.1: "是謂過矣。」\n                        \n                    "
      KR1h0004_tls_015-32a.1: "不如學也。」\n                        \n                    "
      KR1h0004_tls_015-32a.4: "耕也，\n                    "
      KR1h0004_tls_015-32a.7: "祿在其中矣。\n                    "
      KR1h0004_tls_015-32a.6: "學也，\n                    "
      KR1h0004_tls_015-34a.4: "而可大受也，\n                    "
      KR1h0004_tls_015-35a.1: "而可小知也。」\n                        \n                    "
      KR1h0004_tls_015-35a.3: "「民之於仁也，\n                    "
      KR1h0004_tls_015-35a.6: "吾見蹈而死者矣，\n                    "
      KR1h0004_tls_015-36a.1: "未見蹈仁而死者也。」\n                        \n                    "
      KR1h0004_tls_015-42a.5: "「階也。」\n                    "
      KR1h0004_tls_015-42a.8: "「席也。」\n                    "
      KR1h0004_tls_015-43a.4: "「與師言之道與？」\n                    "
      KR1h0004_tls_015-43a.7: 固相師之道也。」
      KR1h0004_tls_016-2a.4: "無乃爾是過與？\n                    "
      KR1h0004_tls_016-2a.7: "且在邦域之中矣，\n                    "
      KR1h0004_tls_016-2a.8: "是社稷之臣也。\n                    "
      KR1h0004_tls_016-4a.1: "皆不欲也。」\n                        \n                    "
      KR1h0004_tls_016-4a.9: "則將焉用彼相矣？\n                    "
      KR1h0004_tls_016-5a.1: "是誰之過與？」\n                        \n                    "
      KR1h0004_tls_016-6a.18: "今由與求也，\n                    "
      KR1h0004_tls_016-6a.22: "而不能守也；\n                    "
      KR1h0004_tls_016-7a.1: "而在蕭牆之內也。」\n                        \n                    "
      KR1h0004_tls_016-7a.8: "蓋十世希不失矣；\n                    "
      KR1h0004_tls_016-7a.10: "五世希不失矣；\n                    "
      KR1h0004_tls_016-7a.12: "三世希不失矣。\n                    "
      KR1h0004_tls_016-8a.4: "五世矣，\n                    "
      KR1h0004_tls_016-8a.6: "四世矣，\n                    "
      KR1h0004_tls_016-10a.1: "損矣。」\n                        \n                    "
      KR1h0004_tls_016-10a.8: "益矣。\n                    "
      KR1h0004_tls_016-11a.1: "損矣。」\n                        \n                    "
      KR1h0004_tls_016-12a.10: "及其老也，\n                    "
      KR1h0004_tls_016-13a.7: "小人不知天命而不畏也，\n                    "
      KR1h0004_tls_016-14a.4: "上也，\n                    "
      KR1h0004_tls_016-14a.6: "次也；\n                    "
      KR1h0004_tls_016-15a.1: "民斯為下矣。」\n                        \n                    "
      KR1h0004_tls_016-14a.8: "又其次也；\n                    "
      KR1h0004_tls_016-16a.5: "吾見其人矣，\n                    "
      KR1h0004_tls_016-16a.6: "吾聞其語矣。\n                    "
      KR1h0004_tls_016-16a.9: "吾聞其語矣，\n                    "
      KR1h0004_tls_016-17a.1: "未見其人也。」\n                        \n                    "
      KR1h0004_tls_016-18a.1: "其斯之謂與？\n                        \n                    "
      KR1h0004_tls_016-19a.1: "「子亦有異聞乎？」\n                        \n                    "
      KR1h0004_tls_016-19a.3: "「未也。\n                    "
      KR1h0004_tls_016-19a.7: "『學《詩》乎？』\n                    "
      KR1h0004_tls_016-19a.9: "『未也。』\n                    "
      KR1h0004_tls_016-19a.17: "『學禮乎？』\n                    "
      KR1h0004_tls_016-19a.19: "『未也。』\n                    "
      KR1h0004_tls_016-21a.1: "又聞君子之遠其子也。」\n                        \n                    "
      KR1h0004_tls_017-4a.7: "可謂仁乎？」\n                    "
      KR1h0004_tls_017-4a.11: "可謂知乎？」\n                    "
      KR1h0004_tls_017-4a.14: "「日月逝矣，\n                    "
      KR1h0004_tls_017-6a.4: "吾將仕矣！」\n                    "
      KR1h0004_tls_017-6a.6: "「性相近也，\n                    "
      KR1h0004_tls_017-7a.1: "習相遠也。」\n                        \n                    "
      KR1h0004_tls_017-10a.1: "小人學道則易使也。』」\n                        \n                    "
      KR1h0004_tls_017-10a.4: "偃之言是也。\n                    "
      KR1h0004_tls_017-11a.1: "前言戲之耳。」\n                        \n                    "
      KR1h0004_tls_017-12a.4: "「末之也已，\n                    "
      KR1h0004_tls_017-13a.1: "何必公山氏之之也？」\n                        \n                    "
      KR1h0004_tls_017-13a.4: "而豈徒哉？\n                    "
      KR1h0004_tls_017-14a.1: "吾其為東周乎？」\n                        \n                    "
      KR1h0004_tls_017-15a.1: "為仁矣。」\n                        \n                    "
      KR1h0004_tls_017-17a.5: "君子不入也。』\n                    "
      KR1h0004_tls_017-18a.4: "有是言也。\n                    "
      KR1h0004_tls_017-18a.9: "吾豈匏瓜也哉？\n                    "
      KR1h0004_tls_017-19a.3: "「由也！\n                    "
      KR1h0004_tls_017-20a.1: "「未也。」\n                        \n                    "
      KR1h0004_tls_017-22a.3: "「女為《周南》、《召南》矣乎？\n                    "
      KR1h0004_tls_017-23a.1: "其猶正牆面而立也與？」\n                        \n                    "
      KR1h0004_tls_017-23a.4: "玉帛云乎哉？\n                    "
      KR1h0004_tls_017-25a.1: "其猶穿窬之盜也與？」\n                        \n                    "
      KR1h0004_tls_017-26a.1: "德之賊也。」\n                        \n                    "
      KR1h0004_tls_017-24a.1: "鍾鼓云乎哉？」\n                        \n                    "
      KR1h0004_tls_017-27a.1: "德之棄也。」\n                        \n                    "
      KR1h0004_tls_017-27a.4: "可與事君也與哉？\n                    "
      KR1h0004_tls_017-27a.5: "其未得之也，\n                    "
      KR1h0004_tls_017-28a.1: "無所不至矣。」\n                        \n                    "
      KR1h0004_tls_017-29a.1: "今之愚也詐而已矣。」\n                        \n                    "
      KR1h0004_tls_017-28a.8: "今之矜也忿戾；\n                    "
      KR1h0004_tls_017-30a.1: "鮮矣仁。」\n                        \n                    "
      KR1h0004_tls_017-31a.8: "「天何言哉？\n                    "
      KR1h0004_tls_017-32a.1: "天何言哉？」\n                        \n                    "
      KR1h0004_tls_017-33a.3: "「三年之喪，期已久矣。\n                    "
      KR1h0004_tls_017-34a.1: "期可已矣。」\n                        \n                    "
      KR1h0004_tls_017-35a.1: "於女安乎？」\n                        \n                    "
      KR1h0004_tls_017-36a.8: "故不為也。\n                    "
      KR1h0004_tls_017-37a.4: "「予之不仁也！\n                    "
      KR1h0004_tls_017-37a.8: "天下之通喪也，\n                    "
      KR1h0004_tls_017-37a.9: 予也
      KR1h0004_tls_017-38a.1: "有三年之愛於其父母乎！」\n                        \n                    "
      KR1h0004_tls_017-38a.5: "難矣哉！\n                    "
      KR1h0004_tls_017-38a.6: "不有博弈者乎？\n                    "
      KR1h0004_tls_017-39a.1: "為之，猶賢乎已。」\n                        \n                    "
      KR1h0004_tls_017-39a.3: "「君子尚勇乎？」\n                    "
      KR1h0004_tls_017-40a.3: "「君子亦有惡乎？」\n                    "
      KR1h0004_tls_017-41a.3: "「賜也亦有惡乎？」\n                    "
      KR1h0004_tls_017-42a.3: "「唯女子與小人為難養也，\n                    "
      KR1h0004_tls_017-43a.4: 其終也已。」
      KR1h0004_tls_018-2a.5: "「子未可以去乎？」\n                    "
      KR1h0004_tls_018-3a.7: "「吾老矣，\n                    "
      KR1h0004_tls_018-3a.8: "不能用也。」\n                    "
      KR1h0004_tls_018-5a.9: "已而，\n                    "
      KR1h0004_tls_018-5a.10: "已而！\n                    "
      KR1h0004_tls_018-18a.4: "天下皆是也，\n                    "
      KR1h0004_tls_018-21a.1: "丘不與易也。」\n                        \n                    "
      KR1h0004_tls_018-23a.1: "「子見夫子乎？」\n                        \n                    "
      KR1h0004_tls_018-27a.5: 至，則行矣。
      KR1h0004_tls_018-27a.3: "「隱者也。」\n                    "
      KR1h0004_tls_018-28a.5: "不可廢也；\n                    "
      KR1h0004_tls_018-28a.10: "君子之仕也，\n                    "
      KR1h0004_tls_018-28a.11: "行其義也。\n                    "
      KR1h0004_tls_018-29a.1: "已知之矣。」\n                        \n                    "
      KR1h0004_tls_018-29a.7: "伯夷、叔齊與！」\n                    "
      KR1h0004_tls_018-29a.9: "「降志辱身矣，\n                    "
      KR1h0004_tls_018-29a.12: "其斯而已矣。」\n                    "
      KR1h0004_tls_018-31a.5: "故舊無大故，則不棄也。\n                    "
      KR1h0004_tls_019-2a.1: "其可已矣。」\n                        \n                    "
      KR1h0004_tls_019-7a.1: "是以君子不為也。」\n                        \n                    "
      KR1h0004_tls_019-8a.1: "可謂好學也已矣。」\n                        \n                    "
      KR1h0004_tls_019-9a.1: "仁在其中矣。」\n                        \n                    "
      KR1h0004_tls_019-12a.5: "則以為厲己也。\n                    "
      KR1h0004_tls_019-13a.1: "則以為謗己也。」\n                        \n                    "
      KR1h0004_tls_019-14a.1: "小德出入可也。」\n                        \n                    "
      KR1h0004_tls_019-14a.6: "抑末也。\n                    "
      KR1h0004_tls_019-15a.9: "區以別矣。\n                    "
      KR1h0004_tls_019-15a.11: "焉可誣也？\n                    "
      KR1h0004_tls_019-18a.3: 「吾友張也
      KR1h0004_tls_019-18a.4: "為難能也，\n                    "
      KR1h0004_tls_019-20a.1: "難與並為仁矣。」\n                        \n                    "
      KR1h0004_tls_019-20a.4: 『人未有自致者也，必也
      KR1h0004_tls_019-21a.4: "『孟莊子之孝也，\n                    "
      KR1h0004_tls_019-22a.1: "是難能也。』」\n                        \n                    "
      KR1h0004_tls_019-22a.6: "民散久矣。\n                    "
      KR1h0004_tls_019-24a.3: "「君子之過也，\n                    "
      KR1h0004_tls_019-28a.10: "得其門者或寡矣。\n                    "
      KR1h0004_tls_019-29a.4: "「無以為也！\n                    "
      KR1h0004_tls_019-29a.5: "仲尼不可毀也。\n                    "
      KR1h0004_tls_019-29a.7: "丘陵也，\n                    "
      KR1h0004_tls_019-29a.9: "仲尼、日月也，\n                    "
      KR1h0004_tls_019-29a.12: "其何傷於日月乎？\n                    "
      KR1h0004_tls_019-30a.1: "多見其不知量也。」\n                        \n                    "
      KR1h0004_tls_019-31a.5: "言不可不慎也。\n                    "
      KR1h0004_tls_019-31a.6: "夫子之不可及也，\n                    "
      KR1h0004_tls_019-31a.7: "猶天之不可階而升也。\n                    "
      KR1h0004_tls_019-31a.16: 如之何其可及也？』」
      KR1h0004_tls_020-9a.1: "斯可以從政矣？」\n                        \n                    "
      KR1h0004_tls_020-10a.1: "斯可以從政矣。」\n                        \n                    "
      KR1h0004_tls_020-13a.4: "斯不亦惠而不費乎？\n                    "
      KR1h0004_tls_020-13a.12: "斯不亦泰而不驕乎？\n                    "
      KR1h0004_tls_020-14a.1: "斯不亦威而不猛乎？」\n                        \n                    "
      KR1h0004_tls_020-15a.6: "猶之與人也，\n                    "
      KR1h0004_tls_020-16a.4: "無以為君子也；\n                    "
      KR1h0004_tls_020-16a.6: "無以立也；\n                    "
      KR1h0004_tls_020-16a.8: 無以知人也。」
      KR1h0004_tls_001-15a.1: "可謂好學也已。」\n                        \n                    "
      KR1h0004_tls_016-12a.4: "少之時，\n                    "
      KR1h0004_tls_001-16a.4: "『如切如磋，\n                    "
      KR1h0004_tls_001-16a.5: "如琢如磨。』\n                    "
      KR1h0004_tls_002-1a.5: "譬如北辰，\n                    "
      KR1h0004_tls_003-13a.3: "祭神如神在。\n                    "
      KR1h0004_tls_003-13a.2: "3.12祭如在，\n                    "
      KR1h0004_tls_003-14a.1: "如不祭。」\n                        \n                    "
      KR1h0004_tls_005-31a.4: "必有忠信如丘者焉，\n                    "
      KR1h0004_tls_005-31a.5: 不如丘之好學也。」
      KR1h0004_tls_008-3a.8: "如臨深淵，\n                    "
      KR1h0004_tls_008-3a.9: "如履薄冰。』\n                    "
      KR1h0004_tls_009-12a.12: "如有所立卓爾。\n                    "
      KR1h0004_tls_009-20a.3: "「譬如為山，\n                    "
      KR1h0004_tls_009-20a.7: "譬如平地，\n                    "
      KR1h0004_tls_010-4a.4: 如不容。
      KR1h0004_tls_010-11a.4: "如不勝。\n                    "
      KR1h0004_tls_010-11a.9: 如有循。
      KR1h0004_tls_012-4a.5: "使民如承大祭。\n                    "
      KR1h0004_tls_010-11a.5: "上如揖，\n                    "
      KR1h0004_tls_016-16a.3: "「『見善如不及，\n                    "
      KR1h0004_tls_019-24a.4: "如日月之食焉：\n                    "
      KR1h0004_tls_010-1a.5: "似不能言者。\n                    "
      KR1h0004_tls_010-6a.5: 其言似不足者。
      KR1h0004_tls_001-1a.3: "1.1子曰：\n                    "
      KR1h0004_tls_001-1a.4: "「學而時習之，\n                    "
      KR1h0004_tls_001-10a.2: 子禽問於子貢曰
      KR1h0004_tls_001-11a.7: 三年無改於父之道
      KR1h0004_tls_001-13a.3: 信近於義
      KR1h0004_tls_001-14a.5: 敏於事而慎於言
      KR1h0004_tls_002-6a.4: 孟孫問孝於我
      KR1h0004_tls_002-22a.8: 施於有政
      KR1h0004_tls_002-24a.5: 殷因於夏禮
      KR1h0004_tls_003-1a.4: 八佾舞於庭
      KR1h0004_tls_003-3a.1: 奚取於三家之堂
      KR1h0004_tls_003-6a.2: 季氏旅於泰山
      KR1h0004_tls_003-12a.5: 知其說者之於天下也
      KR1h0004_tls_003-14a.3: 與其媚於奧
      KR1h0004_tls_003-14a.4: 寧媚於竈
      KR1h0004_tls_003-15a.3: 周監於二代
      KR1h0004_tls_004-4a.3: 苟志於仁矣
      KR1h0004_tls_004-9a.3: 士志於道
      KR1h0004_tls_004-10a.3: 君子之於天下也
      KR1h0004_tls_004-12a.3: 放於利而行
      KR1h0004_tls_004-17a.3: 君子喻於義
      KR1h0004_tls_004-18a.1: 小人喻於利
      KR1h0004_tls_004-21a.3: 三年無改於父之道
      KR1h0004_tls_004-25a.3: 君子欲訥於言
      KR1h0004_tls_004-26a.1: 而敏於行
      KR1h0004_tls_005-2a.5: 免於刑戮
      KR1h0004_tls_005-5a.7: 屢憎於人
      KR1h0004_tls_005-12a.10: 今吾於人也
      KR1h0004_tls_005-22a.5: 至於他邦
      KR1h0004_tls_006-5a.2: 子華使於齊
      KR1h0004_tls_006-37a.7: 何事於仁
      KR1h0004_tls_006-37a.3: 如有博施於民而能濟眾
      KR1h0004_tls_007-2a.1: 竊比於我老彭
      KR1h0004_tls_007-6a.3: 志於道
      KR1h0004_tls_007-6a.4: 據於德
      KR1h0004_tls_007-6a.5: 依於仁
      KR1h0004_tls_007-7a.1: 遊於藝
      KR1h0004_tls_007-9a.2: 子食於有喪者之側
      KR1h0004_tls_007-10a.2: 子於是日哭
      KR1h0004_tls_007-23a.2: 葉公問孔子於子路
      KR1h0004_tls_007-27a.3: 天生德於予
      KR1h0004_tls_007-37a.7: 君取於吳
      KR1h0004_tls_008-2a.7: 君子篤於親
      KR1h0004_tls_008-2a.8: 則民興於仁
      KR1h0004_tls_008-5a.3: 以能問於不能
      KR1h0004_tls_008-5a.4: 以多問於寡
      KR1h0004_tls_008-8a.3: 興於詩
      KR1h0004_tls_008-8a.4: 立於禮
      KR1h0004_tls_008-9a.1: 成於樂
      KR1h0004_tls_008-12a.4: 不至於穀
      KR1h0004_tls_009-5a.2: 子畏於匡
      KR1h0004_tls_009-13a.11: 且予與其死於臣之手也
      KR1h0004_tls_009-14a.3: 有美玉於斯
      KR1h0004_tls_010-31a.4: 而立於阼階
      KR1h0004_tls_010-35a.8: 侍食於君
      KR1h0004_tls_010-32a.2: 問人於他邦
      KR1h0004_tls_011-1a.4: 先進於禮樂
      KR1h0004_tls_011-1a.6: 後進於禮樂
      KR1h0004_tls_011-2a.3: 從我於陳蔡者
      KR1h0004_tls_011-24a.1: 亦不入於室
      KR1h0004_tls_011-28a.2: 子畏於匡
      KR1h0004_tls_012-4a.7: 勿施於人
      KR1h0004_tls_012-21a.2: 齊景公問政於孔子
      KR1h0004_tls_012-26a.3: 博學於文
      KR1h0004_tls_012-32a.2: 樊遲從遊於舞雩之下
      KR1h0004_tls_012-35a.6: 吾見於夫子而問知
