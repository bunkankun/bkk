body:
  text: 先進篇第十一子曰先進於禮樂野人也後進於禮樂君子也如用之則吾從先進子曰從我於陳蔡者皆不及門也德行顏淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏子曰回也非助我者也於吾言無所不說子曰孝哉閔子騫人不間於其父母昆弟之言南容三復白圭孔子以其兄之子妻之季康子問弟子孰為好學孔子對曰有顏回者好學不幸短命死矣今也則亡顏淵死顏路請子之車以為之椁子曰才不才亦各言其子也鯉也死有棺而無椁吾不徒行以為之椁以吾從大夫之後不可徒行也顏淵死子曰噫天喪予天喪予顏淵死子哭之慟從者曰子慟矣曰有慟乎非夫人之為慟而誰為顏淵死門人欲厚葬之子曰不可門人厚葬之子曰回也視予猶父也予不得視猶子也非我也夫二三子也季路問事鬼神子曰未能事人焉能事鬼曰敢問死曰未知生焉知死閔子侍側誾誾如也子路行行如也冉有子貢侃侃如也子樂若由也不得其死然魯人為長府閔子騫曰仍舊貫如之何何必改作子曰夫人不言言必有中子曰由之瑟奚為於丘之門門人不敬子路子曰由也升堂矣未入於室也子貢問師與商也孰賢子曰師也過商也不及曰然則師愈與子曰過猶不及季氏富於周公而求也為之聚斂而附益之子曰非吾徒也小子鳴鼓而攻之可也柴也愚參也魯師也辟由也喭子曰回也其庶乎屢空賜不受命而貨殖焉億則屢中子張問善人之道子曰不踐迹亦不入於室子曰論篤是與君子者乎色莊者乎子路問聞斯行諸子曰有父兄在如之何其聞斯行之冉有問聞斯行諸子曰聞斯行之公西華曰由也問聞斯行諸子曰有父兄在求也問聞斯行諸子曰聞斯行之赤也惑敢問子曰求也退故進之由也兼人故退之子畏於匡顏淵後子曰吾以女為死矣曰子在回何敢死季子然問仲由冉求可謂大臣與子曰吾以子為異之問曾由與求之問所謂大臣者以道事君不可則止今由與求也可謂具臣矣曰然則從之者與子曰弒父與君亦不從也子路使子羔為費宰子曰賊夫人之子子路曰有民人焉有社稷焉何必讀書然後為學子曰是故惡夫佞者子路曾晳冉有公西華侍坐子曰以吾一日長乎爾毋吾以也居則曰不吾知也如或知爾則何以哉子路率爾而對曰千乘之國攝乎大國之間加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也夫子哂之求爾何如對曰方六七十如五六十求也為之比及三年可使足民如其禮樂以俟君子赤爾何如對曰非曰能之願學焉宗廟之事如會同端章甫願為小相焉點爾何如鼓瑟希鏗爾舍瑟而作對曰異乎三子者之撰子曰何傷乎亦各言其志也曰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然歎曰吾與點也三子者出曾晳後曾晳曰夫三子者之言何如子曰亦各言其志也已矣曰夫子何哂由也曰為國以禮其言不讓是故哂之唯求則非邦也與安見方六七十如五六十而非邦也者唯赤則非邦也與宗廟會同非諸侯而何赤也為之小孰能為之大
