body:
  text: 衛靈公篇第十五衛靈公問陳於孔子孔子對曰俎豆之事則嘗聞之矣軍旅之事未之學也明日遂行在陳絕糧從者病莫能興子路慍見曰君子亦有窮乎子曰君子固窮小人窮斯濫矣子曰賜也女以予為多學而識之者與對曰然非與曰非也予一以貫之子曰由知德者鮮矣子曰無為而治者其舜也與夫何為哉恭己正南面而已矣子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前也在輿則見其倚於衡也夫然後行子張書諸紳子曰直哉史魚邦有道如矢邦無道如矢君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之子曰可與言而不與言失人不可與言而與之言失言知者不失人亦不失言子曰志士仁人無求生以害仁有殺身以成仁子貢問為仁子曰工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者顏淵問為邦子曰行夏之時乘殷之輅服周之冕樂則韶舞放鄭聲遠佞人鄭聲淫佞人殆子曰人無遠慮必有近憂子曰已矣乎吾未見好德如好色者也子曰臧文仲其竊位者與知柳下惠之賢而不與立也子曰躬自厚而薄責於人則遠怨矣子曰不曰如之何如之何者吾末如之何也已矣子曰群居終日言不及義好行小慧難矣哉子曰君子義以為質禮以行之孫以出之信以成之君子哉子曰君子病無能焉不病人之不己知也子曰君子疾沒世而名不稱焉子曰君子求諸己小人求諸人子曰君子矜而不爭群而不黨子曰君子不以言舉人不以人廢言子貢問曰有一言而可以終身行之者乎子曰其恕乎己所不欲勿施於人子曰吾之於人也誰毀誰譽如有所譽者其有所試矣斯民也三代之所以直道而行也子曰吾猶及史之闕文也有馬者借人乘之今亡矣夫子曰巧言亂德小不忍則亂大謀子曰眾惡之必察焉眾好之必察焉子曰人能弘道非道弘人子曰過而不改是謂過矣子曰吾嘗終日不食終夜不寢以思無益不如學也子曰君子謀道不謀食耕也餒在其中矣學也祿在其中矣君子憂道不憂貧子曰知及之仁不能守之雖得之必失之知及之仁能守之不莊以涖之則民不敬知及之仁能守之莊以涖之動之不以禮未善也子曰君子不可小知而可大受也小人不可大受而可小知也子曰民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也子曰當仁不讓於師子曰君子貞而不諒子曰事君敬其事而後其食子曰有教無類子曰道不同不相為謀子曰辭達而已矣師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯師冕出子張問曰與師言之道與子曰然固相師之道也
