body:
  text: 鄉黨篇第十孔子於鄉黨恂恂如也似不能言者其在宗廟朝廷便便言唯謹爾朝與下大夫言侃侃如也與上大夫言誾誾如也君在踧踖如也與與如也君召使擯色勃如也足躩如也揖所與立左右手衣前後襜如也趨進翼如也賓退必復命曰賓不顧矣入公門鞠躬如也如不容立不中門行不履閾過位色勃如也足躩如也其言似不足者攝齊升堂鞠躬如也屏氣似不息者出降一等逞顏色怡怡如也沒階趨進翼如也復其位踧踖如也執圭鞠躬如也如不勝上如揖下如授勃如戰色足蹜蹜如有循享禮有容色私覿愉愉如也君子不以紺緅飾紅紫不以為褻服當暑袗絺綌必表而出之緇衣羔裘素衣麑裘黃衣狐裘褻裘長短右袂必有寢衣長一身有半狐貉之厚以居去喪無所不佩非帷裳必殺之羔裘玄冠不以弔吉月必朝服而朝齊必有明衣布齊必變食居必遷坐食不厭精膾不厭細食饐而餲魚餒而肉敗不食色惡不食臭惡不食失飪不食不時不食割不正不食不得其醬不食肉雖多不使勝食氣唯酒無量不及亂沽酒市脯不食不撤薑食不多食祭於公不宿肉祭肉不出三日出三日不食之矣食不語寢不言雖蔬食菜羹必祭必齊如也席不正不坐鄉人飲酒杖者出斯出矣鄉人儺朝服而立於阼階問人於他邦再拜而送之康子饋藥拜而受之曰丘未達不敢嘗廄焚子退朝曰傷人乎不問馬君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之侍食於君君祭先飯疾君視之東首加朝服拖紳君命召不俟駕行矣入太廟每事問朋友死無所歸曰於我殯朋友之饋雖車馬非祭肉不拜寢不尸居不客見齊衰者雖狎必變見冕者與瞽者雖褻必以貌凶服者式之式負版者有盛饌必變色而作迅雷風烈必變升車必正立執綏車中不內顧不疾言不親指色斯舉矣翔而後集曰山梁雌雉時哉時哉子路共之三嗅而作
