  markers: []
body:
  text: 學而篇第一子曰學而時習之不亦說乎有朋自遠方來不亦樂乎人不知而不慍不亦君子乎有子曰其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也君子務本本立而道生孝弟也者其為人仁之本與子曰巧言令色鮮矣仁曾子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎子曰道千乘之國敬事而信節用而愛人使民以時子曰弟子入則孝出則悌謹而信汎愛眾而親人行有餘力則以學文子夏曰賢賢易色事父母能竭其力事君能致其身與朋友交言而有信雖曰未學吾必謂之學矣子曰君子不重則不威學則不固主忠信無友不如己者過則勿憚改曾子曰慎終追遠民德歸厚矣子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之與子曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣有子曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也有子曰信近於義言可復也恭近於禮遠恥辱也因不失其親亦可宗也子曰君子食無求飽居無求安敏於事而慎於言就有道而正焉可謂好學也已子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂道富而好禮者也子貢曰詩云如切如磋如琢如磨其斯之謂與子曰賜也始可與言詩已矣告諸往而知來者子曰不患人之不己知患不知人也
  hash: sha256:1ee1e185aa2626026c00d0ea94720463986bbc5382501c0221f009d813e3e139
