body:
  text: 《季氏篇第十六》季氏將伐顓臾冉有季路見於孔子曰季氏將有事於顓臾孔子曰求無乃爾是過與夫顓臾昔者先王以為東蒙主且在邦域之中矣是社稷之臣也何以伐為冉有曰夫子欲之吾二臣者皆不欲也孔子曰求周任有言曰陳力就列不能者止危而不持顛而不扶則將焉用彼相矣且爾言過矣虎兕出於柙龜玉毀於櫝中是誰之過與冉有曰今夫顓臾固而近於費今不取後世必為子孫憂孔子曰求君子疾夫舍曰欲之而必為之辭丘也聞有國有家者不患寡而患不均不患貧而患不安蓋均無貧和無寡安無傾夫如是故遠人不服則脩文德以來之既來之則安之今由與求也相夫子遠人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦內吾恐季孫之憂不在顓臾而在蕭牆之內也孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出蓋十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣天下有道則政不在大夫天下有道則庶人不議孔子曰祿之去公室五世矣政逮於大夫四世矣故夫三桓之子孫微矣孔子曰益者三友損者三友友直友諒友多聞益矣友便辟友善柔友便佞損矣孔子曰益者三樂損者三樂樂節禮樂樂道人之善樂多賢友益矣樂驕樂樂佚遊樂宴樂損矣孔子曰侍於君子有三愆言未及之而言謂之躁言及之而不言謂之隱未見顏色而言謂之瞽孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬭及其老也血氣既衰戒之在得孔子曰君子有三畏畏天命畏大人畏聖人之言小人不知天命而不畏也狎大人侮聖人之言孔子曰生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣孔子曰君子有九思視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難見得思義孔子曰見善如不及見不善如探湯吾見其人矣吾聞其語矣隱居以求其志行義以達其道吾聞其語矣未見其人也齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓于首陽之下民到于今稱之其斯之謂與陳亢問於伯魚曰子亦有異聞乎對曰未也嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮聞斯二者陳亢退而喜曰問一得三聞詩聞禮又聞君子之遠其子也邦君之妻君稱之曰夫人夫人自稱曰小童邦人稱之曰君夫人稱諸異邦曰寡小君異邦人稱之亦曰君夫人
