body:
  text: 《公冶長篇第五》子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之子謂子賤君子哉若人魯無君子者斯焉取斯子貢問曰賜也何如子曰女器也曰何器也曰瑚璉也或曰雍也仁而不佞子曰焉用佞禦人以口給屢憎於人不知其仁焉用佞子使漆彫開仕對曰吾斯之未能信子說子曰道不行乘桴浮于海從我者其由與子路聞之喜子曰「由也好勇過，我無所取材。 」孟武伯問子路仁乎子曰不知也又問子曰由也千乘之國可使治其賦也不知其仁也求也何如子曰求也千室之邑百乘之家可使為之宰也不知其仁也赤也何如子曰赤也束帶立於朝可使與賓客言也不知其仁也子謂子貢曰女與回也孰愈對曰賜也何敢望回回也聞一以知十賜也聞一以知二子曰弗如也吾與女弗如也宰予晝寢子曰朽木不可雕也糞土之牆不可杇也於予與何誅子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行於予與改是子曰吾未見剛者或對曰申棖子曰棖也慾焉得剛子貢曰我不欲人之加諸我也吾亦欲無加諸人子曰賜也非爾所及也子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也子路有聞未之能行唯恐有聞子貢問曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也子謂子產有君子之道四焉其行己也恭其事上也敬其養民也惠其使民也義子曰晏平仲善與人交久而敬之子曰臧文仲居蔡山節藻梲何如其知也子張問曰令尹子文三仕為令尹無喜色三已之無慍色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁崔子弒齊君陳文子有馬十乘棄而違之至於他邦則曰猶吾大夫崔子也違之之一邦則又曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁季文子三思而後行子聞之曰再斯可矣子曰甯武子邦有道則知邦無道則愚其知可及也其愚不可及也子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之子曰伯夷叔齊不念舊惡怨是用希子曰孰謂微生高直或乞醯焉乞諸其鄰而與之子曰巧言令色足恭左丘明恥之丘亦恥之匿怨而友其人左丘明恥之丘亦恥之顏淵季路侍子曰盍各言爾志子路曰願車馬衣輕裘與朋友共敝之而無憾顏淵曰願無伐善無施勞子路曰願聞子之志子曰老者安之朋友信之少者懷之子曰已矣乎吾未見能見其過而內自訟者也子曰十室之邑必有忠信如丘者焉不如丘之好學也
  hash: sha256:2dc48c9635dc98ba6129df02f99fd752a597cc0c4febf5c6e2dfeb41b07c316b
