body:
  text: 泰伯篇第八子曰泰伯其可謂至德也已矣三以天下讓民無得而稱焉子曰恭而無禮則勞慎而無禮則葸勇而無禮則亂直而無禮則絞君子篤於親則民興於仁故舊不遺則民不偷曾子有疾召門弟子曰啟予足啟予手詩云戰戰兢兢如臨深淵如履薄冰而今而後吾知免夫小子曾子有疾孟敬子問之曾子言曰鳥之將死其鳴也哀人之將死其言也善君子所貴乎道者三動容貌斯遠暴慢矣正顏色斯近信矣出辭氣斯遠鄙倍矣籩豆之事則有司存曾子曰以能問於不能以多問於寡有若無實若虛犯而不校昔者吾友嘗從事於斯矣曾子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也君子人與君子人也曾子曰士不可以不弘毅任重而道遠仁以為己任不亦重乎死而後已不亦遠乎子曰興於詩立於禮成於樂子曰民可使由之不可使知之子曰好勇疾貧亂也人而不仁疾之已甚亂也子曰如有周公之才之美使驕且吝其餘不足觀也已子曰三年學不至於穀不易得也子曰篤信好學守死善道危邦不入亂邦不居天下有道則見無道則隱邦有道貧且賤焉恥也邦無道富且貴焉恥也子曰不在其位不謀其政子曰師摯之始關雎之亂洋洋乎盈耳哉子曰狂而不直侗而不愿悾悾而不信吾不知之矣子曰學如不及猶恐失之子曰巍巍乎舜禹之有天下也而不與焉子曰大哉堯之為君也巍巍乎唯天為大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章也舜有臣五人而天下治武王曰予有亂臣十人孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已三分天下有其二以服事殷周之德其可謂至德也已矣子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宮室而盡力乎溝洫禹吾無間然矣
  hash: sha256:3cc0fda42968108883070152e908ab0cb6b8b70cdeb1e46eb7da89e52a006d28
