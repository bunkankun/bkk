body:
  text: 《里仁篇第四》子曰里仁為美擇不處仁焉得知子曰不仁者不可以久處約不可以長處樂仁者安仁知者利仁子曰唯仁者能好人能惡人子曰苟志於仁矣無惡也子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也君子去仁惡乎成名君子無終食之間違仁造次必於是顛沛必於是子曰我未見好仁者惡不仁者好仁者無以尚之惡不仁者其為仁矣不使不仁者加乎其身有能一日用其力於仁矣乎我未見力不足者蓋有之矣我未之見也子曰人之過也各於其黨觀過斯知仁[some read=人]矣。 」子曰朝聞道夕死可矣子曰士志於道而恥惡衣惡食者未足與議也子曰君子之於天下也無適也無莫也義之與比子曰君子懷德小人懷土君子懷刑小人懷惠子曰放於利而行多怨子曰能以禮讓為國於從政乎何有不能以禮讓為國如禮何子曰不患無位患所以立不患莫己知求為可知也子曰參乎吾道一以貫之曾子曰唯子出門人問曰何謂也曾子曰夫子之道忠恕而已矣子曰君子喻於義小人喻於利子曰見賢思齊焉見不賢而內自省也子曰事父母幾諫見志不從又敬不違勞而不怨子曰父母在不遠遊遊必有方子曰三年無改於父之道可謂孝矣子曰父母之年不可不知也一則以喜一則以懼子曰古者言之不出恥躬之不逮也子曰以約失之者鮮矣子曰君子欲訥於言而敏於行子曰德不孤必有鄰子游曰事君數斯辱矣朋友數斯疏矣
  hash: sha256:f869e3096e70573ba041ea3775e53eca47bc3e1addc1413d2d89cea08210eb3c
