body:
  text: 為政篇第二子曰為政以德譬如北辰居其所而眾星共之子曰詩三百一言以蔽之曰思無邪子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格子曰吾十有五而志于學三十而立四十而不惑五十而知天命六十而耳順七十而從心所欲不踰矩孟懿子問孝子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮孟武伯問孝子曰父母唯其疾之憂子游問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以別乎子夏問孝子曰色難有事弟子服其勞有酒食先生饌曾是以為孝乎子曰吾與回言終日不違如愚退而省其私亦足以發回也不愚子曰視其所以觀其所由察其所安人焉廋哉人焉廋哉子曰溫故而知新可以為師矣子曰君子不器子貢問君子子曰先行其言而後從之子曰君子周而不比小人比而不周子曰學而不思則罔思而不學則殆子曰攻乎異端斯害也已子曰由誨女知之乎知之為知之不知為不知是知也子張學干祿子曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔言寡尤行寡悔祿在其中矣哀公問曰何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸或謂孔子曰子奚不為政子曰書云孝乎惟孝友于兄弟施於有政是亦為政奚其為為政子曰人而無信不知其可也大車無輗小車無軏其何以行之哉子張問十世可知也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也子曰非其鬼而祭之諂也見義不為無勇也
  hash: sha256:5c1bd9afbaac07e0762a472c99ab9cdc183ce357d5528f209bd5d0de3cc3d7b1
