body:
  text: 《堯曰篇第二十》堯曰咨爾舜天之厤數在爾躬允執其中四海困窮天祿永終舜亦以命禹曰予小子履敢用玄牡敢昭告于皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朕躬有罪無以萬方萬方有罪罪在朕躬周有大賚善人是富雖有周親不如仁人百姓有過在予一人謹權量審法度脩廢官四方之政行焉興滅國繼絕世舉逸民天下之民歸心焉所重民食喪祭寬則得眾信則民任焉敏則有功公則說子張問於孔子曰何如斯可以從政矣子曰尊五美屏四惡斯可以從政矣子張曰何謂五美子曰君子惠而不費勞而不怨欲而不貪泰而不驕威而不猛子張曰何謂惠而不費子曰因民之所利而利之斯不亦惠而不費乎擇可勞而勞之又誰怨欲仁而得仁又焉貪君子無眾寡無小大無敢慢斯不亦泰而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎子張曰何謂四惡子曰不教而殺謂之虐不戒視成謂之暴慢令致期謂之賊猶之與人也出納之吝謂之有司孔子曰不知命無以為君子也不知禮無以立也不知言無以知人也
  hash: sha256:1b90cb74339b9c6ba2a0ec920b3aa91d9b78c7555b71461da98d139d333f6777
