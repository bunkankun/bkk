body:
  text: 述而篇第七子曰述而不作信而好古竊比於我老彭子曰默而識之學而不厭誨人不倦何有於我哉子曰德之不脩學之不講聞義不能徙不善不能改是吾憂也子之燕居申申如也夭夭如也子曰甚矣吾衰也久矣吾不復夢見周公子曰志於道據於德依於仁遊於藝子曰自行束脩以上吾未嘗無誨焉子曰不憤不啟不悱不發舉一隅不以三隅反則不復也子食於有喪者之側未嘗飽也子於是日哭則不歌子謂顏淵曰用之則行舍之則藏唯我與爾有是夫子路曰子行三軍則誰與子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也子曰富而可求也雖執鞭之士吾亦為之如不可求從吾所好子之所慎齋戰疾子在齊聞韶三月不知肉味曰不圖為樂之至於斯也冉有曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也子曰飯疏食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲子曰加我數年五十以學易亦可以無大過矣子所雅言詩書執禮皆雅言也葉公問孔子於子路子路不對子曰女奚不曰其為人也發憤忘食樂以忘憂不知老之將至云爾子曰我非生而知之者好古敏以求之者也子不語怪力亂神子曰三人行必有我師焉擇其善者而從之其不善者而改之子曰天生德於予桓魋其如予何子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也子以四教文行忠信子曰聖人吾不得而見之矣得見君子者斯可矣子曰善人吾不得而見之矣得見有恆者斯可矣亡而為有虛而為盈約而為泰難乎有恆矣子釣而不綱弋不射宿子曰蓋有不知而作之者我無是也多聞擇其善者而從之多見而識之知之次也互鄉難與言童子見門人惑子曰與其進也不與其退也唯何甚人絜己以進與其絜也不保其往也子曰仁遠乎哉我欲仁斯仁至矣陳司敗問昭公知禮乎孔子曰知禮孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君取於吳為同姓謂之吳孟子君而知禮孰不知禮巫馬期以告子曰丘也幸苟有過人必知之子與人歌而善必使反之而後和之子曰文莫吾猶人也躬行君子則吾未之有得子曰若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣公西華曰正唯弟子不能學也子疾病子路請禱子曰有諸子路對曰有之誄曰禱爾于上下神祇子曰丘之禱久矣子曰奢則不孫儉則固與其不孫也寧固子曰君子坦蕩蕩小人長戚戚子溫而厲威而不猛恭而安
