body:
  text: 《子張篇第十九》子張曰士見危致命見得思義祭思敬喪思哀其可已矣子張曰執德不弘信道不篤焉能為有焉能為亡子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容眾嘉善而矜不能我之大賢與於人何所不容我之不賢與人將拒我如之何其拒人也子夏曰雖小道必有可觀者焉致遠恐泥是以君子不為也子夏曰日知其所亡月無忘其所能可謂好學也已矣子夏曰博學而篤志切問而近思仁在其中矣子夏曰百工居肆以成其事君子學以致其道子夏曰小人之過也必文子夏曰君子有三變望之儼然即之也溫聽其言也厲子夏曰君子信而後勞其民未信則以為厲己也信而後諫未信則以為謗己也子夏曰大德不踰閑小德出入可也子游曰子夏之門人小子當洒埽應對進退則可矣抑末也本之則無如之何子夏聞之曰噫言游過矣君子之道孰先傳焉孰後倦焉譬諸草木區以別矣君子之道焉可誣也有始有卒者其唯聖人乎子夏曰仕而優則學學而優則仕子游曰喪致乎哀而止子游曰吾友張也為難能也然而未仁曾子曰堂堂乎張也難與並為仁矣曾子曰吾聞諸夫子人未有自致者也必也親喪乎曾子曰吾聞諸夫子孟莊子之孝也其他可能也其不改父之臣與父之政是難能也孟氏使陽膚為士師問於曾子曾子曰上失其道民散久矣如得其情則哀矜而勿喜子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉子貢曰君子之過也如日月之食焉過也人皆見之更也人皆仰之衛公孫朝問於子貢曰仲尼焉學子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何常師之有叔孫武叔語大夫於朝曰子貢賢於仲尼子服景伯以告子貢子貢曰譬之宮牆賜之牆也及肩闚見室家之好夫子之牆數仞不得其門而入不見宗廟之美百官之富得其門者或寡矣夫子之云不亦宜乎叔孫武叔毀仲尼子貢曰無以為也仲尼不可毀也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉人雖欲自絕其何傷於日月乎多見其不知量也陳子禽謂子貢曰子為恭也仲尼豈賢於子乎子貢曰君子一言以為知一言以為不知言不可不慎也夫子之不可及也猶天之不可階而升也夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也
