body:
  text: 子罕篇第九子罕言利與命與仁達巷黨人曰大哉孔子博學而無所成名子聞之謂門弟子曰吾何執執御乎執射乎吾執御矣子曰麻冕禮也今也純儉吾從眾拜下禮也今拜乎上泰也雖違眾吾從下子絕四毋意毋必毋固毋我子畏於匡曰文王既沒文不在茲乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如予何大宰問於子貢曰夫子聖者與何其多能也子貢曰固天縱之將聖又多能也子聞之曰大宰知我乎吾少也賤故多能鄙事君子多乎哉不多也牢曰子云吾不試故藝子曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉子曰鳳鳥不至河不出圖吾已矣夫子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨顏淵喟然歎曰仰之彌高鑽之彌堅瞻之在前忽焉在後夫子循循然善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之末由也已子疾病子路使門人為臣病間曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎且予與其死於臣之手也無寧死於二三子之手乎且予縱不得大葬予死於道路乎子貢曰有美玉於斯韞匵而藏諸求善賈而沽諸子曰沽之哉沽之哉我待賈者也子欲居九夷或曰陋如之何子曰君子居之何陋之有子曰吾自衛反魯然後樂正雅頌各得其所子曰出則事公卿入則事父兄喪事不敢不勉不為酒困何有於我哉子在川上曰逝者如斯夫不舍晝夜子曰吾未見好德如好色者也子曰譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也子曰語之而不惰者其回也與子謂顏淵曰惜乎吾見其進也未見其止也子曰苗而不秀者有矣夫秀而不實者有矣夫子曰後生可畏焉知來者之不如今也四十五十而無聞焉斯亦不足畏也已子曰法語之言能無從乎改之為貴巽舉之言能無說乎繹之為貴說而不繹從而不改吾末如之何也已矣子曰主忠信毋友不如己者過則勿憚改子曰三軍可奪帥也匹夫不可奪志也子曰衣敝縕袍與衣狐貉者立而不恥者其由也與不忮不求何用不臧子路終身誦之子曰是道也何足以臧子曰歲寒然後知松柏之後彫也子曰知者不惑仁者不憂勇者不懼子曰可與共學未可與適道可與適道未可與立可與立未可與權唐棣之華偏其反而豈不爾思室是遠而子曰未之思也夫何遠之有
  hash: sha256:62e6bee9ae5a1e1c6fe4184236fd18b87bdaaf4fcb8649a206982cadb5ae992f
