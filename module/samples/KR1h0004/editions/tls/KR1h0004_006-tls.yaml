body:
  text: 《雍也篇第六》子曰雍也可使南面仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃大簡乎子曰雍之言然哀公問弟子孰為好學孔子對曰有顏回者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也子華使於齊冉子為其母請粟子曰與之釜請益曰與之庾冉子與之粟五秉子曰赤之適齊也乘肥馬衣輕裘吾聞之也君子周急不繼富原思為之宰與之粟九百辭子曰毋以與爾鄰里鄉黨乎子謂仲弓曰犂牛之子騂且角雖欲勿用山川其舍諸子曰回也其心三月不違仁其餘則日月至焉而已矣季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與曰賜也達於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有季氏使閔子騫為費宰閔子騫曰善為我辭焉如有復我者則吾必在汶上矣伯牛有疾子問之自牖執其手曰亡之命矣夫斯人也而有斯疾也！斯人也而有斯疾也子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也冉求曰非不說子之道力不足也子曰力不足者中道而廢今女畫子謂子夏曰女為君子儒無為小人儒子游為武城宰子曰女得人焉耳乎曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也子曰孟之反不伐奔而殿將入門策其馬曰非敢後也馬不進也子曰不有祝鮀之佞而有宋朝之美難乎免於今之世矣子曰誰能出不由戶何莫由斯道也子曰質勝文則野文勝質則史文質彬彬然後君子子曰人之生也直罔之生也幸而免子曰知之者不如好之者好之者不如樂之者子曰中人以上可以語上也中人以下不可以語上也樊遲問知子曰務民之義敬鬼神而遠之可謂知矣問仁曰仁者先難而後獲可謂仁矣子曰知者樂水仁者樂山知者動仁者靜知者樂仁者壽子曰齊一變至於魯魯一變至於道子曰觚不觚觚哉觚哉宰我問曰仁者雖告之曰井有仁焉其從之也子曰何為其然也君子可逝也不可陷也可欺也不可罔也子曰君子博學於文約之以禮亦可以弗畔矣夫子見南子子路不說夫子矢之曰予所否者天厭之天厭之子曰中庸之為德也其至矣乎民鮮久矣子貢曰如有博施於民而能濟眾何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸夫仁者己欲立而立人己欲達而達人能近取譬可謂仁之方也已
