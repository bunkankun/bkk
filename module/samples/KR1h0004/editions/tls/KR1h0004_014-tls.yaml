body:
  text: 《憲問篇第十四》憲問恥子曰邦有道穀邦無道穀恥也克伐怨欲不行焉可以為仁矣子曰可以為難矣仁則吾不知也子曰士而懷居不足以為士矣子曰邦有道危言危行邦無道危行言孫子曰有德者必有言有言者不必有德仁者必有勇勇者不必有仁南宮适問於孔子曰羿善射奡盪舟俱不得其死然禹稷躬稼而有天下夫子不答南宮适出子曰君子哉若人尚德哉若人子曰君子而不仁者有矣夫未有小人而仁者也子曰愛之能勿勞乎忠焉能勿誨乎子曰為命裨諶草創之世叔討論之行人子羽脩飾之東里子產潤色之或問子產子曰惠人也問子西曰彼哉彼哉問管仲曰人也奪伯氏駢邑三百飯疏食沒齒無怨言子曰貧而無怨難富而無驕易子曰孟公綽為趙魏老則優不可以為滕薛大夫子路問成人子曰若臧武仲之知公綽之不欲卞莊子之勇冉求之藝文之以禮樂亦可以為成人矣曰今之成人者何必然見利思義見危授命久要不忘平生之言亦可以為成人矣子問公叔文子於公明賈曰信乎夫子不言不笑不取乎公明賈對曰以告者過也夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取子曰其然豈其然乎子曰臧武仲以防求為後於魯雖曰不要君吾不信也子曰晉文公譎而不正齊桓公正而不譎子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁子貢曰管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髮左衽矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也公叔文子之臣大夫僎與文子同升諸公子聞之曰可以為文矣子言衛靈公之無道也康子曰夫如是奚而不喪孔子曰仲叔圉治賓客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪子曰其言之不怍則為之也難陳成子弒簡公孔子沐浴而朝告於哀公曰陳恆弒其君請討之公曰告夫三子孔子曰以吾從大夫之後不敢不告也君曰告夫三子者之三子告不可孔子曰以吾從大夫之後不敢不告也子路問事君子曰勿欺也而犯之子曰君子上達小人下達子曰古之學者為己今之學者為人蘧伯玉使人於孔子孔子與之坐而問焉曰夫子何為對曰夫子欲寡其過而未能也使者出子曰使乎使乎子曰不在其位不謀其政曾子曰君子思不出其位子曰君子恥其言而過其行子曰君子道者三我無能焉仁者不憂知者不惑勇者不懼子貢曰夫子自道也子貢方人子曰賜也賢乎哉夫我則不暇子曰不患人之不己知患其不能也子曰不逆詐不億不信抑亦先覺者是賢乎微生畝謂孔子曰丘何為是栖栖者與無乃為佞乎孔子曰非敢為佞也疾固也子曰驥不稱其力稱其德也或曰以德報怨何如子曰何以報德以直報怨以德報德子曰莫我知也夫子貢曰何為其莫知子也子曰不怨天不尤人下學而上達知我者其天乎公伯寮愬子路於季孫子服景伯以告曰夫子固有惑志於公伯寮吾力猶能肆諸市朝子曰道之將行也與命也道之將廢也與命也公伯寮其如命何子曰賢者辟世其次辟地其次辟色其次辟言子曰作者七人矣子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者與子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎既而曰鄙哉硜硜乎莫己知也斯已而已矣深則厲淺則揭子曰果哉末之難矣子張曰書云高宗諒陰三年不言何謂也子曰何必高宗古之人皆然君薨百官總己以聽於冢宰三年子曰上好禮則民易使也子路問君子子曰脩己以敬曰如斯而已乎曰脩己以安人曰如斯而已乎曰脩己以安百姓脩己以安百姓堯舜其猶病諸原壤夷俟子曰幼而不孫弟長而無述焉老而不死是為賊以杖叩其脛闕黨童子將命或問之曰益者與子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也
