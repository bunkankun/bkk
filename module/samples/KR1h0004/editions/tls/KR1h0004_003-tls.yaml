body:
  text: 八佾篇第三孔子謂季氏八佾舞於庭是可忍也孰不可忍也三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂子曰人而不仁如禮何人而不仁如樂何林放問禮之本子曰大哉問禮與其奢也寧儉喪與其易也寧戚子曰夷狄之有君不如諸夏之亡也季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曾謂泰山不如林放乎子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子子夏問曰巧笑倩兮美目盼兮素以為絢兮何謂也子曰繪事後素曰禮後乎子曰起予者商也始可與言詩已矣子曰夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也文獻不足故也足則吾能徵之矣子曰禘自既灌而往者吾不欲觀之矣或問禘之說子曰不知也知其說者之於天下也其如示諸斯乎指其掌祭如在祭神如神在子曰吾不與祭如不祭王孫賈問曰與其媚於奧寧媚於竈何謂也子曰不然獲罪於天無所禱也子曰周監於二代郁郁乎文哉吾從周子入太廟每事問或曰孰謂鄹人之子知禮乎入太廟每事問子聞之曰是禮也子曰射不主皮為力不同科古之道也子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮子曰事君盡禮人以為諂也定公問君使臣臣事君如之何孔子對曰君使臣以禮臣事君以忠子曰關雎樂而不淫哀而不傷哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗子聞之曰成事不說遂事不諫既往不咎子曰管仲之器小哉或曰管仲儉乎曰管氏有三歸官事不攝焉得儉然則管仲知禮乎曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫管氏而知禮孰不知禮子語魯大師樂曰樂其可知也始作翕如也從之純如也皦如也繹如也以成儀封人請見曰君子之至於斯也吾未嘗不得見也從者見之出曰二三子何患於喪乎天下之無道也久矣天將以夫子為木鐸子謂韶盡美矣又盡善也謂武盡美矣未盡善也子曰居上不寬為禮不敬臨喪不哀吾何以觀之哉
  hash: sha256:b933d2b457a179f03b591164187ab39367f7391f0daf3624423a587e0d4c4aec
