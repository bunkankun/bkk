body:
  text: 《陽貨篇第十七》陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而往拜之遇諸塗謂孔子曰來予與爾言曰懷其寶而迷其邦可謂仁乎曰不可好從事而亟失時可謂知乎曰不可日月逝矣歲不我與孔子曰諾吾將仕矣子曰性相近也習相遠也子曰唯上知與下愚不移子之武城聞弦歌之聲夫子莞爾而笑曰割雞焉用牛刀子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也子曰二三子偃之言是也前言戲之耳公山弗擾以費畔召子欲往子路不說曰末之也已何必公山氏之之也子曰夫召我者而豈徒哉如有用我者吾其為東周乎子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰恭寬信敏惠恭則不侮寬則得眾信則人任焉敏則有功惠則足以使人佛肸召子欲往子路曰昔者由也聞諸夫子曰親於其身為不善者君子不入也佛肸以中牟畔子之往也如之何子曰然有是言也不曰堅乎磨而不磷不曰白乎涅而不緇吾豈匏瓜也哉焉能繫而不食子曰由也女聞六言六蔽矣乎對曰未也居吾語女好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂子曰小子何莫學夫詩詩可以興可以觀可以群可以怨邇之事父遠之事君多識於鳥獸草木之名子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與子曰禮云禮云玉帛云乎哉樂云樂云鍾鼓云乎哉子曰色厲而內荏譬諸小人其猶穿窬之盜也與子曰「鄉原，德之賊也子曰道聽而塗說德之棄也子曰鄙夫可與事君也與哉其未得之也患不得之既得之患失之苟患失之無所不至矣子曰古者民有三疾今也或是之亡也古之狂也肆今之狂也蕩古之矜也廉今之矜也忿戾古之愚也直今之愚也詐而已矣子曰巧言令色鮮矣仁子曰惡紫之奪朱也惡鄭聲之亂雅樂也惡利口之覆邦家者子曰予欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉孺悲欲見孔子孔子辭以疾將命者出戶取瑟而歌使之聞之宰我問三年之喪期已久矣君子三年不為禮禮必壞三年不為樂樂必崩舊穀既沒新穀既升鑽燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安女安則為之夫君子之居喪食旨不甘聞樂不樂居處不安故不為也今女安則為之宰我出子曰予之不仁也子生三年然後免於父母之懷夫三年之喪天下之通喪也予也有三年之愛於其父母乎子曰飽食終日無所用心難矣哉不有博弈者乎為之猶賢乎已子路曰君子尚勇乎子曰君子義之為上君子有勇而無義為亂小人有勇而無義為盜子貢曰君子亦有惡乎子曰有惡惡稱人之惡者惡居下流而訕上者惡勇而無禮者惡果敢而窒者曰賜也亦有惡乎惡徼以為知者惡不孫以為勇者惡訐以為直者子曰唯女子與小人為難養也近之則不孫遠之則怨子曰年四十而見惡焉其終也已
