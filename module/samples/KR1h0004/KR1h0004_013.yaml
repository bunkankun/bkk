body:
  text: 《子路篇第十三》子路問政子曰先之勞之請益曰無倦仲弓為季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸子路曰衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知蓋闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所錯手足故君子名之必可言也言之必可行也君子於其言無所苟而已矣樊遲請學稼子曰吾不如老農請學為圃曰吾不如老圃樊遲出子曰小人哉樊須也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是則四方之民襁負其子而至矣焉用稼子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為子曰其身正不令而行其身不正雖令不從子曰魯衛之政兄弟也子謂衛公子荊善居室始有曰苟合矣少有曰苟完矣富有曰苟美矣子適衛冉有僕子曰庶矣哉冉有曰既庶矣又何加焉曰富之曰既富矣又何加焉教之子曰苟有用我者期月而已可也三年有成子曰善人為邦百年亦可以勝殘去殺矣誠哉是言也子曰如有王者必世而後仁子曰苟正其身矣於從政乎何有不能正其身如正人何冉子退朝子曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與聞之定公問一言而可以興邦有諸孔子對曰言不可以若是其幾也人之言曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎曰一言而喪邦有諸孔子對曰言不可以若是其幾也人之言曰予無樂乎為君唯其言而莫予違也如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎葉公問政子曰近者說遠者來子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成葉公語孔子曰吾黨有直躬者其父攘羊而子證之孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也子貢問曰何如斯可謂之士矣子曰行己有恥使於四方不辱君命可謂士矣曰敢問其次曰宗族稱孝焉鄉黨稱弟焉曰敢問其次曰言必信行必果硜硜然小人哉抑亦可以為次矣曰今之從政者何如子曰噫斗筲之人何足算也子曰不得中行而與之必也狂狷乎狂者進取狷者有所不為也子曰南人有言曰人而無恆不可以作巫醫善夫不恆其德或承之羞子曰不占而已矣子曰君子和而不同小人同而不和子貢問曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之子曰君子易事而難說也說之不以道不說也及其使人也器之小人難事而易說也說之雖不以道說也及其使人也求備焉子曰君子泰而不驕小人驕而不泰子曰剛毅木訥近仁子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡子曰善人教民七年亦可以即戎矣子曰以不教民戰是謂棄之
