- id: uuid-6c57e839-e1dc-4b6a-97e8-39e1dc9b6a0e
  concept: VIRTUE
  concept_id: uuid-9700afcb-142a-4626-a4b8-d809156fb76e
  seg_id: KR1h0004_tls_001-10a.1
  pos: 1
  bucket: body
  offset: 242
  translation:
    text: 这样能使社会风俗道德日趋于笃厚。” 【儒家不提倡宗教信仰，亦不主张死后有灵魂之存在，然极重葬祭之礼，因此乃生死之间一种纯真情之表现，即孔子所谓之仁心与仁道。孔门常以教孝道达人类之仁心。葬祭之礼，乃孝道之最后表现。对死者能尽我之真情，在死者似无实利可得，在生者亦无酬报可期，其事超于功利计较之外，乃更见其情意之真。明知其人已死，而不忍以死人待之，此即孟子所谓“不忍之心”。于死者尚所不忍，其于生人可知。故儒者就理智言，虽不肯定人死有鬼，而从人类心情深处立教，则慎终追远，确有其不可已。曾子此章，亦孔门重仁道之一端也。】
    title: 論語新解
    src: Qian Mu 錢穆
  form:
    orig: ''
    orth: 德
    pron: dé
  sense:
    id: uuid-4be25be8-01b1-49e7-a25b-e801b169e7d0
    pos: 'N'
    syn_func: nab
    sem_feat: social state of affairs
    def: state/degree of prevailing moral virtue in society
  metadata:
    resp: CH
    created: '2024-07-22T20:21:57.91+09:00'
