body:
  text: 顏淵篇第十二顏淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉顏淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顏淵曰回雖不敏請事斯語矣仲弓問仁子曰出門如見大賓使民如承大祭己所不欲勿施於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣司馬牛問仁子曰仁者其言也訒曰其言也訒斯謂之仁已乎子曰為之難言之得無訒乎司馬牛問君子子曰君子不憂不懼曰不憂不懼斯謂之君子已乎子曰內省不疚夫何憂何懼司馬牛憂曰人皆有兄弟我獨亡子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之內皆兄弟也君子何患乎無兄弟也子張問明子曰浸潤之譖膚受之愬不行焉可謂明也已矣浸潤之譖膚受之愬不行焉可謂遠也已矣子貢問政子曰足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立棘子成曰君子質而已矣何以文為子貢曰惜乎夫子之說君子也駟不及舌文猶質也質猶文也虎豹之鞹猶犬羊之鞹哀公問於有若曰年饑用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足子張問崇德辨惑子曰主忠信徙義崇德也愛之欲其生惡之欲其死既欲其生又欲其死是惑也誠不以富亦祗以異齊景公問政於孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸子曰片言可以折獄者其由也與子路無宿諾子曰聽訟吾猶人也必也使無訟乎子張問政子曰居之無倦行之以忠子曰博學於文約之以禮亦可以弗畔矣夫子曰君子成人之美不成人之惡小人反是季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃子張問士何如斯可謂之達矣子曰何哉爾所謂達者子張對曰在邦必聞在家必聞子曰是聞也非達也夫達也者質直而好義察言而觀色慮以下人在邦必達在家必達夫聞也者色取仁而行違居之不疑在邦必聞在家必聞樊遲從遊於舞雩之下曰敢問崇德脩慝辨惑子曰善哉問先事後得非崇德與攻其惡無攻人之惡非脩慝與一朝之忿忘其身以及其親非惑與樊遲問仁子曰愛人問知子曰知人樊遲未達子曰舉直錯諸枉能使枉者直樊遲退見子夏曰鄉也吾見於夫子而問知子曰舉直錯諸枉能使枉者直何謂也子夏曰富哉言乎舜有天下選於眾舉皋陶不仁者遠矣湯有天下選於眾舉伊尹不仁者遠矣子貢問友子曰忠告而善道之不可則止毋自辱焉曾子曰君子以文會友以友輔仁
