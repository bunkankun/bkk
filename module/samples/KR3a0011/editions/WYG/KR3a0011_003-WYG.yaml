canonical_identifier: bkk:krp/KR3a0011/WYG/v1/juan/3
seq: 3
front:
  text: 或問人形有相曰蓋有之焉夫神氣形容之相包也自然矣貳之於行參之於時相成也亦參相敗也行謂修徳為邪時謂亨期厄㑹所以應人骨體之善惡者其數衆矣其變多矣亦有上中下品云爾或問神僊之術曰誕哉末之也已矣言名生實死誕妄不足信也聖人弗學揚雄曰聖人不師僊非惡生也終始運也終死始生易繫辭曰原始反終故知死生之説揚雄曰有生者必有死有始者必有終自然之道也短長數也短長謂年之夭壽運數非人力之為也曰亦有僊人乎曰僬僥桂莽産乎異俗海外南經僬僥國在三首國東外傳云僬僥民長三尺短之至也詩含神霧曰從中州以東西四十萬里得僬僥國人長一尺五寸也大荒南經冇小人名曰僬僥之國史記仲尼曰僬僥氏三尺短之至也就有仙人亦殊類矣或問有數百嵗人乎曰力稱烏獲烏獲秦武王力士捷言羌亥羌亥疑豎亥之誤勇期賁育孟賁齊人能生㧞牛角夏育衛人聖云仲尼壽稱彭祖以四者况壽言壽中俊傑有彭祖也列仙傳彭祖者殷大夫姓籛名鏗帝顓頊之孫陸終氏之中子歴夏至殷末八百餘嵗常食桂芝善導引行氣物有俊傑不可誣也或問凡壽者必有道非習之功曰夫惟壽則惟能用道惟能用道則性壽矣苟非其性也脩不至也學必至聖可以盡性壽必用道所以盡命或曰人有自變化而僊者信乎曰未之前聞也然則異也異謂怪異非僊也男化為女者有矣死人復生者有矣獻帝興平七年越雋男子化為女子四年武陵女子死十四日復活續漢志曰女子李娥年六十餘死瘞於城中有行人聞冢中有聲告家人出之此二事悦在興平中所親聞見者夫豈人之性哉氣數不存焉或問曰有養性乎曰養性秉中和守之以生而已愛親愛德愛力愛神之謂嗇老子治人事天莫如嗇夫惟嗇是以早復是謂深根固柢長生久視之道否則不宣過則不澹故君子節宣其氣勿使有所壅閉滯底昏亂百度則生疾宣散也壅外壅閉内閉底亦滯也謂血氣集滯也百度百事之節左傳曰於是乎節宣其氣勿使有所壅閉湫底以露其體兹心不爽而昏亂百度今無乃壹之則生疾矣故喜怒哀樂思慮必得其中所以養神也寒暄虚盈消息必得其中所以養體也善治氣者猶禹之治水也若夫導引蓄氣歴藏内視内經異法方宜論曰中央者其治宜導引按蹻導引謂揺筋骨動支節也過則失中可以治疾皆非養性之聖術也夫屈者以乎申也蓄者以乎虚也内者以乎外也屈謂導引蓄謂蓄氣内謂内視以申有屈以虚有蓄以外有内氣宜宣而遏之體宜調而矯之神宜平而抑之必有失和者矣夫善養性者無常術得其和而已矣宣其氣調其體平其神則得其和矣隣臍二寸謂之關黄庭外景經曰上有黄庭下關元後有幽闗前命門呼吸廬間入丹田解云闗元在臍下三寸元陽之命在其前懸精如鏡明照一身不休是道關者所以關藏呼吸之氣以禀授四體也氣出為呼氣入為吸故氣長者以關息氣短者其息稍升其脉稍促其神稍越至於以肩息而氣舒莊子曰真人之息也以踵衆人之息以喉其神稍專至於以關息而氣衍矣故道者常致氣於關是謂要術凡陽氣生養陽氣者天氣生氣也生氣通天論曰陽氣者若天與日失其所則捫壽而不彰又曰陽氣者一日而主外平旦人氣生日中而陽氣隆日西而陽氣已虗氣門乃閉隂氣消殺和喜之徒其氣陽也故養性者崇其陽而絀其隂陽極則亢隂極則凝亢則有悔凝則有凶夫物不能為春故候天春而生人則不然存吾春而已矣存吾春謂順養其生氣也藥者療也療治也所以治疾也無疾則勿藥可也肉不勝食氣况於藥乎論語肉雖多不使勝食氣寒斯熱熱則致滯隂藥之用也唯適其宜則不為害若已氣平也則必有傷唯鍼火亦如之鍼謂九鍼火謂灸柄也故養性者不多服也唯在乎節之而已矣或問仁者壽何謂也論語知者樂仁者壽曰仁者内不傷性外不傷物上不違天下不違人處正居中形神以和故咎徵不至咎徴惡行之騐而休嘉集之壽之術也曰顔冉何顔回子淵年三十二蚤死冉耕伯牛有惡疾而卒揚雄曰回牛之行徳矣曷壽之不益也亦同此意曰命也麥不終夏花不濟春如和氣何言麥雖不踰夏而秀花雖不越春而榮其如和氣之保合何雖云其短長亦在其中矣言顔冉嵗齡雖短而天和不害無殘賊致夭之行故曰長亦在其中矣則知君子不以壽夭為慮而當務脩徳為要也或問黄白之儔抱朴子曰神仙經黄白之方二十五卷千有餘首黄者金也白者銀也古人秘重其道不欲指斥故隱之云爾按秦李少君言丹砂可化為黄金卒無驗病死漢宣時劉更生言黄金可成上令典尚方鑄作事費甚多方不驗毋怪乎世人疑為虚誕也曰傅毅論之當也傅毅字武仲肅宗時與班固賈逵共典校書考其傳無論黄白之説意亡矣燔埴為瓦則可埴黏土也爍瓦為銅則不可以自然騐於不然詭哉歒犬羊之肉以造馬牛不幾矣不其然歟丹砂為金河車作銀非同類矣世稱緯書仲尼之作也世之説者謂孔子既叙六經以明天人之道知後世不能稽同其意故别立緯及䜟以遺來世光武之世篤信斯術學者風靡是以桓譚張衡輩常發其虚偽矣臣悦叔父故司空爽辨之蓋發其偽也爽字慈明董卓輔政徴之爽欲遁命吏持之急不得去因復就拜平原相行至宛陵復追為光禄勳視事三日進拜司空爽見董卓忍暴滋甚必危社稷其所辟舉皆取才略之士將共圖之亦與司徒王允及卓長史何顒等為内謀㑹病薨常著禮易傳詩傳尚書正經春秋條例公羊問辨䜟等篇按爽父淑有子八人儉緄靖燾汪爽肅專而悅則儉之子故爽於悦為叔父所謂辨䜟即其發偽之書也有起於中興之前終張之徒之作乎起於哀平或曰雜曰以已雜仲尼乎以仲尼雜已乎若彼者以仲尼雜已而已然則可謂八十一首非仲尼之作矣緯書有河圖九篇洛書六篇云自黄帝至周文王所受本文又别有三十篇云自初起至于孔子九聖之所増演以廣其意又有七經緯三十六篇並云孔子所作并前合為八十一篇或曰燔諸曰仲尼之作則否有取焉則可曷其燔有取如劉彦和所謂羲農軒皡之源山瀆鍾律之要白魚赤鳥之符黄金紫玉之瑞事豐辭富無益經典而有助文章之類是也在上者不受虗言不聴浮術不采華名不興偽事言必有用術必有典名必有實事必有功有用謂不虗有典謂不浮有實謂不華有功謂不偽在上者如是則緯候鉤䜟之説無所肆其矯誕矣
