front:
  text: 申鑒卷第三
  hash: sha256:1df27808e5794f52bf3abd23a5715e1c59cedf55feea5fb3983e97fd2d7f16ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0011_SBCK_003-1a}
  - {type: line-break, offset: 0, content: '', id: KR3a0011_SBCK_003-1a01}
body:
  text: 吳郡黃省曾注俗嫌第三或問卜筮曰德斯益否斯損曰何謂也吉而濟凶而救之謂益吉而恃凶而怠之謂損吉凶謂兆數之所值言脩德則足以恊吉而消凶否則反是或問曰時羣忌曰此天地之數也非吉凶所生也東方主生死者不鮮西方主殺生者不寡南方火也居之不燋北方水也蹈之不沈漢時俗有方忌如西益宅謂之不祥必有死亡商家門不冝南向徵家門不冝北向之類是也故甲子昧爽殷滅周興武成曰甲子昧爽受率其旅若林㑹于牧野罔有敵於我師前徒倒弋攻於後以北血流漂杵一戎衣天下大定所謂殷以甲子滅周以甲子興也言支干不足忌矣咸陽之地秦亡漢隆秦都關中二世而亡漢遷長安歴年四百言相地家不足信矣或問五三之位周應也五三五星三辰辰星熒惑太白嵗星填星日月斗也志所謂周師初發嵗在鶉火日在析木月在天駟辰在斗柄星在天黿是也春秋元命苞曰殷紂之時五星聚於房房者蒼神之精周據而興龍虎虎當作尾之㑹晉祥也晉獻公問於十偃曰攻虢何月也曰童謡有之曰丙之晨龍尾伏辰均服振振取虢之旂鶉之賁賁天䇿焞焞火中成軍虢公其奔火中而旦其九月十月之交乎韋氏解曰丙丙子晨蚤朝也龍尾尾星也伏隱也辰日月之交㑹也魯僖五年冬周十二月夏十月丙子朔之朝日在尾月在天䇿也伏辰辰在龍尾隱而未見也鶉鶉火鳥星也賁賁鶉火星貌也天䇿尾上一星名曰天䇿一名傳說焞焞近日月之貌也火鶉火也中晨中也成軍軍有成功也傳曰冬十二月丙子朔晉滅虢虢公醜奔京師曰官府設陳富貴者值之布衣寓焉不符其爵也獄犴若居有罪者觸之貞良入焉不受其罰也布衣無位者貞良無罪者言布衣而寓官府則爵不符貞良而入獄犴則罰不受以喻周應晉祥惟武王獻公能當之也或曰然則日月可廢歟曰否曰元辰先王所用也辰謂日月所㑹自玄枵至星紀是也周禮馮相氏掌十有二嵗十有二月十有二辰人承天地故動静焉順順其隂陽順其日辰順其度數内有順實外有順文文實順理也休徴之符自然應也故盜泉朝歌孔墨不由尸子曰孔子過於盗泉渴矣而不飲惡其名也劉向曰邑號朝歌墨子囘車惡其名者順其心也苟無其實徼福於忌斯成難也或曰祈請者誠以接神自然應也祈請求禱也如祈年祈子孫請雨請福之類周禮太提掌六祈以同􅀑神示故精以底之犠# SB1_0336-082.png# page missing或問人形有相曰葢有之焉夫神氣形容之相包也自然矣貳之於行參之於時相成也亦參相敗也行謂修徳為邪時謂亨期厄㑹所以應人骨體之善惡者其數衆矣其變多矣亦有上中下品云爾或問神僊之術曰誕哉末之也已矣言名生實死誕妄不足信也聖人弗學楊雄曰聖人不師僊非惡生也終始運也終死始生易繫辭曰原始反終故知死生之説楊雄曰有生者必有死有始者必有終自然之道也短長數也短長謂年之夭壽運數非人力之為也曰亦有僊人乎曰僬僥桂莽産乎異俗海外南經僬僥國在三首國東外傳云僬僥民長三尺短之至也詩含神霧曰從中州以東西四十萬里得僬僥國人長一尺五寸也大荒南經有小人名曰僬僥之國史記仲尼曰僬僥氏三尺短之至也就有仙人亦殊類矣或問有數百嵗人乎曰力稱烏獲烏獲秦武王力士捷言羌亥羌亥疑豎亥之誤勇期賁育孟賁齊人能生拔牛角夏育衛人聖云仲尼壽稱彭祖以四者況壽言壽中俊傑有彭祖也列仙傳彭祖者殷大夫姓籛名鏗帝顓頊之孫陸終氏之中子歷夏至殷末八百餘嵗常食挂芝善導引行氣物有俊傑不可誣也或問凡壽者必有道非習之功曰夫惟壽則惟能用道惟能用道則性壽矣苟非其性也脩不至也學必至聖可以盡性壽必用道所以盡命或曰人有自變化而僊者信乎曰未之前聞也然則異也異謂怪異非僊也男化爲女者有矣死人復生者有矣獻帝興平七年越雋男子化爲女子四年武陵女子死十四日復活續漢志曰女子李娥年六十餘死瘞於城中有行人聞冡中有聲告家人出之此二事悅抂興平中所親聞見者夫豈人之性哉氣數不存焉或問曰有養性乎曰養性秉中和守之以生而已愛親愛德愛力愛神之謂嗇老子治人事天莫如嗇夫惟嗇是以早復是謂深根固柢長生久視之道否則不宣過則不澹故君子節宣其氣勿使有所壅閉滯底昏亂百度則生疾宣散也壅外壅閉内閉底亦滯也謂血氣集滯也百度百事之節左傳曰於吳乎節宣其氣勿使有所壅閉湫底以露其體兹心不爽而昏亂百度今無乃壹之則生疾矣故喜怒哀樂思慮必得其中所以養神也寒睻虛盈消息必得其中所以養體也善治氣者由禹之治水也若夫導引蓄氣歴藏内視内經異法方冝論曰中央者其治冝導引按蹻導引謂摇筯骨動支節也過則失中可以治疾皆非養性之聖術也夫屈者以乎申也蓄者以乎虛也内者以乎外也屈謂導引蓄謂蓄氣内謂内視以申有屈以虚有蓄以外有内氣冝宣而遏之體冝調而矯之神冝平而抑之必有失和者矣夫善養性者無常術得其和而已矣宣其氣調其體平其神則得其和矣隣臍二寸謂之關黄庭外景經曰上有黄庭下關元後有幽闕前命門呼吸廬間入丹田解云關元在臍下三寸元陽之命在其前懸精如鏡明照一身不休是道關者所以關藏呼吸之氣以稟授四體也氣出為呼氣入為吸故氣長者以關息氣短者其息稍升其脉稍促其神稍越至於以肩息而氣舒莊子曰真人之息也以踵衆人之息以喉其神稍專至於以關息而氣衍矣故道者常致氣於關是謂要術凡陽氣生養陽氣者天氣生氣也生氣通天論曰陽氣者若天與日失其所則捫壽而不彰又曰陽氣者一日而主外平旦人氣生日中而陽氣隆日西而陽氣已虚氣門乃閉隂氣消殺和喜之徒其氣陽也故養性者崇其陽而絀其隂陽極則亢隂極則凝亢則有悔凝則有凶夫物不能為春故候天春而生人則不然存吾春而已矣存吾春謂順養其生氣也藥者療也療治也所以治疾也無疾則勿藥可也肉不勝食氣況於藥乎論語肉雖多不使勝食氣寒斯熱熱則致滯隂藥之用也唯適其冝則不為害若已氣平也則必有傷唯鍼火亦如之鍼謂九鍼火謂灸柄也故養性者不多服也唯在乎節之而已矣或問仁者壽何謂也論語知者樂仁者壽曰仁者内不傷性外不傷物上不違天下不違人處正居中形神以和故咎徴不至咎徴惡行之驗而休嘉集之壽之術也曰顔冉何顔回子淵年三十二蚤死冉耕伯牛有惡疾而卒楊雄曰回牛之行德矣曷壽之不益也亦同此意曰命也麥不終夏花不濟春如和氣何言麥雖不踰夏而秀花雖不越春而榮其如和氣之保合何雖云其短長亦在其中矣言顔冉嵗齡雖短而天和不害無殘賊致天之行故曰長亦在其中矣則知君子不以壽天為慮而當務脩德為要也或問黄白之儔抱朴子曰神仙經黄白之方二十五卷千有餘首黄者金也白者銀也古人秘重其道不欲指斥故隱之云爾按秦李少君言丹砂可化為黄金卒無驗病死漢宣時劉更生言黄金可成上令典尚方鑄作事費甚多方不驗母怪乎世人疑為虛誕也曰傅毅論之當也傅毅字武仲肅宗時與班固賈逵共典校書考其傳無論黄白之説意亡矣燔埴為瓦則可埴黏士也爍瓦為銅則不可以自然驗於不然詭哉歒犬羊之肉以造馬牛不幾矣不其然歟丹砂為金河車作銀非同類矣世稱緯書仲尼之作也世之説者謂孔子既叙六經以明天人之道知後世不能稽同其意故别立緯及䜟以遺來世光武之世篤信斯術學者風靡是以桓譚張衡輩常發其虛偽矣臣悦叔父故司空爽辨之葢發其偽也爽字慈明董卓輔政徴之爽欲遁命吏持之急不得去因復就拜平原相行至宛陵復追為光禄勳視事三日進拜司空爽見董卓忍暴滋甚必危社稷其所辟舉皆取才略之士將共圖之亦與司徒王允及卓長史何顒等為内謀㑹病薨常著禮易傳詩傳尚書正經春秋條例公羊問辨䜟等篇按爽父淑有子八人儉緄靖燾汪爽肅專而悅則儉之子故爽於悦為叔父所謂辨䜟即其發偽之書也有起於中興之前終張之徒之作乎起於哀平或曰雜曰以已雜仲尼乎以仲尼雜已乎若彼者以仲尼雜已而已然則可謂八十一首非仲尼之作矣緯書有河圖九篇洛書六篇云自黄帝至周文王所受本文又别有三十篇云自初起至于孔子九聖之所増演以廣其意又有七經緯三十六篇並云孔子所作并前合爲八十一篇或曰燔諸曰仲尼之作則否有取焉則可曷其燔有取如劉彦和所謂羲農軒皡之源山瀆鍾律之要白魚赤烏之符黄金紫玊之瑞事豐辭富無益經典而有助文章之𩔖是也在上者不受虛言不聽浮術不采華名不興僞事言必有用術必有典名必有實事必有功有用謂不虛有典謂不浮有實謂不華有功謂不僞在上者如是則緯候鉤䜟之說無所肆其矯誕矣申鑒卷第三
