  text: 申鑒卷第四
  hash: sha256:9a749dbdc194e064a3f2e701f0d92fd5bfb21943067deaf1c204513722a6bacc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0011_SBCK_004-1a}
  - {type: line-break, offset: 0, content: '', id: KR3a0011_SBCK_004-1a01}
body:
  text: 吳郡黃省曾注雜言上第四或問曰君子曷敦乎學敦勉也曰生而知之者寡矣學而知之者寡矣悠悠之民泄泄之士明明之治汶汶之亂皆學廢興之由敦之不亦冝乎詩板曰天之方蹶無然泄泄大明曰明明在下君子有三鑒世人鏡鑒蒸庶但知鏡鑒而已前惟順人惟賢鏡惟明此君子之三鑒夏商之衰不鑒於禹湯也桀紂不以前鑒周秦之弊不鑒於民下也幽厲政亥不以人鑒側弁垢顔不鑒於明鏡也此則不以鏡鑒側傾也弁者冠之大名詩賔之初筵曰側弁之俄故君子惟鑒之務務於前鑒人鑒若夫側景之鏡亡鑒矣但知鏡鑒是為無鑒或問致治之要君乎曰兩立哉天無獨運君無獨理非天地不生物非君臣不成治首之者天地也統之者君臣也哉先王之道致訓焉故亡斯須之間而違道矣昔有上致聖由教戒因輔弼欽順四鄰故檢柙之臣不虚於側檢柙猶法度也言法度之臣常充左右也禮度之典不曠於目先哲之言不輟於身非義之道不宣於心是邪僻之氣末由入也缺一字有間缺一字必有入之者矣是故僻志萌則僻事作生於其心害於其政僻事作則正塞正塞則公正亦末由入也矣不任不愛謂之公惟公是從謂之明齊桓公中材也末能成功業由有異焉者矣妾媵盈宫非無愛幸也羣臣盈朝非無親近也然外則管仲射已雍林人殺無知髙國先隂召小白於莒魯聞無知死亦發兵送公子糾而使管仲别將兵遮莒道射中小白帶鈎小白佯死先入齊髙傒立之是為桓公衞姬色妾桓公好内多内寵如夫人者六人長衞姬少衞姬鄭姬葛嬴潘密姬宋華子也非愛也任之也言桓公非親暱管仲欲其擔寄國事也然後知非賢不可任非智不可從也夫此之舉弘矣哉膏盲純白心下為膏肓鬲也二豎不生兹謂心寧省闥淸淨嬖孽不生兹謂政平夫膏盲近心而處阨鍼之不逺逺當作達藥之不中攻之不可二豎藏焉是謂篤患晉侯疾病求醫于秦秦伯使醫緩為之未至公夢疾為二豎于曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也故治身治國者唯是之畏身畏二豎國畏嬖孽或曰愛民如子仁之至乎曰未也曰愛民如身仁之至乎曰未也湯禱桑林湯時大旱七年太史占之曰當以人禱湯曰吾所為請雨者民也若以人禱吾請自當遂齋戒翦髪㫁爪素車白馬身嬰白茅以身為犧禱于桑林之野邾遷于繹邾文公卜遷干繹史曰利於民而不利於君邾子曰苟利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民苟利矣遷也吉莫如之遂遷于繹五月邾文公卒景祠于旱齊大旱景公卜之祟在髙山廣水欲祠靈山河伯以禱晏子曰祠之無益君誠避宫殿暴露與靈山河伯共憂其幸而雨乎於是景公出野暴露三日天果大雨民盡得種樹可謂愛民矣如子與子等耳如身與身等耳如三君者輕身重民然後為至曰何重民而輕身也曰人主承天命以養民者也民存則社稷存民亡則社稷亡故重民者所以重社稷而承天命也社者五土之神稷者於五土之中特指原隰之祗古者立國天子諸侯大夫皆立社而國喪則屋之不受天陽也故公羊傳云亡國之社掩其上柴其下孟子曰民為貴社稷次之君為輕言三君者之重民為欽奉天命以保社稷也或問曰孟軻稱人皆可以為堯舜其信矣曰人非下愚下愚則不移則愚可以為堯舜矣寫堯舜之貌同堯舜之姓則否服堯之制行堯之道則可矣行之於前則古之堯舜也行之於後則今之堯舜也或曰人皆可以為桀紂乎曰行桀紂之事是桀紂也本孟子語曹交意堯舜桀紂之事常並存於世唯人所用而已楊朱哭岐路所通逼者然也淮南子説林訓曰楊子見逵路而哭之為其可以南可以北髙誘曰閔其别與化也夫岐路惡足悲哉中反焉若夫縣度之厄素舉足而已矣西域傳烏秘國西有縣度縣度者石山也谿谷不通以繩索相引而度去喻為桀紂損益之符微而顯也趙獲二城臨饋而憂陶朱既富室妾悲號范蠡既雪㑹稽之恥乃乗扁舟浮於江湖變名易姓適齊為鴟夷子皮之陶為朱公廼治産積居與時逐三致千金而再散分與貧友昆弟後年衰老聽子孫􅁱業而息之遂至鉅萬故言富者稱陶朱此知益為損之為益者也屈伸之數隱而昭也有仍之困復夏之萌也帝相之后有仍國君女也寒浞殺羿滅夏氏時少康方在相后懷姙乃奔歸有仍之國而生少康長為仍牧正夏有舊臣靡自有鬲氏收二國之燼舉兵滅浞而立少康鼎雉之異興殷之符也武丁祭成湯有飛雉升鼎耳而雊祖已訓諸王武丁內反諸巳以思王道三年蠻夷編髪重譯來朝者六國􅀑方無道武丁伐而三年克之殷道復興邵宮之難隆周之應也邵宮召公之室也厲王出犇于彘太子靜匿召公之家國人聞而圍之召公乃以其子代太子太子竟得脫長於召公家二相乃共立之是爲宣王㑹稽之棲霸越之基也夫差二年吳王悉精兵以伐越敗之夫椒越王勾踐乃以餘兵五千人保棲於㑹稽使大夫種因吳太宰嚭而行成請委國爲臣妾至十四年勾踐伐吳虜太子友二十一年越王滅吳夫差自剄死子之之亂强燕之徴也燕王噲讓國於其相子之而國大亂齊因我之遂大勝燕噲死子之亡二年而燕人共立太子平是爲燕昭王此知伸爲屈之爲伸者也人主之患常立於二難之間在上而國家不治難也治國家則必勤身苦思矯情以從道難也有難之難闇主取之無難之難明主居之大臣之患常立於二罪之間在職而不盡忠直之道罪也盡忠直之道焉則必矯上拂下罪也有罪之罪謂不盡忠直之道邪臣由之無罪之罪謂盡道而矯上拂下忠臣置之人臣之義不曰吾君能矣不我須也言無補也而不盡忠不曰吾君不能矣不我識也言無益也而不盡忠孟子曰吾君不能謂之賊必竭其誠明其道盡其義斯已而已矣以道事君不已則奉身以退不可則止臣道也故君臣有異無乖有怨無憾有屈無辱人臣有三罪一曰導非二曰阿失三曰尸寵以非引上謂之導從上之非謂之阿見非不言謂之尸導臣誅阿臣刑尸臣絀絀與黜同貶下也進忠有三術一曰防防與導反二曰救救與阿反三曰戒戒與尸反先其未然謂之防發而止之謂之救行而責之謂之戒防為上救次之戒為下下不鉗口上不塞耳則可有聞矣有鉗之鉗猶可解也無鉗之鉗難矣哉有塞之塞猶可除也無塞之塞其甚矣夫無鉗之鉗無塞之塞獻帝之時如此或曰在上有屈乎曰在上者以義申以義屈義當申則申義當屈則屈髙祖雖能申威於秦項而屈於商山四公四公東園公綺里季夏黄公角里先生也髙祖欲易太子大臣多爭未能得堅决吕后以留侯計云四公皆上所不能致者遂使人奉太子書迎至及宴置酒太子侍四人者從太子上怪問四人前對各言其姓名上廼驚曰吾求公避逃我今公何自從吾兒遊乎四人曰陛下輕士善罵臣等義不辱故恐而亡匿今聞太子仁孝恭敬愛士天下莫不延頸願為太子死者故臣等來上曰煩公幸卒調護太子四人趨去上目送之召戚夫人指視曰我欲易之彼四人為之輔羽翼已成難動矣竟不易太子所謂屈於商山四公光武能申於莽而屈於强項令陳留董宣為雒陽令湖陽公主蒼頭白日殺人宣於夏門亭格殺之主訴帝帝召宣欲箠殺之宣曰陛下聖徳中興而縱奴殺人將何以治天下乎臣不須箠請得自殺即以頭擊楹流血被面帝令小黄門持之使宣叩頭謝主宣不從彊使頓之宣兩手據地終不肯俯因敕强項令出賜錢三十萬所謂屈於强項令明帝能申令於天下而屈於鍾離尚書尚書鍾離意也顯宗即位徴為尚書時交阯太守張恢坐臧徵還伏法以資物簿入大司農詔班賜羣臣意得珠璣悉以委地而不拜賜帝怪而問其故對曰臣聞孔子忍渴於盗泉之水曽參回車於勝母之閭惡其名也此臧穢之寶誠不敢拜帝嗟嘆曰清乎尚書之言乃更以庫錢三十萬賜意轉為尚書僕射車駕數幸廣盛苑意以為從禽廢政常當車陳諫般樂遊田之事天子即時還宫所謂屈於鍾離尚書若秦二世之申欲而非笑唐虞二世曰吾聞之韓子曰堯舜采椽不刮茅茨不翦飯土塯啜土形雖監門之養不觳於此禹鑿龍門通大夏決河亭水放之海身自持築臿脛毋毛臣虜之勞不烈於此矣凡所為貴有天下者得肆意極欲主重明法下不敢為非以制御海内矣夫虞夏之主貴為天子親處窮苦之實以徇百姓尚何於法此所謂非笑唐虞也若定陶傅太后之申意而怨於鄭傅太后元帝倢伃也生定陶恭王元帝崩隨王歸國稱定陶太后成帝無繼嗣太后賂趙昭儀隂為恭王子求漢嗣又以從弟晏子為王妃明年徴定陶王為六子是為哀帝帝即位累尊太后為皇太太后太后父同産弟子孟子喜中叔子晏幼君子商同母弟鄭煇子業俱封侯太后既尊後尤驕與成帝母王太后語至謂之嫗䧟馮太后以祝詛罪令自殺哀帝崩王莽秉政奏貶傅太后號為定陶恭王母復奏發傅太后冢以木棺代去珠玉衣歸定陶葬恭王冢次孔鄉侯晏將家屬徙合浦宗族皆歸故郡趙皇后亦廢為庶人是謂不屈不然則趙氏不亡而秦無愆尤故人主以義申以義屈也喜如春陽怒如秋霜威如雷霆之震惠若雨露之降威怒言申喜惠言屈沛然孰能禦也或問曰難行曰若髙祖聽戍卒不懷居遷萬乘不俟終日齊人婁敬戍隴西過洛陽脫輓輅衣羊裘因虞將軍見髙阻勸都秦地張良又是其説髙租即日車駕西都長安孝文帝不愛千里馬孝文時有獻千里馬者帝曰鸞旗在前屬車在後吉行日五十里師行日三十里朕乘千里馬獨先安之下詔不受慎夫人衣不曵地班固贊文帝身衣弋綈所幸慎夫人衣不曵地光武手不持珠玉循吏傳叙曰光武身衣大練色無重綵耳不聽鄭衛之音手不持珠玉之玩可謂難矣言三君者以規獻帝也抑情絶欲不如是能成功業者鮮矣人臣若金日磾以子私謾而殺之日磾子二人皆愛為帝弄兒其後壯大不謹自殿下興宫人戲日磾適見之惡其淫亂遂殺弄兒卽日磾長子也丙吉之不伐武帝末吉以故廷尉監徴詔治巫蠱郡邸獄時宣帝生數月以皇曾孫坐衛太子事繫吉哀曾孫無辜擇謹厚女徒令保養曾孫置閒燥處望氣者言長安獄中有天子氣上遣使令一切殺之吉閉門拒使者得全曾孫曾孫病吉數敕乳母加致醫藥視遇甚有恩惠以私財物給其衣食自曾孫遭遇吉絕口不道前思至宫婢則自陳嘗有阿保之功辭引使者丙吉知狀上親見問然後知吉有舊恩而終不言上大賢之制詔丞相封吉為博陽侯蘇武之執節武留匈奴凡十九嵗始以彊壯出及還鬚髪盡白拜爲典屬國可謂難矣言三臣者以諷操也或問厲志曰若殷高宗能葺其德藥瞑眩以瘳疾瞑眩者令人憤悶之意方言云凡飲藥而毒東齊海岱間或謂之暝或謂之眩説命啓乃心沃朕心若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷衞武箴戒於朝武公和釐侯子年九十有五猶箴儆于國曰自卿以下至于師長士苟在朝者無謂我老耄而舍必恪恭于朝以交戒我又作賔之初筵抑戒之詩以自警勾踐懸膽於坐勾踐反國乃苦身焦思置膽於坐坐卧即仰膽飲食亦嘗膽也曰女忘㑹稽之恥耶厲矣哉言此欲獻帝勵志以再振漢業也寵妻愛妾幸矣其為災也深矣災與幸同乎曰得則慶否則災戚氏不幸不人豕戚氏戚夫人也髙帝愛幸戚夫人常從之關東吕后年長常留守希見益䟽屢欲立戚夫人子如意為太子不果髙帝崩吕后乃令永巷囚戚夫人髠鉗衣赭衣令舂未幾鴆殺趙王遂斷戚夫人手足去眼熏耳飲瘖藥使居鞠域中名曰人彘趙昭儀不幸不失命元帝始加昭儀之號位視丞相爵比諸侯王顔師古曰昭顯其儀示隆重也趙昭儀者孝成皇后趙飛燕女弟也后寵衰而絶幸昭儀居昭陽舘顓寵十餘年成帝崩民間歸罪昭儀皇太后詔治問皇帝起居發病狀昭儀自殺栗姬不幸不廢景帝立齊栗姬男為太子長公主嫖有女欲與太子為妃栗姬妬而景帝諸美人皆因長公主見得貴幸栗姬日怨怒謝長主不許㑹薄皇后廢長公主日譖栗姬景帝心銜之而未發也王夫人又隂使人趣六臣立栗姬為皇后大行奏事文曰子以母貴母以子貴今太子母號冝為皇后帝怒遂案誅大行而廢太子為臨江王栗姬愈恚不得見以憂死鉤弋不幸不憂殤鉤弋夫人姓趙氏昭帝母也進為倢伃居鉤弋宫大有寵元始三年生昭帝號鉤弋子任身十四月乃生武帝命其所生門曰堯母門後欲立鉤弋子為皇太子以其年穉母少恐女主顓恣亂國家猶豫久之鉤弋夫人從幸甘泉有過見譴以憂死因葬雲陽非災而何言戚氏昭儀栗姬鉤弋所謂否則災也按靈帝何貴人甚有寵幸性彊忌光和三年立為皇后時王美人任娠畏后乃服藥欲除之而胎安不動後生皇子協即獻帝也何皇后酖殺美人至董卓立獻帝乃遷何皇后於永安宫亦酖弑之悦以美人獻帝母也不得顯言故申漢前事以為鑒戒若慎夫人之知孝文所幸慎夫人在禁中嘗與皇后同席坐袁盎引郤慎夫人夫人怒上亦怒盎曰臣聞尊卑有序則上下和今既已立后慎夫人乃妾耳豈可同坐陛下獨不見人彘乎上悦乃召語慎夫人夫人賜盎金五十斤班婕妤之賢婕妤之號自武帝始位視上卿爵比列侯婕言接幸於上也妤美稱也班婕妤者彪之姑况之女也入後宫始為少使俄而大幸為婕妤居増成舍成帝嘗欲與婕妤同輦載辭止太后以樊姬擬之婕妤每進見上䟽依則古禮至趙飛燕譛告許后婕妤祝詛後宫詈及主上皇后坐廢婕妤以善對免因恐久見危乃求共養太后長信宫明德皇后之德明德馬皇后伏波將軍援之少女為顯宗貴人時賈氏生肅宗帝命貴人養之撫育過於所生後有司奏立長秋宫皇太后曰馬貴人德冠後官郎其人也遂立為皇后愈自謙肅能誦易好讀春秋楚詞尤喜周官董仲舒書常衣大練裙不加縁每於侍執之際輒言及政事多所毘補而未嘗以家私干故寵敬日隆始終無衰邵矣哉邵髙也言慎夫人班婕妤馬皇后所謂德則慶也為世憂樂者君子之志也公於四海覆載之度不為世憂樂者小人之志也私於一已形骸之見太平之世事閑而民樂徧焉君子所樂使遽者揖讓百拜非禮也窘急者無敬故不可以成禮憂者弦歌鼓瑟非樂也愁慼者不和故不可以為樂禮者敬而已矣揖讓百拜云乎樂者和而已矣弦歌鼔瑟云乎匹夫匹婦處𤱶畝之中必禮樂存焉爾敬和斯須不離違上順道謂之忠臣逆君從道所謂違而得道者違道順上謂之䛕臣逆道從君所謂順而失義者忠所以為上也䛕所以自為也忠臣安於心䛕臣安於身故在上者必察乎違順謂違上違道順上順道審乎所為謂為上自為慎乎所安謂安心安身廣川王弗察故殺其臣廣川惠王孫去初年十四五事師受易師數諫正去去益大逐之内史請以為掾師數令内史禁切王家去使奴殺師父子楚恭王察之而遲故有遺言成公十六年楚子救鄭不聽申叔之言及戰吕錡射恭王中目敗於鄢陵至襄公十三年楚子疾告大夫曰不榖不徳少主社稷生十年而䘮先君未及習師保之教訓而應受多福是以不徳而亡師于鄢以辱社稷為大夫憂其弘多矣若以大夫之靈獲保首領以殁於地唯是春秋窀穸之事所以從先君於禰廟者請為靈若厲大夫擇焉此所謂遺言也齊宣王其察之矣故賞諫者宣王喜文學遊説之士自如騶衍淳于髠田駢接子慎到環淵之徒七十六人皆命曰列大夫為開第康莊之衢髙門大屋尊寵之不洽而議論或問人君人臣之戒曰莫匪戒也請問其要曰君戒專欲臣戒專利患之甚矣缺五字城重譯而獻珍非寶也腹心之人匍匐而獻善寶之至矣故明王慎内守除外寇而重内寶雲從于龍風從于虎易曰雲從龍風從虎正義曰龍吟則景雲出虎嘯則谷風生鳳儀于韶書曰簫韶九成鳳凰來麟集于孔哀公十四年春西狩獲麟說左氏者云麟生於火而遊於土中央軒轅大角之獸春秋者禮也脩火德以致其子故麟來而爲孔子瑞也陳欽云麟西方獸孔子立言西方故來劉向尹更始皆以爲應孔子而至賈逵服䖍潁容等皆以爲文成致麟而杜氏悉無所取應也出於此應於彼善則祥祥則福否則眚眚則咎故君子應之言善否感應各從其𩔖君子食和羮以平其氣聽和聲以平其志納和言以平其政履和行以平其德夫酸鹹甘苦不同嘉味以濟謂之和羮宮商角徴不同嘉音以章謂之和聲臧否損益不同中正以訓謂之和言趨舍動静不同雅度以平謂之和行人之言曰唯其言而莫予違也則幾於喪國焉孔子曰君子和而不同俱論語文晏干亦云以水濟水誰能食之琴瑟一聲誰能聽之晏子謂齊侯曰今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專壹誰能聽之同之不可也如是周太史伯告鄭桓公曰聲一無聽物一無文味一無果物一不講詩云亦有和羮既戒且平奏假無言時靡有爭此之謂也詩殷頌文亦晏子所引按後漢劉曼山著辨和同之論則當時在位之闇偽阿媚可知矣至獻帝時尤甚故悦以為言申鑒巻第四
