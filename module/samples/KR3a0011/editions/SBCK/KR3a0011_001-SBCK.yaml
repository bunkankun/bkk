body:
  text: 吳郡黃省曾注政體第一夫道之本仁義而已矣五典以經之羣籍以緯之詠之歌之弦之舞之前鑒既明後復申之故古之聖王其於仁義也申重而已篤序無彊謂之申鑒聖漢統天惟宗時亮其功格宇宙粤有虎臣亂政虎臣漢興輔弼之臣所與共成天功者亂治也治亂謂之亂猶治汙謂之汙也書泰誓曰予有亂臣十人時亦惟荒圯湮治荒曰荒兹洪軌儀鑒于三代之典王允迪厥徳迪蹈也功業有尚天道在爾惟帝茂止古茂通用勉也陟降膚止萬國康止允出兹斯行遠矣立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義此引易繫辭文以見人道惟在仁義為政者當申重之也隂陽以統其精氣所謂在天成象剛柔以品其羣形所謂在地成形仁義以經其事業是為道也此三才之道所以立也故凡政之大經法教而已教者陽之化也教者徳禮之謂法者隂之符也法者政𠛬之謂仁也者慈此者也義也者冝此者也禮也者履此者也信也者守此者也智也者知此者也是故好惡以章之喜怒以涖之哀樂以恤之若乃二端不愆二端者教與法也五德不離五德者仁義禮智信也六節不悖六節者好惡喜怒哀樂也則三才允序五事交備洪範次二曰敬用五事一曰貌二曰言三曰視四曰聰五曰思恭從明聰睿所謂交備也百工惟釐庶績咸熈堯典曰允釐百工庶績咸熈注曰工官釐治庶衆績功咸皆熈廣也天作道皇作極洪範次五曰建用皇極又曰惟皇作極極中也臣作輔民作基輔助也弼也基址也謂臣工恊棐民心鞏固也惟先喆古哲喆通用賔戲曰聖喆之治王之政一曰承天二曰正身三曰任賢四曰恤民五曰明制六曰立業承天惟允正身惟常任賢惟固恤民惟勤明制惟典立業惟敦是謂政體也致治按漢書作政字之術先屏四患乃崇五政一曰偽二曰私三曰放四曰奢偽亂俗私壞法放越􅁤奢敗制四者不除則政末由行矣按漢書矣下有夫字俗亂則道荒雖天地不得保其性矣所謂天生烝民其命匪諶靡不有初鮮克有終者也法壊則世傾雖人主不得守其度矣軌越則禮亡雖聖人不得全其道矣制敗則欲肆雖四表不能充其求矣是謂四患此偽私放奢所以為患而當先屏也按當時如董卓鳴鐘鼓如洛以逐君側之惡為名而實有異志後則劫帝長安欲事成雄據天下偽莫有甚焉者卓以嚴刑脅衆睚眦之隙必報故當時法令苛刻愛憎淫刑更相被誣寃死私莫有甚焉者卓至西京乘青蓋金華車𤓰畫兩轓放莫有甚焉者卓築郿塢髙與長安城埒積穀為三十年儲珠玉錦綺奇玩雜物皆山崇阜積奢莫有甚焉者繼而傕汜擅政曹操柄國率田一軌海内成風故悦以為言興農桑以養其生按漢書作性字審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其法是謂五政民不畏死不可懼以罪老子曰民不畏死柰何以死懼之民不樂生不可觀按漢書作勸字以善雖使卨布五教咎繇作士政不行焉無死之畏法何由施無生之樂教何由立故在上者先豐民財以定其志帝耕籍田后桑蠶宫月令孟春之月乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝籍天子三推三公五推卿諸侯九推又季春之日后妃齋戒親東鄉躬桑祭義曰天子為籍千畝冕而朱紘躬秉耒諸侯為籍百畝冕而青絃躬秉耒以事天地山川社稷先古以為醴酪齊盛於是乎取之敬之至也又古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺􅁄牆而外閉之及大昕之朝君皮弁素積卜三官之夫人世婦之吉者使入𧖟於𧖟室奉種浴于川桑于公桑風戾以食之至漢文帝常詔開籍田而漢制皇后亦帥公卿諸侯夫人蠶此所謂興農桑也國無逰民野無荒業財不虛按漢書作賈字用力不妄加以周民事是謂養生此政之當崇者一也君子之所以動天地應神明正萬物而成王治按漢書作化字者必本乎真實而已故在上者審則儀道以定好惡按漢書作審定好醜焉善惡要於一作乎功罪毁譽效於凖驗聽言責事舉名察實功罪凖驗事實之謂也無或詐偽以蕩衆心故事無不覈物無不切按漢書作功字善無不顯功得其跡也惡無不彰罪得其情也俗無姦怪民無淫風淫過無節也伊訓曰敢有殉于貨色恒干遊畋時謂淫風百姓上下睹利害之存乎已也故肅恭其心慎􅁱其行内不忒按漢書作回字惑外無異望慮其暏去徼倖無罪過不憂懼請謁無所聽一作行財賂無所用則民志平矣是謂正俗此政之當崇者二也君子以情用小人以刑用俗本誤作形榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭扑以加小人治按漢書作化字其刑也在手曰梏在足曰桎重者鞭以治之輕者扑以撻之扑榎楚也周禮掌囚凡囚者上罪梏拲而桎中罪桎梏下罪梏滌狼氏誓大夫曰敢不𨵿鞭五百虞典曰鞭作官刑扑作教刑君子不犯辱況於𠛬乎刑不能以逮君子小人不忌𠛬況於辱乎辱不足以治小人若夫中人之倫則刑禮兼焉教化之廢推中人而墜於小人之域教化之行引中人而納於君子之塗塗路也是謂章化此政之當崇者三也小人之情緩則驕驕則恣恣則急急則怨怨則畔危則謀亂安則思欲非威强無以懲之故在上者必有武備以戒不虞易曰君子以除戎器戒不虞以遏宼虐詩民勞曰式遏寇虐俗本誤作虞安居則寄之内政國語桓公曰國安矣吾欲從事於諸侯其可乎管子對曰未可君若正卒伍修甲兵則大國亦將正卒伍修甲兵則難以速得志矣君有攻伐之器小國諸侯有守禦之備則難以速得志矣君若欲速得志於天下諸侯則事可以隱令可以寄政桓公曰為之若何管子曰作内政而寄軍令焉韋昭解曰内政國政也因治政以寄軍令若有征伐鄰國不知也有事則用之軍旅是謂秉威此政之當崇者四也賞罰政之柄也明賞必罰審信慎令賞以勸善罰以懲惡人主不妄賞非徒愛其財也賞妄行則善不勸矣不妄罰非徒慎其刑按漢書作矜其人也罰妄行則惡不懲矣賞不勸謂之止善賞及淫人則善無所勸而為善者止矣罰不懲謂之縱惡罰及吉人則惡無所懲而為惡者縱矣在上者能不止下為善不縱下為惡則國治矣按漢書作國法立矣是謂統法此政之當崇者五也四患既蠲五政既按漢書作又字立行之以誠守之以固簡而不怠䟽而不失老子曰天網恢恢踈而不失無為為之使自施之無事事之使自交之老子曰為無為事無事不肅而治按漢書此下有不嚴而化一句垂拱揖遜按漢書作讓字而海内平矣是謂為政之方也惟六則以立道經一曰中二曰和三曰正四曰公五曰誠六曰通以天道作中以地道作和以仁德作正以事物作公以身極作誠以變數作通易傳曰通其變又曰變則通是謂道實惟恤十難以任賢能周禮注賢謂有徳行者能謂有道藝者一曰不知二曰不進有知而不能進者三曰不任有進而不能任者四曰不終有任而不能終者五曰以小怨棄大德六曰以小過黜大功七曰以小失掩大美八曰以姧訐傷忠正九曰以邪說亂正度十曰以䜛嫉廢賢能賢能所以不進不任不終者不過以小怨小過小失姧訐邪説䜛嫉數端妨之而已故歷言之以足十難是謂十難十難不除則賢臣不用用臣不賢則國非其國也惟察九風以定國常一曰治二曰衰三曰弱四曰乖五曰亂六曰荒七曰叛八曰危九曰亡君臣親而有禮百僚僚官也書臯陶謨曰百僚師師和而不同讓而不爭勤而不怨無事惟職是司皆言百僚此治國之風也如唐虞三代盛時所謂治國之風禮俗不一教化不治不能大同位職不重小臣䜛嫉庶人作議論語曰天下有道則庶人不議此衰國之風也君好讓一作嫌臣好逸士好遊民好流萬民離散不安其居如水之流也此弱國之風也君臣爭名朝廷爭功士大夫爭名庶人爭利此乖國之風也上多欲下多端法不定政多門不統于此亂國之風也以侈為愽以㐾為髙以濫為通遵禮謂之劬守法謂之固以遵禮者為勞苦以守法者為執滯此荒國之風也以苛為密苛謂法令煩細以利為公以割下為能以附上爲忠此叛國之風也上下相䟽內外相蒙互相欺蔽小臣爭寵大臣爭權當時如進讓相謀氾傕相𨷖皆爭權之𩔖此危國之風也上不訪下不諫君無咨詢臣無納忠婦言用政由房闥私政行此亡國之風也故上必察乎國風也惟愼庶獄以昭人情天地之大德曰生易繋辭文萬物之大極曰死洪範六極一曰凶短折死者不可以生刑者不可以復漢文帝十三年齊大倉令淳寸公有罪當刑其少女緹縈上書謂死者不可復生刑者不可復屬雖欲改過自新其道無繇也故先王之刑也官師以成之周禮鄉士遂士縣士方士各職聽于朝司寇聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中所謂官師以成之也棘槐以斷之周禮朝士掌建􅀖外朝之法左九棘孤􅀸大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後左嘉石平罷民焉右肺石達窮民焉又王制曰成獄辭史以獄成告寸正正聽之正以獄成告于大司寇大司寇聽之棘木之下大司寇以獄之成告於王王命三公參聽之三公以獄之成告于王王三宥然後制刑所謂棘槐以斷之也情訊以寛之周禮司刺掌三刺三宥三赦之法以賛司寇聽獄訟壹刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民壹宥曰不識再宥曰過失三宥曰遺忘壹赦曰幼弱再赦曰老耄三赦曰憃愚以此三法者求民情斷民中而施上服下服之罪然後刑殺所謂情訊以寛之也朝市以共之周禮掌囚及刑殺告𠛬于王奉而適朝士加明梏以適市而刑殺之所謂朝市以共之也矜哀以恤之刑斯斷樂不舉施刑之日則弛縣慎之至也刑哉刑哉其慎矣夫惟稽五赦以綏民中一曰原心心可矜也二曰明德德可釋也三曰勸功功可凖也四曰襃化化所關也五曰權計權時之冝非常典也凡先王之攸赦必是族也非是族焉𠛬兹無赦族類也即祭法非此族也不在祀典之族天子有四時朝以聽政晝以訪問夕以􅁱令# SB1_0336-033.png# page missing四表定矣身􅁱家齊而左右㒺非正人則内正立矣四表四外猶言四方也四方定則國治天下平矣問通於道者其守約孟子曰守約而施博者善道也有一言而可常行者恕也論語子貢問有一言而可以終身行之者乎子曰其恕乎有一行而可常履者正也恕者仁之術也孟子曰强恕而行求仁莫近焉正者義之要也至哉此謂道根萬化存焉爾仁義而天下之理得矣是謂不思而得不為而成執之胷心之間而功覆天下也守約施博自天子達於庶人好惡哀樂其􅁱一也豐約勞佚各有其制言上下情無不同其貴豐而逸賤約而勞者分殊爾上足以備禮下足以備樂夫是謂大道天下國家一體也君為元首臣為股肱書曰元首明哉股肱良哉民為手足元首股肱手足言一體下有憂民則上不盡樂下有饑民則上不備膳下有寒民則上不具服徒跣而垂旒非禮也下民憂而上盡樂下民饑而上備膳下民寒而上具服所謂徒跣而垂旒故足寒傷心民寒傷國問君以至美之道道民民以至美之物養君美道五典之類美物五穀之類君降其惠民升其功此無徃不復相報之義也故太平備物非極欲也物損禮闕年凶眚禮非謙約也其數云爾問人主有公賦無私求有公用無私費有公役無私使有公賜無私惠有公怒無私怨私求則下煩而無度是謂傷淸私費費出無經則官耗府庫空虚而無限是謂傷制私使則民撓擾而無節是謂傷義義謂使民之義私惠則下虛望而無凖是謂傷正正謂賜予之正私怨則下疑懼而不安是謂傷德問善治民者治其性也或曰冶金而流去火則剛激水而升舍之則降惡平聲乎治曰不去其火則常流激而不止則常升金流水升喻民治也故大冶之爐可使無剛説文曰冶消也又爐鑄謂之冶尸子曰蚩尤造九冶又鑄匠曰冶踊水之機可使無降莊子子貢謂漢隂丈人曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎為圃者仰而視之曰柰何曰鑿木為機後重前輕挈水若抽數如泆湯其名曰橰悦所謂機蓋是類也善立教者若兹則終身治矣故凡器可使與顔冉同趨凡常也善立教者愚可使賢投百金於前白刃加其身雖巨跖弗敢掇也利在前刑在後則畏而止矣巨跖莊子栁下季之弟名曰盜跖從卒九千人横行天下侵暴諸侯穴室樞户驅人牛馬取人婦女善立法者若兹則終身不掇矣故跖可使與伯夷同功善立法者貪可使廉問民由水也濟大川者太上乘舟其次泅泅浮行水上也泅者勞而危乘舟者逸而安虛入水既不乘舟又不能泅所謂虛入水也則必溺矢以知能治民者泅也以道德治民者舟也縱民之情謂之亂絶民之情謂之荒上無道徳次無智能所謂亂與荒也曰然則如之何曰為之限使勿越也不縱不絶為之界限使不得逾分為之地亦勿越故水可使不濫不可使無流猶民可使不越不可使無情欲也善禁者先禁其身而後人不善禁者先禁人而後身善禁之至於不禁上既正則民不禁自正令亦如之若乃肆情於身而繩欲於衆行詐於官而矜實於民求已之所有餘奪下之所不足捨已之所易責人之所難怨之本也凡此皆所謂先禁人而後身者不惟不能禁人而民怨集矣謂理之源斯絕矣先禁其身者理之源也自上御下猶夫釣者焉隱於手按手下當有而字應於鈎則可以得魚自近御遠猶夫御馬焉和於手而調於銜馬口勒也則可以使馬故至道之要不於身非道也暏孺子之驅雞也而見御民之方孺子驅雞者急則驚緩則滯急急驅之緩緩驅之皆非所以驅雞也悅之取喻卽其所謂小人之情緩則驕驕則恣急則怨怨則畔爾方其北也遽要之則折而過南方其南也遽要之則折而過北迫則飛疎則放過南過北飛放者皆不循路入門也志閑則比之比近也竢雞志閑然後近之則不驚流緩而不安則食之食之則不滯不驅之驅驅之至者也比之食之不驅之驅也志安則循路而入門太上不空市其次不偷竊其次不掠奪上以功惠綏民下以財力奉上即悦所謂君降其惠民升其功是以上下相與空市則民不與民不與則為巧詐而取之謂之偷竊偷竊則民備之備之而不得不得巧詐而取也則暴迫而取之謂之掠奪民必交爭則禍亂矣或曰聖王以天下為樂曰否聖王以天下為憂如帝堯存心天下加志窮民一民饑曰我饑之一民寒曰我寒之一民有罪曰我䧟之是已天下以聖王為樂如帝堯之世天下大和耕田鑿井歌於擊壤立我烝民謡於康衢是已凡主以天下為樂如履癸傾宫瑶臺肉山脯林酒池糟堤以為樂者是已天下以凡主為憂如夏邑民曰時日曷喪予及汝偕亡是已聖王屈巳以申天下之樂屈已而憂凡主申巳以屈天下之憂申巳而樂申天下之樂故樂亦報之民樂則聖王必享其樂屈天下之憂故憂亦及之民憂則凡主必至於憂天下之道也治世所貴乎位者三一曰逹道於天下二曰達恵於民三曰達德於身道非位不行惠非位不降德非位不顯治世之所貴者此也衰世所貴乎位者三一曰以貴髙人二曰以富奉身三曰以報肆心勢非位不隆欲非位不厭讎非位不報衰世之所貴者此也治世之位真位也衰世之位則生災矣苟高人則必損之災也苟奉身則必遺之災也苟肆心則必否之災也治世之臣所貴乎順者三一曰心順二曰職順三曰道順此下疑脱衰世之臣所貴乎順者三一曰體順二曰亂順三曰事順二十二字治世之順真順也衰世之順生逆也當作則生逆矣體苟順則逆節逆節則心不順矣亂苟順則逆忠逆忠則職不順矣事苟順則逆道逆道則道不順矣高下失序則位輕班級不固則位輕漢爵有二十級禄薄卑寵則位輕官職屢改則位輕遷轉煩瀆則位輕黜陟不明則位輕黜退降也陟升進也舜典曰三載考績三考黜陟幽明待臣不以禮則位輕夫位輕而政重者未之有也聖人之大寳曰位易繫辭文輕則喪吾寳也好惡之不行其俗尚矣嘉守節而輕狹陋疾威福而尊權右賤求欲而崇克濟貴求己而榮華譽萬物類是已夫心與言言與事參相應也好惡毀譽賞罰參相福也六者有失六者謂好惡毀譽賞罰有失謂不能詢事考言占外知内而謬施之則實亂矣守實者益榮求已者益達處幽者益明然後民知本也申鑒卷第一
