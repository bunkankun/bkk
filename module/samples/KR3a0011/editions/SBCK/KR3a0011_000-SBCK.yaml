body:
  text: 申鑒注序班史載劉向稱賈􅁩通達國體伊管未能遠過今觀其著述采掇于傳中者其論甚美蓋信乎其然也荀悅作申鑒范史亦稱悅通見政體掇其篇首數百言見之其傳且謂其所爲漢紀論辨多美今仲豫書具在也然則仲豫亦長沙之流亞乎􅁩言當方興有道之朝雖爲庸臣所害而不害其畧施行矣悅言適垂盡無用之世有如昔人切於世事者乎上雖善之奚益悅辟曹操府與從弟或北海孔融同侍講中禁獻替問莫能􅀡遂融彧前後死賊手勢益孤是書之作如之何其敢及也於戲正色抗情者生不足樂文舉之被戮無羡仲豫之生功申運攺者死抱餘恨仲豫之幸存未必不如文若之死士有經世志畧孰不願得所天而事之顧所遭何如所自爲處何如耳悅於所遭與􅁩異所自處異乎融曁彧矣吳郡黃君勉之爲申鑒注其眞有所感其學岀而効用當炳焉恭焉流聲實於天朝尚何悅之慕㢤正徳十四年歳在巳丣冬十月旣望光䘵大夫柱國少傳兼太子太傅户部尚書武英殿大學士致仕王鏊序# SB1_0336-008.png申鑒注序申鑒五􅃃漢荀悅著悅仕獻帝朝辟􅔟操府與孔融及弟彧同侍講禁中悅每有獻替而意有未盡此申鑒𫠦爲作者葢有志於經世也然當時政體顧有大於總􅄃機務使權不下移者乎而曾無一言及之何㢤厥後融以論建漸廣彧以不阿九錫皆不得其𣦸悅獨優游以壽終其亦善䖏濁世者矣其論政體無賈誼之經制而近於醕無劉向之憤激而長於諷其襍言等篇頗似揚雄法言雄曲意美新而悅無一言及於操視雄爲優矣或言悅書似徐幹五符考其㱕茲若人之儔乎吾未知𫠦先後也而三品之說昌黎公有取焉其書世亦罕傳吾蘇黄勉之好蓄異書又爲之訓釋搜討磔裂岀入五經三史春秋内外傳老莊淮南素難天官地志博洽精密多得悅旨雖然悅之書其有𫠦感而爲乎勉之之注豈亦有感而爲乎勉之春秋方富行將抒如䟦君注者之所云乎君青年博學精義理工文詞凢古今載籍奇探𧷤舉胡乃屑注是書吾固知其有所感而爲也悅是書視賈􅁩新書大抵相𩔖皆欲以經世者太𫝊五十八篇予嘗手加編次訂正至訛誤處不敢不闕其疑是五篇者宋尤袤刻寘江西漕臺時巳云其簡編脫繆字畫差舛君兹所注得微其本歟有功仲豫多矣幸併予所疑於太𫝊書者􅀘其闕焉亦二子身後之一遭也嘉靖乙酉十一月冬至日郴燕泉何孟春子元父序注申鑒序荀􅀸五十遊齊在襄王時爲老師被䜛適楚處濁世亡國亂君之間著書數萬言而竟無所施究悲哉逮十三世而有悅其所遭之時如􅀸然故托疾隱居然不能高􅀷丘壑至建安初辟於操府遷黃門侍郎時從弟彧適守尚書令而孔融自山東徵來以是得同侍講中禁濟經之務頗相討論但政移曹氏天子尸居雖有嘉猷將安用之悅恐意藴終不得披露遂拾漢故新事及所欲獻賛者爲申鑒五篇以奏鳴呼亦徒空言也矣厥後篡業日開蘭凋玉玷麟囚鳯戮而悅獨晏然保首領以没者良以融頻寓書規操而操軍國之事必籌於彧由此戾忤而不免也悅於見幾君子誠若有愧然立漢庭十二年清虚沈靜未嘗效一言於操不其賢歟不其賢歟予嘗悲其所遭而讀其書間窺其領要遂爲之注浹旬而成共得萬四千餘言以笥藏之雖不能無揭竿求海之病而事可證引者亦略具矣若其􅀷詞奧義譌文脫簡則竢大方君子覽而正焉正德己卯秋九月望吳郡黃省曾序
