body:
  text: 吳郡黃省曾注政體第一夫道之本仁義而已矣五典以經之羣籍以緯之詠之歌之弦之舞之前鑒既明後復申之故古之聖王其於仁義也申重而已篤序無彊謂之申鑒聖漢統天惟宗時亮其功格宇宙粤有虎臣亂政與共成天功者亂治也虎臣漢興輔弼之臣所也書泰誓曰予有亂臣十人治亂謂之亂猶治汙謂之汙時亦惟荒圯湮曰荒治荒兹洪軌儀鑒于三代之典王允迪厥徳也迪蹈功業有尚天道在爾惟帝茂止通用勉古茂也陟降膚止萬國康止允出兹斯行遠矣立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義在仁義為政者當申重之也此引易繫辭文以見人道惟隂陽以統其精氣天成象所謂在剛柔以品其羣形地成形所謂在仁義以經其事業是為道也之道所此三才也以立故凡政之大經法教而已教者陽之化也禮之謂教者徳法者隂之符也刑之謂法者政仁也者慈此者也義也者冝此者也禮也者履此者也信也者守此者也智也者知此者也是故好惡以章之喜怒以涖之哀樂以恤之若乃二端不愆與法也二端者教五德不離禮智信也五德者仁義六節不悖喜怒哀樂也六節者好惡則三才允序五事交備視四曰聰五曰思恭從明聰睿所謂交備也洪範次二曰敬用五事一曰貌二曰言三曰百工惟釐庶績咸熈咸熈注曰工官釐治庶堯典曰允釐百工庶績皆熈廣也衆績功咸天作道皇作極皇極又曰惟皇作洪範次五曰建用中也極極臣作輔民作基臣工恊棐民心鞏固也輔助也弼也基址也謂惟先喆戲曰聖喆之治古哲喆通用賔王之政一曰承天二曰正身三曰任賢四曰恤民五曰明制六曰立業承天惟允正身惟常任賢惟固恤民惟勤明制惟典立業惟敦是謂政體也致治漢按政字書作之術先屏四患乃崇五政一曰偽二曰私三曰放四曰奢偽亂俗私壞法放越軌奢敗制四者不除則政末由行矣下有夫字按漢書矣俗亂則道荒雖天地不得保其性矣烝民其命所謂天生鮮克有終者也匪諶靡不有初法壊則世傾雖人主不得守其度矣軌越則禮亡雖聖人不得全其道矣制敗則欲肆雖四表不能充其求矣是謂四患時如董卓鳴鐘鼓如洛以逐君側之惡為此偽私放奢所以為患而當先屏也按當天下偽莫有甚焉者卓以嚴刑脅衆睚眦之名而實有異志後則劫帝長安欲事成雄據誣寃死私莫有甚焉者卓至西京乘青蓋金隙必報故當時法令苛刻愛憎淫刑更相被與長安城埒積穀為三十年儲珠玉錦綺奇華車瓜畫兩轓放莫有甚焉者卓築郿塢髙汜擅政曹操柄國率田一軌海内成風故悦玩雜物皆山崇阜積奢莫有甚焉者繼而傕言以為興農桑以養其生作性字按漢書審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其法是謂五政民不畏死不可懼以罪柰何以死懼之老子曰民不畏死民不樂生不可觀漢按勸字書作以善雖使卨布五教咎繇作士政不行焉無生之樂教何由立無死之畏法何由施故在上者先豐民財以定其志帝耕籍田后桑蠶宫月乃擇元辰月令孟春之公九卿諸侯大夫躬耕帝籍天子三推三公天子親載耒耜措之于參保介之御間帥三東鄉躬桑祭義曰天子為籍千畝冕而朱紘五推卿諸侯九推又季春之日后妃齋戒親事天地山川社稷先古以為醴酪齊盛於是躬秉耒諸侯為籍百畝冕而青絃躬秉耒以桑蠶室近川而為之築宫仞有三尺棘牆而乎取之敬之至也又古者天子諸侯必有公夫人世婦之吉者使入𧖟於𧖟室奉種浴于外閉之及大昕之朝君皮弁素積卜三官之籍田而漢制皇后亦帥公卿諸侯夫人蠶此川桑于公桑風戾以食之至漢文帝常詔開農桑也所謂興國無逰民野無荒業財不虛作賈字按漢書用力不妄加以周民事是謂養生崇者一也此政之當君子之所以動天地應神明正萬物而成王治作化字按漢書者必本乎真實而已故在上者審則儀道以定好惡定好醜焉按漢書作審善惡要於乎一作功罪毁譽效於凖驗聽言責事舉名察實罪功之謂也凖驗事實無或詐偽以蕩衆心故事無不覈物無不切作功字按漢書善無不顯跡也功得其惡無不彰情也罪得其俗無姦怪民無淫風伊訓曰敢有淫過無節也遊畋時謂淫風殉于貨色恒干百姓上下睹利害之存乎已也故肅恭其心慎脩其行内不忒作回字按漢書惑外無異望慮其暏去徼倖無罪過不憂懼請謁無所聽行一作財賂無所用則民志平矣是謂正俗崇者二也此政之當君子以情用小人以刑用作形俗本誤榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭扑以加小人治作化字按漢書其刑也以治之輕者扑以撻之扑榎在手曰梏在足曰桎重者鞭桎梏下罪梏滌狼氏誓大夫曰敢不關鞭五楚也周禮掌囚凡囚者上罪梏拲而桎中罪官刑扑作教刑百虞典曰鞭作君子不犯辱況於刑乎能以刑不子逮君小人不忌刑況於辱乎治小人辱不足以若夫中人之倫則刑禮兼焉教化之廢推中人而墜於小人之域教化之行引中人而納於君子之塗也塗路是謂章化崇者三也此政之當小人之情緩則驕驕則恣恣則急急則怨怨則畔危則謀亂安則思欲非威强無以懲之故在上者必有武備以戒不虞戎器戒不虞易曰君子以除以遏宼虐虐俗本誤作虞詩民勞曰式遏寇安居則寄之内政桓公國語曰未可君若正卒伍修甲兵則大國亦將正曰國安矣吾欲從事於諸侯其可乎管子對器小國諸侯有守禦之備則難以速得志矣卒伍修甲兵則難以速得志矣君有攻伐之可以寄政桓公曰為之若何管子曰作内政君若欲速得志於天下諸侯則事可以隱令治政以寄軍令若有征伐鄰國不知也而寄軍令焉韋昭解曰内政國政也因有事則用之軍旅是謂秉威崇者四也此政之當賞罰政之柄也明賞必罰審信慎令賞以勸善罰以懲惡人主不妄賞非徒愛其財也賞妄行則善不勸矣不妄罰非徒慎其刑矜其人按漢書作也罰妄行則惡不懲矣賞不勸謂之止善人則善賞及淫善者止矣無所勸而為罰不懲謂之縱惡惡無所懲而罰及吉人則縱矣為惡者在上者能不止下為善不縱下為惡則國治矣國法立矣按漢書作是謂統法崇者五也此政之當四患既蠲五政既作又字按漢書立行之以誠守之以固簡而不怠䟽而不失恢踈而不失老子曰天網恢無為為之使自施之無事事之使自交之為無為老子曰事事無不肅而治不嚴而化一句按漢書此下有垂拱揖遜漢按讓字書作而海内平矣是謂為政之方也惟六則以立道經一曰中二曰和三曰正四曰公五曰誠六曰通以天道作中以地道作和以仁德作正以事物作公以身極作誠以變數作通又曰變則通易傳曰通其變是謂道實惟恤十難以任賢能者能謂有道藝者周禮注賢謂有徳行一曰不知二曰不進能進者有知而不三曰不任而不有進者能任四曰不終能終者有任而不五曰以小怨棄大德六曰以小過黜大功七曰以小失掩大美八曰以姧訐傷忠正九曰以邪說亂正度十曰以䜛嫉廢賢能者不過以小怨小過小失賢能所以不進不任不終而已故歷言之以足十難姧訐邪説䜛嫉數端妨之是謂十難十難不除則賢臣不用用臣不賢則國非其國也惟察九風以定國常一曰治二曰衰三曰弱四曰乖五曰亂六曰荒七曰叛八曰危九曰亡君臣親而有禮百僚謨曰百僚師師僚官也書臯陶和而不同讓而不爭勤而不怨無事惟職是司言皆僚百此治國之風也所謂治國之風如唐虞三代盛時禮俗不一不能大同教化不治位職不重小臣䜛嫉庶人作議道則庶人不議論語曰天下有此衰國之風也君好讓嫌一作臣好逸士好遊民好流居如水之流也萬民離散不安其此弱國之風也君臣爭名朝廷爭功士大夫爭名庶人爭利此乖國之風也上多欲下多端法不定政多門于不統此亂國之風也以侈為愽以㐾為髙以濫為通遵禮謂之劬守法謂之固以守法者為執滯以遵禮者為勞苦此荒國之風也以苛為密令煩細苛謂法以利為公以割下為能以附上爲忠此叛國之風也上下相䟽內外相蒙相互蔽欺小臣爭寵大臣爭權傕相鬪皆爭權之類當時如進讓相謀氾此危國之風也上不訪下不諫臣無納忠君無咨詢婦言用房闥政由私政行此亡國之風也故上必察乎國風也惟愼庶獄以昭人情天地之大德曰生辭文易繋萬物之大極曰死曰凶短折洪範六極一死者不可以生刑者不可以復淳寸公有罪當刑其少女漢文帝十三年齊大倉令可復屬雖欲改過自新其道無繇也緹縈上書謂死者不可復生刑者不故先王之刑也官師以成之士各職聽于朝司寇聽周禮鄉士遂士縣士方其法以議獄訟獄訟成士師受中所謂官師之斷其獄弊其訟于朝羣士司刑皆在各麗之也以成棘槐以斷之法左九棘孤卿大夫位焉周禮朝士掌建邦外朝之在其後面三槐三公位焉州長衆庶在其後羣士在其後右九棘公侯伯子男位焉羣吏曰成獄辭史以獄成告寸正正聽之正以獄左嘉石平罷民焉右肺石達窮民焉又王制寇以獄之成告於王王命三公參聽之三公成告于大司寇大司寇聽之棘木之下大司後制刑所謂棘槐以斷之也以獄之成告于王王三宥然情訊以寛之禮周訟壹刺曰訊羣臣再刺曰訊羣吏三刺曰訊司刺掌三刺三宥三赦之法以賛司寇聽獄壹赦曰幼弱再赦曰老耄三赦曰憃愚以此萬民壹宥曰不識再宥曰過失三宥曰遺忘之罪然後刑殺所謂情訊以寛之也三法者求民情斷民中而施上服下服朝市以共之朝士加明梏以適市而刑殺之所謂周禮掌囚及刑殺告刑于王奉而適共之也朝市以矜哀以恤之刑斯斷樂不舉日則弛施刑之縣慎之至也刑哉刑哉其慎矣夫惟稽五赦以綏民中一曰原心矜也心可二曰明德釋也德可三曰勸功凖也功可四曰襃化關也化所五曰權計非常典也權時之冝凡先王之攸赦必是族也非是族焉刑兹無赦族也不在祀典之族族類也即祭法非此天子有四時朝以聽政晝以訪問夕以脩令四表定矣正立矣四表四外猶言四方也四身脩家齊而左右㒺非正人則内天下平矣方定則國治問通於道者其守約施博者善道也孟子曰守約而有一言而可常行者恕也以終身行之者乎子曰其論語子貢問有一言而可乎恕有一行而可常履者正也恕者仁之術也行求仁莫近焉孟子曰强恕而正者義之要也至哉此謂道根萬化存焉爾之理得矣仁義而天下是謂不思而得不為而成執之胷心之間而功覆天下也約守博施自天子達於庶人好惡哀樂其脩一也豐約勞佚各有其制而逸賤約而勞者分殊爾言上下情無不同其貴豐上足以備禮下足以備樂夫是謂大道天下國家一體也君為元首臣為股肱哉股肱良哉書曰元首明民為手足足言一體元首股肱手下有憂民則上不盡樂下有饑民則上不備膳下有寒民則上不具服徒跣而垂旒非禮也下民饑而上備膳下民憂而上盡樂所謂徒跣而垂旒下民寒而上具服故足寒傷心民寒傷國問君以至美之道道民民以至美之物養君美物五穀之類美道五典之類君降其惠民升其功此無徃不復相報之義也故太平備物非極欲也物損禮闕眚禮年凶非謙約也其數云爾問人主有公賦無私求有公用無私費有公役無私使有公賜無私惠有公怒無私怨私求則下煩而無度是謂傷淸私費無經費出則官耗空虚府庫而無限是謂傷制私使則民撓擾而無節是謂傷義民之義義謂使私惠則下虛望而無凖是謂傷正予之正正謂賜私怨則下疑懼而不安是謂傷德問善治民者治其性也或曰冶金而流去火則剛激水而升舍之則降惡聲平乎治曰不去其火則常流激而不止則常升喻民治也金流水升故大冶之爐可使無剛謂之冶尸子曰蚩尤造説文曰冶消也又爐鑄匠曰冶九冶又鑄踊水之機可使無降漢隂丈人曰莊子子貢謂夫子不欲乎為圃者仰而視之曰柰何曰鑿有械於此一日浸百畦用力甚寡而見功多湯其名曰橰悦所謂機蓋是類也木為機後重前輕挈水若抽數如泆善立教者若兹則終身治矣故凡器可使與顔冉同趨者愚可使賢凡常也善立教投百金於前白刃加其身雖巨跖弗敢掇也矣巨跖莊子栁下季之弟利在前刑在後則畏而止諸侯穴室樞户驅人牛馬取人婦女名曰盜跖從卒九千人横行天下侵暴善立法者若兹則終身不掇矣故跖可使與伯夷同功貪可使廉善立法者問民由水也濟大川者太上乘舟其次泅浮泅上也行水泅者勞而危乘舟者逸而安虛入水不既所謂虛入水也乘舟又不能泅則必溺矢以知能治民者泅也以道德治民者舟也縱民之情謂之亂絶民之情謂之荒能所謂亂與荒也上無道徳次無智曰然則如之何曰為之限使勿越也限使不得逾分不縱不絶為之界為之地亦勿越故水可使不濫不可使無流可使無情欲也猶民可使不越不善禁者先禁其身而後人不善禁者先禁人而後身善禁之至於不禁不禁自正上既正則民令亦如之若乃肆情於身而繩欲於衆行詐於官而矜實於民求已之所有餘奪下之所不足捨已之所易責人之所難怨之本也不惟不能禁人而民怨集矣凡此皆所謂先禁人而後身者謂理之源斯絕矣理之源也先禁其身者自上御下猶夫釣者焉隱於手有而字按手下當應於鈎則可以得魚自近御遠猶夫御馬焉和於手而調於銜勒也馬口則可以使馬故至道之要不於身非道也暏孺子之驅雞也而見御民之方孺子驅雞者急則驚緩則滯非所以驅雞也悅之取急急驅之緩緩驅之皆驕驕則恣急則怨怨則畔爾喻卽其所謂小人之情緩則方其北也遽要之則折而過南方其南也遽要之則折而過北迫則飛疎則放皆不循路入門也過南過北飛放者志閑則比之然後近之則不驚比近也竢雞志閑流緩而不安則食之不滯食之則不驅之驅驅之至者也驅之驅也比之食之不志安則循路而入門太上不空市其次不偷竊其次不掠奪上以功惠綏民下以財力奉上其惠民升其功即悦所謂君降是以上下相與空市則民不與民不與則為巧詐而取之謂之偷竊偷竊則民備之備之而不得而取也不得巧詐則暴迫而取之謂之掠奪民必交爭則禍亂矣或曰聖王以天下為樂曰否聖王以天下為憂饑之一民寒曰我寒之一民有罪曰我䧟如帝堯存心天下加志窮民一民饑曰我已之是天下以聖王為樂和耕田鑿井歌於擊如帝堯之世天下大於康衢是已壤立我烝民謡凡主以天下為樂宫瑶臺肉如履癸傾以為樂者是已山脯林酒池糟堤天下以凡主為憂民曰時如夏邑汝偕亡是已日曷喪予及聖王屈巳以申天下之樂而憂屈已凡主申巳以屈天下之憂而樂申巳申天下之樂故樂亦報之必享其樂民樂則聖王屈天下之憂故憂亦及之必至於憂民憂則凡主天下之道也治世所貴乎位者三一曰逹道於天下二曰達恵於民三曰達德於身位不降德非位不道非位不行惠非貴者此也顯治世之所衰世所貴乎位者三一曰以貴髙人二曰以富奉身三曰以報肆心不隆欲勢非位衰世之所貴者此也非位不厭讎非位不報治世之位真位也衰世之位則生災矣苟高人則必損之災也苟奉身則必遺之災也苟肆心則必否之災也治世之臣所貴乎順者三一曰心順二曰職順三曰道順者三一曰體順二曰亂順三曰此下疑脱衰世之臣所貴乎順十二字事順二治世之順真順也衰世之順生逆也生逆矣當作則體苟順則逆節不順矣逆節則心亂苟順則逆忠不順矣逆忠則職事苟順則逆道不順矣逆道則道高下失序則位輕班級不固則位輕二十級漢爵有禄薄卑寵則位輕官職屢改則位輕遷轉煩瀆則位輕黜陟不明則位輕也舜典曰三載考黜退降也陟升進陟幽明績三考黜待臣不以禮則位輕夫位輕而政重者未之有也聖人之大寳曰位辭文易繫輕則喪吾寳也好惡之不行其俗尚矣嘉守節而輕狹陋疾威福而尊權右賤求欲而崇克濟貴求己而榮華譽萬物類是已夫心與言言與事參相應也好惡毀譽賞罰參相福也六者有失者六詢事考言占外知内而謬施之謂好惡毀譽賞罰有失謂不能則實亂矣守實者益榮求已者益達處幽者益明然後民知本也申鑒卷第一
