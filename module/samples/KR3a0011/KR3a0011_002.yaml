body:
  text: 吳郡黃省曾注時事第二最凡有二十一首其初二首尚知貴敦也其二首有申重可舉者十有九事一曰明考試二曰公卿不拘為郡二千石不拘為縣三曰置上武之官四曰議州牧五曰生刑而死者但加肉刑六曰德刑並用七曰避讎有科八曰議禄九曰議專地十曰議錢貨十一曰約祀舉重十二曰天人之應十三曰月正聽朝十四曰崇内教十五曰備博士十六曰至德要道十七曰禁數赦令十八曰正尚主之制十九曰復外内注記者盤庚遷殷革奢即約八遷始居毫自湯至盤盤庚殷王名自契至湯具貝玉總貨實為戒乃革奢即約之類庚五遷乃陟河南復湯故居行湯之政以化而裁之與時消息衆寡盈虛不常厥道尚知貴敦古今之法也民寡則用易足土廣則物易生事簡則業易定厭亂則思治創難則思静爭相代立比九世亂於是諸侯莫朝殷自中丁以來廢適而更立諸弟子或或曰三皇民至敦也其治至清也天性乎曰皇民敦秦民弊時也故敦弊不同皇秦之時不同山民樸市民玩處也故樸玩不同山市之處不同桀紂不易民而亂湯武不易民而治政也同故治亂不同桀紂湯武之政不皇民寡寡斯敦機智不生所以至敦三皇之時蒸庶鮮少皇治純純斯淸繁苛不尚所以至淸三皇之治無為而化奚惟性不求無益之物不蓄難得之貨節華麗之飾退利進之路則民俗淸矣簡小忌去淫祀絶竒怪則妋僞息矣致精誠求諸已正大事則神明應矣放邪說去淫智抑百家亂之言諸子殽崇聖典則道義定矣去浮華舉功實絕末伎同本務則事業脩矣初二首所謂尚知貴敦也能盡五事則民敦治清矣此誰毀誰譽譽其有試者萬事之概量也曰吾孔子矣概所以戞摩取平者斗斛曰量言考試品之於人也誰毀誰譽如有所譽者其有所試較米粟之多寡也賢能之虚實猶概量以玆舉者試其事處斯職者考其績省績察職詢事驗舉賞罰夫實以惡反之人焉飾哉語曰盜跖不能盜田尺寸寸不可盜況尺乎不可閟掩纎惡細善夫事驗必若上田之張於野也則為私者寡矣者喻惡不可掩也田布於野不可隱若亂之墜於澳也則可信者解矣之截流横渡亂朱子日舟陸不可信者喻善不可偽也者澳厓内近水之處舟登於故有事考功有言考用動則考行靜則考守明考試也此一首所謂公卿不為郡二千石不為縣未是也公師傅公謂三尉縣謂縣令縣長也班固曰郡守秦官掌治保也卿謂六卿冡宰至司空也郡謂郡守郡卒秩比二千石縣令長皆秦官掌治其縣萬其郡秩二千石郡尉秦官掌佐守典武職甲萬戸為長秩五百石至三百石户以上為令秩千石至六百石減小能其職以極登於大故下作不俗本誤位競下位競修其小職有登則矣業大橈其任以墜於下故上位慎則上位慎大任有墜職矣共其其鼎覆刑焉何憚於降折足覆公餗其易鼎九四曰鼎事刑之尚可何況降位形渥凶此言大臣廢壞國若夫千里之任不能充於郡而縣邑之功廢惜矣哉不以過職絀則勿降所以優賢也以過職絀則降所以懲愆也郡二千石不拘為縣也此一首所謂公卿不拘為孝武皇帝以四夷未賔寇賊姦宄初置武功賞官以寵戰士竭不足以奉戰士有司請食大司農陳臧錢經用賦税既武功爵級十七萬凡直三十餘萬金諸買武民得買爵及贖禁錮免臧罪請置賞官名曰有罪又減二等爵得至樂卿以顯軍功按茂功爵官首者試補吏先除千夫如五大夫其衞三級曰良士四級曰元戎士五級曰官首陵中書有武功爵一級曰造士二級曰閑輿曰執戎十級曰政戾庶長十一級曰軍衛此六級曰秉鐸七級曰千夫八級曰樂卿九級以寵軍功武帝所制若今依此科而崇其制置尚武之官以司馬兵法選位秩比博士苴撰兵法三齊將司馬穰六百石也卷秩比博士講司馬之典簡蒐狩之事中春古者秋教治兵遂以獮田中冬教大閲遂以狩田教振旅遂以蒐田中夏教茇舍遂以苗田中周禮詳見掌軍功爵賞小統於五校枚五校者一校俗本誤作射聲俱掌宿衞兵所謂大駕鹵簿五校在前曰屯騎二曰越騎三曰步兵四曰長水五曰也是大統於太尉武帝建元二年省元狩四年太尉秦官金印紫綬掌武事建武二十七年復為太尉初置大司馬以冠將軍之號既周時務禮亦冝之周之末葉兵革繁矣莫亂於秦民不荒殄今國家忘戰日久毎寇難之作民瘁幾盡不教民戰是謂棄之信矣戰是謂棄之古者孔子曰以不教民首所謂置尚武之官也四時于田所以教爾此一或問曰州牧刺史監察御史三制孰優史秦監御監三輔郡所察之事凡九條監者二嵗更之官掌監郡漢興省之至惠帝三年又遣御史史不奉法下失其職乃遣丞相史出刺并督其後諸州復置監察御史文帝十三年以御五年乃置部刺史掌奉詔六條察州凡十二察監御史武帝元封元年御史止不復監至為刺史位下大夫而臨二千石輕重不相凖州焉居部九嵗舉為守相成帝綏和元年以年復為刺史元壽二年復為牧建武十八年乃更為州牧秩真二千石位次九卿建平二行所部録囚徒考殿最初嵗盡詣京師奏事復為刺史十二人各主一外州舊以八月廵不得去職或謂州府為外臺靈帝中平五年中興但因計吏不復自詣京師雖父母之䘮九卿出領州牧州牧之任自此重矣改刺史惟置牧是時天下方亂多自曰時制而已時所定三制隨曰天下不既定其牧乎曰古諸侯建家國世位權柄存焉於是置諸侯之賢者以牧總其紀綱而已不統其政不御其民今郡縣無常侯之世位不若古諸權輕不固侯之權柄不若古諸存而州牧秉其權重勢異於古之牧不統政不若古諸侯民御非所以强榦弱枝也而無益治民之實監察御史斯可也愈於州牧言監御史若權時之冝則異論也議州牧也此一首所謂肉刑古也或曰復之乎曰古者人民盛焉今也至寡整衆以威撫寡以寛道也復刑非務必也生刑而極死者復之可也生刑也而改如斬右趾本斬右趾之刑復之可也爲棄市則極死矣斯則自古肉刑之除也斬右趾者死也惟復肉刑是謂生死而息民文孝城旦春當黥者髠鉗爲城旦春當劓者笞三下令除肉刑張蒼等立律曰諸當完者完爲自告及吏受賕枉法守縣官財物而卽盜之百當斬左止者笞五百當斬右止及殺人先之名內實殺人斬右止者又當死笞五百三已論命復有笞罪者皆棄市是後外有輕刑者復之則死者生而民生息矣此一首所謂百率多死至景帝更定箠令此言肉刑極死但加肉刑也生刑而死者問德刑並用常典也或先或後時冝後刑或或先德隨時所宜先刑後德刑教不行勢極也過伉耳常典不行教初必簡刑始必略事漸也從冝於簡略創始欲民易教化之隆莫不興行然後責備漸而備簡者以刑法之定莫不避罪然後求密漸而密略者以未可以備謂之虚教責備焉是謂虚教也教化未隆民不興行而未可以密謂之峻刑求密焉是謂峻刑也刑法未定民不避罪而虚教傷化峻刑害民君子弗由也設必違之教不量民力之未能是招民於惡也故謂之傷化責備則教必未可以備而違設必犯之法不度民情之不堪是䧟民於罪也故謂之害民密則法必犯未可以密而求莫不興行則一毫之善可得而勸也然後教備飭則教民行脩不違備而莫不避罪則纎介之惡可得而禁也然後刑密此一首所謂徳刑並用也民知畏罪則法密而不犯或問復讎古義也曰縱復讎可乎曰不可之縱殺亂滋生矣則人將倚法專曰然則如之何曰有縱有禁有生有殺生避而報之殺所謂有禁有殺弗避而報者無罪所謂有縱有制之以義義不同天據禮經則斷之以法殺人者死徵法令則是謂義法並立曰何謂也曰依古復讎之科使父讎避諸異州千里兄弟之讎避諸異郡五百里從父從兄弟之讎避諸異縣百里人凡和周禮調外從父兄弟之讎不同國君之讎眡父師長難父之讎辟諸海外兄弟之讎辟諸千里之與之瑞節而以執之凡殺人有反殺者使邦之讎眡兄弟主友之讎眡從父兄弟弗辟則之則死此古復讎之科也又禮記曰父之讎國交讎之凡殺人而義者不同國令勿讎讎同國又子夏問於孔子曰居父母之讎如之弗與共載天兄弟之讎不反兵交遊之讎不諸市朝不反兵而鬬曰請問居昆弟之讎如何夫子曰寢苦枕干不仕弗與共天下也遇鬬曰請問居從父昆弟之讎如之何曰不為之何曰仕弗與共國銜君命而使雖遇之不後按此異州乃九州之州魁主人能則執兵而陪其弗避而報者無罪之義而已故報者生之未辟之前但知有復讐避而報之殺後則有既辟之報者誅之王禁在焉故犯王禁者罪也復讎者義也以義報罪從王制順也犯制逆也以逆順生殺之凡以公命行止者不為弗避辟讎有科也此一首所謂或問禄曰古之禄也備孟子王制其詳見周禮漢之禄也輕石至百石各有等差漢制禄秩自中二千夫禄必稱位一物不稱非制也公祿貶則私利生則賄賂行矣言月俸貶損私利生則廉者匱而貪者豐也汙墨者富羡潔白者窶貧夫豐貪生私匱廉貶公是亂也先王重之曰禄可増乎曰民家財愆増之冝矣或曰今禄如何帝時今謂獻曰時匱也禄依食食依民參相澹及以澹不足之澹此言民以給食食以給澹古贍字給也即漢書猶未足以澹其欲相贍也禄所謂參必也正貪禄吏黜汙省閑冗官汰羡與時消息昭惠恤下損益以度可也謂議禄也此一首所諸侯不專封富人名田踰限富過公侯是自封也大夫不專地人賣買由已是專地也仲董井田民得賣買富者田連仟伯貧者亡立錐舒説武帝曰秦用商鞅之法改帝王之制除踰侈以相髙邑有人君之尊里有公侯之富之地又顓川澤之地管山林之饒荒淫越制古限民各田以澹不足至哀帝時師丹建言小民安得不困古井田法雖難卒行冝少近冝略爲限丞相孔光大司空何武奏請諸侯累世承平豪富吏民訾數鉅萬而貧弱愈囷田縣道及關内侯吏民名田皆母過三十頃王列侯皆得名田國中列侯在長安公主名皆不便也後遂寢不行時丁傅用事董賢隆貴或曰復井田與曰否專地非古也井田非今也之典而井田廢久言專地固非隆古所可行又非今然則如之何曰耕而勿有以俟制度可也不得踰限也此一首所謂議專地也耕而勿有不得賣買由已以俟制度或問貨曰五銖之制冝矣圜法錢圜函方輕太公爲周立九府平帝元始中成錢二百八十億萬餘王莽居重以銖至漢孝武元狩五年初鑄五銖錢至錢五十又造契刀錯刀與五銖凡四品並行攝變漢制於是更造大錢重十一銖又曰大品而民便五銖私相市買莽下詔敢非井田莽即真乃罷契刀錯刀及五銖更造錢貨六是農商失業食貨俱廢世祖受命復五銖錢挾五銖錢者為惑衆投諸四裔以御魑魅於銖之制冝便於民久矣與天下更始觀此則五曰今廢如之何獻帝今謂五銖錢更鑄小錢是也時廢者初平元年董卓壞曰海内既平行之而已此制冝復言卓既誅曰錢散矣京畿甸一作虚矣其勢必積於遠方若果行之則彼以無用之錢市吾有用之物是匱近而豐逺也曰積曰無曰散曰虚銖彼謂逺方也用之錢皆言五曰事勢有不得官之所急者榖也牛馬之禁不得出百里之外若其他物彼以其錢取之於左用之於右貿遷有無周而通之海内一家何患焉他物以正銖貿遷言五穀不得及逺近為患也不足以匱曰錢寡矣曰錢寡民易矣若錢既通而不周於用然後官鑄而𥙷之廢故易由言五銖由鑄以贍可也易故寡不足官或曰收民之藏錢者輸之官牧逺輸之京師然後行之曰事枉而難實者欺慢必衆姧偽必作争訟必繁刑殺必深吁嗟紛擾之聲章乎天下矣非所以撫遺民成緝熈也而後行之驗動不可此言逺收五銖於京師曰然則收而積之與曰通市其可也積貯亦不可此言收五銖或曰改鑄四銖曰難矣孝文之舊亦不可此言改鑄四銖以復或曰遂廢之曰錢實便於事用民樂行之禁之難今開難令以絶便事禁民所樂不茂矣五銖以此言廢所樂亦不可絶民所便禁民曰起而行之錢不可如之何曰尚之廢之弗得已何憂焉勢自有所不得言或尚或廢其行也厥後曹操為相還用五銖悅之言驗矣已者蓋民便五銖不得而終廢之不憂其不議錢貨也此一首所謂聖王先成民而後致力於神聖王先成民而東觀書詔傳曰於神後致力民事未定旱癘疫之災謂有日月水郡祀有闕不爲尤矣必也舉其重而祀之望祀五嶽四瀆其神之祀縣有舊常瀆江河淮濟也按漢制五嶽岱衡華恒嵩也四月日合凍臘月日涸凍正月日解凍皆太守岱宗廟在博縣西北三十里山虞長守之十十朐縣次傳送京師衡廟在廬江灊縣華廟自侍祠法七十萬五千三牲燔柴上福脯三在潁川陽成縣皆同禮河廟在河南滎陽縣在弘農華隂縣恒廟在中山上曲陽縣嵩廟陵江都縣淮廟在平氏縣濟廟在東郡臨邑河隄謁者掌四瀆禮祠與五嶽同江廟在廣祀縣有舊常也縣所謂其神之若今郡祀之而其祀禮物從鮮可也未定望祀可也若必郡祀則禮物冝言嶽瀆之祀雖曰縣有常典但民事略從省禮重本示民不偷且昭典物其備物以豐年日月之災降異非舊也約祀舉重也此一首所謂天人之應所由來漸矣故履霜堅氷非一時也霜堅氷至坤初六曰履仲尼之禱非一朝也且日食行事或稠或曠一年二交非其常也洪範傳云六沴作見若是王都未見之無聞焉爾官脩其方而先王之禮保章視祲安宅叙降必書雲物爲備故也星辰日月之變動以觀天周禮保章氏掌天星以志封域皆有分星以觀妖祥以十有二歲之相下之遷辨其吉凶以星土辨九州之地所封豐荒之祲象以十有一風察天地之和命乖觀天下之妖祥以五雲之物辨吉凶水旱降眡祲掌十煇之法以觀妖祥辨吉凶一曰祲别之妖祥凡此五物者以詔救政訪序事又彌八曰叙九曰隮十曰想掌安宅叙降鄭氏二曰象三曰鑴四曰監五曰闇六曰瞢七曰其居處也次序其凶禍所下謂禳移之曰宅居也降下也人見妖祥則不安主安太史上事無隱焉勿寢可也天時星曆凡嵗將百官志太史令掌節禁忌凡國有瑞應災異掌記之靈臺丞掌終奏新年曆凡國祭祀䘮娶掌奏良日及時詔四十二人其十四人候星二人候日三人守靈臺候日月星氣屬太史漢官曰靈臺待律一人舍人此一首所謂天人之應也候風十二人候氣三人候晷景七人候鍾天子南面聽天下嚮明而治蓋取諸離辭離易繫南面而聽天下嚮明而治蓋取諸此也也者明也萬物皆相見南方之卦也聖人天之道也月正聽朝國家之大事也月朔嵗首禮儀志每及䞇公侯璧中二千石二千石羔千石六百為大朝受賀其儀夜漏未盡七刻鍾鳴受賀上上殿稱萬嵗舉觴御坐前司空奉羮大司石鴈四百石以下雉百官賀正月二千石以每朔唯十月旦從故事者髙祖定秦之月元農奉飯奏食舉樂百官受賜宴饗大作樂其首也年嵗冝正其儀以明舊典每月常朝後以頻漢舊儀公卿以下其儀不舉久矣此一首所謂月正聽朝也省唯六月十月朔後復以六月盛暑省之古有掌隂陽之禮之官以教後宫以隂禮教周禮内宰以婦職之法教九御六宫以隂禮教九嬪掌婦學之法婦徳婦言婦容二字按此當有婦功九御婦徳婦言婦容婦功各周禮九嬪掌婦學之法以教貞順婦言謂辭令婦容謂婉娩婦功謂絲枲帥其屬而以時御叙于王所鄭氏曰婦徳謂也各率其屬而以時御序于王先王禮也宜崇其教以先内政覽列圖誦列傳遵典行内史執其彤管記善書過考行黜陟以章好惡男女正位乎内外正家而天下定矣曰女正易家人之大義也又曰正家而天下定矣位乎内男正位乎外男女正天地故二儀立而大業成君子之道匪闕終日造次必於是崇内教也此一首所謂備愽士五經愽士黄龍初稍増員十二人後搏士秦官掌通古今武帝建元初置四施孟梁丘京氏尚書三歐陽大小夏侯氏漢百官志愽士祭酒一人博士十四人掌易羊嚴顔氏掌教弟子國有疑事掌承問對詩三魯齊韓氏禮二大小戴氏春秋二公廣太學也辟雍而祀孔子焉禮也仲尼作經本一而已古今文不同而皆自謂真本經真傳各謂古今先師義一而已異家别説不同而皆自謂古今有誤此處仲尼邈而靡質經無所質大聖已逝昔先師没而無間義無所間老師已喪將誰使折之者秦之滅學也書藏於屋壁義絶於朝野秦始皇滅先孔安國書序解散我先人用藏其家書于屋壁代典籍焚書坑儒夫下學士逃難逮至漢興收摭散滯固已無全學矣篇籍廣開獻書之藝文志漢興大收簡脫禮壞樂崩路迄孝武世書缺文有磨滅言有楚夏出有先後得二十九篇至魯恭王壞孔子宅得所如文帝時伏生口誦尚書以授晁錯僅生二十五篇此出有先後之類也藏科斗文字定其可知者増多伏或學者先意有所借定臆見損益無所徵據後進相放彌以滋蔓故一源十流天水違行而訟者紛如也曰天易訟行喻學者所傳背戾玄相爭是也與水違行此以天上水下相違而執不俱是比而論之必有可參者焉備博士也此一首所謂或曰至德要道約爾典籍甚富如而愽之以求約也語有之曰有鳥將來張羅待之得鳥者一目也今為一目之羅無時得鳥矣道羅鳥喻籍喻典道雖要也非博無以通矣而詳説之將孟子曰博學約也以反説愽其方約其説至德要道也此一首所謂赦令權也之後不得已而行者謂凶荒流離盜賊垢汙或曰有制乎曰權無制制其義不制其事巽以行權繫易文辭義制也權者反經無事也問其象曰無妄之災大過凶其象矣不得已而行之禁其屢也卓辛亥大赦天下二年春正月辛丑大赦初平元年春正月山東川郡起兵以討董大赦天下卓誅部將李催等六月䧟長安己天下三年春正月丁丑大赦天下五月下酉年春正月辛酉大赦天下二年春正月癸丑未大赦天下四年春丁卯大赦天下興平元於安邑大赦天下丁丑郊祀上帝大赦天下大赦天下建安元年春正月癸酉郊祀上帝十可謂數甚故悅以此規之初平至此凡七年而大赦者曰絶之乎曰權曰冝弗之絶也一首所謂禁數赦令也既曰權冝著非常典此尚主之制非古也釐降二女陶唐之典曰嫠堯典汭嬪於虞降二女於媯歸妹元吉帝乙之訓曰帝乙歸易泰九五元吉妹以祉王姬歸齊宗周之禮姬亦下嫁于諸詩序曰雖則王侯以隂乗陽違天以婦凌夫違人違天不祥違人不義陳便冝以漢承秦法設尙主之儀悅之叔父荀爽於延熹九年對䇿義冝改尙主之制今悅復以爲言殆其家門以妻制夫以卑臨尊違乾坤之道失陽唱之所謂正尙主之制也素所商講者乎此一首古者天子諸侯有事必告于廟朝有二史左史記言右史記動食玄端而居動則左史書按漢書作事字玉藻曰卒史書之之言則右動爲春秋記事春秋言爲尙書記言尙書君舉必記臧否作善惡按漢書成敗無不存焉下及士庶等各有異茍有茂異按漢書作咸在載籍或欲顯而不得或欲隱而名章至公紀以得失一朝而榮辱千載善人勸焉淫人懼焉故先王重之以嗣賞罰以輔法教冝於今者官以其日各書其盡則集之於尚書史官掌其典文紀其行事按漢書作冝於今者備置則此上下必有脱誤毎於嵗盡舉之尚書若史官使掌典其事不書詭常為善惡則書言行足以為法式則書立功事則書兵戎動衆則書四夷朝獻則書皇后貴人太子拜立則書為三夫人光武置貴人公主大臣拜免則書福淫禍亂則書祥瑞災異則書先帝故事有起居注明徳馬皇后自撰顯漢時有禁中起居故居注宗起日用動靜之節必書焉冝復其式内史掌之以紀内事内外注記者也此一首所謂復申鑒卷第二
