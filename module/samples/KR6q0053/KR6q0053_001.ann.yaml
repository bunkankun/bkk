  seg_id: KR6q0053_T_001-0506b.90
  pos: 9
  translation:
    text: '"There are appropriate ceremonies to be observed when a guest and host
      meet.'
    title: 臨濟錄 (en)
    src: Christoph Anderl
  form:
    orig: 威儀
    orth: 威儀
    pron: wēi yí
  sense:
    id: uuid-2f828de4-f038-4abc-8cc1-469eb37b2426
    pos: N
    syn_func: NPab
    sem_feat: act
    def: 'ZUO: proper behaviour; BUDDH: the proper behaviour/right demeanor; in the
      Buddhist context referring to the proper conduct of monks and nuns as defined
      in the vinaya texts and other texts related to the precepts (the origin of this
      term is pre-Buddhist and refers to right behaviour, proper demeanor; in the
      Buddhist context referring to the proper conduct of monks and nuns which is
      defined especially in vinaya texts and texts related to the precepts. Often
      the term refers to four specific deportments in daily life (sìwēiyí 四威儀), i.e.
      when walking, standing, sitting, and lying down (representing the daily activities).
      See especially DDB (see also NAKAMURA: 33b; FOGUANG: 3771; according to Yanagida
      yǒubiǎo 有表 ''have-expression > expressed, manifest'' is a term typically used
      in the Vinaya School, referring to the concrete correct behaviour required in
      performing the ''three actions'' (sānyè 三業, i.e. physical actions, oral expressions
      and thought processes). Often set in contrast to wúbiǎo jiè 無表戒 ''un-expressed
      (non-manifest) precepts'' (see YANAGIDA 1990: 396, fn. 269; on yǒubiǎo and wúbiǎo
      see also DDB) corr[CH]'
  metadata:
    resp: CH
    created: '2019-03-26T13:08:54.554+09:00'
  offset: 15856
