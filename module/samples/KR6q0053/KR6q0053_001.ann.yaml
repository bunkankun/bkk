- id: uuid-27fd5096-480d-43ab-b5a7-c89e0ef5d099
  concept: MONASTIC BUILDING
  concept_id: uuid-81b9a72f-a494-4df0-96cb-75e64d85b49e
  seg_id: KR6q0053_T_001-0504b.43
  pos: 4
  translation:
    text: Still dressed in his travling clothes, he entered the Dharma Hall to see
      Jingshan.
    title: 臨濟錄 (en)
    src: Christoph Anderl
  form:
    orig: 法堂
    orth: 法堂
    pron: fǎ táng
  sense:
    id: uuid-d39a3ec5-e239-4dbb-ad40-e909ca1924e8
    pos: N
    syn_func: NP
    def: 'BUDDH: dharma-hall (this refers to one of the main buildings of a Buddhist
      monastery, also called lecture-hall (jiǎngtáng 講堂). The word appears already
      in sūtra literature and an early reference can be found in XGSZ. The dharma-hall
