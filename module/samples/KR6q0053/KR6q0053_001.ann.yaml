  concept: BUDDHIST DEITIES
  concept_id: uuid-99966339-0ca3-4191-b8be-a2c84711be95
  seg_id: KR6q0053_T_001-0502a.75
  pos: 1
  translation:
    text: the gods of the earth stand guard with their legs,
    title: 臨濟錄 (en)
    src: Christoph Anderl
  form:
    orig: 地神
    orth: 地神
    pron: dì shén
  sense:
    id: uuid-5b65f6d8-26a1-425f-b368-70a54f8f7595
    pos: N
    syn_func: NP
    def: 'BUDDH: Earth God; skr. Pṛthivī (god who controls the earth; more commonly
      known as Dìtiān 地天; also referred to as Jiānláo dìshén 堅牢地神, Jiānláo dìtiān
      堅牢地天, Chídì shén 持地神) (one of the twelve devas (十二天); according to Buddhist
      legend, when Buddha was about to be enlightened, this spirit appeared and drove
      away the forces of Māra; consequently stayed with Buddha for a period and afterwards
      spread the Buddhist teachings in the Heavens, becoming one of the guardian gods
      of Buddhism; the description of the spirit differs very much according to several
      Buddhist scriptures, some describing the spirit as having male gender, others
      as being female)'
  metadata:
    resp: CH
    created: '2019-03-26T13:08:54.554+09:00'
