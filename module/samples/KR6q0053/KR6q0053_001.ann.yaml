- id: uuid-6a43c1ca-d146-4215-a5ef-6ab75025a60c
  concept: ACT
  concept_id: uuid-abfdc4bb-445b-44d8-a4e9-f9f114a2beba
  seg_id: KR6q0053_T_001-0497c.40
  pos: 7
  translation:
    text: '"Just get so you can follow along with circumstances and use up your old
      karma.'
    title: 臨濟錄 (en)
    src: Christoph Anderl
  form:
    orig: 業
    orth: 業
    pron: yè
  sense:
    id: uuid-8f6707b7-9f56-4d89-9a3d-2e04966eba0b
    pos: N
    syn_func: nab
    sem_feat: act
    def: 'BUDDH: skr. karma; pali kamma (lit. action, deed of karmic significance)This
      is agency which brings forth ''existence'' (yǒu 有 ) and is in turn caused by
      mental defilements (usually ''craving'' (tṛṣṇā) and ''ignorance'' (avidyā));
      the concept of karma in India predates the emergence of Buddhism, but was somewhat
      redefined in Buddhism and Śākyamuni was said to have put much emphasis on the
      law of moral causality which is determined by one''s actions; karma is often
      subdivided in three kind of actions: physical, shēnyè 身業, skr. kāya-karman,
      PALI kāya-kamma; verbal, kǒuyè 口業, SANSKRIT vāk-karman, PALI vacī-kamma; mental,
      yìyè 意業, skr. manas-karma, PALI mano-kamma, mental karma is sometims also referred
      to as ''non-manifest'' or ''latent'' action (skr. avijñapti, PALI aviññatti,
      wúbiǎoyè 無表業; another method of classifying karma is according to the nature
      of the actions, i.e. ''wholesome deeds'', shànyè 善業, SANSKRIT kuśala-karman,
      PALI kusala-kamma; and ''evil deeds'', èyè 惡業, skr. pāpa-karman, pali pāpa-kammaFocusing
      on the destiny after death which are caused by one''s actions, karma is divided
      into fúyè 福業, ''meritorious actions'' (skr. puṇya, pali puñña), and demeritorious
      actions, fēifúyè 非福業, skr. apuṇya, pali apuñña)(Actions which lead to rebirth
      in the three realms, sānjiè 三界 (including good and bad actions) are referred
      to as ''defiled actions'' yǒulòuyè 有漏業, skr. sāsrava-karman; by contrast there
      are ''undefiled actions'', wúlòuyè 無漏業, skr. anāsrava-karman (often referring
      to the actions of a Bodhisattva; in the case of Buddha one speaks of fóshì 佛事,
      ''Buddha-deeds'', skr. buddha-kāryaThe concept of karma is further complicated
      by the question who and what transmigrates, since in Buddhism the existence
      of an entity surviving death is denied (one of the later approaches to solve
