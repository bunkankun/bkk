seq: 1
front:
  text: 臨濟慧照玄公大宗師語錄序曹溪派列淘涌而流注無窮南嶽岐分巍峨而聯綿不盡雲仍曼衍枝葉滋榮非止蔭覆人天抑亦光揚祖道無說之說須知意不在言無聞之聞果信言非有意此皆理極無喻之道緒餘影響者也故臨濟祖師以正法眼明涅槃心興大智大慈運大機大用棒頭喝下勦絕凡情電掣星馳卒難搆副豈容擬議那許追思非唯鷄過新羅欲使鳳趨霄漢不留朕跡透脫玄關令三界迷徒歸一真實際天下英流莫不仰瞻為一宗之祖理當然也今總統雪堂禪師乃臨濟十八代孫河北江南遍尋是錄偶至餘杭得獲是本如貧得寶似暗得燈踊躍歡呼不勝感激遂捨長財繡梓流通俵施諸剎此一端奇事寔千載難逢咦擲地金聲聞四海定知珠玉價難酬元貞二年歲次丁未大都報恩禪寺住持嗣祖林泉老人從倫盥手焚香謹序臨濟慧照玄公大宗師語錄序薄伽梵正法眼藏涅槃妙心付摩訶迦葉是為第一祖逮二十八祖菩提達磨提十方三世諸佛密印而來震旦是時中國始知佛法有教外別傳不立文字直指人心見性成佛厥後優鉢羅花於時出現芬芳馥郁一華五葉香風匝地寶色照天各放無量光明輝映大千世界其中一大苾芻為一大事因緣依棲黃蘗山中三度參請三度被打後向高安灘頭大愚老師處始全印證平生用金剛王寶劍逢凡殺凡逢聖殺聖風行草偃號令八方如雪色象王如金毛師子踞地哮吼狐狸野干心破腦裂百獸見之無不股慄如驚濤嶮崖壁立萬仞使途中之人其行次且不敢舉足下足惟恐喪身失命雖老子鉗槌者見之無不汗下若夫三玄三要奪境奪人金章玉句如風檣陣馬如迅雷奔霆凌轢波濤穿穴嶮固破碎陣敵天回地轉七縱八橫幾於截斷眾流四海學徒莫不望風披靡故門庭峻峭孤硬難入蓋妙用功夫不在文字不離文字盡大地作一隻眼者乃能識之末後將正法眼藏却向瞎驢邊滅却師之出處具載傳燈等錄茲不復贅自興化獎公而下子孫雲仍最為蕃衍盛大多大根器人冠映河嶽騰耀古今在在處處法席叢林化俗談真重規疊矩出廣長舌相為人開堂演法如慈明圓公琅瑯覺公皆大法王人天師也今雪堂大禪師臨濟十八代嫡孫琅瑯第十世的派王臣尊禮緇素嚮慕是亦僧中之龍象爾不忘祖師恩德每恨臨濟一言一句一棒一喝參承諮決升堂入室語錄未大發明刻梓流行用廣禪林觀聽仍求北山居士郭天錫為作序引嗚呼雪堂老師行從上祖師難能之事慎終追遠知恩報恩則不無將五百年風顛老漢吐下唾團重新拈出供養今代衲僧還肯咀嚼麼合浦還珠固為奇特冷灰爆豆亦自不妨大德二年八月前監察御史郭天錫焚香九拜書臨濟慧照玄公大宗師語錄序竊以黃蘗山高便敢當頭捋虎滹陀岸遠亦能順水操舟既露惡毒爪牙仍顯慈悲手段欄腮一掌免煩著齒粘唇劈肋三拳可謂傾心吐膽三玄在手七事隨身觸之則石裂崖崩擬之則雷轟電掣門庭孤峻閫奧宏深只可望崖不可趣向茲者總統雪堂和尚憫巴歌唱而和寡嗟雪曲彈而應稀語錄闕文叢林罕見遂旁求釋子而再起斯文欲鏤板以廣流通俾參玄而得受用弘揚祖道垂裕後昆棒頭喝下須明石火電光正案傍提要顧眉毛鼻孔其他機緣備載前錄不勞再舉噫臨濟祖師六傳而至汾陽大宗師汾陽下傑出六大尊者曰慈明圓曰琅瑘覺圓傳陽岐會會傳白雲端端傳五祖演演傳佛果勤佛鑑天目齊佛果傳虎丘隆大慧杲虎丘隆傳應菴華華傳密菴傑傑傳松源岳岳傳無德通通傳虛舟度度傳徑山虎巖伏天目齊傳汝州和和傳竹林寶寶傳竹林安安傳竹林海海傳慶壽璋白澗一歸雲宣宣傳平山亮白澗一傳冲虛昉懶牧歸慶壽璋傳海雲大宗師竹林彛彛傳龍華惠海雲傳可菴朗龍宮玉頤菴儇可菴傳太傅劉文貞公慶壽滿龍宮玉傳大名海頤菴傳慶壽安琅瑘覺傳泐潭月月傳毘陵真真傳白水白白傳天寧黨黨傳慈照純純傳鄭州寶寶傳竹林藏慶壽亨少林鑑慶壽亨傳東平汴大原昭少林鑑傳法王通通傳安閑覺覺傳南京智西菴贇南京智傳壽峯湛西菴贇傳雪堂仁雪堂乃臨濟十八世孫也莫不門庭孤峻機辯縱橫俱是克家子孫燈燈續焰直至如今可謂源清流長此之謂也雪堂禪師乃吾三世祖囑子為序率爾書之腦後見腮頂門具眼者大發一笑開泰退堂襲祖第二十世孫五峯普秀齋沐焚香拜書鎮州臨濟慧照禪師語錄序延康殿學士金紫光祿大夫真定府路安撫使兼馬步軍都總管兼知成德軍府事馬防撰黃檗山頭曾遭痛棒大愚肋下方解築拳饒舌老婆尿床鬼子這風顛漢再捋虎鬚巖谷栽松後人標榜钁頭斸地幾被活埋肯箇後生驀口自摑辭焚机案坐斷舌頭不是河南便歸河北院臨古渡運濟往來把定要津壁立萬仞奪人奪境陶鑄仙陀三要三玄鈐鎚衲子常在家舍不離途中無位真人面門出入兩堂齊喝賓主歷然照用同時本無前後菱花對像虛谷傳聲妙應無方不留朕跡拂衣南邁戾止大名興化師承東堂迎侍銅瓶鐵鉢掩室杜詞松老雲閑曠然自適面壁未幾密付將終正法誰傳瞎驢邊滅圓覺老演今為流通點撿將來故無差舛唯餘一喝尚要商量具眼禪流冀無賺舉宣和庚子中秋日謹序
